// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {

  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

<script type="text/babel">
// Perdidos Algures — Auth screens & hook (Supabase-backed).
// Replaces localStorage-based AuthStore with real Supabase auth.
// The trigger in supabase-setup.sql creates the profile row automatically.
// Admin is whoever registers with the name "Miguel" first.

const { useState: aUseState, useEffect: aUseEffect, useRef: aUseRef } = React;

// ── useAuth hook ───────────────────────────────────────────────
// Returns { user, profile, loading, login, register, logout }
// Ensure a profile row exists. If the DB trigger failed, creates it on the fly.
async function ensureProfile(u) {
  let p = await DB.getProfile(u.id).catch(() => null);
  if (p) return p;
  const meta = u.user_metadata || {};
  const name = meta.name || u.email?.split('@')[0] || 'Utilizador';
  const isAdmin = name.trim().toLowerCase() === 'miguel';
  try {
    await sb.from('profiles').insert({
      id: u.id, name,
      initials: meta.initials || initialsFromName(name),
      color:    meta.color    || colorFromName(name),
      photo_url: meta.photo_url || null,
      is_admin: isAdmin,
    });
  } catch {}
  return await DB.getProfile(u.id).catch(() => null);
}

// user   = Supabase auth.User (raw)
// profile = profiles row from DB (name, color, is_admin, etc.)
function useAuth() {
  const [user,    setUser]    = aUseState(null);
  const [profile, setProfile] = aUseState(null);
  const [loading, setLoading] = aUseState(true);

  aUseEffect(() => {
    // Check existing session
    sb.auth.getSession().then(({ data }) => {
      const u = data.session?.user ?? null;
      setUser(u);
      if (u) {
        DB.getProfile(u.id).then((p) => { setProfile(p); setLoading(false); });
      } else {
        setLoading(false);
      }
    }).catch(() => {
      // Graceful fallback if Supabase auth is unavailable (e.g. sandboxed iframe)
      setLoading(false);
    });

    // Listen for auth changes
    const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
      const u = session?.user ?? null;
      setUser(u);
      if (u) {
        DB.getProfile(u.id).then((p) => {
          // If profile doesn't exist yet (new user), wait a bit and retry
          // (profile is created by a Supabase trigger after signUp)
          if (!p) {
            setTimeout(() => {
              DB.getProfile(u.id).then((p2) => { setProfile(p2); setLoading(false); })
                .catch(() => setLoading(false));
            }, 1500);
          } else {
            setProfile(p); setLoading(false);
          }
        }).catch(() => setLoading(false));
      } else {
        setProfile(null);
        setLoading(false);
      }
    });

    return () => subscription.unsubscribe();
  }, []);

  const login = async (name, password) => {
    setLoading(true);
    try {
      const u = await DB.signIn({ name, password });
      // onAuthStateChange will update state
      return u;
    } catch (e) {
      setLoading(false);
      throw e;
    }
  };

  const register = async (data) => {
    setLoading(true);
    try {
      await DB.signUp(data);
      // After signup, immediately sign in so the session is established
      // (Supabase may not auto-confirm email, so we force signIn here)
      const u = await DB.signIn({ name: data.name, password: data.password });
      // onAuthStateChange will update state, but set loading false as safety
      return u;
    } catch (e) {
      setLoading(false);
      throw e;
    }
  };

  const logout = async () => {
    await DB.signOut();
    setUser(null);
    setProfile(null);
  };

  return { user, profile, loading, login, register, logout };
}

// Photo file → downscaled data URL (for preview before upload)
async function readPhotoFile(file) {
  if (!file) return null;
  const dataUrl = await new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.onerror = rej;
    fr.readAsDataURL(file);
  });
  const img = await new Promise((res, rej) => {
    const im = new Image();
    im.onload = () => res(im);
    im.onerror = rej;
    im.src = dataUrl;
  });
  const max = 400;
  const scale = Math.min(1, max / Math.max(img.width, img.height));
  const canvas = document.createElement('canvas');
  canvas.width  = Math.round(img.width  * scale);
  canvas.height = Math.round(img.height * scale);
  canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.85);
}

// ── Auth layout (split screen) ─────────────────────────────────
function AuthLayout({ children, narrow }) {
  return (
    <div style={{
      width: '100%', height: '100%', minHeight: 640,
      background: 'var(--pa-bg)',
      display: 'flex', flexDirection: narrow ? 'column' : 'row',

        display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
        position: 'relative', overflow: 'hidden',
      }}>
        <div style={{ position: 'absolute', top: -120, right: -80, width: 360, height: 360, borderRadius: '50%', background: 'var(--pa-accent)', opacity: 0.22 }} />
        <div style={{ position: 'relative' }}>
          <Logo size={16} color="#fff" />
        </div>
        <div style={{ position: 'relative' }}>
          <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 11, letterSpacing: 1.4, color: 'rgba(255,255,255,0.5)', textTransform: 'uppercase' }}>
            A sua aplicação de grupo
          </div>
          <div style={{ marginTop: 10, fontFamily: 'var(--pa-display)', fontSize: narrow ? 30 : 48, fontWeight: 600, letterSpacing: -1.5, lineHeight: 0.98 }}>
            Perdidos<br/><span style={{ color: 'var(--pa-accent)' }}>Algures.</span>
          </div>
          {!narrow && <div style={{ marginTop: 14, fontSize: 14, color: 'rgba(255,255,255,0.65)', maxWidth: 340, lineHeight: 1.5 }}>
            Votem nos destinos, escolham o alojamento, marquem os dias. Tudo junto, sem WhatsApp a explodir.
          </div>}
        </div>
        {!narrow && (
          <div style={{ position: 'relative', fontFamily: 'var(--pa-mono)', fontSize: 10.5, color: 'rgba(255,255,255,0.4)', letterSpacing: 1 }}>
            Só para o grupo · privado
          </div>
        )}
      </div>

      {/* form panel */}
      <div style={{
        flex: 1, padding: narrow ? '32px 28px 52px' : '60px 52px',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{ width: '100%', maxWidth: 360 }}>
          {children}
        </div>
      </div>
    </div>
  );
}

// ── Login screen ───────────────────────────────────────────────
function LoginScreen({ auth, onSwitch, narrow }) {
  const [name, setName] = aUseState('');
  const [pw, setPw]     = aUseState('');
  const [busy, setBusy] = aUseState(false);
  const [err, setErr]   = aUseState(null);

  const submit = async (e) => {
    e.preventDefault();
    setBusy(true); setErr(null);
    try { await auth.login(name, pw); }
    catch (ex) { setErr(ex.message); setBusy(false); }
  };

  return (
    <AuthLayout narrow={narrow}>
      <div style={{ fontFamily: 'var(--pa-display)', fontSize: 34, fontWeight: 600, letterSpacing: -1.2, lineHeight: 1 }}>
        Bem-vindo<br/>de volta.
      </div>
      <div style={{ marginTop: 10, color: 'var(--pa-muted)', fontSize: 14 }}>
        Entra com o nome e a password que criaste.
      </div>

      <form onSubmit={submit} style={{ marginTop: 28, display: 'flex', flexDirection: 'column', gap: 14 }}>
        <Field label="O teu nome" placeholder="Rita / Tiago / ..." value={name} onChange={setName} />
        <AuthPasswordField label="Password" value={pw} onChange={setPw} />
        {err && <AuthError msg={err} />}
        <button type="submit" disabled={busy || !name || !pw} style={{
          marginTop: 6, height: 52, borderRadius: 999, border: 'none',
          background: 'var(--pa-ink)', color: '#fff',
          cursor: (busy || !name || !pw) ? 'default' : 'pointer',
          fontFamily: 'var(--pa-body)', fontSize: 15, fontWeight: 600,
          opacity: (busy || !name || !pw) ? 0.5 : 1, transition: 'opacity .15s',
        }}>{busy ? 'A entrar...' : 'Entrar'}</button>
      </form>

      <div style={{ marginTop: 24, paddingTop: 22, borderTop: '1px solid var(--pa-line)', textAlign: 'center', fontSize: 13, color: 'var(--pa-muted)' }}>
        Ainda não tens conta?{' '}
        <button type="button" onClick={onSwitch} style={{
          background: 'none', border: 'none', color: 'var(--pa-accent)',
          fontFamily: 'inherit', fontSize: 'inherit', fontWeight: 600, cursor: 'pointer', padding: 0,
        }}>Cria a tua →</button>
      </div>
    </AuthLayout>
  );
}

// ── Register screen ────────────────────────────────────────────
function RegisterScreen({ auth, onSwitch, narrow }) {
  const [name, setName]   = aUseState('');
  const [pw, setPw]       = aUseState('');
  const [pw2, setPw2]     = aUseState('');
  const [photoFile, setPhotoFile] = aUseState(null);
  const [photoPreview, setPhotoPreview] = aUseState(null);
  const [busy, setBusy]   = aUseState(false);
  const [err, setErr]     = aUseState(null);
  const fileRef = aUseRef(null);

  const onPick = async (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    setPhotoFile(f);
    try { const url = await readPhotoFile(f); setPhotoPreview(url); }
    catch {}
  };

  const submit = async (e) => {
    e.preventDefault();
    if (pw !== pw2) { setErr('As passwords não batem certo.'); return; }
    setBusy(true); setErr(null);
    try {
      await auth.register({ name, password: pw, photoFile });
      // auth.register now auto-signs in, so onAuthStateChange will redirect
    }
    catch (ex) {
      // If signUp succeeded but signIn failed (e.g. email not confirmed),
      // show a helpful message instead of the raw error
      if (ex.message && ex.message.match(/confirm/i)) {
        setErr('Conta criada! A tentar entrar automaticamente... Se ficar preso, tenta fazer login manualmente.');
      } else {
        setErr(ex.message);
      }
      setBusy(false);
    }
  };

  const color = name ? colorFromName(name) : 'var(--pa-muted)';
  const initials = name ? initialsFromName(name) : '?';

  return (
    <AuthLayout narrow={narrow}>
      <div style={{ fontFamily: 'var(--pa-display)', fontSize: 34, fontWeight: 600, letterSpacing: -1.2, lineHeight: 1 }}>
        Bora arrancar.
      </div>
      <div style={{ marginTop: 10, color: 'var(--pa-muted)', fontSize: 14 }}>
        Nome, foto (opcional) e uma password.
      </div>

      <form onSubmit={submit} style={{ marginTop: 24, display: 'flex', flexDirection: 'column', gap: 14 }}>
        {/* Photo picker */}
        <button type="button" onClick={() => fileRef.current?.click()} style={{
          display: 'flex', alignItems: 'center', gap: 14,
          padding: 14, borderRadius: 14, cursor: 'pointer', textAlign: 'left',
          background: '#fff', border: '1px solid var(--pa-line)',
        }}>
          <div style={{
            width: 52, height: 52, borderRadius: 52, flexShrink: 0,
            background: photoPreview ? `center/cover no-repeat url(${photoPreview})` : color,

        <Field label="Como te chamas" placeholder="Tiago, Matilde, ..." value={name} onChange={setName} />
        <AuthPasswordField label="Password" value={pw} onChange={setPw} />

          background: 'var(--pa-accent)', color: '#fff',
          cursor: (busy || !name || !pw) ? 'default' : 'pointer',
          fontFamily: 'var(--pa-body)', fontSize: 15, fontWeight: 600,
          opacity: (busy || !name || !pw) ? 0.5 : 1, transition: 'opacity .15s',
        }}>{busy ? 'A criar...' : 'Criar conta'}</button>
      </form>

      <div style={{ marginTop: 24, paddingTop: 22, borderTop: '1px solid var(--pa-line)', textAlign: 'center', fontSize: 13, color: 'var(--pa-muted)' }}>
        Já tens conta?{' '}
        <button type="button" onClick={onSwitch} style={{
          background: 'none', border: 'none', color: 'var(--pa-accent)',
          fontFamily: 'inherit', fontSize: 'inherit', fontWeight: 600, cursor: 'pointer', padding: 0,
        }}>Inicia sessão →</button>
      </div>
    </AuthLayout>
  );
}

function AuthPasswordField({ label, value, onChange }) {
  const [show, setShow] = aUseState(false);
  return (
    <label style={{ display: 'block' }}>
      <span style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase' }}>

        <input value={value || ''} onChange={(e) => onChange(e.target.value)}

          style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontFamily: 'var(--pa-body)', fontSize: 15, color: 'var(--pa-ink)' }} />
        <button type="button" onClick={() => setShow((s) => !s)} style={{ border: 'none', background: 'transparent', cursor: 'pointer', padding: 4, color: 'var(--pa-muted)' }}>
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
            <path d="M1 7s2.5-5 8-5 8 5 8 5-2.5 5-8 5S1 7 1 7z" stroke="currentColor" strokeWidth="1.4"/>
            <circle cx="9" cy="7" r="2.2" stroke="currentColor" strokeWidth="1.4"/>
            {!show && <path d="M2 12L16 2" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>}
          </svg>
        </button>
      </div>
    </label>
  );
}

function AuthError({ msg }) {
  return (
    <div style={{ padding: '10px 14px', borderRadius: 10, background: 'rgba(217,119,87,0.14)', color: '#8a4220', fontSize: 13, fontWeight: 500, display: 'flex', gap: 8, alignItems: 'center' }}>
      <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="6" stroke="currentColor" strokeWidth="1.3" fill="none"/><path d="M7 4v3.5M7 10v.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
      {msg}
    </div>
  );
}

function AuthGate({ auth, narrow }) {
  const [mode, setMode] = aUseState('login');
  if (mode === 'register') return <RegisterScreen auth={auth} onSwitch={() => setMode('login')} narrow={narrow} />;
  return <LoginScreen auth={auth} onSwitch={() => setMode('register')} narrow={narrow} />;
}

Object.assign(window, {
  useAuth, AuthLayout, LoginScreen, RegisterScreen, AuthGate,
  AuthPasswordField, AuthError, readPhotoFile,
});

<script type="text/babel">
// Perdidos Algures — Chat (Supabase realtime).
// Messages persisted in DB, new ones arrive via realtime subscription.
// Falls back to seeded messages if Supabase is unavailable.

const { useState: cUseState, useEffect: cUseEffect, useRef: cUseRef, useContext: cUseContext } = React;

// Messages are managed through AppCtx — the panel just reads/writes to it.
// EditionId and userId come from AppCtx as well.

const CHAT_SEED = [
  { id: 'seed1', by_profile: { id: 'tiago',   name: 'Tiago',   initials: 'TM', color: '#6b8e6f', is_admin: false }, text: 'Pessoal, já podem começar a sugerir alojamentos.',    created_at: '2026-05-20T10:00:00Z' },
  { id: 'seed2', by_profile: { id: 'matilde', name: 'Matilde', initials: 'MS', color: '#b08968', is_admin: false }, text: 'A Casa do Faro tem 4 quartos, fiquei a olhar 👀',        created_at: '2026-05-20T10:12:00Z' },
  { id: 'seed3', by_profile: { id: 'rita',    name: 'Rita',    initials: 'RP', color: '#d97757', is_admin: false }, text: 'Cíes em junho vai ser brutal, mas o ferry tem horário fixo', created_at: '2026-05-21T09:30:00Z' },
  { id: 'seed4', by_profile: { id: 'joao',    name: 'João',    initials: 'JF', color: '#8b6f47', is_admin: false }, text: 'Voto Bouzas + dia nas ilhas, melhor dos dois mundos', created_at: '2026-05-21T14:20:00Z' },
  { id: 'seed5', by_profile: { id: 'miguel',  name: 'Miguel',  initials: 'M',  color: '#1f1a14', is_admin: true  }, text: 'Empate na votação. Usem o Borda Count ou a Segunda Volta para decidir.', created_at: '2026-05-22T19:00:00Z' },
];

// ── ChatPanel ─────────────────────────────────────────────────
function ChatPanel({ me, editionId, compact = false }) {
  const [messages, setMessages] = cUseState([]);
  const [text, setText]         = cUseState('');
  const [loading, setLoading]   = cUseState(true);
  const [realtimeOk, setRealtimeOk] = cUseState(false);
  const scrollRef  = cUseRef(null);
  const chanRef    = cUseRef(null);
  const pollRef    = cUseRef(null);
  const pendingRef = cUseRef(new Set()); // track optimistic IDs

  const loadMessages = cUseRef(null);
  loadMessages.current = async () => {
    if (!editionId) return;
    const msgs = await DB.getMessages(editionId).catch(() => null);
    if (msgs) setMessages(msgs.length > 0 ? msgs : CHAT_SEED);
  };

  cUseEffect(() => {
    if (!editionId) {
      setMessages(CHAT_SEED);
      setLoading(false);
      return;
    }

    let mounted = true;

    // Initial load
    DB.getMessages(editionId).then((msgs) => {
      if (!mounted) return;
      setMessages(msgs.length > 0 ? msgs : CHAT_SEED);
      setLoading(false);
    }).catch(() => { if (mounted) { setMessages(CHAT_SEED); setLoading(false); } });

    // Realtime subscription — handles INSERT and DELETE
    const ch = sb.channel(`msgs:${editionId}`)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `edition_id=eq.${editionId}` },
        async (payload) => {
          if (!mounted) return;
          const { data } = await sb.from('messages')
            .select('*, by_profile:profiles!by_user(id, name, initials, color, photo_url, is_admin)')
            .eq('id', payload.new.id).single();
          if (data && mounted) {
            // Remove any optimistic placeholder for this message
            pendingRef.current.delete(data.id);
            setMessages((prev) => {
              // avoid duplicate if already added optimistically
              if (prev.some((m) => m.id === data.id)) return prev;
              // remove optimistic placeholder (same text+user within 5s)
              const filtered = prev.filter((m) => {
                if (!m._optimistic) return true;
                if (m.by_profile?.id === data.by_profile?.id && m.text === data.text) return false;
                return true;
              });
              return [...filtered, data];
            });
          }
        })
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages', filter: `edition_id=eq.${editionId}` },
        (payload) => {
          if (!mounted) return;
          const deletedId = payload.old?.id;
          if (deletedId) setMessages((prev) => prev.filter((m) => m.id !== deletedId));
        })
      .subscribe((status) => {
        if (status === 'SUBSCRIBED' && mounted) setRealtimeOk(true);
      });

    chanRef.current = ch;

    // Polling fallback: every 8s do a full refresh
    // This catches cases where the realtime sub misses events
    pollRef.current = setInterval(() => {
      if (mounted) loadMessages.current();
    }, 8000);

    return () => {
      mounted = false;
      try { sb.removeChannel(ch); } catch {}
      if (pollRef.current) clearInterval(pollRef.current);
    };
  }, [editionId]);

  cUseEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [messages.length]);

  const send = async () => {
    const t = text.trim();
    if (!t || !editionId || !me) return;
    setText('');

    // Optimistic: show immediately
    const optimisticId = 'opt-' + Date.now();
    const optimisticMsg = {
      id: optimisticId,
      _optimistic: true,
      by_profile: { id: me.id, name: me.name, initials: me.initials, color: me.color, is_admin: me.isAdmin },
      text: t,
      created_at: new Date().toISOString(),
    };
    setMessages((prev) => [...prev, optimisticMsg]);

    try {
      await DB.sendMessage(editionId, me.id, t);
      // Realtime sub will replace the optimistic entry when INSERT fires.
      // If realtime is slow, keep the optimistic one visible.
    } catch (e) {
      // Mark it as failed
      setMessages((prev) => prev.map((m) =>
        m.id === optimisticId ? { ...m, _failed: true, text: m.text + ' ⚠' } : m
      ));
    }
  };

  const onKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', minHeight: 0 }}>
      {/* Connection status */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', marginBottom: 4, paddingBottom: 4, borderBottom: '1px solid var(--pa-line)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 4, fontFamily: 'var(--pa-mono)', fontSize: 9, letterSpacing: 0.8, color: realtimeOk ? '#3d5e44' : 'var(--pa-muted)', textTransform: 'uppercase' }}>
          <div style={{ width: 5, height: 5, borderRadius: 5, background: realtimeOk ? '#3d5e44' : 'var(--pa-muted)' }} />
          {realtimeOk ? 'em direto' : 'a ligar...'}
        </div>
      </div>
      <div ref={scrollRef} style={{
        flex: 1, overflow: 'auto', padding: compact ? '6px 12px' : '8px 2px',
        display: 'flex', flexDirection: 'column', gap: 10,
      }}>
        {loading && (
          <div style={{ textAlign: 'center', padding: 20, fontFamily: 'var(--pa-mono)', fontSize: 11, color: 'var(--pa-muted)', letterSpacing: 1 }}>
            A carregar...
          </div>
        )}
        {!loading && messages.map((m) => {
          const author = m.by_profile || { name: '?', initials: '?', color: 'var(--pa-muted)' };
          const mine = me && (m.by_profile?.id === me.id || m.by_profile?.name === me.name);
          const isOptimistic = !!m._optimistic;
          const isFailed = !!m._failed;
          return (
            <div key={m.id} style={{ display: 'flex', gap: 8, flexDirection: mine ? 'row-reverse' : 'row', opacity: isOptimistic ? 0.65 : 1 }}>
              <Avatar member={author} size={compact ? 22 : 26} />
              <div style={{ maxWidth: '78%', display: 'flex', flexDirection: 'column', alignItems: mine ? 'flex-end' : 'flex-start' }}>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, marginBottom: 3, flexDirection: mine ? 'row-reverse' : 'row' }}>
                  <span style={{ fontFamily: 'var(--pa-body)', fontSize: 11, fontWeight: 600, color: 'var(--pa-ink)' }}>
                    {mine ? 'tu' : author.name}
                    {author.is_admin && <span style={{ color: 'var(--pa-accent)', marginLeft: 3 }}>★</span>}
                  </span>
                  <span style={{ fontFamily: 'var(--pa-mono)', fontSize: 9.5, color: isFailed ? '#c44' : 'var(--pa-muted)' }}>
                    {isOptimistic ? (isFailed ? '⚠ falhou' : '…') : new Date(m.created_at).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' })}
                  </span>
                </div>
                <div style={{
                  padding: '8px 12px',
                  background: mine ? (isFailed ? 'rgba(200,60,60,0.15)' : 'var(--pa-ink)') : '#fff',
                  color: mine ? (isFailed ? '#c44' : '#fff') : 'var(--pa-ink)',
                  borderRadius: 12,
                  borderTopLeftRadius: mine ? 12 : 4,
                  borderTopRightRadius: mine ? 4 : 12,
                  border: (mine && !isFailed) ? 'none' : '1px solid var(--pa-line)',
                  fontFamily: 'var(--pa-body)', fontSize: compact ? 12.5 : 13.5,
                  lineHeight: 1.4, wordWrap: 'break-word', whiteSpace: 'pre-wrap',
                }}>{m.text}</div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Composer */}
      <div style={{
        padding: compact ? '10px 12px 12px' : '10px 2px 4px',
        borderTop: '1px solid var(--pa-line)',
        display: 'flex', alignItems: 'flex-end', gap: 8, flexShrink: 0,
      }}>
        <textarea value={text} onChange={(e) => setText(e.target.value)} onKeyDown={onKey}
          placeholder="Escreve algo..." rows={1}
          style={{
            flex: 1, padding: '10px 14px', borderRadius: 18,
            background: '#fff', border: '1px solid var(--pa-line)',
            fontFamily: 'var(--pa-body)', fontSize: 13.5, color: 'var(--pa-ink)',
            outline: 'none', resize: 'none', boxSizing: 'border-box', maxHeight: 80, lineHeight: 1.4,
          }} />
        <button onClick={send} disabled={!text.trim()} style={{
          width: 38, height: 38, borderRadius: 999, border: 'none', flexShrink: 0,
          background: text.trim() ? 'var(--pa-accent)' : 'rgba(31,26,20,0.06)',
          color: text.trim() ? '#fff' : 'var(--pa-muted)',
          cursor: text.trim() ? 'pointer' : 'default',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 7L13 2.5 9 13l-2-5z" fill="currentColor"/></svg>
        </button>
      </div>
    </div>
  );
}

// ── Mobile sheet ───────────────────────────────────────────────
function MobileChatSheet({ me, editionId, open, onClose }) {
  if (!open) return null;
  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 100, background: 'rgba(0,0,0,0.4)' }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, height: '85%',
        background: 'var(--pa-bg)', borderTopLeftRadius: 28, borderTopRightRadius: 28,
        display: 'flex', flexDirection: 'column', overflow: 'hidden',
        boxShadow: '0 -8px 32px rgba(0,0,0,0.2)',
      }}>
        <div style={{ padding: '14px 22px 12px', borderBottom: '1px solid var(--pa-line)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div>
            <div style={{ fontFamily: 'var(--pa-display)', fontSize: 18, fontWeight: 600, letterSpacing: -0.3 }}>Chat do grupo</div>
            <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1, color: 'var(--pa-muted)' }}>em tempo real</div>
          </div>
          <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: 999, border: 'none', background: 'rgba(31,26,20,0.06)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="var(--pa-ink)" strokeWidth="1.5" strokeLinecap="round"/></svg>
          </button>
        </div>
        <ChatPanel me={me} editionId={editionId} compact />
      </div>
    </div>
  );
}

Object.assign(window, { ChatPanel, MobileChatSheet });

</script>

}

// ─────────────────────────────────────────────────────────────
// METHOD: Borda Count — rank all tied options 1st→last
// ─────────────────────────────────────────────────────────────
function TieMethodBorda({ tied, me, onResolve, onBack }) {
  const allMembers = D.members.filter((m) => D.phase1.state[m.id] === 'in');
  const n = tied.length;

  // Seed: everyone has submitted except me
  const seedRankings = {};
  allMembers.forEach((m, i) => {
    if (m.id !== me.id) {
      // Each member has a different shuffle
      const order = tied.map((_, j) => j).sort(() => (Math.sin(i * 7 + j * 13) > 0 ? 1 : -1));
      seedRankings[m.id] = order.map((idx) => tied[idx].id);
    }
  });

  const [submitted, setSubmitted] = tbUseState(seedRankings);
  const [myRanking, setMyRanking] = tbUseState(tied.map((t) => t.id)); // drag order
  const [done, setDone] = tbUseState(false);
  const [dragging, setDragging] = tbUseState(null);
  const [dragOver, setDragOver] = tbUseState(null);

  const allSubmitted = { ...submitted };
  if (done) allSubmitted[me.id] = myRanking;

  const submittedMembers = allMembers.filter((m) => allSubmitted[m.id]);
  const pendingMembers = allMembers.filter((m) => !allSubmitted[m.id]);

  // Borda tally: n pts for 1st, n-1 for 2nd, …
  const tally = tied.map((t) => {
    const pts = submittedMembers.reduce((sum, m) => {
      const rank = (allSubmitted[m.id] || []).indexOf(t.id);
      return sum + (rank >= 0 ? (n - rank) : 0);
    }, 0);
    return { opt: t, pts };
  }).sort((a, b) => b.pts - a.pts);

  const maxPts = tally[0]?.pts || 0;
  const winner = tally[0]?.opt;

  // Drag-to-reorder
  const onDragStart = (e, idx) => { setDragging(idx); e.dataTransfer.effectAllowed = 'move'; };
  const onDragOver = (e, idx) => { e.preventDefault(); setDragOver(idx); };
  const onDrop = (e, idx) => {
    e.preventDefault();
    if (dragging === null || dragging === idx) return;
    const next = myRanking.slice();
    const [item] = next.splice(dragging, 1);
    next.splice(idx, 0, item);
    setMyRanking(next);
    setDragging(null); setDragOver(null);
  };
  const onDragEnd = () => { setDragging(null); setDragOver(null); };

  return (
    <TieMethodFrame method="borda" me={me} onBack={onBack}
      meta={`${submittedMembers.length} de ${allMembers.length} ordenaram`}>

      <ParticipantRow allMembers={allMembers} submitted={submittedMembers} pending={pendingMembers} />

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }}>
        {/* My ranking drag-list */}
        {!done ? (
          <div>
            <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 8 }}>
              A tua ordem — arrasta para reordenar
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 14 }}>
              {myRanking.map((id, i) => {
                const opt = tied.find((t) => t.id === id);
                if (!opt) return null;
                return (
                  <div key={id}
                    draggable
                    onDragStart={(e) => onDragStart(e, i)}
                    onDragOver={(e) => onDragOver(e, i)}
                    onDrop={(e) => onDrop(e, i)}
                    onDragEnd={onDragEnd}
                    style={{
                      display: 'flex', alignItems: 'center', gap: 12,
                      padding: '12px 14px', borderRadius: 10, cursor: 'grab',
                      background: dragOver === i ? 'rgba(217,119,87,0.10)' : '#fff',
                      border: dragOver === i ? '2px solid var(--pa-accent)' : '1px solid var(--pa-line)',
                      transition: 'background .12s, border .12s',
                      opacity: dragging === i ? 0.4 : 1,
                    }}>
                    <div style={{
                      width: 28, height: 28, borderRadius: 28, flexShrink: 0,
                      background: i === 0 ? 'var(--pa-accent)' : i === 1 ? 'rgba(31,26,20,0.12)' : 'rgba(31,26,20,0.06)',
                      color: i === 0 ? '#fff' : 'var(--pa-ink)',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontFamily: 'var(--pa-mono)', fontSize: 13, fontWeight: 700,
                    }}>
                      {i + 1}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontFamily: 'var(--pa-body)', fontSize: 13.5, fontWeight: 600 }}>
                        {opt.type} · {opt.area}
                      </div>
                      <div style={{ fontSize: 11.5, color: 'var(--pa-muted)' }}>
                        {n - i} {n - i === 1 ? 'ponto' : 'pontos'}
                      </div>
                    </div>
                    <svg width="10" height="16" viewBox="0 0 10 16" fill="var(--pa-muted)">
                      <circle cx="3" cy="3" r="1.5"/><circle cx="7" cy="3" r="1.5"/>
                      <circle cx="3" cy="8" r="1.5"/><circle cx="7" cy="8" r="1.5"/>
                      <circle cx="3" cy="13" r="1.5"/><circle cx="7" cy="13" r="1.5"/>
                    </svg>
                  </div>
                );
              })}
            </div>
            <Btn variant="accent" size="sm" style={{ width: '100%' }} onClick={() => setDone(true)}>
              Submeter ranking
            </Btn>
          </div>
        ) : (
          <div>
            <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 8 }}>
              O teu ranking
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {myRanking.map((id, i) => {
                const opt = tied.find((t) => t.id === id);
                return (
                  <div key={id} style={{
                    display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px',
                    borderRadius: 10, background: '#fff', border: '1px solid var(--pa-line)',
                  }}>
                    <div style={{
                      width: 24, height: 24, borderRadius: 24,
                      background: i === 0 ? 'var(--pa-accent)' : 'rgba(31,26,20,0.07)',
                      color: i === 0 ? '#fff' : 'var(--pa-ink)',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontFamily: 'var(--pa-mono)', fontSize: 12, fontWeight: 700, flexShrink: 0,
                    }}>{i + 1}</div>
                    <span style={{ fontFamily: 'var(--pa-body)', fontSize: 13, fontWeight: 500 }}>
                      {opt?.type} · {opt?.area}
                    </span>
                    <Pill size="sm">{n - i}pts</Pill>
                  </div>
                );
              })}
            </div>
            <button onClick={() => setDone(false)} style={{
              marginTop: 8, background: 'transparent', border: 'none', cursor: 'pointer',
              fontFamily: 'var(--pa-body)', fontSize: 12, color: 'var(--pa-muted)', padding: '4px 0',
            }}>corrigir ranking</button>
          </div>
        )}

        {/* Live tally */}
        <div>
          <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 8 }}>
            Pontuação Borda
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {tally.map(({ opt, pts }, i) => {
              const isWinner = i === 0;
              const maxPossible = n * submittedMembers.length;
              const pct = maxPossible > 0 ? (pts / maxPossible) * 100 : 0;
              return (
                <div key={opt.id} style={{
                  padding: 12, borderRadius: 10,
                  background: isWinner && submittedMembers.length > 0 ? 'rgba(217,119,87,0.08)' : '#fff',
                  border: isWinner && submittedMembers.length > 0 ? '1.5px solid var(--pa-accent)' : '1px solid var(--pa-line)',
                }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      {isWinner && submittedMembers.length > 0 && <span style={{ fontSize: 13 }}>🏆</span>}
                      <span style={{ fontFamily: 'var(--pa-body)', fontSize: 13, fontWeight: 600 }}>
                        {opt.type} · {opt.area}
                      </span>
                    </div>
                    <span style={{ fontFamily: 'var(--pa-mono)', fontSize: 14, fontWeight: 700, color: isWinner ? 'var(--pa-accent)' : 'var(--pa-ink)' }}>
                      {pts} pts
                    </span>
                  </div>
                  <div style={{ height: 6, borderRadius: 6, background: 'rgba(31,26,20,0.06)' }}>
                    <div style={{
                      width: `${pct}%`, height: '100%', borderRadius: 6,
                      background: isWinner ? 'var(--pa-accent)' : 'var(--pa-ink)',
                      transition: 'width .4s',
                    }} />
                  </div>
                </div>
              );
            })}
          </div>

          {me.isAdmin && pendingMembers.length === 0 && (
            <Btn variant="accent" size="sm" style={{ width: '100%', marginTop: 14 }}
              onClick={() => onResolve(winner.id, 'borda')}>
              Fechar — vence {winner.type} de {winner.area}
            </Btn>
          )}
          {me.isAdmin && pendingMembers.length > 0 && (
            <Btn variant="ghost" size="sm" style={{ width: '100%', marginTop: 14 }}
              onClick={() => onResolve(winner.id, 'borda')}>
              Fechar antecipado ({submittedMembers.length}/{allMembers.length})
            </Btn>
          )}
        </div>
      </div>
    </TieMethodFrame>
  );
}

// ─────────────────────────────────────────────────────────────
// METHOD: Score voting (1–5 stars per option)
// ─────────────────────────────────────────────────────────────
function TieMethodScore({ tied, me, onResolve, onBack }) {
  const allMembers = D.members.filter((m) => D.phase1.state[m.id] === 'in');

  // Seed some existing scores
  const seedScores = {};
  allMembers.forEach((m, mi) => {
    if (m.id !== me.id) {
      seedScores[m.id] = tied.map((_, ti) => Math.max(1, Math.min(5, 3 + Math.round(Math.sin(mi * 5 + ti * 7) * 1.5))));
    }
  });

  const [allScores, setAllScores] = tbUseState(seedScores);
  const [myScores, setMyScores] = tbUseState(tied.map(() => null));
  const [submitted, setSubmitted] = tbUseState(false);

  const combinedScores = submitted ? { ...allScores, [me.id]: myScores } : allScores;
  const submittedMembers = allMembers.filter((m) => combinedScores[m.id]);
  const pendingMembers = allMembers.filter((m) => !combinedScores[m.id]);

  const averages = tied.map((t, ti) => {
    const vals = submittedMembers.map((m) => combinedScores[m.id][ti]).filter((v) => v !== null);
    return { opt: t, avg: vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0, count: vals.length };
  }).sort((a, b) => b.avg - a.avg);
  const winner = averages[0]?.opt;

  const setMyStar = (ti, star) => {
    setMyScores((prev) => { const n = [...prev]; n[ti] = star; return n; });
  };

  const canSubmit = myScores.every((s) => s !== null);

  return (
    <TieMethodFrame method="score" me={me} onBack={onBack}
      meta={`${submittedMembers.length} de ${allMembers.length} avaliaram`}>

      <ParticipantRow allMembers={allMembers} submitted={submittedMembers} pending={pendingMembers} />

      {/* Star rating ballot */}
      {!submitted && (
        <div style={{ background: 'var(--pa-bg)', borderRadius: 12, padding: 18, marginBottom: 16, border: '1.5px solid var(--pa-accent)' }}>
          <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 12 }}>
            A tua avaliação (1–5 ★ por opção)
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 14 }}>
            {tied.map((t, ti) => (
              <div key={t.id} style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: '10px 14px', background: '#fff', borderRadius: 10, gap: 16,
              }}>
                <div style={{ minWidth: 0, flex: 1 }}>
                  <div style={{ fontFamily: 'var(--pa-body)', fontSize: 13, fontWeight: 600 }}>
                    {t.type} · {t.area}
                  </div>
                  <div style={{ fontSize: 11.5, color: 'var(--pa-muted)' }}>{t.price}€/noite</div>
                </div>
                <div style={{ display: 'flex', gap: 3, flexShrink: 0 }}>
                  {[1, 2, 3, 4, 5].map((star) => (
                    <button key={star} onClick={() => setMyStar(ti, star)} style={{
                      background: 'none', border: 'none', cursor: 'pointer', padding: '2px 3px',
                      fontSize: 22, lineHeight: 1,
                      filter: (myScores[ti] !== null && star <= myScores[ti]) ? 'none' : 'grayscale(1) opacity(0.3)',
                      transform: 'scale(1)',
                      transition: 'filter .1s, transform .1s',
                    }}
                      onMouseEnter={(e) => e.currentTarget.style.transform = 'scale(1.2)'}
                      onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1)'}>
                      ⭐
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <Btn variant="accent" size="sm" style={{ width: '100%' }} disabled={!canSubmit} onClick={() => setSubmitted(true)}>
            Submeter avaliação
          </Btn>
        </div>
      )}

      {/* Live averages */}
      <div>
        <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 8 }}>
          Médias · {submittedMembers.length} avaliações
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {averages.map(({ opt, avg, count }, i) => {
            const isFirst = i === 0 && count > 0;
            const filled = Math.round(avg);
            return (
              <div key={opt.id} style={{
                display: 'flex', alignItems: 'center', gap: 14, padding: '12px 16px', borderRadius: 12,
                background: isFirst ? 'rgba(217,119,87,0.08)' : '#fff',
                border: isFirst ? '1.5px solid var(--pa-accent)' : '1px solid var(--pa-line)',
              }}>
                {isFirst && <span style={{ fontSize: 16 }}>🏆</span>}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: 'var(--pa-body)', fontSize: 13.5, fontWeight: 600 }}>
                    {opt.type} · {opt.area}
                  </div>
                  <div style={{ display: 'flex', gap: 2, marginTop: 4 }}>
                    {[1, 2, 3, 4, 5].map((s) => (
                      <span key={s} style={{ fontSize: 14, filter: s <= filled ? 'none' : 'grayscale(1) opacity(0.25)' }}>⭐</span>
                    ))}
                  </div>
                </div>
                <div style={{ textAlign: 'right', flexShrink: 0 }}>
                  <div style={{ fontFamily: 'var(--pa-display)', fontSize: 22, fontWeight: 700, letterSpacing: -0.5, color: isFirst ? 'var(--pa-accent)' : 'var(--pa-ink)' }}>
                    {avg > 0 ? avg.toFixed(1) : '—'}
                  </div>
                  <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, color: 'var(--pa-muted)' }}>
                    /{count} pessoas
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {me.isAdmin && (
          <div style={{ display: 'flex', gap: 8, marginTop: 14 }}>
            {pendingMembers.length > 0 && (
              <Btn variant="ghost" size="sm" onClick={() => onResolve(winner.id, 'score')}>
                Fechar agora ({submittedMembers.length}/{allMembers.length})
              </Btn>
            )}
            {pendingMembers.length === 0 && (
              <Btn variant="accent" size="sm" style={{ flex: 1 }} onClick={() => onResolve(winner.id, 'score')}>
                Fechar — vence {winner.type} de {winner.area}
              </Btn>
            )}
          </div>
        )}
      </div>
    </TieMethodFrame>
  );
}

// ─────────────────────────────────────────────────────────────
// METHOD: Progressive elimination — rounds until winner
// ─────────────────────────────────────────────────────────────
function TieMethodElim({ tied, me, onResolve, onBack }) {
  const allMembers = D.members.filter((m) => D.phase1.state[m.id] === 'in');

  // Each round: remaining options, mock votes from others, my vote
  const [round, setRound] = tbUseState(0);
  const [remaining, setRemaining] = tbUseState(tied.map((t) => t.id));
  const [history, setHistory] = tbUseState([]); // [{eliminated, round, votes}]
  const [roundVotes, setRoundVotes] = tbUseState({}); // memberId → optId
  const [myVote, setMyVote] = tbUseState(null);
  const [roundClosed, setRoundClosed] = tbUseState(false);

  const remainingOpts = remaining.map((id) => tied.find((t) => t.id === id)).filter(Boolean);
  const submittedMembers = allMembers.filter((m) => roundVotes[m.id] || (m.id === me.id && roundClosed));
  const pendingMembers = allMembers.filter((m) => !roundVotes[m.id] && !(m.id === me.id && roundClosed));

  // Seed mock votes for current round
  const seedRoundVotes = () => {
    const v = {};
    allMembers.forEach((m, i) => {
      if (m.id !== me.id) {
        const opts = remainingOpts;
        v[m.id] = opts[i % opts.length]?.id;
      }
    });
    return v;
  };

  const submitMyVote = () => {
    if (!myVote) return;
    const allVotes = { ...seedRoundVotes(), [me.id]: myVote };
    setRoundVotes(allVotes);
    setRoundClosed(true);
  };

  const closeRound = () => {
    const allVotes = { ...seedRoundVotes(), [me.id]: myVote };
    // Tally
    const tally = {};
    remaining.forEach((id) => { tally[id] = 0; });
    Object.values(allVotes).forEach((id) => { if (tally[id] !== undefined) tally[id]++; });
    const sorted = Object.entries(tally).sort((a, b) => a[1] - b[1]);
    const minVotes = sorted[0][1];
    const eliminated = sorted.filter(([, v]) => v === minVotes).map(([id]) => id);

    const newRemaining = remaining.filter((id) => !eliminated.includes(id));
    setHistory((h) => [...h, { round: round + 1, eliminated, tally }]);

    if (newRemaining.length === 1) {
      onResolve(newRemaining[0], 'elim');
      return;
    }
    // Next round
    setRemaining(newRemaining);
    setRound((r) => r + 1);
    setRoundVotes({});
    setMyVote(null);
    setRoundClosed(false);
  };

  return (
    <TieMethodFrame method="elim" me={me} onBack={onBack}
      meta={`Ronda ${round + 1} · ${remaining.length} opções restantes`}>

      {/* History */}
      {history.length > 0 && (
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 14 }}>
          {history.map((h) => (
            h.eliminated.map((id) => {
              const opt = tied.find((t) => t.id === id);
              return (
                <div key={id} style={{
                  padding: '6px 10px', borderRadius: 999, background: 'rgba(31,26,20,0.06)',
                  fontFamily: 'var(--pa-body)', fontSize: 11.5, color: 'var(--pa-muted)',
                  display: 'flex', alignItems: 'center', gap: 6,
                }}>
                  <span style={{ textDecoration: 'line-through' }}>{opt?.type} · {opt?.area}</span>
                  <span style={{ color: '#c44', fontWeight: 600 }}>✕ ronda {h.round}</span>
                </div>
              );
            })
          ))}
        </div>
      )}

      {/* Current round ballot */}
      {!roundClosed && (
        <div style={{ background: 'var(--pa-bg)', borderRadius: 12, padding: 16, marginBottom: 14, border: '1.5px solid var(--pa-accent)' }}>
          <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 10 }}>
            Ronda {round + 1} · votas em qual?
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: `repeat(${Math.min(remainingOpts.length, 3)}, 1fr)`, gap: 8, marginBottom: 12 }}>
            {remainingOpts.map((t) => {
              const sel = myVote === t.id;
              return (
                <button key={t.id} onClick={() => setMyVote(t.id)} style={{
                  padding: '12px 14px', borderRadius: 10, cursor: 'pointer', textAlign: 'left',
                  background: sel ? 'var(--pa-ink)' : '#fff',
                  color: sel ? '#fff' : 'var(--pa-ink)',
                  border: sel ? 'none' : '1px solid var(--pa-line)',
                }}>
                  <div style={{ fontFamily: 'var(--pa-body)', fontSize: 13, fontWeight: 600 }}>{t.type}</div>
                  <div style={{ fontSize: 11.5, opacity: .7 }}>{t.area}</div>
                </button>
              );
            })}
          </div>
          <Btn variant="accent" size="sm" style={{ width: '100%' }} disabled={!myVote} onClick={submitMyVote}>
            Votar nesta ronda
          </Btn>
        </div>
      )}

      {/* Current round tally + close */}
      {roundClosed && (
        <div style={{ background: '#fff', borderRadius: 12, padding: 16, marginBottom: 14, border: '1px solid var(--pa-line)' }}>
          <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 10 }}>
            Resultado ronda {round + 1}
          </div>
          {(() => {
            const allVotes = { ...seedRoundVotes(), [me.id]: myVote };
            const tally = {};
            remaining.forEach((id) => { tally[id] = 0; });
            Object.values(allVotes).forEach((id) => { if (tally[id] !== undefined) tally[id]++; });
            const sorted = Object.entries(tally).sort((a, b) => b[1] - a[1]);
            const minVotes = sorted[sorted.length - 1][1];
            return sorted.map(([id, votes]) => {
              const opt = tied.find((t) => t.id === id);
              const isElim = votes === minVotes;
              return (
                <div key={id} style={{
                  display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0',
                  opacity: isElim ? 0.5 : 1,
                }}>
                  <div style={{ flex: 1, fontFamily: 'var(--pa-body)', fontSize: 13, fontWeight: 500 }}>
                    {isElim ? <s>{opt?.type} · {opt?.area}</s> : `${opt?.type} · ${opt?.area}`}
                  </div>
                  <Pill tone={isElim ? 'warn' : 'success'} size="sm">
                    {votes} {isElim ? '— eliminado' : ''}
                  </Pill>
                </div>
              );
            });
          })()}
          {me.isAdmin && (
            <Btn variant="accent" size="sm" style={{ width: '100%', marginTop: 12 }} onClick={closeRound}>
              Eliminar e avançar →
            </Btn>
          )}
        </div>
      )}

      <ParticipantRow allMembers={allMembers} submitted={submittedMembers} pending={pendingMembers} />
    </TieMethodFrame>
  );
}

// ─────────────────────────────────────────────────────────────
// METHOD: Runoff (existing, cleaned up)
// ─────────────────────────────────────────────────────────────
function TieMethodRunoff({ tied, me, onResolve, onBack }) {
  const allMembers = D.members.filter((m) => D.phase1.state[m.id] === 'in');
  const [runoffVotes, setRunoffVotes] = tbUseState({
    rita: tied[0].id, tiago: tied[0].id, ines: tied[0].id,
    matilde: tied[1].id, joao: tied[1].id,
  });
  const [myRunoff, setMyRunoff] = tbUseState(null);

  const allVotes = { ...runoffVotes, ...(myRunoff ? { [me.id]: myRunoff } : {}) };
  const tally = tied.map((t) => ({
    opt: t,
    count: Object.values(allVotes).filter((v) => v === t.id).length,
    voters: allMembers.filter((m) => allVotes[m.id] === t.id),
  }));
  const submittedMembers = allMembers.filter((m) => allVotes[m.id]);
  const pendingMembers = allMembers.filter((m) => !allVotes[m.id]);
  const winner = [...tally].sort((a, b) => b.count - a.count)[0]?.opt;

  return (
    <TieMethodFrame method="runoff" me={me} onBack={onBack}
      meta={`${submittedMembers.length} de ${allMembers.length} votaram`}>
      <ParticipantRow allMembers={allMembers} submitted={submittedMembers} pending={pendingMembers} />
      <div style={{ display: 'grid', gridTemplateColumns: `repeat(${tied.length}, 1fr)`, gap: 12, marginBottom: 14 }}>
        {tally.map(({ opt, count, voters }) => {
          const sel = myRunoff === opt.id;
          return (
            <button key={opt.id} onClick={() => setMyRunoff(opt.id)} style={{
              background: '#fff', borderRadius: 12, padding: 16, textAlign: 'left',
              border: sel ? '2px solid var(--pa-accent)' : '1px solid var(--pa-line)', cursor: 'pointer',
              position: 'relative',
            }}>
              <div style={{ position: 'absolute', top: 12, right: 14, fontFamily: 'var(--pa-display)', fontSize: 24, fontWeight: 700, color: 'var(--pa-accent)' }}>{count}</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8 }}>
                <Pill tone="dark" size="sm">{opt.type}</Pill>
                <span style={{ fontSize: 11.5, color: 'var(--pa-muted)' }}>{opt.area}</span>
              </div>
              <div style={{ fontSize: 12.5, color: 'var(--pa-ink)', lineHeight: 1.4, marginBottom: 10 }}>{opt.note}</div>
              <Stack members={voters} max={5} size={20} ringColor="#fff" />
            </button>
          );
        })}
      </div>
      {me.isAdmin && (
        <Btn variant="accent" size="sm" onClick={() => onResolve(winner.id, 'runoff')}>
          Fechar segunda volta
        </Btn>
      )}
    </TieMethodFrame>
  );
}

// ─────────────────────────────────────────────────────────────
// METHOD: Public vote with comments (existing, cleaned up)
// ─────────────────────────────────────────────────────────────
function TieMethodPublic({ tied, me, onResolve, onBack }) {
  const allMembers = D.members.filter((m) => D.phase1.state[m.id] === 'in');
  const [publicVotes, setPublicVotes] = tbUseState({
    miguel:  { choice: tied[0].id, comment: 'Casa com cama a sério. Noites de junho ainda são frescas para tendas.' },
    rita:    { choice: tied[0].id, comment: 'Bouzas tem o melhor jantar pós-praia.' },
    matilde: { choice: tied[1].id, comment: 'Cíes só uma vez na vida. A noite na ilha é outra coisa.' },
    tiago:   { choice: tied[0].id, comment: 'Já lá fui — a casa é mesmo bonita.' },
    joao:    { choice: tied[1].id, comment: 'Glamping é uma vibe completamente diferente.' },
  });
  const [myPick, setMyPick] = tbUseState(null);
  const [myComment, setMyComment] = tbUseState('');
  const [submitted, setSubmitted] = tbUseState(false);

  const allVotes = { ...publicVotes, ...(submitted && myPick ? { [me.id]: { choice: myPick, comment: myComment } } : {}) };
  const tally = tied.map((t) => ({
    opt: t,
    voters: allMembers.filter((m) => allVotes[m.id]?.choice === t.id),
  }));
  const submittedMembers = allMembers.filter((m) => allVotes[m.id]);
  const pendingMembers = allMembers.filter((m) => !allVotes[m.id]);
  const winner = [...tally].sort((a, b) => b.voters.length - a.voters.length)[0]?.opt;

  return (
    <TieMethodFrame method="public" me={me} onBack={onBack}
      meta={`${submittedMembers.length} de ${allMembers.length} declararam`}>
      <ParticipantRow allMembers={allMembers} submitted={submittedMembers} pending={pendingMembers} />
      {!submitted && (
        <div style={{ background: 'var(--pa-bg)', borderRadius: 12, padding: 16, marginBottom: 14, border: '1.5px solid var(--pa-accent)' }}>
          <div style={{ display: 'grid', gridTemplateColumns: `repeat(${tied.length}, 1fr)`, gap: 8, marginBottom: 12 }}>
            {tied.map((t) => {
              const sel = myPick === t.id;
              return (
                <button key={t.id} onClick={() => setMyPick(t.id)} style={{
                  padding: '10px 12px', borderRadius: 8, cursor: 'pointer',
                  background: sel ? 'var(--pa-ink)' : '#fff', color: sel ? '#fff' : 'var(--pa-ink)',
                  border: sel ? 'none' : '1px solid var(--pa-line)', textAlign: 'left',
                }}>
                  <div style={{ fontSize: 12, fontWeight: 600 }}>{t.type}</div>
                  <div style={{ fontSize: 11, opacity: .7 }}>{t.area}</div>
                </button>
              );
            })}
          </div>
          <textarea value={myComment} onChange={(e) => setMyComment(e.target.value)}
            placeholder="Em duas linhas, porquê este?" rows={2}
            style={{ width: '100%', padding: '10px 12px', borderRadius: 8, background: '#fff', border: '1px solid var(--pa-line)', fontFamily: 'var(--pa-body)', fontSize: 13, outline: 'none', resize: 'none', boxSizing: 'border-box' }} />
          <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 10 }}>
            <Btn variant="accent" size="sm" disabled={!myPick} onClick={() => setSubmitted(true)}>Declarar</Btn>
          </div>
        </div>
      )}
      <div style={{ display: 'grid', gridTemplateColumns: `repeat(${tied.length}, 1fr)`, gap: 12, marginBottom: 14 }}>
        {tally.map(({ opt, voters }) => (
          <div key={opt.id} style={{ background: '#fff', borderRadius: 12, padding: 14, border: '1px solid var(--pa-line)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
              <Pill tone="dark" size="sm">{opt.type} · {opt.area}</Pill>
              <span style={{ fontFamily: 'var(--pa-display)', fontSize: 20, fontWeight: 700, color: 'var(--pa-accent)' }}>{voters.length}</span>
            </div>
            {voters.map((v) => (
              <div key={v.id} style={{ display: 'flex', gap: 8, padding: '6px 0', borderTop: '1px solid var(--pa-line)' }}>
                <Avatar member={v} size={20} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 11.5, fontWeight: 600 }}>{v.id === me.id ? 'tu' : v.name}</div>
                  {allVotes[v.id]?.comment && (
                    <div style={{ fontSize: 11, color: 'var(--pa-muted)', fontStyle: 'italic', lineHeight: 1.35 }}>
                      "{allVotes[v.id].comment}"
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>
      {me.isAdmin && <Btn variant="accent" size="sm" disabled={submittedMembers.length === 0} onClick={() => onResolve(winner.id, 'public')}>Fechar voto público</Btn>}
    </TieMethodFrame>
  );
}

// ─────────────────────────────────────────────────────────────
// METHOD: Random coin flip
// ─────────────────────────────────────────────────────────────
function TieMethodRandom({ tied, me, onResolve, onBack }) {
  const [state, setState] = tbUseState('idle');
  const [hover, setHover] = tbUseState(0);
  const [winner, setWinner] = tbUseState(null);
  const timerRef = tbUseRef(null);

  const roll = () => {
    if (state !== 'idle') return;
    setState('rolling');
    let speed = 80;
    let i = 0;
    const tick = () => {
      i = (i + 1) % tied.length;
      setHover(i);
      speed += 25;
      if (speed < 800) { timerRef.current = setTimeout(tick, speed); }
      else { const w = tied[Math.floor(Math.random() * tied.length)]; setWinner(w); setHover(tied.indexOf(w)); setState('done'); }
    };
    tick();
  };
  tbUseEffect(() => () => clearTimeout(timerRef.current), []);

  return (
    <TieMethodFrame method="random" me={me} onBack={state === 'idle' ? onBack : undefined}>
      <div style={{ background: '#fff', borderRadius: 14, padding: 24, textAlign: 'center' }}>
        <div style={{ fontSize: 52, marginBottom: 10 }}>🎲</div>
        <div style={{ fontFamily: 'var(--pa-body)', fontSize: 14, color: 'var(--pa-muted)', marginBottom: 18 }}>
          {state === 'idle' && (me.isAdmin ? 'Clica para lançar.' : 'Miguel vai lançar.')}
          {state === 'rolling' && '...'}
          {state === 'done' && `Saiu: ${winner?.type} de ${winner?.area}`}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: `repeat(${tied.length}, 1fr)`, gap: 10, marginBottom: 18 }}>
          {tied.map((t, i) => {
            const lit = (state === 'rolling' && hover === i) || (state === 'done' && winner?.id === t.id);
            return (
              <div key={t.id} style={{
                padding: 14, borderRadius: 12, transition: 'all .12s',
                background: lit ? 'var(--pa-accent)' : 'var(--pa-bg)',
                color: lit ? '#fff' : 'var(--pa-ink)',
                border: lit ? 'none' : '1px solid var(--pa-line)',
                transform: lit && state === 'done' ? 'scale(1.04)' : 'scale(1)',
                boxShadow: lit && state === 'done' ? '0 8px 24px rgba(217,119,87,0.4)' : 'none',
              }}>
                <div style={{ fontFamily: 'var(--pa-display)', fontSize: 16, fontWeight: 600 }}>{t.type}</div>
                <div style={{ fontSize: 12, opacity: .7 }}>{t.area}</div>
              </div>
            );
          })}
        </div>
        {me.isAdmin && state === 'idle' && <Btn variant="accent" size="lg" onClick={roll} style={{ width: '100%' }}>Lançar à sorte 🎲</Btn>}
        {me.isAdmin && state === 'done' && (
          <div style={{ display: 'flex', gap: 8 }}>
            <Btn variant="ghost" size="md" style={{ flex: 1 }} onClick={onBack}>Trocar método</Btn>
            <Btn variant="accent" size="md" style={{ flex: 1 }} onClick={() => onResolve(winner.id, 'random')}>Confirmar {winner.type}</Btn>
          </div>
        )}
      </div>
    </TieMethodFrame>
  );
}

// ─────────────────────────────────────────────────────────────
// TieBreakManager — top-level for phase 5
// ─────────────────────────────────────────────────────────────
function TieBreakManager({ tied, me, onResolve }) {
  const [method, setMethod] = tbUseState(null);
  if (!method) return <TieMethodPicker tied={tied} me={me} onPick={setMethod} />;
  const props = { tied, me, onBack: () => setMethod(null), onResolve };
  const map = { admin: TieMethodAdmin, borda: TieMethodBorda, score: TieMethodScore, elim: TieMethodElim, runoff: TieMethodRunoff, public: TieMethodPublic, random: TieMethodRandom };
  const Comp = map[method];
  return Comp ? <Comp {...props} /> : null;
}

Object.assign(window, {
  TIE_METHODS, TieBreakManager,
  TieMethodPicker, TieMethodAdmin, TieMethodBorda, TieMethodScore,
  TieMethodElim, TieMethodRunoff, TieMethodPublic, TieMethodRandom,
});
