function MPlanCompras() {
  return (
    <div style={{ background: '#fff', borderRadius: 14, border: '1px solid var(--pa-line)', overflow: 'hidden' }}>
      {D.phase8.shopping.slice(0, 5).map((it, i) => {
        const m = memberById(it.who);
        return (
          <div key={it.id} style={{
            display: 'flex', alignItems: 'center', gap: 10,
            padding: '11px 14px',
            borderTop: i === 0 ? 'none' : '1px solid var(--pa-line)',
            opacity: it.done ? 0.5 : 1,
          }}>
            <div style={{
              width: 18, height: 18, borderRadius: 5,
              background: it.done ? '#3d5e44' : 'transparent',
              border: it.done ? 'none' : '1.5px solid var(--pa-line)',
              display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
            }}>
              {it.done && <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2 2 4-4" stroke="#fff" strokeWidth="1.8" fill="none" strokeLinecap="round"/></svg>}
            </div>
            <div style={{ flex: 1, fontSize: 13, textDecoration: it.done ? 'line-through' : 'none' }}>{it.label}</div>
            <Avatar member={m} size={18} />
          </div>
        );
      })}
    </div>
  );
}

function MPlanItin() {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      {D.phase8.itinerary.map((day, i) => (
        <div key={i} style={{ background: '#fff', borderRadius: 12, border: '1px solid var(--pa-line)', overflow: 'hidden' }}>
          <div style={{ padding: '10px 14px', background: 'rgba(31,26,20,0.04)', fontFamily: 'var(--pa-display)', fontSize: 14, fontWeight: 600 }}>
            {day.day}
          </div>
          {day.items.map((it, j) => (
            <div key={j} style={{ padding: '10px 14px', borderTop: '1px solid var(--pa-line)', display: 'flex', alignItems: 'center', gap: 12 }}>
              <span style={{ fontFamily: 'var(--pa-mono)', fontSize: 11.5, fontWeight: 600, color: 'var(--pa-accent)', width: 42, flexShrink: 0 }}>{it.t}</span>
              <span style={{ fontSize: 12.5, color: 'var(--pa-ink)', flex: 1 }}>{it.label}</span>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// Top-level mobile router
function MobileApp({ viewAs = 'member', phase = D.edition.currentPhase, liveUser, onLogout }) {
  const me = liveUser || (viewAs === 'admin' ? memberById(D.adminId) : memberById('rita'));
  const [chatOpen, setChatOpen] = mUseState(false);
  const phases = { 1: MPhase1, 2: MPhase2, 3: MPhase3, 4: MPhase4, 5: MPhase5, 6: MPhase6, 7: MPhase7, 8: MPhase8 };
  const View = phases[phase] || MPhase3;
  return (
    <div style={{ position: 'relative', width: '100%', height: '100%' }}>
      <View me={me} onLogout={onLogout} onOpenChat={() => setChatOpen(true)} />
      <MobileChatSheet me={me} open={chatOpen} onClose={() => setChatOpen(false)} />
    </div>
  );
}

Object.assign(window, {
  MPhase1, MPhase2, MPhase3, MPhase4, MPhase5, MPhase6, MPhase7, MPhase8,
  MobileApp,
});

</script>
<script type="text/babel">
// Perdidos Algures — LiveApp: root entry point.
// Manages Supabase session, loads edition, provides AppCtx to shells.

const { useState: lUseState, useEffect: lUseEffect, useContext: lUseContext,
        createContext: lCreateContext, useCallback: lUseCallback } = React;

// ── AppCtx: shared app state ───────────────────────────────────
const AppCtx = lCreateContext({
  me: null,
  edition: null,
  members: [],
  setEdition: () => {},
  refreshEdition: async () => {},
  logout: async () => {},
});
window.AppCtx = AppCtx;
function useApp() { return lUseContext(AppCtx); }
window.useApp = useApp;

// profile row → member-shaped object the rest of the app uses
function profileToMember(profile) {
  if (!profile) return null;
  return {
    id:          profile.id,
    name:        profile.name,
    initials:    profile.initials || initialsFromName(profile.name),
    color:       profile.color   || colorFromName(profile.name),
    photo_url:   profile.photo_url || null,
    photoDataUrl:profile.photo_url || null, // compat
    isAdmin:     profile.is_admin === true,
  };
}

// ── useViewport ───────────────────────────────────────────────
function useViewport() {
  const [w, setW] = lUseState(typeof window !== 'undefined' ? window.innerWidth : 1440);
  lUseEffect(() => {
    const r = () => setW(window.innerWidth);
    window.addEventListener('resize', r);
    return () => window.removeEventListener('resize', r);
  }, []);
  return w;
}

// ── CreateEditionScreen ───────────────────────────────────────
// Admin-only: shown when no edition exists yet.
function CreateEditionScreen({ me, onCreate }) {
  const [number, setNumber] = lUseState('1');
  const [title, setTitle]   = lUseState('');
  const [sub, setSub]       = lUseState('');
  const [busy, setBusy]     = lUseState(false);
  const [err, setErr]       = lUseState(null);

  const submit = async (e) => {
    e.preventDefault();
    if (!title.trim()) { setErr('Dá um nome à edição.'); return; }
    setBusy(true); setErr(null);
    try {
      const ed = await DB.createEdition({ number: parseInt(number, 10) || 1, title: title.trim(), subtitle: sub.trim(), adminId: me.id });
      onCreate(ed);
    } catch (ex) { setErr(ex.message); setBusy(false); }
  };

  return (
    <div style={{
      width: '100vw', height: '100vh', background: 'var(--pa-bg)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: 'var(--pa-body)',
    }}>
      <div style={{ maxWidth: 460, width: '100%', padding: '0 28px' }}>
        <Logo size={18} />
        <div style={{ marginTop: 32, fontFamily: 'var(--pa-display)', fontSize: 36, fontWeight: 600, letterSpacing: -1.2, lineHeight: 1.02 }}>
          Lança a primeira<br/><span style={{ color: 'var(--pa-accent)' }}>edição.</span>
        </div>
        <div style={{ marginTop: 10, fontSize: 14, color: 'var(--pa-muted)', lineHeight: 1.5 }}>
          Olá {me.name}. Não há nenhuma edição activa. Cria a primeira e dá-lhe um nome.
        </div>

        <form onSubmit={submit} style={{ marginTop: 28, display: 'flex', flexDirection: 'column', gap: 14 }}>
          <Field label="Número da edição" placeholder="1" value={number} onChange={setNumber} />
          <Field label="Nome" placeholder="Tropa Mediterrânica" value={title} onChange={setTitle} />
          <Field label="Subtítulo (opcional)" placeholder="Algures entre o sol e o vinho." value={sub} onChange={setSub} />
          {err && (
            <div style={{ padding: '10px 14px', borderRadius: 10, background: 'rgba(217,119,87,0.14)', color: '#8a4220', fontSize: 13 }}>{err}</div>
          )}
          <button type="submit" disabled={busy || !title.trim()} style={{
            marginTop: 8, height: 52, borderRadius: 999, border: 'none',
            background: 'var(--pa-accent)', color: '#fff', cursor: busy ? 'default' : 'pointer',
            fontFamily: 'var(--pa-body)', fontSize: 15, fontWeight: 600,
            opacity: (busy || !title.trim()) ? 0.5 : 1,
          }}>{busy ? 'A criar...' : 'Criar edição 🚀'}</button>
        </form>
      </div>
    </div>
  );
}

// ── Spinner ───────────────────────────────────────────────────
function AppSpinner() {
  return (
    <div style={{ width: '100vw', height: '100vh', background: 'var(--pa-bg)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div>
        <Logo size={18} />
        <div style={{ marginTop: 16, fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.5, color: 'var(--pa-muted)', textTransform: 'uppercase', textAlign: 'center' }}>
          A carregar...
        </div>
      </div>
    </div>
  );
}

// ── AdminPanel ────────────────────────────────────────────────
// Full-screen overlay for admin management: messages, user actions, editions
function AdminPanel({ me, edition, members, onClose }) {
  const [tab, setTab] = lUseState('messages');
  const [messages, setMessages] = lUseState([]);
  const [rsvpData, setRsvpData] = lUseState([]);
  const [votes3, setVotes3] = lUseState([]);
  const [votes5, setVotes5] = lUseState([]);
  const [locSugs, setLocSugs] = lUseState([]);
  const [accSugs, setAccSugs] = lUseState([]);
  const [avail, setAvail] = lUseState([]);
  const [editions, setEditions] = lUseState([]);
  const [loading, setLoading] = lUseState(true);
  const [confirm, setConfirm] = lUseState(null); // { type, id, label }
  const [busy, setBusy] = lUseState(false);
  const [toast, setToast] = lUseState(null);

  const showToast = (msg, ok = true) => {
    setToast({ msg, ok });
    setTimeout(() => setToast(null), 2500);
  };

  lUseEffect(() => {
    if (!edition) { setLoading(false); return; }
    setLoading(true);
    Promise.all([
      DB.getMessages(edition.id).catch(() => []),
      DB.getRsvp(edition.id).catch(() => []),
      DB.getVotes(edition.id, 3).catch(() => []),
      DB.getVotes(edition.id, 5).catch(() => []),
      DB.getLocationSuggestions(edition.id).catch(() => []),
      DB.getAccommodations(edition.id).catch(() => []),
      DB.getAvailability(edition.id).catch(() => []),
      DB.getAllEditions().catch(() => []),
    ]).then(([msgs, rsvp, v3, v5, locs, accs, av, eds]) => {
      setMessages(msgs);
      setRsvpData(rsvp);
      setVotes3(v3);
      setVotes5(v5);
      setLocSugs(locs);
      setAccSugs(accs);
      setAvail(av);
      setEditions(eds);
      setLoading(false);
    });
  }, [edition?.id, tab]);

  const doDelete = async () => {
    if (!confirm) return;
    setBusy(true);
    try {
      const { type, id, userId } = confirm;
      if (type === 'message')      { await DB.deleteMessage(id); setMessages((p) => p.filter((m) => m.id !== id)); }
      if (type === 'rsvp')         { await DB.deleteRsvp(edition.id, userId); setRsvpData((p) => p.filter((r) => r.user_id !== userId)); }
      if (type === 'vote3')        { await DB.deleteVote(edition.id, userId, 3); setVotes3((p) => p.filter((v) => v.user_id !== userId)); }
      if (type === 'vote5')        { await DB.deleteVote(edition.id, userId, 5); setVotes5((p) => p.filter((v) => v.user_id !== userId)); }
      if (type === 'locSug')       { await DB.deleteLocationSuggestion(id); setLocSugs((p) => p.filter((s) => s.id !== id)); }
      if (type === 'accSug')       { await DB.deleteAccommodation(id); setAccSugs((p) => p.filter((s) => s.id !== id)); }
      if (type === 'avail')        { await DB.deleteAvailability(edition.id, userId); setAvail((p) => p.filter((a) => a.user_id !== userId)); }
      if (type === 'edition-del')  {
        await DB.deleteEdition(id);
        setEditions((p) => p.filter((e) => e.id !== id));
      }
      if (type === 'edition-reset') {
        await DB.resetEdition(id);
        showToast('Edição resetada para a Fase 1.');
        setBusy(false);
        setConfirm(null);
        // Reload the page so all state refreshes
        setTimeout(() => window.location.reload(), 800);
        return;
      }
      showToast('Eliminado com sucesso.');
    } catch (ex) { showToast('Erro: ' + ex.message, false); }
    setBusy(false);
    setConfirm(null);
  };

  const tabs = [
    { id: 'messages', label: 'Mensagens' },
    { id: 'rsvp', label: 'RSVPs' },
    { id: 'votes', label: 'Votos' },
    { id: 'suggestions', label: 'Sugestões' },
    { id: 'availability', label: 'Disponibilidade' },
    { id: 'editions', label: 'Edições' },
  ];

  const btnDel = (label, type, id, userId, phase) => (
    <button onClick={() => setConfirm({ type, id, userId, phase, label })} style={{
      padding: '4px 10px', borderRadius: 6, border: '1px solid rgba(217,119,87,0.4)',
      background: 'transparent', color: '#c44', cursor: 'pointer',
      fontFamily: 'var(--pa-mono)', fontSize: 10, fontWeight: 600,
    }}>✕ apagar</button>
  );

  const Row = ({ left, right }) => (
    <div style={{
      display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between',
      padding: '10px 0', borderBottom: '1px solid var(--pa-line)', gap: 12,
    }}>
      <div style={{ flex: 1, minWidth: 0, fontSize: 13, color: 'var(--pa-ink)', lineHeight: 1.4 }}>{left}</div>
      <div style={{ flexShrink: 0 }}>{right}</div>
    </div>
  );

  const memberName = (uid) => members.find((m) => m.id === uid)?.name || uid;

  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 9999,
      background: 'rgba(31,26,20,0.55)', backdropFilter: 'blur(4px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      <div style={{
        width: '92vw', maxWidth: 860, height: '88vh',
        background: 'var(--pa-bg)', borderRadius: 20,
        display: 'flex', flexDirection: 'column',
        boxShadow: '0 32px 80px rgba(0,0,0,0.3)',
        overflow: 'hidden',
      }}>
        {/* Header */}
        <div style={{
          padding: '18px 24px', borderBottom: '1px solid var(--pa-line)',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0,
        }}>
          <div>
            <div style={{ fontFamily: 'var(--pa-display)', fontSize: 20, fontWeight: 700, letterSpacing: -0.5 }}>
              Painel Admin
            </div>
            <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1, color: 'var(--pa-muted)', textTransform: 'uppercase', marginTop: 2 }}>
              Gerir dados · edição activa
            </div>
          </div>
          <button onClick={onClose} style={{
            width: 36, height: 36, borderRadius: 999, border: '1px solid var(--pa-line)',
            background: '#fff', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 2l10 10M12 2L2 12" stroke="var(--pa-ink)" strokeWidth="1.8" strokeLinecap="round"/></svg>
          </button>
        </div>

        {/* Tabs */}
        <div style={{ padding: '10px 24px 0', display: 'flex', gap: 4, flexWrap: 'wrap', flexShrink: 0, borderBottom: '1px solid var(--pa-line)' }}>
          {tabs.map((t) => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              padding: '7px 14px', borderRadius: '8px 8px 0 0', border: 'none', cursor: 'pointer',
              background: tab === t.id ? '#fff' : 'transparent',
              borderTop: tab === t.id ? '2px solid var(--pa-accent)' : '2px solid transparent',
              color: tab === t.id ? 'var(--pa-ink)' : 'var(--pa-muted)',
              fontFamily: 'var(--pa-body)', fontSize: 12.5, fontWeight: tab === t.id ? 600 : 500,
            }}>{t.label}</button>
          ))}
        </div>

        {/* Content */}
        <div style={{ flex: 1, overflow: 'auto', padding: '16px 24px' }}>
          {loading && <div style={{ textAlign: 'center', padding: 40, color: 'var(--pa-muted)', fontSize: 13 }}>A carregar...</div>}

          {!loading && tab === 'messages' && (
            <div>
              <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 12 }}>
                {messages.length} mensagens
              </div>
              {messages.length === 0 && <div style={{ color: 'var(--pa-muted)', fontSize: 13 }}>Sem mensagens.</div>}
              {messages.map((msg) => (
                <Row key={msg.id}
                  left={<><span style={{ fontWeight: 600 }}>{msg.by_profile?.name || '?'}</span>: {msg.text}<span style={{ fontSize: 10.5, color: 'var(--pa-muted)', marginLeft: 8 }}>{new Date(msg.created_at).toLocaleString('pt-PT')}</span></>}
                  right={btnDel(msg.text.slice(0, 30), 'message', msg.id)}
                />
              ))}
            </div>
          )}

          {!loading && tab === 'rsvp' && (
            <div>
              <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 12 }}>
                {rsvpData.length} respostas RSVP
              </div>
              {rsvpData.length === 0 && <div style={{ color: 'var(--pa-muted)', fontSize: 13 }}>Sem RSVPs.</div>}
              {rsvpData.map((r) => (
                <Row key={r.user_id}
                  left={<><span style={{ fontWeight: 600 }}>{r.profiles?.name || memberName(r.user_id)}</span> → <span style={{ color: r.state === 'in' ? '#3d5e44' : r.state === 'out' ? '#c44' : 'var(--pa-muted)' }}>{r.state === 'in' ? '✓ Dentro' : r.state === 'out' ? '✕ Fora' : '? A pensar'}</span></>}
                  right={btnDel(r.profiles?.name || r.user_id, 'rsvp', null, r.user_id)}
                />
              ))}
            </div>
          )}

          {!loading && tab === 'votes' && (
            <div>
              <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 8 }}>
                Votos Fase 3 (locais) — {votes3.length} votos
              </div>
              {votes3.map((v) => (
                <Row key={v.user_id + '3'}
                  left={<><span style={{ fontWeight: 600 }}>{memberName(v.user_id)}</span> → <span style={{ fontFamily: 'var(--pa-mono)', fontSize: 11.5 }}>{v.suggestion_id}</span></>}
                  right={btnDel(memberName(v.user_id), 'vote3', null, v.user_id, 3)}
                />
              ))}
              <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', margin: '20px 0 8px' }}>
                Votos Fase 5 (alojamentos) — {votes5.length} votos
              </div>
              {votes5.map((v) => (
                <Row key={v.user_id + '5'}
                  left={<><span style={{ fontWeight: 600 }}>{memberName(v.user_id)}</span> → <span style={{ fontFamily: 'var(--pa-mono)', fontSize: 11.5 }}>{v.suggestion_id}</span></>}
                  right={btnDel(memberName(v.user_id), 'vote5', null, v.user_id, 5)}
                />
              ))}
            </div>
          )}

          {!loading && tab === 'suggestions' && (
            <div>
              <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 8 }}>
                Sugestões de locais — {locSugs.length}
              </div>
              {locSugs.map((s) => (
                <Row key={s.id}
                  left={<><span style={{ fontWeight: 600 }}>{s.name}</span> · {s.city} <span style={{ fontSize: 11.5, color: 'var(--pa-muted)' }}>por {s.by_profile?.name || s.by_user}</span></>}
                  right={btnDel(s.name, 'locSug', s.id)}
                />
              ))}
              <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', margin: '20px 0 8px' }}>
                Sugestões de alojamento — {accSugs.length}
              </div>
              {accSugs.map((s) => (
                <Row key={s.id}
                  left={<><span style={{ fontWeight: 600 }}>{s.type}</span> · {s.area} · {s.price}€/n <span style={{ fontSize: 11.5, color: 'var(--pa-muted)' }}>por {s.by_profile?.name || s.by_user}</span></>}
                  right={btnDel(s.area, 'accSug', s.id)}
                />
              ))}
            </div>
          )}

          {!loading && tab === 'availability' && (
            <div>
              <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 12 }}>
                Disponibilidades submetidas — {avail.length}
              </div>
              {avail.length === 0 && <div style={{ color: 'var(--pa-muted)', fontSize: 13 }}>Nenhuma disponibilidade submetida.</div>}
              {avail.map((a) => (
                <Row key={a.user_id}
                  left={<><span style={{ fontWeight: 600 }}>{a.profiles?.name || memberName(a.user_id)}</span>: <span style={{ fontFamily: 'var(--pa-mono)', fontSize: 11.5 }}>{(a.days || []).join(', ')}</span></>}
                  right={btnDel(a.profiles?.name || a.user_id, 'avail', null, a.user_id)}
                />
              ))}
            </div>
          )}

          {!loading && tab === 'editions' && (
            <div>
              <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 12 }}>
                {editions.length} edições na base de dados
              </div>
              {editions.map((ed) => {
                const isActive = ed.id === edition?.id;
                return (
                  <Row key={ed.id}
                    left={
                      <div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                          <span style={{ fontWeight: 600 }}>Nº{ed.number}</span> · {ed.title}
                          {isActive && <span style={{ fontFamily: 'var(--pa-mono)', fontSize: 9, letterSpacing: 1, color: 'var(--pa-accent)', fontWeight: 700, textTransform: 'uppercase', padding: '2px 6px', borderRadius: 4, background: 'rgba(217,119,87,0.12)' }}>ACTIVA</span>}
                        </div>
                        <div style={{ fontSize: 11.5, color: 'var(--pa-muted)', marginTop: 2 }}>
                          Fase {ed.current_phase} · criada {new Date(ed.created_at).toLocaleDateString('pt-PT')}
                        </div>
                      </div>
                    }
                    right={
                      <div style={{ display: 'flex', gap: 6 }}>
                        <button onClick={() => setConfirm({ type: 'edition-reset', id: ed.id, label: `Resetar "${ed.title}" → Fase 1 (apaga todos os dados da edição)` })} style={{
                          padding: '4px 10px', borderRadius: 6, border: '1px solid rgba(31,26,20,0.2)',
                          background: 'transparent', color: 'var(--pa-ink)', cursor: 'pointer',
                          fontFamily: 'var(--pa-mono)', fontSize: 10, fontWeight: 600,
                        }}>↺ reset</button>
                        {!isActive && (
                          <button onClick={() => setConfirm({ type: 'edition-del', id: ed.id, label: `Apagar edição "${ed.title}" e todos os seus dados` })} style={{
                            padding: '4px 10px', borderRadius: 6, border: '1px solid rgba(217,119,87,0.4)',
                            background: 'transparent', color: '#c44', cursor: 'pointer',
                            fontFamily: 'var(--pa-mono)', fontSize: 10, fontWeight: 600,
                          }}>✕ apagar</button>
                        )}
                      </div>
                    }
                  />
                );
              })}
              {editions.length === 0 && <div style={{ color: 'var(--pa-muted)', fontSize: 13 }}>Sem edições.</div>}
            </div>
          )}
        </div>

        {/* Confirm dialog */}
        {confirm && (
          <div style={{
            position: 'absolute', inset: 0, background: 'rgba(31,26,20,0.4)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 10,
          }}>
            <div style={{
              background: '#fff', borderRadius: 16, padding: 28, maxWidth: 380, width: '90%',
              boxShadow: '0 16px 48px rgba(0,0,0,0.2)',
            }}>
              <div style={{ fontFamily: 'var(--pa-display)', fontSize: 18, fontWeight: 700, marginBottom: 10 }}>
                {confirm.type === 'edition-reset' ? '↺ Confirmar reset' : 'Confirmar eliminação'}
              </div>
              <div style={{ fontSize: 13.5, color: 'var(--pa-muted)', marginBottom: 20, lineHeight: 1.5 }}>
                {confirm.label}
              </div>
              <div style={{ display: 'flex', gap: 10 }}>
                <button onClick={() => setConfirm(null)} style={{
                  flex: 1, height: 42, borderRadius: 999, border: '1px solid var(--pa-line)',
                  background: '#fff', cursor: 'pointer', fontFamily: 'var(--pa-body)', fontSize: 14, fontWeight: 600,
                }}>Cancelar</button>
                <button onClick={doDelete} disabled={busy} style={{
                  flex: 1, height: 42, borderRadius: 999, border: 'none',
                  background: confirm.type === 'edition-reset' ? 'var(--pa-ink)' : '#c44',
                  color: '#fff', cursor: busy ? 'default' : 'pointer',
                  fontFamily: 'var(--pa-body)', fontSize: 14, fontWeight: 600,
                  opacity: busy ? 0.6 : 1,
                }}>{busy ? 'A processar...' : (confirm.type === 'edition-reset' ? 'Resetar' : 'Eliminar')}</button>
              </div>
            </div>
          </div>
        )}

        {/* Toast */}
        {toast && (
          <div style={{
            position: 'absolute', bottom: 24, left: '50%', transform: 'translateX(-50%)',
            padding: '10px 20px', borderRadius: 999,
            background: toast.ok ? '#3d5e44' : '#c44', color: '#fff',
            fontFamily: 'var(--pa-body)', fontSize: 13, fontWeight: 600,
            boxShadow: '0 8px 24px rgba(0,0,0,0.2)', zIndex: 20,
          }}>{toast.msg}</div>
        )}
      </div>
    </div>
  );
}

// ── LiveApp ───────────────────────────────────────────────────
function LiveApp() {
  const auth = useAuth();
  const w = useViewport();
  const isDesktop = w >= 1100;

  const [edition,  setEdition]  = lUseState(null);
  const [members,  setMembers]  = lUseState([]);
  const [edLoaded, setEdLoaded] = lUseState(false);
  const [adminPanelOpen, setAdminPanelOpen] = lUseState(false);

  // Expose admin panel opener to DTopBar button
  lUseEffect(() => {
    window.__openAdminPanel = () => setAdminPanelOpen(true);
    return () => { delete window.__openAdminPanel; };
  }, []);

  // When profile is ready, load edition + members
  lUseEffect(() => {
    if (!auth.profile) { setEdLoaded(false); return; }
    let mounted = true;
    Promise.all([
      DB.getEdition().catch(() => null),
      DB.getAllProfiles().catch(() => []),
    ]).then(([ed, profs]) => {
      if (!mounted) return;
      setEdition(ed);
      setMembers(profs.map(profileToMember));
      setEdLoaded(true);
    });
    return () => { mounted = false; };
  }, [auth.profile?.id]);

  // Realtime: edition updates (phase changes from admin)
  lUseEffect(() => {
    if (!edition?.id) return;
    const ch = DB.subscribeEdition(edition.id, (updated) => {
      setEdition((prev) => ({ ...prev, ...updated }));
    });
    return () => { sb.removeChannel(ch); };
  }, [edition?.id]);

  const refreshEdition = lUseCallback(async () => {
    const ed = await DB.getEdition().catch(() => null);
    setEdition(ed);
  }, []);

  // ── Loading spinner
  if (auth.loading || (auth.user && !edLoaded)) return <AppSpinner />;

  // ── Not logged in
  if (!auth.user || !auth.profile) {
    return (
      <div style={{ width: '100vw', height: '100vh' }}>
        <AuthGate auth={{ login: auth.login, register: auth.register, user: auth.user }} narrow={!isDesktop} />
      </div>
    );
  }

  const me = profileToMember(auth.profile);

  // ── Admin: no edition yet → create it
  if (!edition && me.isAdmin) {
    return <CreateEditionScreen me={me} onCreate={(ed) => { setEdition(ed); setEdLoaded(true); }} />;
  }

  // ── Member: no edition yet
  if (!edition) {
    return (
      <div style={{ width: '100vw', height: '100vh', background: 'var(--pa-bg)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ textAlign: 'center', padding: 40, maxWidth: 400 }}>
          <Logo size={20} />
          <div style={{ marginTop: 20, fontFamily: 'var(--pa-display)', fontSize: 24, fontWeight: 600, letterSpacing: -0.5 }}>
            Ainda não há edição activa.
          </div>
          <div style={{ marginTop: 8, fontSize: 14, color: 'var(--pa-muted)', lineHeight: 1.5 }}>
            Aguarda que o Miguel inicie uma nova edição. Podes tentar recarregar a página ou voltar mais tarde.
          </div>
          <div style={{ marginTop: 24, display: 'flex', gap: 10, justifyContent: 'center' }}>
            <button onClick={() => window.location.reload()} style={{
              height: 42, padding: '0 20px', borderRadius: 999,
              background: 'var(--pa-ink)', color: '#fff', border: 'none',
              fontFamily: 'var(--pa-body)', fontSize: 14, fontWeight: 600, cursor: 'pointer',
            }}>Recarregar</button>
            <button onClick={auth.logout} style={{
              height: 42, padding: '0 20px', borderRadius: 999,
              background: '#fff', color: 'var(--pa-ink)', border: '1px solid var(--pa-line)',
              fontFamily: 'var(--pa-body)', fontSize: 14, fontWeight: 600, cursor: 'pointer',
            }}>Sair</button>
          </div>
        </div>
      </div>
    );
  }

  // ── App context value
  const ctx = { me, edition, members, setEdition, refreshEdition, logout: auth.logout };

  if (isDesktop) {
    return (
      <AppCtx.Provider value={ctx}>
        <div style={{ width: '100vw', height: '100vh' }}>
          <DesktopShell
            viewAs={me.isAdmin ? 'admin' : 'member'}
            phase={edition.current_phase}
            liveUser={me}
            onLogout={auth.logout}
          />
        </div>
        {adminPanelOpen && me.isAdmin && (
          <AdminPanel me={me} edition={edition} members={members} onClose={() => setAdminPanelOpen(false)} />
        )}
      </AppCtx.Provider>
    );
  }

  return (
    <AppCtx.Provider value={ctx}>
      <div style={{ width: '100vw', height: '100vh', background: '#000', display: 'flex', alignItems: 'stretch', justifyContent: 'center' }}>
        <div style={{ width: '100%', maxWidth: 480, background: 'var(--pa-bg)', display: 'flex', flexDirection: 'column' }}>
          <MobileApp
            viewAs={me.isAdmin ? 'admin' : 'member'}
            phase={edition.current_phase}
            liveUser={me}
            onLogout={auth.logout}
          />
        </div>
      </div>
      {adminPanelOpen && me.isAdmin && (
        <AdminPanel me={me} edition={edition} members={members} onClose={() => setAdminPanelOpen(false)} />
      )}
    </AppCtx.Provider>
  );
}

Object.assign(window, { LiveApp, AppCtx, useApp, profileToMember, CreateEditionScreen, AppSpinner, useViewport });

</script>

<script type="text/babel" data-presets="env,react">
  const { useState, useEffect } = React;

  // ── Route: ?canvas=1 → design canvas; default → live app ───
  const isCanvasMode = new URLSearchParams(location.search).has('canvas');

  // ── Theme defaults ────────────────────────────────────────
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "palette": ["#f5f1ea", "#1f1a14", "#d97757"],
    "viewAs": "admin",
    "showMobile": true,
    "showAuth": true
  }/*EDITMODE-END*/;

  const PALETTES = [
    ['#f5f1ea', '#1f1a14', '#d97757'], // warm clay (default)
    ['#fdf6e3', '#2d2410', '#c8804a'], // sun-bleached
    ['#eef0e8', '#1c2418', '#5a8a5e'], // moss
    ['#f0eae4', '#1a1714', '#3a5a7a'], // tide
    ['#fafaf7', '#0f0f0e', '#ff5a36'], // editorial
  ];

  function applyPalette(p) {
    const r = document.documentElement.style;
    r.setProperty('--pa-bg', p[0]);
    r.setProperty('--pa-ink', p[1]);
    r.setProperty('--pa-accent', p[2]);
    r.setProperty('--pa-muted', mix(p[0], p[1], 0.45));
    r.setProperty('--pa-line', mix(p[0], p[1], 0.10));
  }
  function mix(a, b, t) {
    const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
    const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
    const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
    const r = Math.round(ar + (br - ar) * t);
    const g = Math.round(ag + (bg - ag) * t);
    const bl = Math.round(ab + (bb - ab) * t);
    return '#' + ((1 << 24) | (r << 16) | (g << 8) | bl).toString(16).slice(1);
  }

  function PhoneFrame({ children }) { return <IOSDevice width={402} height={874}>{children}</IOSDevice>; }

  // ── Static auth artboard previews (for the canvas only) ──
  function StaticAuthPreview({ mode, narrow }) {
    // Dummy auth object — never resolves, just shows the form chrome
    const fakeAuth = { login: async () => {}, register: async () => {}, user: null, logout: () => {} };
    if (mode === 'login') return <LoginScreen auth={fakeAuth} onSwitch={() => {}} narrow={narrow} />;
    return <RegisterScreen auth={fakeAuth} onSwitch={() => {}} narrow={narrow} />;
  }

  // ── Live-app root (default landing) ───────────────────────
  function LiveRoot() {
    const [t] = useTweaks({ palette: TWEAK_DEFAULTS.palette });
    useEffect(() => { applyPalette(TWEAK_DEFAULTS.palette); }, []);
    return <LiveApp />;
  }

  // ── Canvas root (design review) ───────────────────────────
  function CanvasRoot() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    useEffect(() => { applyPalette(t.palette); }, [t.palette]);
    const v = t.viewAs;

    const desktopArtboards = [
      { id: 'd1', label: 'Fase 01 · RSVP',                phase: 1 },
      { id: 'd2', label: 'Fase 02 · Sugerir locais',      phase: 2 },
      { id: 'd3', label: 'Fase 03 · Votar local',         phase: 3 },
      { id: 'd4', label: 'Fase 04 · Sugerir alojamento',  phase: 4 },
      { id: 'd5', label: 'Fase 05 · Votar alojamento (empate)', phase: 5 },
      { id: 'd6', label: 'Fase 06 · Disponibilidade',     phase: 6 },
      { id: 'd7', label: 'Fase 07 · Trancar datas',       phase: 7 },
      { id: 'd8', label: 'Fase 08 · Planeamento',         phase: 8 },
    ];

    const mobileArtboards = [
      { id: 'm1', label: 'Fase 01 · RSVP',          phase: 1 },
      { id: 'm2', label: 'Fase 02 · Locais',        phase: 2 },
      { id: 'm3', label: 'Fase 03 · Votar local',   phase: 3 },
      { id: 'm4', label: 'Fase 04 · Alojamentos',  phase: 4 },
      { id: 'm5', label: 'Fase 05 · Empate',       phase: 5 },
      { id: 'm6', label: 'Fase 06 · Datas',        phase: 6 },
      { id: 'm8', label: 'Fase 08 · Planear',      phase: 8 },
    ];

    return (
      <>
        <DesignCanvas>
          {t.showAuth && (
            <DCSection id="auth" title="Contas & Acesso"
              subtitle='Entrada do site: registo com nome + foto + password. Admin é "Miguel" com password fixa. (Detalhes técnicos no README.md)'>
              <DCArtboard id="login-desktop" label="Login · desktop" width={1100} height={760}>
                <StaticAuthPreview mode="login" narrow={false} />
              </DCArtboard>
              <DCArtboard id="register-desktop" label="Registo · desktop" width={1100} height={760}>
                <StaticAuthPreview mode="register" narrow={false} />
              </DCArtboard>
              <DCArtboard id="login-mobile" label="Login · mobile" width={402} height={780}>
                <StaticAuthPreview mode="login" narrow={true} />
              </DCArtboard>
              <DCArtboard id="register-mobile" label="Registo · mobile" width={402} height={780}>
                <StaticAuthPreview mode="register" narrow={true} />
              </DCArtboard>
            </DCSection>
          )}

          <DCSection id="desktop" title="Perdidos Algures · Desktop"
            subtitle="Seis fases. Miguel inicia, o grupo decide, Miguel tranca. Toggle 'Ver como' nos tweaks para alternar admin/membro.">
            {desktopArtboards.map((a) => (
              <DCArtboard key={a.id} id={a.id} label={a.label} width={1440} height={900}>
                <DesktopShell viewAs={v} phase={a.phase} />
              </DCArtboard>
            ))}
          </DCSection>

          {t.showMobile && (
            <DCSection id="mobile" title="Mobile · companion"
              subtitle="Versão de telemóvel pensada para responder em segundos a meio do dia.">
              {mobileArtboards.map((a) => (
                <DCArtboard key={a.id} id={a.id} label={a.label} width={402} height={874}>
                  <PhoneFrame><MobileApp viewAs={v} phase={a.phase} /></PhoneFrame>
                </DCArtboard>
              ))}
            </DCSection>
          )}
        </DesignCanvas>

        <TweaksPanel title="Tweaks">
          <TweakSection label="Quem está a ver">
            <TweakRadio label="Ver como" value={v}
              options={[{ value: 'admin', label: '👑 Miguel' }, { value: 'member', label: '🥾 Rita' }]}
              onChange={(value) => setTweak('viewAs', value)} />
          </TweakSection>
          <TweakSection label="Paleta">
            <TweakColor label="Tema" value={t.palette} options={PALETTES}
              onChange={(value) => setTweak('palette', value)} />
          </TweakSection>
          <TweakSection label="Secções no canvas">
            <TweakToggle label="Contas & Acesso" value={t.showAuth} onChange={(v) => setTweak('showAuth', v)} />
            <TweakToggle label="Mobile companion" value={t.showMobile} onChange={(v) => setTweak('showMobile', v)} />
          </TweakSection>
        </TweaksPanel>
      </>
    );
  }

  const RootComp = isCanvasMode ? CanvasRoot : LiveRoot;
  ReactDOM.createRoot(document.getElementById('root')).render(<RootComp />);
</script>
</body>
</html>
