// Top-level mobile router
function MobileApp({ viewAs = 'member', liveUser, onLogout, phase: initialPhase, onBackToHub, onEditProfile }) {
  const appData = useAppStore();
  const me = liveUser || (viewAs === 'admin' ? memberById(D.adminId) : getAllMembers()[0] || memberById(D.adminId));
  const [chatOpen, setChatOpen] = mUseState(false);
  const allMsgs = useChat();
  const [lastSeen, setLastSeen] = mUseState(() => {
    try { return parseInt(localStorage.getItem('pa-chat-seen') || '0', 10) || 0; } catch { return 0; }
  });
  const unread = allMsgs.filter(m => (m.id || 0) > lastSeen && m.who !== me?.id).length;
  const markChatSeen = () => {
    const maxId = allMsgs.reduce((mx, m) => Math.max(mx, m.id || 0), 0);
    setLastSeen(maxId);
    try { localStorage.setItem('pa-chat-seen', String(maxId)); } catch {}
  };
  const openChat = () => { markChatSeen(); setChatOpen(true); };
  // Se o chat está aberto e chegam mensagens novas, marca como vistas
  mUseEffect(() => { if (chatOpen) markChatSeen(); /* eslint-disable-next-line */ }, [allMsgs.length, chatOpen]);
  const phase = initialPhase !== undefined ? initialPhase : (appData.currentPhase || D.edition.currentPhase || 1);
  const phases = { 1:MPhase1, 2:MPhase6, 3:MPhase7, 4:MPhaseConfirm, 5:MPhase2, 6:MPhase3, 7:MPhase4, 8:MPhase5, 9:MPhase8 }; // 1 interesse · 2 disp · 3 datas · 4 confirmar · 5 local · 6 votar local · 7 aloj · 8 votar aloj · 9 plano
  const View = phases[phase] || MPhase1;
  return (
    <MNavCtx.Provider value={{ onBackToHub, onEditProfile, me, chatUnread: unread }}>
      <div style={{ position:'relative', width:'100%', height:'100%', display:'flex', flexDirection:'column' }}>
        <AnnouncementBanner me={me} />
        <DatesChip phase={phase} />
        <div style={{ flex:1, overflow:'hidden', position:'relative' }}>
          <div key={phase} className="pa-phase-enter" role="main" aria-label={`Fase ${phase}`} style={{ width:'100%', height:'100%' }}>
            <View me={me} onLogout={onLogout} onOpenChat={openChat} />
          </div>
        </div>
        {initialPhase === undefined && (
          <div style={{ padding:'8px 14px calc(12px + env(safe-area-inset-bottom))', background:'var(--pa-bg)', borderTop:'1px solid var(--pa-line)', flexShrink:0 }}>
            <PhaseProgressBanner phase={phase} me={me} narrow />
          </div>
        )}
        <MobileChatSheet me={me} open={chatOpen} onClose={() => setChatOpen(false)} />
      </div>
    </MNavCtx.Provider>
  );
}

Object.assign(window, {
  MPhase1, MPhase2, MPhase3, MPhase4, MPhase5, MPhase6, MPhase7, MPhase8, MPhaseConfirm,
  MobileApp,
});
</script>
<script type="text/babel">// Perdidos Algures — Sistema de progressão de fases.
// - Auto-advance: quando todos os participantes "in" tiverem completado a fase,
//   inicia countdown de 10s. Quando chega a 0, qualquer cliente avança a fase
//   (idempotente, primeiro a chegar ganha; os outros notam e param).
// - Só o admin avança a fase (botão "Avançar"). Prazo opcional com countdown.
// Tudo guardado na edição ativa via AppStore.

const { useState: pUseState, useEffect: pUseEffect, useRef: pUseRef } = React;

// ─────────────────────────────────────────────────────────────
// Quem está "a bordo" (RSVP === 'in'). Inclui o admin se respondeu in.
// ─────────────────────────────────────────────────────────────
// Universo PARTICIPANTE de uma fase: toda a gente da edição exceto quem disse
// explicitamente que não vai. Serve as listas de estado e os lembretes — quem
// ainda não respondeu, ou respondeu "talvez", também precisa de ser chamado.
// NÃO confundir com getInMembers (quórum de avanço = só os confirmados).
function getActiveMembers(appData) {
  const rsvp = (appData && appData.rsvp) || {};
  const all = (typeof getEditionMembers === 'function') ? getEditionMembers(appData)
    : ((typeof getAllMembers === 'function') ? getAllMembers() : []);
  return all.filter((m) => rsvp[m.id] !== 'out');
}

// Interessados = quem disse "sim" ou "a pensar" (in ou maybe). É o conjunto que
// conta ANTES de as datas serem trancadas (interesse + disponibilidade).
function getInterestedMembers(appData) {
  const rsvp = (appData && appData.rsvp) || {};
  const all = (typeof getEditionMembers === 'function') ? getEditionMembers(appData)
    : ((typeof getAllMembers === 'function') ? getAllMembers() : []);
  return all.filter(m => rsvp[m.id] === 'in' || rsvp[m.id] === 'maybe');
}

// Um dia está dentro do intervalo trancado?
function paWithinLocked(day, locked) {
  if (!locked) return false;
  const k = paNormDay(day);
  return k >= paNormDay(locked.from) && k <= paNormDay(locked.to);
}

// Presença FIRME de um membro (fase 4 "Confirmar presença" em diante):
//  - resposta explícita (Vou/Não vou) ou override do admin → esse valor
//  - senão, marcou algum dos dias trancados → vai (auto)
//  - senão → "por confirmar" (undefined)
function memberGoing(appData, id) {
  const going = (appData && appData.going) || {};
  if (going[id] === true || going[id] === false) return going[id];
  const locked = appData && appData.locked;
  if (!locked) return undefined;
  const days = ((appData.avail || {})[id]) || [];
  return days.some(d => paWithinLocked(d, locked)) ? true : undefined;
}

// Quem VAI firme (a lista que manda a partir da fase 5).
function getGoingMembers(appData) {
  return getInterestedMembers(appData).filter(m => memberGoing(appData, m.id) === true);
}

// Conjunto que "conta" no momento atual — UM só, nunca dois a discordar:
//  - antes de trancar as datas: os interessados (in/maybe)
//  - depois de trancar: quem vai firme
function getInMembers(appData) {
  if (appData && appData.locked) return getGoingMembers(appData);
  return getInterestedMembers(appData);
}

// Quantos membros TOTAIS existem (para fase 1, onde ainda ninguém disse 'in')
function getTotalMembers() {
  return (typeof getAllMembers === 'function') ? getAllMembers().length : 0;
}

// ─────────────────────────────────────────────────────────────
// phaseComplete: a fase está pronta para avançar?
//   - Fase 1: todos responderam (in/out/maybe)
//   - Fase 2: todos os "in" submeteram pelo menos uma sugestão de local
//   - Fase 3: todos os "in" votaram num local
//   - Fase 4: todos os "in" submeteram pelo menos uma sugestão de alojamento
//   - Fase 5: todos os "in" votaram num alojamento E sem empate
//   - Fase 6: todos os "in" submeteram disponibilidade
//   - Fase 7: datas trancadas
//   - Fase 8: nunca (é a última)
// ─────────────────────────────────────────────────────────────
function phaseComplete(phase, appData) {
  const allMembers = (typeof getEditionMembers === 'function') ? getEditionMembers(appData)
    : ((typeof getAllMembers === 'function') ? getAllMembers() : []);
  const interested = (typeof getInterestedMembers === 'function') ? getInterestedMembers(appData) : allMembers;
  const inMembers = (typeof getInMembers === 'function') ? getInMembers(appData) : interested;
  const inIds = inMembers.map(m => m.id);
  const avail = appData.avail || {};

  // Fluxo: 1 interesse → 2 disponibilidade → 3 datas → 4 confirmar presença →
  // 5 locais → 6 votar local → 7 alojamentos → 8 votar alojamento → 9 plano.
  // (Datas antes de local/alojamento: a disponibilidade é a restrição mais dura;
  // e a presença firme só se pergunta depois de haver datas concretas.)
  if (phase === 1) { // interesse — arranque, não bloqueia
    return interested.length > 0;
  }
  if (phase === 2) { // disponibilidade — todos os interessados marcaram ≥1 dia
    if (interested.length === 0) return false;
    return interested.every(m => paFutureDays(avail[m.id]).length > 0);
  }
  if (phase === 3) { // datas trancadas
    return !!appData.locked;
  }
  if (phase === 4) { // confirmar presença — cada interessado com estado resolvido
    if (!appData.locked || interested.length === 0) return false;
    return interested.every(m => memberGoing(appData, m.id) !== undefined);
  }
  if (phase === 5) { // sugestões de local
    // Sugerir é OPCIONAL: nem toda a gente tem ideias, e obrigar gera sugestões
    // forçadas. A fase está pronta quando há escolha real (≥2 sugestões).
    return (appData.locSuggs || []).length >= 2;
  }
  if (phase === 6) { // votar local — quem VAI votou + sem empate
    if (inIds.length === 0) return false;
    const votes = appData.locVotes || {};
    const allVoted = inIds.every(id => paVoteList(votes[id]).length > 0);
    if (!allVoted) return false;
    // Se admin já desempatou, completo
    if (appData.locWinner) return true;
    // Se há empate por PONTOS (sem vencedor escolhido), NÃO completa
    // Só votos de quem VAI contam para o empate.
    const tally = paVoteTally(votes, appData.locSuggs || [], inIds);
    const sorted = Object.values(tally).sort((a,b) => b-a);
    if (sorted.length < 2) return true;
    return !(sorted[0] === sorted[1]);
  }
  if (phase === 7) { // sugestões de alojamento
    // Como na fase 5: opcional; pronta quando há escolha real (≥2 sugestões).
    return (appData.accSuggs || []).length >= 2;
  }
  if (phase === 8) { // votar alojamento — quem VAI votou + sem empate
    if (inIds.length === 0) return false;
    const votes = appData.accVotes || {};
    const allVoted = inIds.every(id => paVoteList(votes[id]).length > 0);
    if (!allVoted) return false;
    if (appData.accWinner) return true;
    const tally = paVoteTally(votes, appData.accSuggs || [], inIds);
    const sorted = Object.values(tally).sort((a,b) => b-a);
    if (sorted.length < 2) return true;
    return !(sorted[0] === sorted[1]);
  }
  return false; // fase 9 (planeamento) é a última
}

// ─────────────────────────────────────────────────────────────
// Hook: gere progresso da fase (SEM countdown automático).
// - Quando todos os "in" estão prontos, admin pode avançar com botão
// - Só o admin avança a fase; prazo opcional avança automaticamente quando expira
// - Sem timer, sem auto-advance silencioso — sempre uma ação humana clara
// ─────────────────────────────────────────────────────────────
function usePhaseProgress(phase, me) {
  const appData = useAppStore();

  const isLast = phase >= 9;
  const isComplete = phaseComplete(phase, appData);
  const allMembers = (typeof getEditionMembers === 'function') ? getEditionMembers(appData)
    : ((typeof getAllMembers === 'function') ? getAllMembers() : []);
  const interested = (typeof getInterestedMembers === 'function') ? getInterestedMembers(appData) : allMembers;
  // Quem "conta" agora: interessados antes de trancar, quem VAI depois.
  const inMembers = (phase === 1) ? allMembers : getInMembers(appData);
  // Prazo opcional (countdown). Guardado em appData.deadline (ISO). Só o admin define.
  const deadline = appData.deadline || null;
  const expired = deadline ? (Date.now() >= new Date(deadline).getTime()) : false;

  // Quem ainda não completou (para mostrar quem falta).
  // REGRA: cada fase usa EXATAMENTE o mesmo conjunto que o seu portão em
  // phaseComplete — senão o contador e o banner contradizem-se.
  let pending = [];
  if (!isComplete) {
    if (phase === 1) { // interesse — quem ainda não respondeu
      pending = allMembers.filter(m => !(appData.rsvp||{})[m.id]);
    } else if (phase === 2) { // disponibilidade — interessados sem dias marcados
      const avail = appData.avail || {};
      pending = interested.filter(m => paFutureDays(avail[m.id]).length === 0);
    } else if (phase === 4) { // confirmar presença — quem não marcou os dias trancados
      pending = interested.filter(m => memberGoing(appData, m.id) === undefined);
    } else if (phase === 5) { // sugestões de local
      const suggs = appData.locSuggs || [];
      pending = inMembers.filter(m => !suggs.some(s => s.by === m.id));
    } else if (phase === 6) { // votar local
      const votes = appData.locVotes || {};
      pending = inMembers.filter(m => paVoteList(votes[m.id]).length === 0);
    } else if (phase === 7) { // sugestões de alojamento
      const suggs = appData.accSuggs || [];
      pending = inMembers.filter(m => !suggs.some(s => s.by === m.id));
    } else if (phase === 8) { // votar alojamento
      const votes = appData.accVotes || {};
      pending = inMembers.filter(m => paVoteList(votes[m.id]).length === 0);
    }
    // fase 3 (trancar datas) e 9 (plano): ação do admin, sem lista de pendentes.
  }

  // Só o admin avança a fase, sempre por clique. Avançar limpa qualquer prazo definido.
  const advanceNow = async () => {
    if (isLast) return;
    await AppStore.setPhase(phase + 1);
    await AppStore.clearKey('deadline');
  };
  const setDeadline = async (iso) => { await AppStore._set('deadline', iso); };
  const clearDeadline = async () => { await AppStore.clearKey('deadline'); };

  // NÃO há avanço automático. O prazo (deadline) é apenas um indicador visual de
  // pressão ("os votos fecham às X"); quando expira, mostra-se "prazo terminado" e
  // o admin decide avançar manualmente. Avançar é SEMPRE uma ação humana do admin.

  return {
    isLast, isComplete,
    inCount: inMembers.length,
    pending,
    deadline, expired,
    advanceNow, setDeadline, clearDeadline,
  };
}

// ─────────────────────────────────────────────────────────────
// Componente: Banner de progresso (sem countdown).
// 3 estados:
//   A) Fase incompleta: mostra "Faltam: X" + voto para avançar
//   B) Fase completa: "Todos prontos!" + botão admin "Avançar fase →"
//   C) Empate fase 3/5 não resolvido: avisa que admin tem de desempatar
// ─────────────────────────────────────────────────────────────
function CountdownBanner({ deadline, narrow }) {
  const [now, setNow] = pUseState(Date.now());
  pUseEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(t);
  }, []);
  const ms = new Date(deadline).getTime() - now;
  const expired = ms <= 0;
  const d = Math.max(0, Math.floor(ms / 86400000));
  const h = Math.max(0, Math.floor((ms % 86400000) / 3600000));
  const m = Math.max(0, Math.floor((ms % 3600000) / 60000));
  const s = Math.max(0, Math.floor((ms % 60000) / 1000));
  const Unit = ({ v, l }) => (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', minWidth:40 }}>
      <div style={{ fontFamily:'var(--pa-display)', fontSize: narrow?22:26, fontWeight:700, lineHeight:1, fontVariantNumeric:'tabular-nums' }}>{String(v).padStart(2,'0')}</div>
      <div style={{ fontFamily:'var(--pa-mono)', fontSize:9, letterSpacing:1, opacity:0.6, textTransform:'uppercase', marginTop:3 }}>{l}</div>
    </div>
  );
  if (expired) {
    return (
      <div style={{ background:'var(--pa-ink)', color:'#fff', borderRadius:14, padding: narrow?'12px 14px':'14px 18px', textAlign:'center' }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, opacity:0.6, textTransform:'uppercase' }}>Prazo terminado</div>
        <div style={{ fontFamily:'var(--pa-display)', fontSize:16, fontWeight:600, marginTop:3 }}>O tempo de votação acabou ⏱</div>
      </div>
    );
  }
  return (
    <div style={{ background:'var(--pa-ink)', color:'#fff', borderRadius:14, padding: narrow?'12px 14px':'14px 18px' }}>
      <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, opacity:0.6, textTransform:'uppercase', marginBottom:8, textAlign:'center' }}>Tempo para votar</div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap: narrow?6:10 }}>
        <Unit v={d} l="dias" />
        <span style={{ opacity:0.4, fontSize:20, fontWeight:700 }}>:</span>
        <Unit v={h} l="horas" />
        <span style={{ opacity:0.4, fontSize:20, fontWeight:700 }}>:</span>
        <Unit v={m} l="min" />
        <span style={{ opacity:0.4, fontSize:20, fontWeight:700 }}>:</span>
        <Unit v={s} l="seg" />
      </div>
    </div>
  );
}

// Controlo de admin para definir/limpar o prazo de votação
function DeadlineControl({ deadline, onSet, onClear, narrow }) {
  const [open, setOpen] = pUseState(false);
  const [val, setVal] = pUseState('');
  if (deadline) {
    return (
      <Btn variant="soft" size="sm" onClick={onClear}>Remover prazo</Btn>
    );
  }
  if (!open) {
    return <Btn variant="soft" size="sm" onClick={() => setOpen(true)}>⏱ Definir prazo</Btn>;
  }
  return (
    <div style={{ display:'flex', alignItems:'center', gap:6, flexWrap:'wrap' }}>
      <input type="datetime-local" value={val} onChange={(e)=>setVal(e.target.value)}
        style={{ padding:'7px 10px', borderRadius:10, border:'1px solid var(--pa-line)', fontFamily:'var(--pa-body)', fontSize:16, color:'var(--pa-ink)' }} />
      <Btn variant="accent" size="sm" disabled={!val} onClick={() => {
        const iso = new Date(val).toISOString();
        if (new Date(iso).getTime() > Date.now()) { onSet(iso); setOpen(false); }
        else if (window._paToast) window._paToast('Escolhe uma data no futuro.');
      }}>Definir</Btn>
      <Btn variant="ghost" size="sm" onClick={() => setOpen(false)}>✕</Btn>
    </div>
  );
}

function PhaseProgressBanner({ phase, me, narrow }) {
  const p = usePhaseProgress(phase, me);
  // Anti-spam do "Lembrar quem falta" (1 por minuto). Declarado antes do
  // early-return para respeitar as regras dos hooks.
  const [remindCooldown, setRemindCooldown] = pUseState(false);
  // No mobile o painel pode ser fechado para não comer ecrã. A escolha fica
  // guardada. (Também antes do early-return, pela mesma razão.)
  const [collapsed, setCollapsed] = pUseState(() => {
    try { return localStorage.getItem('pa-banner-collapsed') === '1'; } catch (e) { return false; }
  });
  const toggleCollapsed = () => setCollapsed((c) => {

<script type="text/babel">// Perdidos Algures — Painel de desempate (admin).
// Quando há empate, admin pode resolver com:
//  - Cara ou coroa (random, animação)
//  - Votação por pontos (3-2-1 — cada um classifica top 3)
// O resultado é guardado em locWinner / accWinner conforme a fase.

const { useState: tbUseState2, useEffect: tbUseEffect2, useRef: tbUseRef2 } = React;

// Deteta empate nos votos da fase atual.
// Se inIds for passado, conta apenas votos de quem está "in".
// ─────────────────────────────────────────────────────────────
// Votação: helpers centrais. Um voto pode ser:
//   - string (modo clássico "1 voto") → 1 ponto
//   - array [id1, id2, id3] (modo Top 3) → 3/2/1 pontos por posição
// Tudo o resto (empates, quórum, vencedor) trabalha sobre PONTOS, o que
// mantém os votos antigos 100% compatíveis (string = lista de 1 = 1 ponto).
// ─────────────────────────────────────────────────────────────
const PA_RANK_POINTS = [3, 2, 1];

// Toggle do modo de votação (só admin). Mudar recomeça a votação da fase.
function VoteModeToggle({ kind, mode, isAdmin, hasVotes }) {
  if (!isAdmin) return null;
  const change = (m) => {
    if (m === mode) return;
    const warn = hasVotes
      ? 'Mudar o modo de votação RECOMEÇA a votação (os votos atuais são apagados). Continuar?'
      : 'Mudar o modo de votação desta fase?';
    if (!window.confirm(warn)) return;
    AppStore.setVoteMode(kind, m);
    if (window._paToast) window._paToast(m === 'points' ? 'Modo Top 3 ativado — cada um ordena até 3 favoritos.' : 'Modo 1 voto ativado.', 'success');
  };
  const btn = (m, label) => (
    React.createElement('button', { key: m, onClick: () => change(m), style: {
      padding: '5px 11px', borderRadius: 999, cursor: 'pointer',
      border: mode === m ? '1.5px solid var(--pa-accent)' : '1px solid var(--pa-line)',
      background: mode === m ? 'rgba(217,119,87,0.1)' : '#fff',
      color: mode === m ? 'var(--pa-accent)' : 'var(--pa-muted)',
      fontFamily: 'var(--pa-mono)', fontSize: 10.5, fontWeight: 700 } }, label)
  );
  return React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' } },
    React.createElement('span', { style: { fontFamily: 'var(--pa-mono)', fontSize: 9.5, letterSpacing: 1, color: 'var(--pa-muted)', textTransform: 'uppercase' } }, 'Modo'),
    btn('single', '1 voto'), btn('points', 'Top 3'));
}
Object.assign(window, { VoteModeToggle });
function paVoteList(v) {
  if (Array.isArray(v)) return v.filter(Boolean).slice(0, 3);
  return v ? [v] : [];
}
function paVoteTally(votes, suggestions, inIds) {
  const tally = {};
  (suggestions || []).forEach((s) => { tally[s.id] = 0; });
  Object.entries(votes || {}).forEach(([uid, v]) => {
    if (inIds && Array.isArray(inIds) && !inIds.includes(uid)) return;
    const list = paVoteList(v);
    const single = list.length === 1;
    list.forEach((id, i) => {
      if (tally[id] === undefined) return;
      tally[id] += single ? 1 : (PA_RANK_POINTS[i] || 0);
    });
  });
  return tally;
}
Object.assign(window, { paVoteList, paVoteTally, PA_RANK_POINTS, getActiveMembers, paIsPastDay, paFutureDays });

// ─────────────────────────────────────────────────────────────
// Mapa das sugestões: geocoding gratuito (Nominatim/OpenStreetMap) no momento
// de sugerir — se resolver, a sugestão ganha coordenadas e aparece no mapa da
// votação; se falhar, a sugestão segue na mesma (o mapa é bónus, nunca bloqueio).
// ─────────────────────────────────────────────────────────────
async function paGeocode(query) {
  if (!query || !query.trim()) return null;
  try {
    const ctl = new AbortController();
    const t = setTimeout(() => ctl.abort(), 3500);
    const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(query.trim());
    const res = await fetch(url, { signal: ctl.signal, headers: { 'Accept': 'application/json' } });
    clearTimeout(t);
    if (!res.ok) return null;
    const arr = await res.json();
    if (!Array.isArray(arr) || !arr[0]) return null;
    const { lat, lon } = arr[0];
    const la = parseFloat(lat), lo = parseFloat(lon);
    if (!isFinite(la) || !isFinite(lo)) return null;
    return { lat: la, lng: lo };
  } catch (e) { return null; }
}
// Estética dos mapas: CARTO Voyager — tons quentes e limpos que assentam na
// paleta da app; gratuito, sem chave, com suporte retina ({r}).
// Leaflet só é descarregado quando um mapa aparece: poupa ~150KB no arranque
// de quem nunca abre um mapa (a maioria das visitas). Uma vez carregado, o
// service worker guarda-o em cache para as próximas.
let _leafletPromise = null;
function paLoadLeaflet() {
  if (window.L) return Promise.resolve(window.L);
  if (_leafletPromise) return _leafletPromise;
  _leafletPromise = new Promise((resolve, reject) => {
    try {
      const css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
      css.crossOrigin = 'anonymous';
      document.head.appendChild(css);
      const js = document.createElement('script');
      js.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
      js.crossOrigin = 'anonymous';
      js.async = true;
      js.onload = () => resolve(window.L);
      js.onerror = () => { _leafletPromise = null; reject(new Error('leaflet')); };
      document.head.appendChild(js);
    } catch (e) { _leafletPromise = null; reject(e); }
  });
  return _leafletPromise;
}
Object.assign(window, { paLoadLeaflet });

function paTileLayer(L) {
  // CARTO Positron: o minimal moderno (fundo quase branco, tipografia discreta)
  // que faz os pins e as zonas terracota saltarem — look "produto", não "wiki".
  return L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19, subdomains: 'abcd',
    attribution: '&copy; OpenStreetMap &copy; CARTO',

}
// Zona sombreada (regiões: distrito/concelho/freguesia) com o accent da app.
function paZoneLayer(L, zone) {
  return L.geoJSON(zone, { style: { color: '#d97757', weight: 2.5, fillColor: '#d97757', fillOpacity: 0.22, dashArray: '4 3' } });
}
// Pinos modernos: gota SVG com anel branco e sombra (votações e picker).
function paPinIcon(L, color = '#d97757') {
  const svg = `<svg width="30" height="40" viewBox="0 0 30 40" xmlns="http://www.w3.org/2000/svg">
    <path d="M15 0C6.7 0 0 6.7 0 15c0 10.5 15 25 15 25s15-14.5 15-25C30 6.7 23.3 0 15 0z" fill="${color}"/>
    <circle cx="15" cy="14.5" r="5.5" fill="#fff"/>

  return L.divIcon({
    className: 'pa-pin', // sem animação aqui: a raiz é posicionada pelo Leaflet
    html: `<div class="pa-pin-inner" style="filter: drop-shadow(0 3px 5px rgba(31,26,20,0.35));">${svg}</div>`,
    iconSize: [30, 40], iconAnchor: [15, 38], popupAnchor: [0, -34],

function paDotIcon(L, color, emoji) {

    className: 'pa-dot',
    html: `<div class="pa-dot-inner" style="width:32px;height:32px;border-radius:32px;background:${color};border:2.5px solid #fff;
      box-shadow:0 3px 8px rgba(31,26,20,0.3);display:flex;align-items:center;justify-content:center;
      font-size:15px;line-height:1;">${emoji}</div>`,

Object.assign(window, { paTileLayer, paZoneLayer, paPinIcon, paDotIcon });

// "Ver no mapa" = focar o mapa INTEGRADO da app (nunca sair para o Google).

const _paBusy = new Set();

// Links de utilizador (ex: Airbnb do alojamento) NUNCA vão crus para o href:

function paSafeUrl(u) {
  const s = String(u || '').trim();

    const url = new URL(s.includes('://') ? s : 'https://' + s);

}

function MapLink({ targetId, hasGeo, style }) {

// Mapa embebido (Leaflet + OpenStreetMap) com pins das sugestões geocodificadas.
// Sem votos nos popups — a votação é secreta. Não renderiza sem coordenadas.
function LocMap({ suggestions, height = 230, membersById }) {

      // Regiões (Alentejo, Comporta…) aparecem como ZONA sombreada; sítios exatos como pino.

    window.addEventListener('pa-map-focus', onFocus);

    // Container pode mudar de tamanho (tab, rotação, teclado): reavaliar.
    const ro = (typeof ResizeObserver !== 'undefined') ? new ResizeObserver(() => map.invalidateSize()) : null;
    if (ro && ref.current) ro.observe(ref.current);
    setTimeout(() => map.invalidateSize(), 60); // primeiro paint dentro de tabs
    return () => { window.removeEventListener('pa-map-focus', onFocus); try { if (ro) ro.disconnect(); map.remove(); } catch (e) {} mapRef.current = null; };
  }, [withGeo.map((s) => s.id + ':' + s.geo.lat + (s.zone ? 'z' : '')).join(','), leafletTick]);
  if (withGeo.length === 0) return null;
  return React.createElement('div', { className: 'pa-map', style: { borderRadius: 14, overflow: 'hidden', border: '1px solid var(--pa-line)', marginBottom: 14 } },
    React.createElement('div', { ref, style: { height, width: '100%', background: '#eee9df' } }),
    withGeo.length < (suggestions || []).length &&
      React.createElement('div', { style: { padding: '6px 10px', fontFamily: 'var(--pa-body)', fontSize: 10.5, color: 'var(--pa-muted)', background: '#fff' } },
        (suggestions.length - withGeo.length) + ' sugestão(ões) sem localização no mapa — o link "ver no mapa" funciona na mesma.'));
}
// ─────────────────────────────────────────────────────────────
// LocationPicker: o padrão das apps de referência (Uber, delivery, Airbnb):
// 1) escreves e aparecem sugestões (autocomplete, sem typos);
// 2) escolhes e o pin aparece num mini-mapa para CONFIRMAÇÃO VISUAL;
// 3) afinas arrastando o pin ou tocando no mapa — o sítio é sempre o certo.
// Nominatim/OSM (gratuito) com debounce ≥750ms e cancelamento de pedidos
// pendentes, a respeitar a política de uso (1 pedido/s).
// ─────────────────────────────────────────────────────────────
function LocationPicker({ onChange, placeholder = 'Procurar no mapa…', compact = false }) {
  const [query, setQuery] = React.useState('');
  const [results, setResults] = React.useState(null); // null=idle, []=sem resultados
  const [searching, setSearching] = React.useState(false);
  const [picked, setPicked] = React.useState(null); // { lat, lng, label }
  const mapEl = React.useRef(null);
  const debRef = React.useRef(null);
  const ctlRef = React.useRef(null);
  const [leafletTick, setLeafletTick] = React.useState(0);

  const shortLabel = (dn) => String(dn || '').split(',').slice(0, 3).join(',');

  // Ao desmontar: cancela o debounce e o pedido em voo (sem setState em morto).
  React.useEffect(() => () => {
    if (debRef.current) clearTimeout(debRef.current);
    if (ctlRef.current) { try { ctlRef.current.abort(); } catch (e) {} }
  }, []);

  // Autocomplete com debounce + cancelamento
  const onType = (v) => {
    setQuery(v);
    if (debRef.current) clearTimeout(debRef.current);
    if (ctlRef.current) { try { ctlRef.current.abort(); } catch (e) {} }
    if (v.trim().length < 3) { setResults(null); setSearching(false); return; }
    setSearching(true);
    debRef.current = setTimeout(async () => {
      const ctl = new AbortController();
      ctlRef.current = ctl;
      try {
        // polygon_geojson simplificado: regiões (Alentejo, Comporta…) vêm com a
        // forma da zona em poucos KB, em vez de um simples ponto no centro.
        const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=5&polygon_geojson=1&polygon_threshold=0.015&q=' + encodeURIComponent(v.trim());
        const res = await fetch(url, { signal: ctl.signal, headers: { 'Accept': 'application/json' } });
        const arr = res.ok ? await res.json() : [];
        setResults(Array.isArray(arr) ? arr.filter((r) => isFinite(parseFloat(r.lat))) : []);
      } catch (e) { if (e.name !== 'AbortError') setResults([]); }
      finally { setSearching(false); }
    }, 750);
  };

  const choose = (r) => {
    try { paLoadLeaflet(); } catch (e) {} // adianta o download enquanto o React atualiza
    const p = { lat: parseFloat(r.lat), lng: parseFloat(r.lon), label: shortLabel(r.display_name) };
    // Se o resultado é uma REGIÃO (tem polígono), guardamos a forma sombreada —
    // com teto de peso (25KB) para nunca inchar a base de dados.
    const gj = r.geojson;
    if (gj && (gj.type === 'Polygon' || gj.type === 'MultiPolygon')) {
      // Teto de 12KB por zona: o data da edição viaja no polling — zonas leves
      // (simplificadas) mantêm a forma reconhecível sem pesar na rede/BD grátis.
      try { if (JSON.stringify(gj).length <= 12 * 1024) p.zone = gj; } catch (e) {}
    }
    setPicked(p);
    setResults(null);
    setQuery('');
    if (onChange) onChange(p);
  };
  const move = (lat, lng) => {
    setPicked((prev) => {
      const p = { ...(prev || {}), lat, lng, adjusted: true };
      if (onChange) onChange(p);
      return p;
    });
  };
  const clear = () => { setPicked(null); setResults(null); setQuery(''); if (onChange) onChange(null); };

  // Mini-mapa de confirmação: pin arrastável + toque no mapa move
  React.useEffect(() => {
    if (!picked || !mapEl.current) return;
    if (!window.L) { paLoadLeaflet().then(() => setLeafletTick((t) => t + 1)).catch(() => {}); return; }
    const L = window.L;
    const map = L.map(mapEl.current, { scrollWheelZoom: false });
    paTileLayer(L).addTo(map);
    if (picked.zone) {
      // Região: mostra a ZONA sombreada — não há pino para arrastar.
      const layer = paZoneLayer(L, picked.zone).addTo(map);
      try { map.fitBounds(layer.getBounds().pad(0.08)); } catch (e) { map.setView([picked.lat, picked.lng], 9); }
    } else {
      map.setView([picked.lat, picked.lng], 14);
      const mk = L.marker([picked.lat, picked.lng], { draggable: true, icon: paPinIcon(L) }).addTo(map);
      mk.on('dragend', () => { const ll = mk.getLatLng(); move(ll.lat, ll.lng); });
      map.on('click', (e) => { mk.setLatLng(e.latlng); move(e.latlng.lat, e.latlng.lng); });
    }
    const ro = (typeof ResizeObserver !== 'undefined') ? new ResizeObserver(() => map.invalidateSize()) : null;
    if (ro && mapEl.current) ro.observe(mapEl.current);
    setTimeout(() => map.invalidateSize(), 60);
    return () => { try { if (ro) ro.disconnect(); map.remove(); } catch (e) {} };
  }, [picked ? (picked.zone ? 'zone' : 'pin') : 'off', leafletTick]); // monta/desmonta; o marker segue os ajustes sem reinit

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
      {!picked && (
        <div style={{ position:'relative' }}>
          <input value={query} onChange={(e) => onType(e.target.value)} placeholder={placeholder} maxLength={80}
            style={{ width:'100%', boxSizing:'border-box', padding: compact ? '9px 12px' : '11px 14px', borderRadius:12,
              border:'1px solid var(--pa-line)', background:'#fff', fontFamily:'var(--pa-body)',
              fontSize: compact ? 13 : 14, color:'var(--pa-ink)', outline:'none' }} />
          {searching && <span style={{ position:'absolute', right:12, top:'50%', transform:'translateY(-50%)', fontFamily:'var(--pa-body)', fontSize:11, color:'var(--pa-muted)' }}>a procurar…</span>}
          {results !== null && (
            <div className="pa-scroll" style={{ position:'absolute', top:'100%', left:0, right:0, zIndex:60, marginTop:4, background:'#fff',
              border:'1px solid var(--pa-line)', borderRadius:12, boxShadow:'0 8px 24px rgba(0,0,0,0.12)', maxHeight:220, overflowY:'auto' }}>
              {results.length === 0 && (
                <div style={{ padding:'10px 14px', fontFamily:'var(--pa-body)', fontSize:12.5, color:'var(--pa-muted)' }}>
                  Sem resultados — tenta acrescentar a terra ou concelho.
                </div>
              )}
              {results.map((r, i) => (
                <button key={i} onClick={() => choose(r)} style={{ display:'block', width:'100%', textAlign:'left',
                  padding:'10px 14px', border:'none', borderTop: i ? '1px solid var(--pa-line)' : 'none',
                  background:'#fff', cursor:'pointer', fontFamily:'var(--pa-body)', fontSize:12.5, color:'var(--pa-ink)' }}>
                  📍 {shortLabel(r.display_name)}
                </button>
              ))}
            </div>
          )}
        </div>
      )}
      {picked && (
        <div className="pa-map" style={{ borderRadius:12, overflow:'hidden', border:'1px solid var(--pa-accent)' }}>
          <div ref={mapEl} style={{ height: compact ? 150 : 180, width:'100%', background:'#eee9df' }} />
          <div style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 10px', background:'#fff' }}>
            <span style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:11.5, color:'var(--pa-muted)', minWidth:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
              {picked.zone
                ? <>🗺 Zona selecionada — {picked.label || 'região'} (fica sombreada no mapa)</>
                : <>📍 {picked.label || 'ponto escolhido'}{picked.adjusted ? ' (afinado à mão)' : ''} — arrasta o pino ou toca no mapa para afinar</>}
            </span>
            <button onClick={clear} aria-label="Limpar localização"
              style={{ border:'none', background:'transparent', color:'var(--pa-muted)', cursor:'pointer', fontSize:14, padding:0 }}>×</button>
          </div>
        </div>
      )}
    </div>
  );
}
Object.assign(window, { LocationPicker });

// de interesse adicionados pelo grupo. Pins coloridos: laranja=local,

function TripMap({ me }) {

  if (accWin && accWin.geo) pins.push({ id:'win-acc', kind:'estadia', color:'#1f1a14', name: (accWin.type ? accWin.type + ' em ' : '') + (accWin.area || ''), sub:'a vossa estadia', geo: accWin.geo, zone: accWin.zone });

  React.useEffect(() => {

        const popup = `<b>${String(p.name).replace(/</g,'&lt;')}</b>${p.sub ? '<br/>' + String(p.sub).replace(/</g,'&lt;') : ''}`;
        const emoji = { local:'📍', estadia:'🏠', interesse:'⭐', atividade:'🎯' }[p.kind] || '📍';
        const layer = p.zone

        return layer.addTo(map).bindPopup(popup);
      });
      try { map.fitBounds(L.featureGroup(ms).getBounds().pad(0.2), { maxZoom: 13 }); } catch (e) { map.setView([pins[0].geo.lat, pins[0].geo.lng], 10); }
      msRef = ms;

    const onFocus = (ev) => {
      const layer = byId[ev.detail && ev.detail.id];
      if (!layer) return;
      try {
        if (layer.getBounds) map.flyToBounds(layer.getBounds().pad(0.12), { duration: 0.6 });

      setTimeout(() => { try { layer.openPopup(); } catch (e) {} }, 650);

    window.addEventListener('pa-map-focus', onFocus);

    const ro = (typeof ResizeObserver !== 'undefined') ? new ResizeObserver(() => map.invalidateSize()) : null;
    if (ro && ref.current) ro.observe(ref.current);
    setTimeout(() => map.invalidateSize(), 60); // o tab "Mapa" só existe ao ser aberto
    return () => { window.removeEventListener('pa-map-focus', onFocus); try { if (ro) ro.disconnect(); map.remove(); } catch (e) {} };
  }, [pins.map((p) => p.id + ':' + p.geo.lat + (p.zone ? 'z' : '')).join(','), leafletTick]);

  const [poiGeo, setPoiGeo] = React.useState(null);

  const addPoi = () => {

    AppStore.updatePlanning((p) => ({ ...p, pois: [ ...(p.pois || []), { id:'poi_' + Date.now().toString(36), name: n.slice(0, 60), geo: { lat: poiGeo.lat, lng: poiGeo.lng }, ...(poiGeo.zone ? { zone: poiGeo.zone } : {}), by: me.id } ] }));
    setName(''); setPoiGeo(null); setPickerKey((k) => k + 1);

            fontFamily:'var(--pa-body)', fontSize:16, color:'var(--pa-ink)', outline:'none' }} />
        <LocationPicker key={pickerKey} compact onChange={setPoiGeo} placeholder="Procurar no mapa" />

      {pois.length > 0 && (

function detectTie(votes, suggestions, inIds) {
  if (!votes) return null;
  const nVoters = Object.entries(votes).filter(([uid, v]) =>
    (!inIds || !Array.isArray(inIds) || inIds.includes(uid)) && paVoteList(v).length > 0).length;
  if (nVoters === 0) return null;
  const tally = paVoteTally(votes, suggestions, inIds);
  const sorted = Object.entries(tally).sort((a,b) => b[1] - a[1]);
  if (sorted.length < 2 || sorted[0][1] === 0) return null;
  const top = sorted[0][1];
  const tied = sorted.filter(([,v]) => v === top).map(([id]) => id);
  if (tied.length < 2) return null;
  return {
    tiedIds: tied,
    tiedItems: tied.map(id => suggestions.find(s => s.id === id)).filter(Boolean),
    tally,
  };
}

// ─────────────────────────────────────────────────────────────
// Cara ou Coroa — animação simples, resultado aleatório
// ─────────────────────────────────────────────────────────────
function CoinFlip({ tiedItems, me, onResolve, onCancel }) {
  const appData = useAppStore();
  const isAdmin = !!me?.isAdmin;

  // Resultado partilhado por todos os clientes (admin grava, outros leem)
  const sharedResultId = appData.coinFlipResult;
  const result = sharedResultId ? (tiedItems.find(t => t.id === sharedResultId) || null) : null;

  const [flipping, setFlipping] = tbUseState2(false);
  const [highlight, setHighlight] = tbUseState2(-1);
  const timerRef = tbUseRef2 ? tbUseRef2(null) : { current: null };

  // Para não-admin: quando o resultado partilhado chega, faz uma animação curta
  // e depois fixa no vencedor (sincroniza visualmente sem decidir nada localmente)
  tbUseEffect2(() => {
    if (isAdmin) return;
    if (!sharedResultId) { setHighlight(-1); setFlipping(false); return; }
    const winnerIdx = tiedItems.findIndex(t => t.id === sharedResultId);
    if (winnerIdx < 0) return;
    runAnimation(winnerIdx, false);
    return () => { if (timerRef.current) clearTimeout(timerRef.current); };
    // eslint-disable-next-line
  }, [sharedResultId, isAdmin]);

  // Animação partilhada: percorre as opções, dá voltas completas, desacelera e
  // termina exatamente no vencedor. Só revela o resultado (laranja) quando para.
  function runAnimation(winnerIdx, persistFirst) {
    const n = tiedItems.length;
    setFlipping(true);
    setHighlight(0);
    const loops = 3; // voltas completas antes de abrandar
    const seq = [];
    for (let i = 0; i < loops * n + winnerIdx; i++) seq.push(i % n);
    seq.push(winnerIdx); // garante terminar no vencedor
    let k = 0;
    const tick = () => {
      setHighlight(seq[k]);
      k++;
      if (k < seq.length) {
        const progress = k / seq.length;
        const delay = 55 + Math.pow(progress, 2.4) * 340; // abranda no fim
        timerRef.current = setTimeout(tick, delay);
      } else {
        setHighlight(winnerIdx);
        setFlipping(false); // só agora o resultado é revelado
      }
    };
    tick();
  }

  // Admin lança: escolhe vencedor justo, persiste, e anima
  const flip = async () => {
    if (!isAdmin || flipping) return;
    const winnerIdx = Math.floor(Math.random() * tiedItems.length);
    const winnerId = tiedItems[winnerIdx].id;
    // Persiste primeiro para os outros clientes começarem a animação em sincronia
    await AppStore._set('coinFlipResult', winnerId);
    runAnimation(winnerIdx, true);
  };

  const repeat = async () => {
    if (!isAdmin || flipping) return;
    if (timerRef.current) clearTimeout(timerRef.current);
    await AppStore.clearKey('coinFlipResult');
    setHighlight(-1);
    setFlipping(false);
  };

  const accept = async () => {
    if (!isAdmin || !result || flipping) return;
    await AppStore.clearKey('coinFlipResult');
    onResolve(result.id);
  };

  // O resultado (laranja) só aparece quando a animação parou
  const revealed = result && !flipping;

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:18, padding:'8px 0' }}>
      <div style={{ fontFamily:'var(--pa-mono)', fontSize:11, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', textAlign:'center' }}>
        {tiedItems.length === 2 ? 'Cara ou coroa' : 'À sorte'}
      </div>

      {/* Estado para não-admin quando o admin ainda não lançou */}
      {!isAdmin && !sharedResultId && (
        <div style={{ padding:'12px 14px', background:'rgba(31,26,20,0.04)', borderRadius:12, textAlign:'center', fontFamily:'var(--pa-body)', fontSize:13.5, color:'var(--pa-muted)' }}>
          O admin vai sortear num instante...
        </div>
      )}

      {/* Lista vertical com destaque animado/sincronizado */}
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        {tiedItems.map((item, i) => {
          const isHighlight = flipping && highlight === i;
          const isResult = revealed && result.id === item.id;
          return (
            <div key={item.id} style={{
              padding:'14px 16px', borderRadius:14,
              background: isResult ? 'var(--pa-accent)' : isHighlight ? 'var(--pa-ink)' : '#fff',
              color: (isResult || isHighlight) ? '#fff' : 'var(--pa-ink)',
              border: '1px solid ' + ((isResult || isHighlight) ? 'transparent' : 'var(--pa-line)'),
              fontFamily:'var(--pa-display)', fontSize:18, fontWeight:600,
              transition: 'all 0.12s ease',
              transform: isHighlight ? 'scale(1.03)' : 'scale(1)',
              boxShadow: isResult ? '0 6px 20px rgba(217,119,87,0.35)' : 'none',
              display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <span>{item.name || item.area || '?'}</span>
              {isResult && <span style={{ fontSize:14, opacity:0.9 }}>★ Vencedor</span>}
            </div>
          );
        })}
      </div>

      {/* Controlos: só admin */}
      {isAdmin ? (
        <div style={{ display:'flex', gap:8 }}>
          {!revealed
            ? <>
                <Btn variant="ghost" onClick={onCancel} style={{ flex:1 }} disabled={flipping}>Cancelar</Btn>
                <Btn variant="accent" onClick={flip} disabled={flipping} style={{ flex:1 }}>{flipping ? 'A girar...' : '🎲 Lançar'}</Btn>
              </>
            : <>
                <Btn variant="ghost" onClick={repeat} style={{ flex:1 }}>Repetir</Btn>
                <Btn variant="accent" onClick={accept} style={{ flex:1 }}>Aceitar vencedor</Btn>
              </>}
        </div>
      ) : (
        sharedResultId && (
          <div style={{ padding:'10px 12px', background:'rgba(31,26,20,0.04)', borderRadius:10, textAlign:'center', fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)' }}>
            {flipping ? 'A girar a roleta...' : 'Aguarda o admin confirmar o vencedor...'}
          </div>
        )
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Votação por pontos — cada pessoa classifica top 3 dos empatados
//   1ª escolha = 3 pts, 2ª = 2 pts, 3ª = 1 pt
//   Resultados guardados em appData.tieVotes (objeto por user → array ordenado)
// ─────────────────────────────────────────────────────────────
function PointsVote({ tiedItems, me, onResolve, onCancel, voteKey }) {
  const appData = useAppStore();
  const tieVotes = appData[voteKey] || {};
  const inMembers = getInMembers(appData);
  // Toda a gente que está na edição pode participar (não apenas in members)
  const [myRank, setMyRank] = tbUseState2(() => {
    const existing = tieVotes[me?.id];
    if (existing && Array.isArray(existing) && existing.length === tiedItems.length) return existing.slice();
    return tiedItems.map(i => i.id);
  });

  tbUseEffect2(() => {
    const existing = tieVotes[me?.id];
    if (existing && JSON.stringify(existing) !== JSON.stringify(myRank)) {
      setMyRank(existing.slice());
    }
  }, [tieVotes[me?.id]]);

  // Conta todos os votos válidos (não só inMembers)
  const allMembers = (typeof getAllMembers === 'function') ? getAllMembers() : [];
  const eligible = allMembers; // toda a gente pode votar
  const voted = eligible.filter(m => Array.isArray(tieVotes[m.id]) && tieVotes[m.id].length === tiedItems.length);
  const allVoted = voted.length >= Math.max(inMembers.length, 1); // pelo menos os in

  const moveItem = (idx, dir) => {
    const swap = idx + dir;
    if (swap < 0 || swap >= myRank.length) return;
    const next = myRank.slice();
    [next[idx], next[swap]] = [next[swap], next[idx]];
    setMyRank(next);
  };

  const submit = async () => {
    await AppStore._set(voteKey, { ...tieVotes, [me.id]: myRank });
  };

  const resolveWinner = () => {
    // Pontuação: posição 0 = N pontos, posição N-1 = 1 ponto
    const N = tiedItems.length;
    const score = {};
    tiedItems.forEach(t => { score[t.id] = 0; });
    voted.forEach(m => {
      const rank = tieVotes[m.id];
      rank.forEach((id, i) => { score[id] = (score[id] || 0) + (N - i); });
    });
    const sorted = Object.entries(score).sort((a,b) => b[1] - a[1]);
    if (sorted.length === 0) return null;
    const topScore = sorted[0][1];
    const tiedAtTop = sorted.filter(([,v]) => v === topScore).length > 1;
    return { winnerId: sorted[0][0], scores: score, tied: tiedAtTop };
  };

  const accept = async () => {
    const r = resolveWinner();
    if (!r) return;
    await AppStore.clearKey(voteKey);
    onResolve(r.winnerId);
  };

  const result = allVoted ? resolveWinner() : null;
  const myVoteSubmitted = !!tieVotes[me?.id];

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <div style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)' }}>
        Ordena por preferência. A 1ª escolha vale {tiedItems.length} pontos, a última vale 1.
      </div>

      <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
        {myRank.map((id, idx) => {
          const item = tiedItems.find(t => t.id === id);
          if (!item) return null;
          const points = tiedItems.length - idx;
          return (
            <div key={id} style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 12px',
              background:'#fff', borderRadius:12, border:'1px solid var(--pa-line)' }}>
              <div style={{ width:28, height:28, borderRadius:8, background:'var(--pa-accent-strong)', color:'#fff',
                display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--pa-display)', fontWeight:700, fontSize:13, flexShrink:0 }}>
                {idx + 1}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontFamily:'var(--pa-body)', fontSize:13.5, fontWeight:600 }}>{item.name || item.area || '?'}</div>
                <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, color:'var(--pa-muted)' }}>{points} {points===1?'ponto':'pontos'}</div>
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
                <button onClick={() => moveItem(idx, -1)} disabled={idx===0 || myVoteSubmitted} style={{ width:24, height:18, border:'1px solid var(--pa-line)', borderRadius:4, background:'#fff', cursor:idx===0?'default':'pointer', padding:0, opacity:idx===0||myVoteSubmitted?0.4:1 }}>
                  <svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 5l4-4 4 4" fill="none" stroke="var(--pa-ink)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </button>
                <button onClick={() => moveItem(idx, 1)} disabled={idx===myRank.length-1 || myVoteSubmitted} style={{ width:24, height:18, border:'1px solid var(--pa-line)', borderRadius:4, background:'#fff', cursor:idx===myRank.length-1?'default':'pointer', padding:0, opacity:(idx===myRank.length-1||myVoteSubmitted)?0.4:1 }}>
                  <svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" fill="none" stroke="var(--pa-ink)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </button>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ padding:'10px 12px', background:'rgba(31,26,20,0.04)', borderRadius:10 }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>
          Votos
        </div>
        <div style={{ fontFamily:'var(--pa-display)', fontSize:15, fontWeight:600, marginTop:2 }}>
          {voted.length} {voted.length === 1 ? 'voto' : 'votos'}
        </div>
      </div>

      {result && me?.isAdmin && (
        <div style={{ padding:'12px 14px', borderRadius:12, background: result.tied ? 'var(--pa-accent)' : 'var(--pa-ink)', color:'#fff' }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, opacity:0.6, textTransform:'uppercase' }}>{result.tied ? 'Ainda empatado' : 'Resultado'}</div>
          <div style={{ fontFamily:'var(--pa-display)', fontSize:18, fontWeight:600, marginTop:4 }}>
            {result.tied
              ? 'Empate nos pontos!'
              : <>{(tiedItems.find(t=>t.id===result.winnerId) || {}).name || (tiedItems.find(t=>t.id===result.winnerId) || {}).area} ganha</>}
          </div>
          <div style={{ fontFamily:'var(--pa-body)', fontSize:11, opacity:0.8, marginTop:4 }}>
            {Object.entries(result.scores).map(([id,s]) => `${(tiedItems.find(t=>t.id===id)||{}).name||(tiedItems.find(t=>t.id===id)||{}).area}: ${s}`).join(' · ')}
          </div>
          {result.tied && (
            <div style={{ fontFamily:'var(--pa-body)', fontSize:12, marginTop:8, opacity:0.95 }}>
              Os pontos empataram. Volta atrás e usa a roleta para desempatar à sorte.
            </div>
          )}
        </div>
      )}

      <div style={{ display:'flex', gap:8 }}>
        <Btn variant="ghost" onClick={onCancel} style={{ flex:1 }}>Voltar</Btn>
        {!myVoteSubmitted
          ? <Btn variant="accent" onClick={submit} style={{ flex:1 }}>Submeter voto</Btn>
          : (me?.isAdmin && result
              ? (result.tied
                  ? <Btn variant="soft" disabled style={{ flex:1 }}>Empate — usa a roleta</Btn>
                  : <Btn variant="accent" onClick={accept} style={{ flex:1 }}>Aceitar vencedor</Btn>)
              : <Btn variant="soft" disabled style={{ flex:1 }}>Voto submetido · aguarda outros</Btn>)}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Modal global de desempate (admin escolhe método; membros vêm o método ativo)
// O método ativo guarda-se em appData.tieMethod = 'coin' | 'points' | null
// ─────────────────────────────────────────────────────────────
function TiebreakModal({ open, onClose, tie, me, voteKey, onResolve }) {
  const appData = useAppStore();
  const method = appData.tieMethod;

  if (!open || !tie) return null;

  const choose = (m) => AppStore._set('tieMethod', m);
  const cancel = () => { AppStore.clearKey('tieMethod'); AppStore.clearKey(voteKey); onClose(); };
  const resolveAndClose = async (winnerId) => {
    await AppStore.clearKey('tieMethod');
    await AppStore.clearKey(voteKey);
    await onResolve(winnerId);
    onClose();
  };

  return (
    <PAModal open={open} onClose={me?.isAdmin ? cancel : onClose} title="🎯 Desempate" maxWidth={500}>
      <div style={{ fontFamily:'var(--pa-body)', fontSize:13.5, color:'var(--pa-muted)', marginBottom:14 }}>
        Empate entre <strong style={{ color:'var(--pa-ink)' }}>{tie.tiedItems.length} opções</strong>:&nbsp;
        {tie.tiedItems.map(t => t.name || t.area).join(' · ')}
      </div>

      {!method && (
        me?.isAdmin ? (
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            <button onClick={() => choose('coin')} style={{
              padding:'14px 16px', borderRadius:14, border:'1px solid var(--pa-line)', background:'#fff',
              cursor:'pointer', textAlign:'left', display:'flex', alignItems:'center', gap:14, fontFamily:'var(--pa-body)' }}>
              <div style={{ fontSize:30 }}>🎰</div>
              <div>
                <div style={{ fontSize:15, fontWeight:600 }}>Roleta da sorte</div>
                <div style={{ fontSize:12, color:'var(--pa-muted)', marginTop:2 }}>Cara ou coroa (à sorte)</div>
              </div>
            </button>
            <button onClick={() => choose('points')} style={{
              padding:'14px 16px', borderRadius:14, border:'1px solid var(--pa-line)', background:'#fff',
              cursor:'pointer', textAlign:'left', display:'flex', alignItems:'center', gap:14, fontFamily:'var(--pa-body)' }}>
              <div style={{ fontSize:30 }}>🏆</div>
              <div>
                <div style={{ fontSize:15, fontWeight:600 }}>Votação por pontos</div>
                <div style={{ fontSize:12, color:'var(--pa-muted)', marginTop:2 }}>Cada um classifica · 1º = mais pontos · ganha o que somar mais</div>
              </div>
            </button>
          </div>
        ) : (
          <div style={{ padding:'20px 0', textAlign:'center', color:'var(--pa-muted)' }}>
            O admin está a escolher como desempatar...
          </div>
        )
      )}

      {method === 'coin' && (
        <CoinFlip tiedItems={tie.tiedItems} me={me} onResolve={resolveAndClose} onCancel={() => AppStore.clearKey('tieMethod')} />
      )}

      {method === 'points' && (
        <PointsVote tiedItems={tie.tiedItems} me={me} voteKey={voteKey}
          onResolve={resolveAndClose}
          onCancel={() => me?.isAdmin && AppStore.clearKey('tieMethod')} />
      )}
    </PAModal>
  );
}

Object.assign(window, { detectTie, CoinFlip, PointsVote, TiebreakModal });
</script>

<script type="text/babel">// Perdidos Algures — Edition Hub + modais (perfil, criar/editar edição).
// Funciona em desktop e mobile (layout responsivo).

const { useState: hUseState, useEffect: hUseEffect, useRef: hUseRef } = React;

// ─────────────────────────────────────────────────────────────
// Modal genérico (overlay centrado, responsivo)
// ─────────────────────────────────────────────────────────────
function PAModal({ open, onClose, title, children, maxWidth = 460 }) {
  // Escape fecha (toda a gente espera isso). O clique no fundo NÃO fecha:
  // um toque a 2 mm do modal apagava formulários inteiros (nome, foto, report).
  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div className="pa-fade" role="dialog" aria-modal="true" aria-label={typeof title === 'string' ? title : undefined}
      style={{
      position:'fixed', inset:0, zIndex:1000, background:'rgba(31,26,20,0.45)',
      display:'flex', alignItems:'center', justifyContent:'center', padding:16,
      backdropFilter:'blur(2px)' }}>
      <div onClick={(e)=>e.stopPropagation()} className="pa-scale" style={{
        width:'100%', maxWidth, maxHeight:'90dvh', overflow:'auto',
        background:'var(--pa-bg)', borderRadius:20, padding:'24px 22px',
        boxShadow:'0 20px 60px rgba(0,0,0,0.3)' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:18 }}>
          <div style={{ fontFamily:'var(--pa-display)', fontSize:20, fontWeight:600, letterSpacing:-0.4 }}>{title}</div>
          <button onClick={onClose} style={{ width:32, height:32, borderRadius:999, border:'none',
            background:'rgba(31,26,20,0.06)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="var(--pa-ink)" strokeWidth="1.5" strokeLinecap="round"/></svg>
          </button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Editor de Perfil — foto + nome de exibição (login fica fixo)
// ─────────────────────────────────────────────────────────────
// Mudar password. Em modo obrigatório (password temporária), não há como sair
// sem escolher uma nova — e a antiga não é pedida.
function PasswordModal({ open, onClose, auth, forced = false }) {
  const [oldPw, setOldPw] = hUseState('');
  const [pw1, setPw1] = hUseState('');
  const [pw2, setPw2] = hUseState('');
  const [busy, setBusy] = hUseState(false);
  const [err, setErr] = hUseState(null);

  hUseEffect(() => { if (open) { setOldPw(''); setPw1(''); setPw2(''); setErr(null); } }, [open]);

  const save = async () => {
    if (pw1 !== pw2) { setErr('As passwords não coincidem.'); return; }
    setBusy(true); setErr(null);
    try {
      await AuthStore.changePassword(forced ? '' : oldPw, pw1);
      if (window._paToast) window._paToast('Password alterada. As outras sessões foram terminadas.', 'success');
      onClose();
    } catch (e) { setErr(e.message); }
    finally { setBusy(false); }
  };

  return (
    <PAModal open={open} onClose={forced ? (() => {}) : onClose} title={forced ? 'Escolhe uma password nova' : 'Mudar password'} maxWidth={420}>
      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
        {forced && (
          <div style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)', lineHeight:1.5 }}>
            Entraste com uma password temporária. Escolhe uma só tua para continuar.
          </div>
        )}
        {!forced && <Field label="Password atual" type="password" value={oldPw} onChange={setOldPw} placeholder="" />}
        <Field label="Password nova" type="password" value={pw1} onChange={setPw1} placeholder="" />
        <Field label="Repete a password nova" type="password" value={pw2} onChange={setPw2} placeholder="" />
        {err && <AuthError msg={err} />}
        <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
          {!forced && <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>}
          <Btn variant="accent" onClick={save} disabled={busy || pw1.length < 4 || pw2.length < 4}>
            {busy ? 'A guardar...' : 'Guardar password'}
          </Btn>
        </div>
      </div>
    </PAModal>
  );
}
Object.assign(window, { PasswordModal });

function ProfileEditor({ open, onClose, auth }) {
  const me = auth.user;
  const [displayName, setDisplayName] = hUseState(me?.displayName || me?.name || '');
  const [photo, setPhoto] = hUseState(me?.photoDataUrl || null);
  const [busy, setBusy] = hUseState(false);
  const [err, setErr] = hUseState(null);
  const fileRef = hUseRef(null);

  hUseEffect(() => {
    if (open) { setDisplayName(me?.displayName || me?.name || ''); setPhoto(me?.photoDataUrl || null); setErr(null); }
  }, [open]);

  const onPick = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    try { setPhoto(await readPhotoFile(f)); } catch { setErr('Não consegui ler a foto.'); }
  };

  const save = async () => {
    setBusy(true); setErr(null);

    catch (ex) { setErr(ex.message); }
    finally { setBusy(false); }

  return (
