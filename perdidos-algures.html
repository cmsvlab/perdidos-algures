// ─────────────────────────────────────────────────────────────
// PlanCustos — registo de despesas + divisão equitativa
// ─────────────────────────────────────────────────────────────
// ── Splitwise: funções de cálculo de divisão de despesas ──
// Converte texto em número aceitando vírgula decimal (formato PT: "33,50" → 33.5)
function paNum(v) {
  if (typeof v === 'number') return isNaN(v) ? 0 : v;
  const n = parseFloat(String(v == null ? '' : v).replace(',', '.'));
  return isNaN(n) ? 0 : n;
}
function expenseShares(exp, members) {
  const amount = paNum(exp.amount);
  const mode = exp.splitMode || 'equal';
  const ids = members.map(m => m.id);
  let among = (exp.splitAmong && exp.splitAmong.length) ? exp.splitAmong.filter(id => ids.includes(id)) : ids.slice();
  if (among.length === 0) among = ids.slice();
  const shares = {};
  if (among.length === 0) return shares; // sem membros → nada a dividir (evita divisão por zero)
  if (mode === 'custom' && exp.splitCustom) {
    among.forEach(id => { shares[id] = paNum(exp.splitCustom[id]); });
  } else {
    // 'equal' e 'some' dividem igualmente entre os participantes escolhidos
    const per = amount / among.length;
    among.forEach(id => { shares[id] = per; });
  }
  return shares;
}

// Saldo líquido de cada membro (positivo = tem a receber; negativo = deve)
function computeBalances(breakdown, members) {
  const bal = {};
  members.forEach(m => { bal[m.id] = 0; });
  (breakdown || []).forEach(exp => {
    const amount = paNum(exp.amount);
    if (bal[exp.paidBy] !== undefined) bal[exp.paidBy] += amount;
    const shares = expenseShares(exp, members);
    Object.entries(shares).forEach(([id, owed]) => { if (bal[id] !== undefined) bal[id] -= owed; });
  });
  // arredonda a cêntimos
  Object.keys(bal).forEach(id => { bal[id] = Math.round(bal[id] * 100) / 100; });
  // Corrige o resíduo de arredondamento para os saldos somarem EXATAMENTE 0
  // (caso contrário alguém perderia/ganharia 1-2 cêntimos no acerto de contas).
  // IMPORTANTE: só corrige resíduos de CÊNTIMOS (arredondamento). Um resíduo
  // grande significa dados inconsistentes (ex: pagador que já não é membro) e
  // "corrigi-lo" à força inventaria dinheiro — nesse caso fica como está.
  const ids = Object.keys(bal);
  if (ids.length) {
    const residual = Math.round(ids.reduce((s, id) => s + bal[id], 0) * 100) / 100;
    const maxRoundingResidual = Math.max(0.05, (breakdown || []).length * 0.01);
    if (Math.abs(residual) >= 0.01 && Math.abs(residual) <= maxRoundingResidual) {
      // Absorve o resíduo no maior saldo em valor absoluto
      let target = ids[0];
      ids.forEach(id => { if (Math.abs(bal[id]) > Math.abs(bal[target])) target = id; });
      bal[target] = Math.round((bal[target] - residual) * 100) / 100;
    }
  }
  return bal;
}

// Minimiza o número de transferências para acertar as contas (greedy)
function simplifyDebts(balances) {
  const creditors = [], debtors = [];
  Object.entries(balances).forEach(([id, b]) => {
    if (b > 0.01) creditors.push({ id, amount: b });
    else if (b < -0.01) debtors.push({ id, amount: -b });
  });
  creditors.sort((a,b) => b.amount - a.amount);
  debtors.sort((a,b) => b.amount - a.amount);
  const tx = [];
  let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const d = debtors[i], c = creditors[j];
    const pay = Math.round(Math.min(d.amount, c.amount) * 100) / 100;
    if (pay > 0) tx.push({ from: d.id, to: c.id, amount: pay });
    d.amount = Math.round((d.amount - pay) * 100) / 100;
    c.amount = Math.round((c.amount - pay) * 100) / 100;
    if (d.amount <= 0.01) i++;
    if (c.amount <= 0.01) j++;
  }
  return tx;
}

function PlanCustos({ me }) {
  const appData = useAppStore();
  const plan = appData.planData || {};
  const costs = plan.costs || {};
  const breakdown = costs.breakdown || [];
  const inMembers = (typeof getInMembers === 'function') ? getInMembers(appData) : [];
  const accWinner = appData.accWinner;
  const accSuggs = appData.accSuggs || [];
  const winnerAcc = accSuggs.find(a => a.id === accWinner);

  const [open, setOpen] = React.useState(false);
  const [desc, setDesc] = React.useState('');
  const [amount, setAmount] = React.useState('');
  const [payer, setPayer] = React.useState(me?.id || '');
  const [splitMode, setSplitMode] = React.useState('equal');
  const [among, setAmong] = React.useState(inMembers.map(m => m.id));
  const [custom, setCustom] = React.useState({});

  // Garante que o pagador é sempre um membro válido (evita créditos perdidos
  // se o pagador não estiver entre os participantes, p.ex. admin sem RSVP 'in').
  React.useEffect(() => {
    if (inMembers.length && !inMembers.some(m => m.id === payer)) {
      setPayer(inMembers.some(m => m.id === me?.id) ? me.id : inMembers[0].id);
    }
    // eslint-disable-next-line
  }, [inMembers.length, payer]);
  React.useEffect(() => { if (among.length === 0) setAmong(inMembers.map(m => m.id)); /* eslint-disable-next-line */ }, [inMembers.length]);

  const total = breakdown.reduce((s, e) => s + paNum(e.amount), 0);
  // Inclui no cálculo todos os que pagaram ou participam numa despesa, mesmo que já
  // não estejam 'in' — para ninguém perder reembolsos por ter mudado o RSVP.
  const involvedIds = new Set(inMembers.map(m => m.id));
  breakdown.forEach(e => {
    if (e.paidBy) involvedIds.add(e.paidBy);
    (e.splitAmong || []).forEach(id => involvedIds.add(id));
  });
  const calcMembers = Array.from(involvedIds).map(id => memberById(id)).filter(Boolean);
  const balances = computeBalances(breakdown, calcMembers);
  const settlements = simplifyDebts(balances);

  const resetForm = () => { setDesc(''); setAmount(''); setSplitMode('equal'); setAmong(inMembers.map(m=>m.id)); setCustom({}); };

  const addExpense = async () => {
    const v = paNum(amount);
    if (!desc.trim() || !v || v <= 0) return;
    // 'equal' e 'custom' usam todos os membros; só 'some' usa a seleção
    let finalAmong = splitMode === 'some' ? among : inMembers.map(m=>m.id);
    if (finalAmong.length === 0) finalAmong = inMembers.map(m=>m.id);
    const exp = {
      id: 'exp_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      desc: desc.trim(), amount: v, paidBy: payer || me.id,
      splitMode, splitAmong: finalAmong,
      splitCustom: splitMode === 'custom' ? { ...custom } : undefined,
      at: Date.now(),
    };
    await AppStore.updatePlanning(p => ({ ...p, costs:{ ...(p.costs||{}), breakdown:[...((p.costs&&p.costs.breakdown)||[]), exp] } }));
    resetForm(); setOpen(false);
    if (window._paToast) window._paToast('Despesa adicionada!', 'success');
  };

  const remove = async (id) => {
    if (!window.confirm('Apagar esta despesa?')) return;
    await AppStore.updatePlanning(p => ({ ...p, costs:{ ...(p.costs||{}), breakdown:((p.costs&&p.costs.breakdown)||[]).filter(e=>e.id!==id) } }));
  };

  // Atalho: criar despesa do alojamento vencedor
  const addAccommodation = () => {
    setOpen(true);
    setDesc(winnerAcc ? ('Alojamento — ' + (winnerAcc.area || winnerAcc.type || 'Airbnb')) : 'Alojamento (Airbnb)');
    setSplitMode('equal'); setAmong(inMembers.map(m=>m.id));
  };

  const toggleAmong = (id) => setAmong(a => a.includes(id) ? a.filter(x=>x!==id) : [...a, id]);
  const customTotal = Object.values(custom).reduce((s,v)=>s+paNum(v),0);
  const customOk = splitMode !== 'custom' || Math.abs(customTotal - paNum(amount)) < 0.01;

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      {/* Resumo */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        <div style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:14, padding:'14px 16px' }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Total do grupo</div>
          <div style={{ fontFamily:'var(--pa-display)', fontSize:24, fontWeight:600, marginTop:4 }}>{total.toFixed(2)}€</div>
        </div>
        <div style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:14, padding:'14px 16px' }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Despesas</div>
          <div style={{ fontFamily:'var(--pa-display)', fontSize:24, fontWeight:600, marginTop:4 }}>{breakdown.length}</div>
        </div>
      </div>

      {/* Atalhos / adicionar */}
      {!open && (
        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
          <Btn variant="accent" onClick={()=>{ resetForm(); setOpen(true); }} style={{ flex:1 }}>+ Nova despesa</Btn>
          <Btn variant="soft" onClick={addAccommodation} style={{ flex:1 }}>🏠 Alojamento</Btn>
        </div>
      )}

      {/* Form de despesa (Splitwise) */}
      {open && (
        <div className="pa-scale" style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:14, padding:16, display:'flex', flexDirection:'column', gap:12 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Nova despesa</div>
            <button onClick={()=>{ setOpen(false); resetForm(); }} style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', fontSize:18, padding:0 }}>×</button>
          </div>
          <Field placeholder="Descrição" value={desc} onChange={setDesc} />
          <Field placeholder="Valor total (€)" value={amount} onChange={setAmount} prefix="€" />

          <div>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:6 }}>Quem pagou</div>
            <div style={{ padding:'12px 14px', borderRadius:12, background:'#fff', border:'1px solid var(--pa-line)', display:'flex', alignItems:'center' }}>
              <select value={payer} onChange={(e)=>setPayer(e.target.value)} style={{ width:'100%', minWidth:0, border:'none', outline:'none', background:'transparent', fontFamily:'var(--pa-body)', fontSize:16, color:'var(--pa-ink)' }}>
                {inMembers.map(m => <option key={m.id} value={m.id}>{m.id===me?.id ? 'Eu ('+m.name+')' : m.name}</option>)}
              </select>
            </div>
          </div>

          <div>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:6 }}>Como dividir</div>
            <div style={{ display:'flex', gap:6 }}>
              {[{k:'equal',l:'Igual (todos)'},{k:'some',l:'Só alguns'},{k:'custom',l:'Valores'}].map(o => (
                <button key={o.k} onClick={()=>{ setSplitMode(o.k); if (o.k==='some') setAmong(inMembers.map(m=>m.id)); }} style={{
                  flex:1, padding:'9px 6px', borderRadius:10, cursor:'pointer', fontFamily:'var(--pa-body)', fontSize:12.5, fontWeight:600,
                  background: splitMode===o.k ? 'var(--pa-ink)' : '#fff', color: splitMode===o.k ? '#fff':'var(--pa-ink)',
                  border: splitMode===o.k ? 'none':'1px solid var(--pa-line)' }}>{o.l}</button>
              ))}
            </div>
          </div>

          {/* Seleção de participantes (some) */}
          {splitMode === 'some' && (
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {inMembers.map(m => (
                <button key={m.id} onClick={()=>toggleAmong(m.id)} style={{
                  display:'flex', alignItems:'center', gap:10, padding:'8px 12px', borderRadius:10, cursor:'pointer', textAlign:'left',
                  background: among.includes(m.id) ? 'rgba(217,119,87,0.10)' : '#fff', border:'1px solid '+(among.includes(m.id)?'var(--pa-accent)':'var(--pa-line)') }}>
                  <Avatar member={m} size={26} />
                  <span style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:13, fontWeight:600 }}>{m.name}</span>
                  <span style={{ fontSize:14 }}>{among.includes(m.id) ? '✓' : ''}</span>
                </button>
              ))}
              {paNum(amount)>0 && among.length>0 && (
                <div style={{ fontSize:11.5, color:'var(--pa-muted)', textAlign:'center' }}>{(paNum(amount)/among.length).toFixed(2)}€ por pessoa ({among.length})</div>
              )}
            </div>
          )}

          {/* Valores personalizados (custom) */}
          {splitMode === 'custom' && (
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {inMembers.map(m => (
                <div key={m.id} style={{ display:'flex', alignItems:'center', gap:10 }}>
                  <Avatar member={m} size={26} />
                  <span style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:13, fontWeight:600 }}>{m.name}</span>
                  <div style={{ width:110, padding:'8px 10px', borderRadius:10, background:'#fff', border:'1px solid var(--pa-line)', display:'flex', alignItems:'center', gap:4 }}>
                    <span style={{ color:'var(--pa-muted)', fontSize:14 }}>€</span>
                    <input value={custom[m.id]||''} onChange={(e)=>setCustom(c=>({...c,[m.id]:e.target.value}))} placeholder="0" inputMode="decimal" maxLength={8}
                      style={{ width:'100%', minWidth:0, border:'none', outline:'none', background:'transparent', fontFamily:'var(--pa-body)', fontSize:16 }} />
                  </div>
                </div>
              ))}
              <div style={{ fontSize:11.5, textAlign:'center', color: customOk ? 'var(--pa-muted)' : '#8a4220', fontWeight:600 }}>
                Soma: {customTotal.toFixed(2)}€ / {paNum(amount).toFixed(2)}€ {customOk ? '✓' : '(tem de bater certo)'}
              </div>
            </div>
          )}

          <Btn variant="accent" onClick={addExpense} disabled={!desc.trim() || !(paNum(amount)>0) || !customOk}>Adicionar despesa</Btn>
        </div>
      )}

      {/* Estado vazio */}
      {breakdown.length === 0 && !open && (
        <div style={{ textAlign:'center', padding:'24px 16px', color:'var(--pa-muted)' }}>
          <div style={{ fontSize:28, marginBottom:8, opacity:0.5 }}>🧾</div>
          <div style={{ fontFamily:'var(--pa-body)', fontSize:13.5, fontWeight:600, color:'var(--pa-ink)' }}>Ainda sem despesas</div>
          <div style={{ fontFamily:'var(--pa-body)', fontSize:12, marginTop:2, lineHeight:1.5, maxWidth:300, margin:'2px auto 0' }}>
            Adiciona o alojamento, combustível, jantares... e a app divide tudo e diz quem paga a quem.
          </div>
        </div>
      )}

      {/* Lista de despesas */}
      {breakdown.length > 0 && (
        <div className="pa-stagger" style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {breakdown.slice().reverse().map(e => {
            const by = memberById(e.paidBy);
            const shares = expenseShares(e, inMembers);
            const nShare = Object.keys(shares).length;
            const modeLabel = e.splitMode === 'custom' ? 'valores' : (e.splitMode === 'some' ? nShare+' pessoas' : 'todos');
            return (
              <div key={e.id} style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:12, padding:'10px 14px', display:'flex', alignItems:'center', gap:12 }}>
                <Avatar member={by || {initials:'?',color:'var(--pa-muted)'}} size={30} />
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontFamily:'var(--pa-body)', fontSize:13.5, fontWeight:600, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{e.desc}</div>
                  <div style={{ fontFamily:'var(--pa-mono)', fontSize:10.5, color:'var(--pa-muted)' }}>{by?.name || '?'} pagou · dividido por {modeLabel}</div>
                </div>
                <div style={{ fontFamily:'var(--pa-display)', fontSize:16, fontWeight:600 }}>{paNum(e.amount).toFixed(2)}€</div>
                {(me?.isAdmin || e.paidBy === me?.id) && (
                  <button onClick={()=>remove(e.id)} aria-label="Apagar" style={{ width:24, height:24, border:'none', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', fontSize:16, padding:0 }}>×</button>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Acerto de contas (settlement) */}
      {settlements.length > 0 && (
        <div style={{ background:'var(--pa-ink)', color:'#fff', borderRadius:14, padding:16 }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, opacity:0.6, textTransform:'uppercase', marginBottom:12 }}>Acertar contas</div>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {settlements.map((t, i) => {
              const from = memberById(t.from), to = memberById(t.to);
              return (
                <div key={i} style={{ background:'rgba(255,255,255,0.07)', borderRadius:12, padding:'10px 12px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <Avatar member={from||{initials:'?'}} size={24} ringColor="var(--pa-ink)" />
                    <span style={{ fontFamily:'var(--pa-body)', fontSize:13, fontWeight:600 }}>{from?.name||'?'}</span>
                    <svg width="16" height="10" viewBox="0 0 16 10" style={{ opacity:0.6 }}><path d="M1 5h13M10 1l4 4-4 4" stroke="#fff" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    <Avatar member={to||{initials:'?'}} size={24} ringColor="var(--pa-ink)" />
                    <span style={{ fontFamily:'var(--pa-body)', fontSize:13, fontWeight:600, flex:1 }}>{to?.name||'?'}</span>
                    <span style={{ fontFamily:'var(--pa-display)', fontSize:16, fontWeight:700, color:'#ffb89c' }}>{t.amount.toFixed(2)}€</span>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ fontSize:11, opacity:0.55, marginTop:12, lineHeight:1.4 }}>
            Transferências mínimas para todos ficarem quites.
          </div>
        </div>
      )}

      {total > 0 && settlements.length === 0 && (
        <div style={{ background:'rgba(107,142,111,0.15)', borderRadius:14, padding:16, textAlign:'center', fontFamily:'var(--pa-body)', fontSize:13.5, fontWeight:600, color:'#3d5e44' }}>
          ✓ Está tudo acertado — ninguém deve nada.
        </div>
      )}
    </div>
  );
}

function PlanItinerario({ me }) {
  const appData = useAppStore();
  const plan = appData.planData || { itinerary:[] };
  const items = plan.itinerary || [];
  const locked = appData.locked;

  const [day, setDay] = React.useState(1);
  const [time, setTime] = React.useState('');
  const [what, setWhat] = React.useState('');

  // Calcular nº de dias da viagem
  const dayCount = locked ? paDaySpan(locked.from, locked.to) : 1;
  const days = Array.from({length: dayCount}, (_,i) => i+1);

  const add = async () => {
    if (!what.trim()) return;
    const newI = { id:'it_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6), day, time:time.trim(), what:what.trim() };
    await AppStore.updatePlanning(p => ({ ...p, itinerary:[...((p.itinerary)||[]), newI] }));
    setTime(''); setWhat('');
  };

  const remove = async (id) => {
    await AppStore.updatePlanning(p => ({ ...p, itinerary:((p.itinerary)||[]).filter(i => i.id !== id) }));
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      {/* Form */}
      <div style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:14, padding:16, display:'flex', flexDirection:'column', gap:10 }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Nova paragem</div>
        <div style={{ display:'grid', gridTemplateColumns:'auto 1fr', gap:10 }}>
          <label style={{ padding:'12px 14px', borderRadius:12, background:'#fff', border:'1px solid var(--pa-line)', minWidth:90, boxSizing:'border-box', display:'flex', alignItems:'center' }}>
            <select value={day} onChange={(e)=>setDay(parseInt(e.target.value, 10))} style={{ width:'100%', minWidth:0, border:'none', outline:'none', background:'transparent', fontFamily:'var(--pa-body)', fontSize:16, color:'var(--pa-ink)' }}>
              {days.map(d => <option key={d} value={d}>Dia {d}</option>)}
            </select>
          </label>
          <Field placeholder="Hora (opcional)" value={time} onChange={setTime} prefix="🕐" />
        </div>
        <Field placeholder="O que fazer" value={what} onChange={setWhat} />
        <Btn variant="accent" onClick={add} disabled={!what.trim()}>+ Adicionar</Btn>
      </div>

      {/* Itinerário por dia */}
      {days.map(d => {
        const dayItems = items.filter(i => i.day === d).sort((a,b) => (a.time||'').localeCompare(b.time||''));
        if (dayItems.length === 0) return null;
        return (
          <div key={d} style={{ display:'flex', flexDirection:'column', gap:8 }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Dia {d}</div>
            {dayItems.map(i => (
              <div key={i.id} style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:12, padding:'10px 14px', display:'flex', alignItems:'center', gap:12 }}>
                {i.time && <div style={{ fontFamily:'var(--pa-mono)', fontSize:11, fontWeight:600, color:'var(--pa-accent)', minWidth:42 }}>{i.time}</div>}
                <div style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:13.5 }}>{i.what}</div>
                {me?.isAdmin && <button onClick={()=>remove(i.id)} style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', fontSize:16, padding:0 }}>×</button>}
              </div>
            ))}
          </div>
        );
      })}
      {items.length === 0 && (
        <div style={{ padding:'24px 0', textAlign:'center', color:'var(--pa-muted)', fontSize:13 }}>
          Sem paragens ainda. Adiciona a primeira acima.
        </div>
      )}
    </div>
  );
}

function PlanAtividades({ me }) {
  const appData = useAppStore();
  const plan = appData.planData || { activities:[] };
  const items = plan.activities || [];
  const [text, setText] = React.useState('');
  const [actGeo, setActGeo] = React.useState(null);
  const [actPickerKey, setActPickerKey] = React.useState(0);

  const add = async () => {
    if (!text.trim()) return;
    const newA = { id:'act_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6), text:text.trim(), by:me?.id, done:false, at:Date.now(), ...(actGeo ? { geo: { lat: actGeo.lat, lng: actGeo.lng }, ...(actGeo.zone ? { zone: actGeo.zone } : {}) } : {}) };
    await AppStore.updatePlanning(p => ({ ...p, activities:[...((p.activities)||[]), newA] }));
    setText(''); setActGeo(null); setActPickerKey((k) => k + 1);
  };

  const toggle = async (id) => {
    await AppStore.updatePlanning(p => ({ ...p, activities:((p.activities)||[]).map(a => a.id===id ? {...a, done:!a.done} : a) }));
  };

  const remove = async (id) => {
    await AppStore.updatePlanning(p => ({ ...p, activities:((p.activities)||[]).filter(a => a.id !== id) }));
  };

  const pending = items.filter(a => !a.done);
  const done = items.filter(a => a.done);

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      <div style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:14, padding:16, display:'flex', gap:8 }}>
        <input value={text} onChange={(e)=>setText(e.target.value)} onKeyDown={(e)=>{ if(e.key==='Enter'){ e.preventDefault(); add(); } }}
          placeholder="Adicionar atividade" maxLength={100} style={{ flex:1, minWidth:0, boxSizing:'border-box', padding:'10px 14px', borderRadius:10, border:'1px solid var(--pa-line)', fontFamily:'var(--pa-body)', fontSize:16, outline:'none' }} />
      <div style={{ margin:'8px 0' }}>
        <LocationPicker key={actPickerKey} compact onChange={setActGeo} placeholder="Onde (opcional)" />
      </div>
        <Btn variant="accent" onClick={add} disabled={!text.trim()} style={{ flexShrink:0 }}>+</Btn>
      </div>

      {pending.length > 0 && (
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Por fazer ({pending.length})</div>
          {pending.map(a => {
            const by = memberById(a.by);
            return (
              <div key={a.id} style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:12, padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
                <button onClick={()=>toggle(a.id)} style={{ width:22, height:22, borderRadius:6, border:'2px solid var(--pa-line)', background:'#fff', cursor:'pointer', flexShrink:0, padding:0 }} />
                <div style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:13.5 }}>{a.text}</div>
                {by && <Avatar member={by} size={20} />}
                {(me?.isAdmin || a.by === me?.id) && <button onClick={()=>remove(a.id)} style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', fontSize:16, padding:0 }}>×</button>}
              </div>
            );
          })}
        </div>
      )}

      {done.length > 0 && (
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Feito ({done.length})</div>
          {done.map(a => (
            <div key={a.id} style={{ background:'rgba(31,26,20,0.03)', borderRadius:12, padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
              <button onClick={()=>toggle(a.id)} style={{ width:22, height:22, borderRadius:6, border:'none', background:'var(--pa-accent-strong)', color:'#fff', cursor:'pointer', flexShrink:0, padding:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13 }}>✓</button>
              <div style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:13.5, color:'var(--pa-muted)', textDecoration:'line-through' }}>{a.text}</div>
              {(me?.isAdmin || a.by === me?.id) && <button onClick={()=>remove(a.id)} style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', fontSize:16, padding:0 }}>×</button>}
            </div>
          ))}
        </div>
      )}

      {items.length === 0 && (
        <div style={{ padding:'24px 0', textAlign:'center', color:'var(--pa-muted)', fontSize:13 }}>
          Lista vazia. Adiciona ideias aqui.
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PlanCompras — lista de compras partilhada
// ─────────────────────────────────────────────────────────────
function PlanCompras({ me }) {
  const appData = useAppStore();
  const plan = appData.planData || { shopping:[] };
  const items = plan.shopping || [];
  const [text, setText] = React.useState('');
  const [qty, setQty] = React.useState('');

  const add = async () => {
    if (!text.trim()) return;
    const newS = { id:'shop_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6), text:text.trim(), qty:qty.trim(), done:false, at:Date.now() };
    await AppStore.updatePlanning(p => ({ ...p, shopping:[...((p.shopping)||[]), newS] }));
    setText(''); setQty('');
  };

  const toggle = async (id) => {
    await AppStore.updatePlanning(p => ({ ...p, shopping:((p.shopping)||[]).map(s => s.id===id ? {...s, done:!s.done} : s) }));
  };

  const remove = async (id) => {
    await AppStore.updatePlanning(p => ({ ...p, shopping:((p.shopping)||[]).filter(s => s.id !== id) }));
  };

  const clearDone = async () => {
    if (!window.confirm('Limpar itens já comprados?')) return;
    await AppStore.updatePlanning(p => ({ ...p, shopping:((p.shopping)||[]).filter(s => !s.done) }));
  };

  const pending = items.filter(s => !s.done);
  const done = items.filter(s => s.done);

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      <div style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:14, padding:16, display:'flex', gap:8 }}>
        <input value={text} onChange={(e)=>setText(e.target.value)} onKeyDown={(e)=>{ if(e.key==='Enter'){ e.preventDefault(); add(); } }}
          placeholder="Adicionar item" maxLength={100} style={{ flex:1, minWidth:0, boxSizing:'border-box', padding:'10px 14px', borderRadius:10, border:'1px solid var(--pa-line)', fontFamily:'var(--pa-body)', fontSize:16, outline:'none' }} />
        <input value={qty} onChange={(e)=>setQty(e.target.value)} placeholder="Qtd" maxLength={8} style={{ width:56, flexShrink:0, boxSizing:'border-box', padding:'10px 8px', borderRadius:10, border:'1px solid var(--pa-line)', fontFamily:'var(--pa-body)', fontSize:16, outline:'none', textAlign:'center' }} />
        <Btn variant="accent" onClick={add} disabled={!text.trim()} style={{ flexShrink:0 }}>+</Btn>
      </div>

      {pending.length > 0 && (
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Por comprar ({pending.length})</div>
          {pending.map(s => (
            <div key={s.id} style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:12, padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
              <button onClick={()=>toggle(s.id)} style={{ width:22, height:22, borderRadius:6, border:'2px solid var(--pa-line)', background:'#fff', cursor:'pointer', flexShrink:0, padding:0 }} />
              <div style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:13.5 }}>{s.text}</div>
              {s.qty && <Pill size="sm" tone="muted">×{s.qty}</Pill>}
              <button onClick={()=>remove(s.id)} style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', fontSize:16, padding:0 }}>×</button>
            </div>
          ))}
        </div>
      )}

      {done.length > 0 && (
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Comprado ({done.length})</div>
            <Btn variant="ghost" size="sm" onClick={clearDone}>Limpar</Btn>
          </div>
          {done.map(s => (
            <div key={s.id} style={{ background:'rgba(31,26,20,0.03)', borderRadius:12, padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
              <button onClick={()=>toggle(s.id)} style={{ width:22, height:22, borderRadius:6, border:'none', background:'var(--pa-accent-strong)', color:'#fff', cursor:'pointer', flexShrink:0, padding:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13 }}>✓</button>
              <div style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:13.5, color:'var(--pa-muted)', textDecoration:'line-through' }}>{s.text}</div>
              {s.qty && <Pill size="sm" tone="muted">×{s.qty}</Pill>}
            </div>
          ))}
        </div>
      )}

      {items.length === 0 && (
        <div style={{ padding:'24px 0', textAlign:'center', color:'var(--pa-muted)', fontSize:13 }}>
          Lista vazia. Adiciona itens acima.
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// DesktopShell
// ─────────────────────────────────────────────────────────────
const PHASE_STORAGE_KEY = 'pa-current-phase';

function DesktopShell({ viewAs = 'admin', phase: initialPhase, liveUser, onLogout, onBackToHub, onEditProfile }) {
  const appData = useAppStore();
  const me = liveUser || (viewAs === 'admin' ? memberById(D.adminId) : (getAllMembers().find(m=>!m.isAdmin) || getAllMembers()[0] || memberById(D.adminId)));

  const edition = {
    number: appData.editionNumber || D.edition.number,
    title: appData.editionTitle || D.edition.title,
    subtitle: appData.editionSubtitle || D.edition.subtitle,
  };

  // Fase partilhada via AppStore (Supabase). No canvas usa initialPhase fixo.
  const phase = initialPhase !== undefined ? initialPhase : (appData.currentPhase || D.edition.currentPhase || 1);

  const setPhase = (n) => {
    if (initialPhase !== undefined) return;
    const clamped = Math.max(1, Math.min(D.phases.length, n));
    AppStore.setPhase(clamped);
  };
  const reset = () => { if (initialPhase === undefined) AppStore.resetEdition(); };

  const ctx = { phase, setPhase, reset, canEdit: me.isAdmin };

  const phases = { 1:DPhase1, 2:DPhase6, 3:DPhase7, 4:DPhaseConfirm, 5:DPhase2, 6:DPhase3, 7:DPhase4, 8:DPhase5, 9:DPhase8 }; // 1 interesse · 2 disp · 3 datas · 4 confirmar · 5 local · 6 votar local · 7 aloj · 8 votar aloj · 9 plano
  const PhaseView = phases[phase] || DPhase1;

  return (
    <PhaseCtx.Provider value={ctx}>
      <div style={{ width:'100%', height:'100%', display:'flex', flexDirection:'column',
        background:'var(--pa-bg)', overflow:'hidden',
        fontFamily:'var(--pa-body)', color:'var(--pa-ink)', WebkitFontSmoothing:'antialiased' }}>
        <DTopBar me={me} edition={edition} onLogout={onLogout} onBackToHub={onBackToHub} onEditProfile={onEditProfile} />
        <div style={{ flex:1, display:'flex', overflow:'hidden', minHeight:0 }}>
          <DLeftRail phase={phase} me={me} />
          <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0, background:'#fcf9f3' }}>
            <AnnouncementBanner me={me} />
            <DatesChip phase={phase} />
            <div key={phase} className="pa-phase-enter" role="main" aria-label={`Fase ${phase} de ${D.phases.length}`} style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0 }}>
              <PhaseView me={me} />
            </div>
            {initialPhase === undefined && (
              <div style={{ padding:'12px 36px 16px', background:'#fcf9f3', borderTop:'1px solid var(--pa-line)' }}>
                <PhaseProgressBanner phase={phase} me={me} />
              </div>
            )}
          </div>
          <DRightRail phase={phase} me={me} />
        </div>
      </div>
    </PhaseCtx.Provider>
  );
}

Object.assign(window, {
  DPhase4, DPhase5, DPhase6, DPhase7, DPhase8,
  AccommodationCard, AccommodationForm, DLocationWinnerStrip,
  PlanEstadia, PlanCustos, PlanItinerario, PlanAtividades, PlanCompras,
  DesktopShell, PHASE_STORAGE_KEY,
});

<script type="text/babel">// Perdidos Algures — Mobile companion (dinâmico via AppStore).

const { useState: mUseState, useEffect: mUseEffect, useMemo: mUseMemo, useRef: mUseRef } = React;

function MShell({ children }) {

}

const MNavCtx = React.createContext({ onBackToHub: null, onEditProfile: null, me: null });

function MPhaseNav({ phase }) {
  const [open, setOpen] = mUseState(false);
  const nav = React.useContext(MNavCtx); // nav.me → gates de admin no menu
  const _app = useAppStore();
  phase = _app.currentPhase || phase; // fase real (números fixos são da ordem antiga)
  const total = D.phases.length;
  const go = (n) => { AppStore.setPhase(Math.max(1, Math.min(total, n))); AppStore.clearKey('deadline'); setOpen(false); };
  // Reiniciar a fase atual (paridade com o desktop): cada fase limpa a sua chave
  const resetKey = { 1:'rsvp', 2:'avail', 3:'locked', 4:'going', 5:'locSuggs', 6:'locVotes', 7:'accSuggs', 8:'accVotes' }[phase];
  const resetLabel = { 1:'as respostas', 2:'as disponibilidades', 3:'as datas trancadas', 4:'as sugestões de local', 5:'os votos de local', 6:'as sugestões de alojamento', 7:'os votos de alojamento' }[phase];
  const doReset = () => {
    if (!window.confirm(`Reiniciar ${resetLabel} desta fase?`)) return;
    AppStore.clearKey(resetKey);
    // Reiniciar uma votação sem limpar o vencedor deixava a fase "decidida"
    // com zero votos — o vencedor cai junto com os votos.
    if (resetKey === 'locVotes') AppStore.clearKey('locWinner');
    if (resetKey === 'accVotes') AppStore.clearKey('accWinner');
    setOpen(false);
  };
  return (
    <div role="navigation" aria-label="Navegação de fases" style={{ position:'relative', display:'flex', alignItems:'center', gap:3 }}>
      <button onClick={() => go(phase - 1)} disabled={phase === 1} aria-label="Fase anterior"
        style={{ width:36, height:36, borderRadius:999, border:'1px solid var(--pa-line)', background:'#fff',
          cursor: phase===1?'default':'pointer', opacity: phase===1?0.4:1, padding:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <svg width="9" height="9" viewBox="0 0 11 11"><path d="M7 2L3 5.5l4 3.5" stroke="var(--pa-ink)" strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
      <button onClick={() => setOpen(o=>!o)} style={{ height:36, padding:'0 12px', borderRadius:999, background:'var(--pa-ink)', color:'#fff', border:'none', fontFamily:'var(--pa-mono)', fontSize:11, fontWeight:600, cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5 }}>
        FASE {String(phase).padStart(2,'0')}/{String(total).padStart(2,'0')}
        <svg width="8" height="5" viewBox="0 0 9 6"><path d="M1 1l3.5 3.5L8 1" stroke="#fff" strokeWidth="1.4" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
      <button onClick={() => go(phase + 1)} disabled={phase === total} aria-label="Fase seguinte"
        style={{ width:36, height:36, borderRadius:999, border:'1px solid var(--pa-line)', background:'#fff',
          cursor: phase===total?'default':'pointer', opacity: phase===total?0.4:1, padding:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <svg width="9" height="9" viewBox="0 0 11 11"><path d="M4 2l4 3.5L4 9" stroke="var(--pa-ink)" strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
      {open && (
        <>
          <div onClick={() => setOpen(false)} style={{ position:'fixed', inset:0, zIndex:40 }} />
          <div style={{ position:'absolute', top:'100%', right:0, marginTop:6, background:'#fff', borderRadius:12, padding:6, boxShadow:'0 8px 28px rgba(0,0,0,0.18)', border:'1px solid var(--pa-line)', zIndex:41, minWidth:160 }}>
            {D.phases.map((p) => (
              <button key={p.n} onClick={() => go(p.n)} style={{
                width:'100%', textAlign:'left', padding:'8px 10px', borderRadius:8, border:'none', cursor:'pointer',
                background: p.n===phase ? 'var(--pa-ink)' : 'transparent', color: p.n===phase ? '#fff' : 'var(--pa-ink)',
                fontFamily:'var(--pa-body)', fontSize:12.5, display:'flex', gap:8, alignItems:'center' }}>
                <span style={{ fontFamily:'var(--pa-mono)', fontSize:10, opacity:0.7 }}>{String(p.n).padStart(2,'0')}</span>
                {p.name}
              </button>
            ))}
            <div style={{ borderTop:'1px solid var(--pa-line)', margin:'4px 0' }} />
            {nav.me?.isAdmin && (<>
            <button onClick={() => { paOpenAnnounce(); setOpen(false); }} style={{
              width:'100%', textAlign:'left', padding:'8px 10px', borderRadius:8, border:'none', cursor:'pointer',
              background:'transparent', color:'var(--pa-ink)', fontFamily:'var(--pa-body)', fontSize:12.5, display:'flex', gap:8, alignItems:'center' }}>
              <span style={{ fontSize:13 }}>📢</span> Enviar anúncio

            <button onClick={() => { paOpenMembers(); setOpen(false); }} style={{
              width:'100%', textAlign:'left', padding:'8px 10px', borderRadius:8, border:'none', cursor:'pointer',

              width:'100%', textAlign:'left', padding:'8px 10px', borderRadius:8, border:'none', cursor:'pointer',
              background:'transparent', color:'var(--pa-ink)', fontFamily:'var(--pa-body)', fontSize:12.5, display:'flex', gap:8, alignItems:'center' }}>
              <span style={{ fontSize:13 }}>⬇</span> Backup da edição

            <button onClick={() => { paOpenBugReport(); setOpen(false); }} style={{

                  <span style={{ fontSize:13 }}>🔄</span> Reiniciar esta fase
                </button>
              </>
            )}
          </div>
        </>
      )}
    </div>
  );
}

function MHeader({ phase, onLogout, onOpenChat }) {

            </svg>
          </button>

      </div>
    </div>

}

function MPhaseTitle({ kicker, title, sub }) {

// PHASE 1 — RSVP

// PHASE 3 — Vote local
function MPhase3({ me, onLogout, onOpenChat }) {
  const appData = useAppStore();
  const suggestions = appData.locSuggs || [];
  const [vote, setVote] = mUseState(() => VoteStore.getVote(me.id, 'loc'));
  mUseEffect(() => { setVote(VoteStore.getVote(me.id, 'loc')); }, [appData.locVotes, me.id]);
  const [saved, setSaved] = mUseState(false);
  const [tieOpen, setTieOpen] = mUseState(false);

  const voteMode = appData.locVoteMode || 'points' /* Top 3 por defeito */;
  const myList = paVoteList(vote);
  const handleVote = (id) => {
    if (voteMode === 'points') {
      const cur = paVoteList(vote);
      let next;
      if (cur.includes(id)) next = cur.filter((x) => x !== id);
      else if (cur.length < 3) next = [...cur, id];
      else { if (window._paToast) window._paToast('Já tens 3 escolhas — toca numa para a trocar.', 'info'); return; }
      if (next.length === 0) { setVote(null); VoteStore.clearVote(me.id, 'loc'); return; }
      setVote(next);
      VoteStore.setVote(me.id, 'loc', next);
    } else {
      setVote(id);
      VoteStore.setVote(me.id, 'loc', id);
    }
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  // Empate
  const inMembers = (typeof getInMembers === 'function') ? getInMembers(appData) : [];
  const votes = appData.locVotes || {};
  const allVoted = inMembers.length > 0 && inMembers.every(m => votes[m.id]);
  const tie = allVoted ? detectTie(votes, suggestions) : null;
  mUseEffect(() => { if (tie && !appData.locWinner) setTieOpen(true); }, [tie?.tiedIds?.join(','), appData.locWinner]);

  if (suggestions.length === 0) {
    return (
      <MShell>
        <MHeader phase={5} onLogout={onLogout} onOpenChat={onOpenChat} />
        <MEmpty icon="🗺️" text="Ainda não há destinos para votar. Volta à fase anterior." />
      </MShell>
    );
  }

  return (
    <MShell>
      <MHeader phase={5} onLogout={onLogout} onOpenChat={onOpenChat} />
      <MPhaseTitle kicker="Voto secreto" title={<>Onde queres<br/><span style={{ color:'var(--pa-accent)' }}>passar este?</span></>} />
      {me.isAdmin && <div style={{ marginBottom:10 }}><VoteModeToggle kind="loc" mode={voteMode} isAdmin={true} hasVotes={Object.keys(appData.locVotes || {}).length > 0} /></div>}
      <LocMap suggestions={suggestions} height={190} membersById={(id) => (typeof memberById === 'function' ? memberById(id) : null)} />
      <div className="pa-scroll" style={{ padding:'6px 16px 14px', flex:1, minHeight:0, overflow:'auto', display:'flex', flexDirection:'column', gap:10 }}>
        <VotersRow doneIds={Object.keys(votes).filter((id) => paVoteList(votes[id]).length > 0)} allMembers={inMembers} label="Já votaram" />
        {suggestions.map((s) => {
          const sel = voteMode === 'points' ? myList.includes(s.id) : vote === s.id;
          const rank = voteMode === 'points' ? myList.indexOf(s.id) : -1;
          const by = memberById(s.by) || { name:s.by, initials:'?' };
          return (
            <button key={s.id} onClick={() => handleVote(s.id)} style={{ position:'relative',
              background:'#fff', borderRadius:14, textAlign:'left', padding:'14px 16px',
              border: sel?'2px solid var(--pa-accent)':'1px solid var(--pa-line)',
              
              cursor:'pointer', position:'relative' }}>
              {voteMode === 'points' && rank >= 0 && (
                <span aria-label={`A tua ${rank+1}ª escolha`} style={{ position:'absolute', top:-8, left:-8, zIndex:3,
                  width:26, height:26, borderRadius:26, background:'var(--pa-accent-strong)', color:'#fff',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontFamily:'var(--pa-mono)', fontSize:11, fontWeight:700,
                  boxShadow:'0 2px 6px rgba(0,0,0,0.25)' }}>{rank+1}º</span>
              )}
              
              <div style={{ fontFamily:'var(--pa-display)', fontSize:17, fontWeight:600, letterSpacing:-0.3 }}>{s.name}</div>
              {s.city && <div style={{ fontSize:11.5, color:'var(--pa-muted)', marginTop:2 }}>{s.city}</div>}
              <MapLink targetId={s.id} hasGeo={!!s.geo} style={{ marginTop:4, display:'inline-block' }} />
              <div style={{ marginTop:8, display:'flex', alignItems:'center', gap:6 }}>
                <Avatar member={by} size={18} />
                <span style={{ fontSize:10.5, color:'var(--pa-muted)' }}>{by.name}</span>
              </div>
              {sel && (
                <div style={{ position:'absolute', top:12, right:12, width:24, height:24, borderRadius:24,
                  background: saved?'#3d5e44':'var(--pa-accent)',
                  display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 6.5l2 2 4.5-5" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
              )}
            </button>
          );
        })}
        {myList.length > 0 && (
          <div style={{ padding:'10px 14px', borderRadius:10, background:'rgba(107,142,111,0.12)', fontSize:12, color:'#3d5e44', textAlign:'center' }}>
            {saved ? 'Voto guardado ✓' : (voteMode === 'points'
              ? 'Top: ' + myList.map((id, i) => `${i+1}º ${((id) => { const s = suggestions.find((x) => x.id === id); return s ? (s.name || s.area || s.type) : '?'; })(id)}`).join(' · ')
              : `Voto em ${((id) => { const s = suggestions.find((x) => x.id === id); return s ? (s.name || s.area || s.type) : '?'; })(myList[0] || vote)}`)}
            <button onClick={() => { setVote(null); VoteStore.clearVote(me.id, 'loc'); if (window._paToast) window._paToast('Voto removido.', 'success'); }}
              style={{ display:'block', margin:'6px auto 0', border:'none', background:'transparent', color:'var(--pa-muted)', textDecoration:'underline', cursor:'pointer', fontFamily:'var(--pa-body)', fontSize:11.5, padding:0 }}>
              Remover o meu voto
            </button>
          </div>
        )}
      </div>
      <TiebreakModal
        open={tieOpen && !!tie && !appData.locWinner}
        onClose={()=>setTieOpen(false)}
        tie={tie}
        me={me}
        voteKey="tieVotesLoc"
        onResolve={(winnerId)=>AppStore.setLocWinner(winnerId)}
      />
    </MShell>
  );
}

    setTimeout(() => setSaved(false), 2000);
  };

  if (suggestions.length === 0) {
    return (
      <MShell>
        <MHeader phase={7} onLogout={onLogout} onOpenChat={onOpenChat} />
        <MEmpty icon="🏡" text="Ainda não há alojamentos para votar. Volta à fase anterior." />
      </MShell>
    );
  }

  return (
    <MShell>
      <MHeader phase={7} onLogout={onLogout} onOpenChat={onOpenChat} />
      <div style={{ padding:'0 22px 4px' }}>
        <Pill tone="accent" size="sm">Voto secreto</Pill>
        {me.isAdmin && <div style={{ margin:'8px 0 2px' }}><VoteModeToggle kind="acc" mode={voteMode} isAdmin={true} hasVotes={Object.keys(appData.accVotes || {}).length > 0} /></div>}
        <div style={{ marginTop:8 }}><LocMap suggestions={suggestions} height={180} membersById={(id) => (typeof memberById === 'function' ? memberById(id) : null)} /></div>
      </div>
      <MPhaseTitle title={<>Vota no <span style={{ color:'var(--pa-accent)' }}>alojamento.</span></>}
        sub={voteMode === 'points' ? 'Até 3 por ordem (3/2/1 pontos), secreto até fechar.' : 'Um por pessoa, secreto até fechar.'} />

      <div className="pa-scroll" style={{ padding:'6px 16px 14px', flex:1, minHeight:0, overflow:'auto', display:'flex', flexDirection:'column', gap:10 }}>
        {!appData.accWinner && <VotersRow doneIds={Object.keys(votes).filter((id) => paVoteList(votes[id]).length > 0)} allMembers={inMembers} label="Já votaram" />}
        {suggestions.map((s) => {
          const sel = voteMode === 'points' ? myList.includes(s.id) : vote === s.id;
          const rank = voteMode === 'points' ? myList.indexOf(s.id) : -1;
          return (
            <button key={s.id} onClick={() => handleVote(s.id)} style={{ position:'relative',
              background:'#fff', borderRadius:12, padding:'12px 14px',
              border: sel?'2px solid var(--pa-accent)':'1px solid var(--pa-line)',
              
              cursor:votingClosed?'default':'pointer', textAlign:'left', position:'relative', width:'100%' }}>
              {voteMode === 'points' && rank >= 0 && (
                <span aria-label={`A tua ${rank+1}ª escolha`} style={{ position:'absolute', top:-8, left:-8, zIndex:3,
                  width:26, height:26, borderRadius:26, background:'var(--pa-accent-strong)', color:'#fff',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontFamily:'var(--pa-mono)', fontSize:11, fontWeight:700,
                  boxShadow:'0 2px 6px rgba(0,0,0,0.25)' }}>{rank+1}º</span>
              )}
              
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:10 }}>
                <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                  <Pill tone="dark" size="sm">{s.type}</Pill>
                  <span style={{ fontSize:11.5 }}>{s.area}</span>
                </div>
                <span style={{ fontFamily:'var(--pa-mono)', fontSize:13, fontWeight:700 }}>{s.price}€</span>
              </div>
              {sel && (
                <div style={{ position:'absolute', top:10, right:10, width:22, height:22, borderRadius:22,
                  background: saved?'#3d5e44':'var(--pa-accent)',
                  display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <svg width="11" height="11" viewBox="0 0 11 11"><path d="M2.5 5.5l2 2 4-4" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
              )}
            </button>
          );
        })}
        {myList.length > 0 && (
          <div style={{ padding:'10px 14px', borderRadius:10, background:'rgba(107,142,111,0.12)', fontSize:12, color:'#3d5e44', textAlign:'center' }}>
            {saved ? 'Voto guardado ✓' : (voteMode === 'points'
              ? 'Top: ' + myList.map((id, i) => `${i+1}º ${((id) => { const s = suggestions.find((x) => x.id === id); return s ? (s.name || s.area || s.type) : '?'; })(id)}`).join(' · ')
              : `Voto em ${((id) => { const s = suggestions.find((x) => x.id === id); return s ? (s.name || s.area || s.type) : '?'; })(myList[0] || vote)}`)}
            <button onClick={() => { setVote(null); VoteStore.clearVote(me.id, 'acc'); if (window._paToast) window._paToast('Voto removido.', 'success'); }}
              style={{ display:'block', margin:'6px auto 0', border:'none', background:'transparent', color:'var(--pa-muted)', textDecoration:'underline', cursor:'pointer', fontFamily:'var(--pa-body)', fontSize:11.5, padding:0 }}>
              Remover o meu voto
            </button>
          </div>
        )}
      </div>
      <TiebreakModal
        open={tieOpen && !!tie && !appData.accWinner}
        onClose={()=>setTieOpen(false)}
        tie={tie}
        me={me}
        voteKey="tieVotesAcc"
        onResolve={(winnerId)=>AppStore.setAccWinner(winnerId)}
      />
    </MShell>
  );
}

// PHASE 6 — Disponibilidade
function MPhase6({ me, onLogout, onOpenChat }) {
  const appData = useAppStore();
  const allMembers = getEditionMembers(appData);
  const locSuggs = appData.locSuggs || [];
  const winnerLoc = appData.locWinner ? locSuggs.find((s) => s.id === appData.locWinner) : null;
  const accSuggs = appData.accSuggs || [];
  const winnerAcc = appData.accWinner ? accSuggs.find((s) => s.id === appData.accWinner) : null;
  const [mi, setMi] = mUseState(0) /* mês corrente primeiro */;
  const [days, setDays] = mUseState(() => (AppStore.getAvailability(me.id) || []).map(paNormDay));
  mUseEffect(() => { setDays((AppStore.getAvailability(me.id) || []).map(paNormDay)); }, [appData.avail, me.id]);
  const toggle = (k) => setDays((arr) => arr.includes(k) ? arr.filter((x) => x !== k) : [...arr, k]);
  const allAvail = appData.avail || {};
  // "Pronto" = a MESMA métrica do quórum da fase: pelo menos 1 dia marcado.
  // (A existência da chave não chega — uma lista vazia não é uma resposta.)
  const submittedIds = Object.keys(allAvail).filter((id) => paFutureDays(allAvail[id]).length > 0);
  // Disponibilidade conta os INTERESSADOS (sim + talvez), igual ao desktop.
  const inMembers = (typeof getInterestedMembers === 'function') ? getInterestedMembers(appData) : allMembers;
  const totalIn = inMembers.length || allMembers.length;
  const inIds = mUseMemo(() => new Set(inMembers.map((m) => m.id)), [inMembers]);
  const meIsIn = inIds.has(me.id);
  const heat = mUseMemo(() => {
    const h = {};
    Object.entries(allAvail).forEach(([mid, arr]) => { if (mid === me.id || !inIds.has(mid)) return; (arr || []).forEach((d) => { const k = paNormDay(d); h[k] = (h[k] || 0) + 1; }); });
    if (meIsIn) days.forEach((k) => { h[k] = (h[k] || 0) + 1; });
    return h;
  }, [allAvail, days, me.id, inIds, meIsIn]);
  const peopleByDay = mUseMemo(() => {
    const map = {};
    Object.entries(allAvail).forEach(([mid, arr]) => { if (mid === me.id || !inIds.has(mid)) return; (arr || []).forEach((d) => { const k = paNormDay(d); (map[k] = map[k] || []).push(memberById(mid) || { name: '?' }); }); });
    if (meIsIn) days.forEach((k) => { (map[k] = map[k] || []).push({ ...(memberById(me.id) || me), name: me.name + ' (tu)' }); });
    return map;
  }, [allAvail, days, me.id, inIds, meIsIn]);
  const namesFor = (k) => (peopleByDay[k] || []).map((p) => p.name).join(', ');

  return (
    <MShell>
      <MHeader phase={2} onLogout={onLogout} onOpenChat={onOpenChat} />
      <MPhaseTitle kicker={`${paFutureDays(days).length} dias marcados`}
        title={<>Em que dias<br/><span style={{ color:'var(--pa-accent)' }}>podes ir?</span></>} />
      <div className="pa-scroll" style={{ padding:'6px 16px 14px', flex:1, minHeight:0, overflow:'auto' }}>
        {winnerLoc && (
          <div style={{ background:'var(--pa-ink)', color:'#fff', borderRadius:14, padding:'12px 14px', display:'flex', alignItems:'center', gap:12, marginBottom:14 }}>
            <div style={{ width:38, height:38, borderRadius:9, flexShrink:0,
              background:`repeating-linear-gradient(135deg,${winnerLoc.accent||'var(--pa-accent)'}88 0 6px,${winnerLoc.accent||'var(--pa-accent)'}44 6px 12px)` }} />
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontFamily:'var(--pa-mono)', fontSize:9, letterSpacing:1.1, color:'rgba(255,255,255,0.6)', textTransform:'uppercase' }}>Destino · alojamento</div>
              <div style={{ fontFamily:'var(--pa-display)', fontSize:15, fontWeight:600, letterSpacing:-0.3, marginTop:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                {winnerLoc.name}{winnerAcc ? ` · ${winnerAcc.area}` : ''}
              </div>
            </div>
          </div>
        )}

        <div style={{ background:'#fff', borderRadius:16, padding:14, border:'1px solid var(--pa-line)' }}>
          <Calendar dense pastDisabled mi={mi} onMonth={setMi} onCellClick={(d) => toggle(paDayKey(PA_MONTHS[mi].y, PA_MONTHS[mi].m, d))} renderCell={(d, _i, past) => {
            const k = paDayKey(PA_MONTHS[mi].y, PA_MONTHS[mi].m, d);
            const sel = days.includes(k);
            const n = heat[k] || 0;
            const intensity = totalIn > 0 ? n / totalIn : 0;
            return (
              <div title={past ? 'Dia já passado' : (n > 0 ? namesFor(k) : undefined)} style={{ width:'100%', height:'100%', borderRadius:6,
                background: past ? (sel ? 'rgba(31,26,20,0.10)' : 'rgba(31,26,20,0.03)')
                  : (intensity > 0 ? `rgba(217,119,87,${0.10 + intensity * 0.55})` : '#fff'),
                color: past ? 'var(--pa-muted)' : 'var(--pa-ink)',
                border: past ? (sel ? '2px dashed rgba(31,26,20,0.28)' : '1px solid var(--pa-line)')
                  : (sel ? '2px solid var(--pa-accent)' : intensity === 0 ? '1px solid var(--pa-line)' : '1px solid transparent'),
                boxShadow: (!past && sel) ? '0 0 0 1.5px rgba(217,119,87,0.25)' : 'none',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                fontFamily:'var(--pa-body)' }}>
                <div style={{ fontSize:12, fontWeight: (sel && !past) ? 700 : 600, lineHeight:1, textDecoration: past && sel ? 'line-through' : 'none' }}>{d}</div>
                {n > 0 && <div style={{ fontFamily:'var(--pa-mono)', fontSize:7.5, marginTop:1, color:'var(--pa-muted)', fontWeight:700, lineHeight:1 }}>{n}/{totalIn}</div>}
              </div>
            );
          }} />
          <div style={{ display:'flex', alignItems:'center', gap:14, marginTop:12 }}>
            <div style={{ display:'flex', alignItems:'center', gap:5 }}>
              <span style={{ width:13, height:13, borderRadius:3, background:'rgba(217,119,87,0.5)', display:'inline-block' }} />
              <span style={{ fontSize:10.5, color:'var(--pa-muted)' }}>mais gente</span>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:5 }}>
              <span style={{ width:13, height:13, borderRadius:3, background:'#fff', border:'2px solid var(--pa-accent)', display:'inline-block', boxSizing:'border-box' }} />
              <span style={{ fontSize:10.5, color:'var(--pa-muted)' }}>os teus dias</span>
            </div>
          </div>
        </div>
        <button onClick={() => { AppStore.setAvailability(me.id, days); if (window._paToast) window._paToast('Disponibilidade guardada!', 'success'); }}
          style={{ marginTop:14, width:'100%', padding:'14px', borderRadius:999, border:'none',
            background:'var(--pa-accent-strong)', color:'#fff', cursor:'pointer',
            fontFamily:'var(--pa-body)', fontSize:14, fontWeight:600 }}>
          Guardar disponibilidade
        </button>
        {(days.length > 0 || (allAvail[me.id] || []).length > 0) && (
          <button onClick={() => { if (!window.confirm('Limpar todos os teus dias marcados?')) return; setDays([]); AppStore.clearAvailability(me.id); if (window._paToast) window._paToast('Disponibilidade limpa.', 'success'); }}
            style={{ width:'100%', marginTop:8, padding:'10px', borderRadius:12, border:'1px solid var(--pa-line)', background:'#fff', color:'var(--pa-muted)', fontFamily:'var(--pa-body)', fontSize:13, cursor:'pointer' }}>
            Limpar os meus dias
          </button>
        )}

        {/* estado do grupo */}
        <div style={{ marginTop:18, background:'#fff', borderRadius:16, border:'1px solid var(--pa-line)', overflow:'hidden' }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', padding:'12px 16px 6px' }}>
            Estado do grupo · {inMembers.filter((m) => submittedIds.includes(m.id)).length}/{totalIn}
          </div>
          {allMembers.map((m) => {
            const rsvpState = (appData.rsvp || {})[m.id];
            const submitted = submittedIds.includes(m.id);
            const isInterested = rsvpState === 'in' || rsvpState === 'maybe';
            const isOut = rsvpState === 'out';
            let pill;
            if (isOut) pill = <Pill tone="muted" size="sm">sem interesse</Pill>;
            else if (isInterested) pill = submitted ? <Pill tone="success" size="sm">✓ pronto</Pill> : <Pill tone="muted" size="sm">a marcar…</Pill>;
            else pill = <Pill tone="muted" size="sm">sem responder</Pill>;
            return (
              <div key={m.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'9px 16px', borderTop:'1px solid var(--pa-line)', opacity: isInterested ? 1 : 0.55 }}>
                <Avatar member={m} size={28} />
                <span style={{ flex:1, minWidth:0, fontSize:13.5, color:'var(--pa-ink)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{m.name}</span>
                {pill}
              </div>
            );
          })}
        </div>
        <div style={{ marginTop:12 }}>
          <DayPeoplePanel peopleByDay={peopleByDay} total={totalIn} limit={4} />
        </div>
      </div>
    </MShell>
  );
}

// PHASE 7 — Trancar datas
function MPhase7({ me, onLogout, onOpenChat }) {
  const appData = useAppStore();
  const locked = appData.locked;
  const allAvail = appData.avail || {};
  // Datas decidem-se com a disponibilidade dos INTERESSADOS (não muda ao trancar).
  const inMembers = (typeof getInterestedMembers === 'function') ? getInterestedMembers(appData) : getAllMembers();
  const totalIn = inMembers.length || getAllMembers().length;
  const inIds = new Set(inMembers.map((m) => m.id));
  const [range, setRange] = mUseState({ from: null, to: null });
  const [mi, setMi] = mUseState(0) /* mês corrente primeiro */;

  // Heat map — só quem está "in"; chaves absolutas YYYY-MM-DD (números antigos normalizados)
  const heat = {};
  Object.entries(allAvail).forEach(([mid, arr]) => { if (!inIds.has(mid)) return; (arr||[]).forEach(d => { const k = paNormDay(d); heat[k] = (heat[k]||0) + 1; }); });
  // Quem marcou cada dia (nomes, só "in")
  const peopleByDay = {};
  Object.entries(allAvail).forEach(([mid, days]) => {
    if (!inIds.has(mid)) return;
    (days||[]).forEach(d => { const k = paNormDay(d); (peopleByDay[k] = peopleByDay[k] || []).push(memberById(mid) || { id:mid, name:'?', initials:'?', color:'var(--pa-muted)' }); });
  });
  const namesFor = (k) => (peopleByDay[k] || []).map(p => p.name).join(', ');
  // Seleção por 2 toques, igual ao desktop: 1º = início, 2º = fim.
  const pickDay = (k) => setRange((r) => {
    if (!r.from || (r.from && r.to)) return { from: k, to: null };
    if (k >= r.from) return { from: r.from, to: k };
    return { from: k, to: null };
  });

  return (
    <MShell>
      <MHeader phase={3} onLogout={onLogout} onOpenChat={onOpenChat} />
      {locked ? (
        <>
          <MPhaseTitle kicker="Datas trancadas 🔒"
            title={<>Temos datas!<br/><span style={{ color:'var(--pa-accent)' }}>{paRangeLabel(locked.from, locked.to)}.</span></>}
            sub={locked.monthLabel || ''} />
          <div className="pa-scroll" style={{ padding:'6px 16px 14px', flex:1, minHeight:0, overflow:'auto' }}>
            <div style={{ background:'var(--pa-ink)', color:'#fff', borderRadius:16, padding:20, textAlign:'center' }}>
              <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'rgba(255,255,255,0.6)', textTransform:'uppercase', marginBottom:8 }}>Confirmado</div>
              <div style={{ fontFamily:'var(--pa-display)', fontSize:34, fontWeight:600, letterSpacing:-1 }}>{paRangeLabel(locked.from, locked.to)}</div>
              <div style={{ marginTop:4, opacity:0.7 }}>{paDaySpan(locked.from, locked.to)} {paDaySpan(locked.from, locked.to) === 1 ? 'dia' : 'dias'}</div>
            </div>
            <Btn variant="soft" size="sm" style={{ width:'100%', marginTop:12 }}
              onClick={() => window.paDownloadIcs()}>
              📅 Adicionar ao calendário
            </Btn>
            {me.isAdmin && (
              <Btn variant="ghost" size="sm" style={{ width:'100%', marginTop:8 }}
                onClick={() => AppStore.clearKey('locked')}>
                Destrancar
              </Btn>
            )}
          </div>
        </>
      ) : me.isAdmin ? (
        <>
          <MPhaseTitle kicker="Tu decides"
            title={<>Tranca os <br/><span style={{ color:'var(--pa-accent)' }}>melhores dias.</span></>}
            sub="Toca num dia para começar a seleção." />
          <div className="pa-scroll" style={{ padding:'6px 16px 14px', flex:1, minHeight:0, overflow:'auto' }}>
            <div style={{ background:'#fff', borderRadius:16, padding:16, border:'1px solid var(--pa-line)' }}>
              <Calendar dense pastDisabled mi={mi} onMonth={setMi} onCellClick={(d) => pickDay(paDayKey(PA_MONTHS[mi].y, PA_MONTHS[mi].m, d))} renderCell={(d, _i, past) => {
                const k = paDayKey(PA_MONTHS[mi].y, PA_MONTHS[mi].m, d);
                const n = heat[k] || 0;
                const inRange = range.from && k >= range.from && k <= (range.to || range.from);
                const intensity = totalIn > 0 ? n/totalIn : 0;
                return (
                  <div style={{ width:'100%', height:'100%', borderRadius:7,
                    opacity: past ? 0.5 : 1,
                    background: inRange ? 'var(--pa-ink)' : past ? 'rgba(31,26,20,0.03)' : intensity > 0 ? `rgba(217,119,87,${0.10+intensity*0.6})` : '#fff',
                    color: inRange ? '#fff' : past ? 'var(--pa-muted)' : 'var(--pa-ink)',
                    border: intensity===0&&!inRange ? '1px solid var(--pa-line)' : 'none',
                    display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
                    <div style={{ fontFamily:'var(--pa-body)', fontSize:12, fontWeight:600 }}>{d}</div>
                    {n > 0 && <div style={{ fontFamily:'var(--pa-mono)', fontSize:8, color: inRange?'rgba(255,255,255,0.7)':'var(--pa-muted)' }}>{n}/{totalIn}</div>}
                  </div>
                );
              }} />
            </div>
            <div style={{ marginTop:12 }}>
              <DayPeoplePanel peopleByDay={peopleByDay} total={totalIn} limit={4} title="Quem está livre em cada dia" />
            </div>
            {range.from && (
              <div style={{ background:'#fff', borderRadius:14, padding:14, marginTop:12, border:'1px solid var(--pa-line)' }}>
                <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Seleção</div>
                <div style={{ fontFamily:'var(--pa-display)', fontSize:22, fontWeight:600, marginTop:4 }}>{paRangeLabel(range.from, range.to || range.from)}</div>
                <div style={{ display:'flex', gap:6, marginTop:10 }}>
                  <Btn variant="ghost" size="sm" style={{ flex:1 }} onClick={() => setRange((r)=>({ from: paDayShift(r.from,-1), to: r.to }))}>← início −1</Btn>
                  <Btn variant="ghost" size="sm" style={{ flex:1 }} onClick={() => setRange((r)=>({ from: r.from, to: paDayShift(r.to || r.from, 1) }))}>fim +1 →</Btn>
                </div>
                <Btn variant="accent" style={{ width:'100%', marginTop:10 }}
                  onClick={() => { const f=range.from, t=range.to||range.from; AppStore.setLockedDates(f, t, paRangeLabel(f, t)); }}>
                  Trancar {range.to && range.to !== range.from ? 'estes dias' : 'este dia'} 🔒
                </Btn>
              </div>
            )}
          </div>
        </>
      ) : (
        <>
          <MPhaseTitle kicker="A aguardar"
            title={<>Admin está<br/><span style={{ color:'var(--pa-accent)' }}>a escolher os dias.</span></>}
            sub="Já submeteste disponibilidade. Brevemente sabes." />
          <div style={{ padding:'6px 16px', flex:1 }}>
            <div style={{ padding:16, background:'rgba(31,26,20,0.04)', borderRadius:14, fontSize:13, color:'var(--pa-muted)', textAlign:'center' }}>
              Aguarda que o {memberById(D.adminId)?.name || 'admin'} tranche as datas.
            </div>
          </div>
        </>
      )}
    </MShell>
  );
}

// PHASE 8 — Planeamento
// ─────────────────────────────────────────────────────────────
// MOBILE — Fase 4: Confirmar presença
// ─────────────────────────────────────────────────────────────
function MPhaseConfirm({ me, onLogout, onOpenChat }) {
  const appData = useAppStore();
  const locked = appData.locked || null;
  const rangeLabel = locked ? paRangeLabel(locked.from, locked.to) : '—';
  const interested = (typeof getInterestedMembers === 'function') ? getInterestedMembers(appData) : getAllMembers();
  const stateOf = (id) => (typeof memberGoing === 'function') ? memberGoing(appData, id) : undefined;
  const going = interested.filter((m) => stateOf(m.id) === true);
  const notGoing = interested.filter((m) => stateOf(m.id) === false);
  const pending = interested.filter((m) => stateOf(m.id) === undefined);
  const myState = stateOf(me.id);
  const meInterested = interested.some((m) => m.id === me.id);
  const answer = (uid, val) => AppStore.setGoing(uid, val);

  return (
    <MShell>
      <MHeader phase={4} onLogout={onLogout} onOpenChat={onOpenChat} />
      <MPhaseTitle kicker="Confirmar presença"
        title={<>Quem <span style={{ color:'var(--pa-accent)' }}>vai?</span></>}
        sub={locked ? `A aventura é de ${rangeLabel}.` : 'As datas ainda não estão trancadas.'} />
      <div className="pa-scroll" style={{ padding:'6px 16px 14px', flex:1, minHeight:0, overflow:'auto' }}>
        {locked && meInterested && myState === undefined && (
          <div style={{ background:'#fff', border:'1.5px solid var(--pa-accent)', borderRadius:16, padding:16, marginBottom:14 }}>
            <div style={{ fontFamily:'var(--pa-display)', fontSize:19, fontWeight:600, marginBottom:4 }}>Vais? A aventura é de {rangeLabel}.</div>
            <div style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)', marginBottom:12 }}>Assim sabemos já quem conta para o destino e as contas.</div>
            <div style={{ display:'flex', gap:8 }}>
              <Btn variant="accent" size="lg" style={{ flex:1 }} onClick={() => answer(me.id, true)}>Vou</Btn>
              <Btn variant="ghost" size="lg" style={{ flex:1 }} onClick={() => answer(me.id, false)}>Não vou</Btn>
            </div>
          </div>
        )}
        {locked && meInterested && myState !== undefined && (

            const s = stateOf(m.id);
            return (

}
