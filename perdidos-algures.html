        <Logo size={15} compact={narrow} />
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <button onClick={()=>setProfileOpen(true)} title="Editar perfil" style={{
            display:'flex', alignItems:'center', gap:8, padding:'4px 4px 4px 10px', borderRadius:999,
            border:'1px solid var(--pa-line)', background:'#fff', cursor:'pointer' }}>
            {!narrow && <span style={{ fontFamily:'var(--pa-body)', fontSize:13, fontWeight:600 }}>{me.name}</span>}
            <Avatar member={me} size={30} />
          </button>
          <button onClick={auth.logout} title="Sair" style={{ width:36, height:36, borderRadius:999, background:'#fff',
            border:'1px solid var(--pa-line)', cursor:'pointer', padding:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M9 4V2.5a1 1 0 00-1-1H3a1 1 0 00-1 1v9a1 1 0 001 1h5a1 1 0 001-1V10" stroke="var(--pa-ink)" strokeWidth="1.3" strokeLinecap="round"/>
              <path d="M6 7h7m0 0L10.5 4.5M13 7l-2.5 2.5" stroke="var(--pa-ink)" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      {/* Conteúdo */}
      <div className="pa-scroll" style={{ flex:1, minHeight:0, overflow:'auto', padding:narrow?'24px 18px 40px':'40px 48px 60px', maxWidth:1100, width:'100%', margin:'0 auto', boxSizing:'border-box' }}>
        <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', gap:12, marginBottom:24, flexWrap:'wrap' }}>
          <div>
            <h1 style={{ fontFamily:'var(--pa-display)', fontSize:narrow?28:38, fontWeight:600, letterSpacing:-1, margin:0, lineHeight:1 }}>
              As tuas aventuras

            <p style={{ fontFamily:'var(--pa-body)', fontSize:14, color:'var(--pa-muted)', margin:'8px 0 0' }}>
              {isAdmin ? 'Cria, gere e entra nas edições.' : 'Escolhe uma edição para participar.'}
            </p>
          </div>
          {isAdmin && (
            <Btn variant="accent" onClick={()=>{ setEditingEdition(null); setEditorOpen(true); }} icon={<span style={{ fontSize:16 }}>+</span>}>
              Nova edição
            </Btn>
          )}
        </div>

        {active.length === 0 && (
          <div style={{ padding:'56px 0', textAlign:'center', color:'var(--pa-muted)' }}>
            <div style={{ fontSize:40, marginBottom:8 }}>🗺️</div>
            <div style={{ fontFamily:'var(--pa-body)', fontSize:15 }}>
              {isAdmin ? 'Ainda não há edições. Cria a primeira!' : 'Ainda não há edições ativas. Aguarda o admin.'}
            </div>
          </div>

        <div className="pa-stagger" style={{ display:'grid', gridTemplateColumns: narrow ? '1fr' : 'repeat(auto-fill, minmax(320px, 1fr))', gap:16 }}>

      <ProfileEditor open={profileOpen} onClose={()=>setProfileOpen(false)} auth={auth} />
      <EditionEditor open={editorOpen} onClose={()=>setEditorOpen(false)} edition={editingEdition} />
    </div>
  );
}

Object.assign(window, { PAModal, ProfileEditor, EditionEditor, EditionCard, EditionHub });
</script>

<script type="text/babel">// Perdidos Algures — Live app entry. Boots the auth gate and routes the
// authenticated user into the desktop or mobile shell based on viewport.
// This is the default landing UI when there is no ?canvas=1 query param.

const { useState: lUseState, useEffect: lUseEffect } = React;

function useViewport() {
  const [w, setW] = lUseState(typeof window !== 'undefined' ? window.innerWidth : 1440);
  lUseEffect(() => {
    const r = () => setW(window.innerWidth);
    window.addEventListener('resize', r);
    return () => window.removeEventListener('resize', r);
  }, []);
  return w;
}

// Convert an auth session into a member-shaped object the rest of the app
// expects. Usa sempre o id real (UUID do Supabase) para que chat, votos,
// RSVP e disponibilidade fiquem ligados ao profile correto.
function sessionToMember(session) {
  if (!session) return null;
  return {
    id: session.id,
    name: session.displayName || session.name,
    loginName: session.name,
    initials: session.initials || ((session.displayName||session.name) ? (session.displayName||session.name)[0].toUpperCase() : '?'),
    color: session.color || '#1f1a14',
    photoDataUrl: session.photoDataUrl,
    isAdmin: !!session.isAdmin,
  };
}

function OnboardingModal({ onClose }) {
  const [step, setStep] = lUseState(0);
  const steps = [
    { emoji:'🧭', title:'Bem-vindo ao Perdidos Algures', body:'A app para o teu grupo decidir uma viagem em conjunto — sem confusão no chat de sempre.' },
    { emoji:'✅', title:'Tudo por fases', body:'Primeiro dizem quem entra, depois sugerem e votam o destino e o alojamento, marcam disponibilidade e trancam as datas.' },
    { emoji:'🎲', title:'Empates? À sorte ou por pontos', body:'Se houver empate, o admin desempata com uma roleta justa ou uma votação por pontos.' },
    { emoji:'💸', title:'Contas tipo Splitwise', body:'No fim, registam as despesas (incluindo o Airbnb), e a app diz exatamente quem paga quanto a quem.' },
  ];
  const s = steps[step];
  const last = step === steps.length - 1;
  const finish = () => { try { localStorage.setItem('pa-onboarded', '1'); } catch {} onClose(); };
  return (
    <PAModal open={true} onClose={finish} title="">
      <div style={{ textAlign:'center', padding:'4px 0' }}>
        <div key={step} className="pa-scale" style={{ fontSize:48, marginBottom:14 }}>{s.emoji}</div>
        <div style={{ fontFamily:'var(--pa-display)', fontSize:22, fontWeight:600, letterSpacing:-0.4, marginBottom:10 }}>{s.title}</div>
        <div style={{ fontFamily:'var(--pa-body)', fontSize:14.5, color:'var(--pa-muted)', lineHeight:1.55, maxWidth:340, margin:'0 auto' }}>{s.body}</div>
        <div style={{ display:'flex', justifyContent:'center', gap:6, margin:'20px 0' }}>
          {steps.map((_, i) => (
            <div key={i} style={{ width: i===step?20:7, height:7, borderRadius:7, background: i===step?'var(--pa-accent)':'var(--pa-line)', transition:'all .25s' }} />
          ))}
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <Btn variant="ghost" onClick={finish} style={{ flex:1 }}>Saltar</Btn>
          <Btn variant="accent" onClick={()=> last ? finish() : setStep(step+1)} style={{ flex:2 }}>{last ? 'Começar!' : 'Seguinte'}</Btn>
        </div>
      </div>
    </PAModal>
  );
}

function LiveApp() {
  const auth = useAuth();
  const w = useViewport();
  const isDesktop = w >= 1100;
  // Re-renderiza quando a lista de edições muda (ex: eliminada externamente)
  const editions = useEditions();
  const [inEdition, setInEdition] = lUseState(() => !!EditionStore.activeId() && !!EditionStore.active());
  const [profileOpen, setProfileOpen] = lUseState(false);
  const [showOnboarding, setShowOnboarding] = lUseState(false);

  // Mostra onboarding na primeira visita (após login)
  lUseEffect(() => {
    if (auth.user) {
      try { if (!localStorage.getItem('pa-onboarded')) setShowOnboarding(true); } catch {}
    }
  }, [auth.user]);

  // Se a edição ativa desaparece (eliminada), volta automaticamente ao hub
  lUseEffect(() => {
    if (inEdition && !EditionStore.active()) {
      setInEdition(false);
    }
  }, [editions, inEdition]);

  if (!auth.user) {
    return (
      <div className="pa-vh" style={{ width: '100vw' }}>
        <AuthGate auth={auth} narrow={!isDesktop} />
      </div>
    );
  }

  const me = sessionToMember(auth.user);
  const viewAs = auth.user.isAdmin ? 'admin' : 'member';

  // Hub de edições (landing após login OU se edição ativa desapareceu)
  if (!inEdition || !EditionStore.active()) {
    return (
      <div className="pa-vh" style={{ width:'100vw', overflow:'auto' }}>
        <EditionHub auth={auth} narrow={!isDesktop} onEnterEdition={() => setInEdition(true)} />
        {showOnboarding && <OnboardingModal onClose={()=>setShowOnboarding(false)} />}
      </div>
    );
  }

  const backToHub = () => { EditionStore.setActive(null); setInEdition(false); };

  if (isDesktop) {
    return (
      <div className="pa-vh" style={{ width: '100vw' }}>
        <DesktopShell viewAs={viewAs} liveUser={me} onLogout={auth.logout} onBackToHub={backToHub} onEditProfile={()=>setProfileOpen(true)} />
        <ProfileEditor open={profileOpen} onClose={()=>setProfileOpen(false)} auth={auth} />
      </div>
    );
  }

  return (
    <div className="pa-vh" style={{ width: '100vw', background: 'var(--pa-ink)', display: 'flex', alignItems: 'stretch', justifyContent: 'center' }}>
      <div style={{ width: '100%', maxWidth: 520, background: 'var(--pa-bg)', display: 'flex', flexDirection: 'column', boxShadow: '0 0 60px rgba(0,0,0,0.3)' }}>
        <MobileApp viewAs={viewAs} liveUser={me} onLogout={auth.logout} onBackToHub={backToHub} onEditProfile={()=>setProfileOpen(true)} />
        <ProfileEditor open={profileOpen} onClose={()=>setProfileOpen(false)} auth={auth} />
      </div>
    </div>
  );
}

Object.assign(window, { LiveApp, useViewport, sessionToMember });
</script>

<script type="text/babel" data-presets="env,react">
  const { useState, useEffect } = React;

  // ── Route: ?canvas=1 → design canvas; default → live app ───
  const isCanvasMode = new URLSearchParams(location.search).has('canvas');

  // ── Theme defaults ────────────────────────────────────────
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "palette": ["#f5f1ea", "#1f1a14", "#d97757"],
    "viewAs": "admin",
    "showMobile": true,
    "showAuth": true
  }/*EDITMODE-END*/;

  const PALETTES = [
    ['#f5f1ea', '#1f1a14', '#d97757'], // warm clay (default)
    ['#fdf6e3', '#2d2410', '#c8804a'], // sun-bleached
    ['#eef0e8', '#1c2418', '#5a8a5e'], // moss
    ['#f0eae4', '#1a1714', '#3a5a7a'], // tide
    ['#fafaf7', '#0f0f0e', '#ff5a36'], // editorial
  ];

  function applyPalette(p) {
    const r = document.documentElement.style;
    r.setProperty('--pa-bg', p[0]);
    r.setProperty('--pa-ink', p[1]);
    r.setProperty('--pa-accent', p[2]);
    r.setProperty('--pa-muted', mix(p[0], p[1], 0.45));
    r.setProperty('--pa-line', mix(p[0], p[1], 0.10));
  }
  function mix(a, b, t) {
    const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
    const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
    const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
    const r = Math.round(ar + (br - ar) * t);
    const g = Math.round(ag + (bg - ag) * t);
    const bl = Math.round(ab + (bb - ab) * t);
    return '#' + ((1 << 24) | (r << 16) | (g << 8) | bl).toString(16).slice(1);
  }

  function PhoneFrame({ children }) { return <IOSDevice width={402} height={874}>{children}</IOSDevice>; }

  // ── Static auth artboard previews (for the canvas only) ──
  function StaticAuthPreview({ mode, narrow }) {
    // Dummy auth object — never resolves, just shows the form chrome
    const fakeAuth = { login: async () => {}, register: async () => {}, user: null, logout: () => {} };
    if (mode === 'login') return <LoginScreen auth={fakeAuth} onSwitch={() => {}} narrow={narrow} />;
    return <RegisterScreen auth={fakeAuth} onSwitch={() => {}} narrow={narrow} />;
  }

  // ── Live-app root (default landing) ───────────────────────
  function LiveRoot() {
    const [t] = useTweaks({ palette: TWEAK_DEFAULTS.palette });
    useEffect(() => { applyPalette(TWEAK_DEFAULTS.palette); }, []);
    return <LiveApp />;
  }

  // ── Canvas root (design review) ───────────────────────────
  function CanvasRoot() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    useEffect(() => { applyPalette(t.palette); }, [t.palette]);
    const v = t.viewAs;

    const desktopArtboards = [
      { id: 'd1', label: 'Fase 01 · RSVP',                phase: 1 },
      { id: 'd2', label: 'Fase 02 · Sugerir locais',      phase: 2 },
      { id: 'd3', label: 'Fase 03 · Votar local',         phase: 3 },
      { id: 'd4', label: 'Fase 04 · Sugerir alojamento',  phase: 4 },
      { id: 'd5', label: 'Fase 05 · Votar alojamento (empate)', phase: 5 },
      { id: 'd6', label: 'Fase 06 · Disponibilidade',     phase: 6 },
      { id: 'd7', label: 'Fase 07 · Trancar datas',       phase: 7 },
      { id: 'd8', label: 'Fase 08 · Planeamento',         phase: 8 },
    ];

    const mobileArtboards = [
      { id: 'm1', label: 'Fase 01 · RSVP',          phase: 1 },
      { id: 'm2', label: 'Fase 02 · Locais',        phase: 2 },
      { id: 'm3', label: 'Fase 03 · Votar local',   phase: 3 },
      { id: 'm4', label: 'Fase 04 · Alojamentos',  phase: 4 },
      { id: 'm5', label: 'Fase 05 · Empate',       phase: 5 },
      { id: 'm6', label: 'Fase 06 · Datas',        phase: 6 },
      { id: 'm8', label: 'Fase 08 · Planear',      phase: 8 },
    ];

    return (
      <>
        <DesignCanvas>
          {t.showAuth && (
            <DCSection id="auth" title="Contas & Acesso"
              subtitle='Entrada do site: registo com nome + foto + password. Admin é "Miguel" com password fixa. (Detalhes técnicos no README.md)'>
              <DCArtboard id="login-desktop" label="Login · desktop" width={1100} height={760}>
                <StaticAuthPreview mode="login" narrow={false} />
              </DCArtboard>
              <DCArtboard id="register-desktop" label="Registo · desktop" width={1100} height={760}>
                <StaticAuthPreview mode="register" narrow={false} />
              </DCArtboard>
              <DCArtboard id="login-mobile" label="Login · mobile" width={402} height={780}>
                <StaticAuthPreview mode="login" narrow={true} />
              </DCArtboard>
              <DCArtboard id="register-mobile" label="Registo · mobile" width={402} height={780}>
                <StaticAuthPreview mode="register" narrow={true} />
              </DCArtboard>
            </DCSection>
          )}

          <DCSection id="desktop" title="Perdidos Algures · Desktop"
            subtitle="Seis fases. Miguel inicia, o grupo decide, Miguel tranca. Toggle 'Ver como' nos tweaks para alternar admin/membro.">
            {desktopArtboards.map((a) => (
              <DCArtboard key={a.id} id={a.id} label={a.label} width={1440} height={900}>
                <DesktopShell viewAs={v} phase={a.phase} />
              </DCArtboard>
            ))}
          </DCSection>

          {t.showMobile && (
            <DCSection id="mobile" title="Mobile · companion"
              subtitle="Versão de telemóvel pensada para responder em segundos a meio do dia.">
              {mobileArtboards.map((a) => (
                <DCArtboard key={a.id} id={a.id} label={a.label} width={402} height={874}>
                  <PhoneFrame><MobileApp viewAs={v} phase={a.phase} /></PhoneFrame>
                </DCArtboard>
              ))}
            </DCSection>
          )}
        </DesignCanvas>

        <TweaksPanel title="Tweaks">
          <TweakSection label="Quem está a ver">
            <TweakRadio label="Ver como" value={v}
              options={[{ value: 'admin', label: '👑 Miguel' }, { value: 'member', label: '🥾 Rita' }]}
              onChange={(value) => setTweak('viewAs', value)} />
          </TweakSection>
          <TweakSection label="Paleta">
            <TweakColor label="Tema" value={t.palette} options={PALETTES}
              onChange={(value) => setTweak('palette', value)} />
          </TweakSection>
          <TweakSection label="Secções no canvas">
            <TweakToggle label="Contas & Acesso" value={t.showAuth} onChange={(v) => setTweak('showAuth', v)} />
            <TweakToggle label="Mobile companion" value={t.showMobile} onChange={(v) => setTweak('showMobile', v)} />
          </TweakSection>
        </TweaksPanel>
      </>
    );
  }

  const RootComp = isCanvasMode ? CanvasRoot : LiveRoot;

  // Error Boundary: se um componente rebentar, mostra um ecrã de recuperação
  // em vez de deixar a app em branco (estabilidade).
  class PAErrorBoundary extends React.Component {
    constructor(props) { super(props); this.state = { hasError: false }; }
    static getDerivedStateFromError() { return { hasError: true }; }
    componentDidCatch(err, info) { console.error('[PA] erro de runtime apanhado:', err, info); }
    render() {
      if (this.state.hasError) {
        return React.createElement('div', { style:{ position:'fixed', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:16, background:'#fcf9f3', padding:24, textAlign:'center', fontFamily:'system-ui,-apple-system,sans-serif' } },
          React.createElement('div', { style:{ fontSize:40 } }, '🧭'),
          React.createElement('div', { style:{ fontFamily:"'Bricolage Grotesque',system-ui,sans-serif", fontSize:22, fontWeight:600, color:'#1f1a14' } }, 'Algo encravou'),
          React.createElement('div', { style:{ fontSize:14, color:'#8a7e6e', maxWidth:320, lineHeight:1.5 } }, 'Houve um problema a mostrar esta parte. Os teus dados estão guardados — é só recarregar.'),
          React.createElement('button', { onClick:()=>location.reload(), style:{ marginTop:8, padding:'12px 24px', borderRadius:999, border:'none', background:'#d97757', color:'#fff', cursor:'pointer', fontSize:14, fontWeight:600 } }, 'Recarregar')
        );
      }
      return this.props.children;
    }
  }

  const renderApp = () => ReactDOM.createRoot(document.getElementById('root'))
    .render(React.createElement(PAErrorBoundary, null, React.createElement(RootComp)));

  // Inicializa Supabase (AppStore + ChatStore) antes de renderizar
  initSupabase().then(renderApp).catch(err => {
    console.error('[PA] Erro ao iniciar Supabase:', err);
    renderApp(); // Renderiza mesmo assim para não bloquear a app
  });
</script>
</body>
</html>
