}

function Stack({ members, max = 4, size = 28, ringColor }) {
  return (
    <div style={{ display: 'inline-flex' }}>
      {members.slice(0, max).map((m, i) => (
        <div key={m.id} style={{ marginLeft: i === 0 ? 0 : -size * 0.32, zIndex: max - i }}>
          <Avatar member={m} size={size} ring ringColor={ringColor} />
        </div>
      ))}
      {members.length > max && (
        <div style={{
          marginLeft: -size * 0.32, width: size, height: size, borderRadius: size,
          background: '#fff', color: 'var(--pa-ink)',
          fontFamily: 'var(--pa-body)', fontWeight: 600, fontSize: size * 0.36,
          display: 'flex', alignItems: 'center', justifyContent: 'center',

}

// ─────────────────────────────────────────────────────────────
// Pill / Btn / Field

function Pill({ children, tone = 'default', size = 'md' }) {
  const tones = {
    default: { bg: 'rgba(31,26,20,0.06)', fg: 'var(--pa-ink)' },
    accent:  { bg: 'rgba(217,119,87,0.14)', fg: 'var(--pa-accent)' },
    muted:   { bg: 'transparent', fg: 'var(--pa-muted)' },
    success: { bg: 'rgba(107,142,111,0.16)', fg: '#3d5e44' },
    warn:    { bg: 'rgba(217,119,87,0.20)', fg: '#8a4220' },
    dark:    { bg: 'var(--pa-ink)', fg: '#fff' },
  };
  const sizes = {
    sm: { pad: '3px 8px', fs: 10.5 },
    md: { pad: '4px 10px', fs: 11.5 },
    lg: { pad: '6px 14px', fs: 13 },
  };
  const t = tones[tone], s = sizes[size];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: s.pad, borderRadius: 999,
      background: t.bg, color: t.fg,
      fontFamily: 'var(--pa-body)', fontSize: s.fs, fontWeight: 500,
      letterSpacing: 0.1, whiteSpace: 'nowrap',
    }}>{children}</span>
  );
}

function Btn({ children, onClick, variant = 'primary', size = 'md', icon, style = {}, disabled = false }) {
  const variants = {
    primary: { bg: 'var(--pa-ink)', fg: '#fff', border: 'none' },
    accent:  { bg: 'var(--pa-accent)', fg: '#fff', border: 'none' },
    ghost:   { bg: 'transparent', fg: 'var(--pa-ink)', border: '1px solid var(--pa-line)' },
    soft:    { bg: '#fff', fg: 'var(--pa-ink)', border: '1px solid var(--pa-line)' },
    danger:  { bg: 'transparent', fg: '#8a4220', border: '1px solid #8a4220' },
  };
  const sizes = {
    sm: { pad: '6px 12px', fs: 12, h: 30 },
    md: { pad: '10px 16px', fs: 13.5, h: 40 },
    lg: { pad: '14px 22px', fs: 15, h: 52 },
  };
  const v = variants[variant], s = sizes[size];
  return (
    <button onClick={onClick} disabled={disabled} style={{
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
      padding: s.pad, height: s.h, borderRadius: 999,
      background: v.bg, color: v.fg, border: v.border,
      fontFamily: 'var(--pa-body)', fontSize: s.fs, fontWeight: 600,
      letterSpacing: -0.1, cursor: disabled ? 'default' : 'pointer',
      opacity: disabled ? 0.4 : 1,
      transition: 'transform .12s, opacity .12s, background .12s',
      ...style,
    }}>{icon}{children}</button>
  );
}

function Field({ label, placeholder, value, onChange, textarea, prefix, maxLength }) {
  const Tag = textarea ? 'textarea' : 'input';
  const limit = maxLength || (textarea ? 500 : 120);
  return (
    <label style={{ display: 'block', minWidth: 0, width: '100%' }}>

          style={{

            fontFamily: 'var(--pa-body)', fontSize: 16, color: 'var(--pa-ink)',
          }} />
      </div>

}

// ─────────────────────────────────────────────────────────────
// PhotoSlot — striped placeholder

function PhotoSlot({ accent = '#c8956d', label, height = 140, radius = 14, style = {} }) {

// Calendar — month grid with custom cell renderer.

function Calendar({ grid = D.phase6.monthGrid, monthLabel = D.phase6.monthLabel,

                  fontFamily: 'var(--pa-body)', fontSize: dense ? 12 : 14, fontWeight: 500,
                  color: 'var(--pa-ink)',

              ))}
            </button>
          );
        })}
      </div>
    </div>
  );
}

(function setupConnectivityIndicator() {
  let bar = null;
  const show = () => {
    if (bar) return;
    bar = document.createElement('div');
    bar.textContent = 'Sem ligação — as alterações podem não guardar';
    bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99998;background:#8a4220;color:#fff;' +
      'padding:8px 14px;font-family:system-ui,sans-serif;font-size:12.5px;font-weight:600;text-align:center;' +

    document.body.appendChild(bar);
    requestAnimationFrame(() => { if (bar) bar.style.transform = 'translateY(0)'; });
  };
  const hide = (reconnected) => {
    if (bar) { const b = bar; bar = null; b.style.transform = 'translateY(-100%)'; setTimeout(() => b.remove(), 320); }
    if (reconnected && window._paToast) window._paToast('Ligação restabelecida', 'success');
  };
  try {
    window.addEventListener('offline', show);
    window.addEventListener('online', () => hide(true));
    if (navigator.onLine === false) show();
  } catch (e) {}
})();

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2,'0')).join('');
}

// ─────────────────────────────────────────────────────────────
// AppStore — app_data (key/value) no Supabase.
// As CHAVES de cache estão alinhadas com o que os componentes lêem:
//   rsvp, locSuggs, accSuggs, locWinner, accWinner, locVotes, accVotes,
//   avail, locked, currentPhase, editionTitle/Number/Subtitle, planData, history
// ─────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────
// EditionStore — gere múltiplas edições (tabela editions).
// Cada edição tem o seu estado completo no campo jsonb `data`.

const EditionStore = {
  list() { return _editionsCache; },

    // Recarrega o cache do AppStore para a nova edição
    AppStore._syncFromActive();
    _editionsListeners.forEach(fn => fn(_editionsCache.slice()));
    _appListeners.forEach(fn => fn(AppStore._cache()));
  },
  _notify() { _editionsListeners.forEach(fn => fn(_editionsCache.slice())); },

  async fetchAll() {

    _editionsCache = data || [];

  },

  nextNumber() {

  async create({ number, title, subtitle }) {

  async update(id, fields) {

    if (error) throw new Error('Erro ao atualizar: ' + error.message);
    _editionsCache = _editionsCache.map(e => e.id === id ? data : e).sort((a,b)=>b.number-a.number);
    this._notify();
    if (id === _activeEditionId) { AppStore._syncFromActive(); _appListeners.forEach(fn => fn(AppStore._cache())); }
    return data;

  subscribe(fn)   { _editionsListeners.add(fn); },

  _pollingInterval: null,
  _visibilitySetup: false,
  _lastVisPoll: 0,

// ─────────────────────────────────────────────────────────────
// AppStore — opera sobre a EDIÇÃO ATIVA (EditionStore.active()).
// O cache (_appCache) reflete o campo `data` da edição ativa + currentPhase.
// A interface pública (getRsvp, setRsvp, etc.) mantém-se igual.
// ─────────────────────────────────────────────────────────────
let _appCache = {};
const _appListeners = new Set();

const AppStore = {
  _cache() { return _appCache || {}; },
  _notify() { _appListeners.forEach(fn => fn({ ...this._cache() })); },

  // Reconstrói o cache a partir da edição ativa
  _syncFromActive() {
    const ed = (typeof EditionStore !== 'undefined') ? EditionStore.active() : null;
    if (!ed) { _appCache = {}; return; }
    _appCache = {
      ...(ed.data || {}),
      currentPhase: ed.current_phase || 1,
      editionTitle: ed.title,
      editionSubtitle: ed.subtitle,
      editionNumber: ed.number,
    };
  },

  // Grava uma chave de dados na edição ativa (substitui o valor inteiro).
  // Usar APENAS para valores primitivos ou substituições completas.
  // Para edições concorrentes em objects/arrays, usar _merge/_appendToArray/_modifyArray.
  async _set(key, value) {
    const ed = EditionStore.active();
    if (!ed) { console.warn('[PA AppStore] sem edição ativa'); return; }
    _appCache = { ...(this._cache()), [key]: value };
    this._notify();
    const newData = { ...(ed.data || {}) };
    newData[key] = value;
    ed.data = newData;
    await this._updateWithRetry(ed.id, newData, key);
  },

  // Escreve no Supabase com até 3 tentativas e backoff exponencial (300ms, 600ms).
  // Resiliente a falhas de rede transitórias; só avisa o utilizador se todas falharem.
  async _updateWithRetry(edId, newData, key) {
    const attempts = 3;
    for (let i = 0; i < attempts; i++) {
      try {
        const { error } = await _sb.from('editions').update({ data: newData }).eq('id', edId);
        if (!error) return true;
        if (i === attempts - 1) {
          console.error('[PA AppStore] erro a guardar', key, error.message);
          if (window._paToast) window._paToast('Não consegui guardar. Verifica a ligação.');
          return false;
        }
      } catch (e) {
        if (i === attempts - 1) {
          console.error('[PA AppStore] exceção a guardar', key, e.message);
          if (window._paToast) window._paToast('Não consegui guardar. Verifica a ligação.');
          return false;
        }
      }
      await new Promise(r => setTimeout(r, 300 * Math.pow(2, i)));
    }
    return false;
  },

  // Sincroniza o cache local a partir de novos dados da edição
  _applyNewData(ed, newData) {
    ed.data = newData;
    _appCache = {
      ...newData,
      currentPhase: ed.current_phase || 1,
      editionTitle: ed.title,
      editionSubtitle: ed.subtitle,
      editionNumber: ed.number,
    };
    this._notify();
  },

  // Fallback read-modify-write directo (quando as RPC não existem na BD).
  // Não é 100% atómico mas funciona; usado se o supabase-rpcs.sql ainda não correu.
  async _rmwFallback(key, transformFn, ed) {
    try {
      const { data: fresh } = await _sb.from('editions').select('data').eq('id', ed.id).single();
      const freshData = (fresh && fresh.data) || {};
      const newData = { ...freshData, [key]: transformFn(freshData[key]) };
      this._applyNewData(ed, newData);
      await this._updateWithRetry(ed.id, newData, key);
    } catch (e) {
      console.error('[PA AppStore] fallback falhou:', key, e.message);
      if (window._paToast) window._paToast('Erro ao guardar. Tenta de novo.');
    }
  },

  // Detecta se o erro é "função RPC não existe" (PostgREST PGRST202 ou 404)
  _isRpcMissing(error) {
    if (!error) return false;
    const msg = (error.message || '') + (error.code || '') + (error.hint || '');
    return /PGRST202|not exist|not found|404|schema cache|Could not find/i.test(msg);
  },

  // Merge profundo de chave-valor (para objects como votos, rsvp).
  // Tenta RPC atómica; se não existir, faz fallback read-modify-write.
  async _merge(key, deltaObj) {
    const ed = EditionStore.active();
    if (!ed) { console.warn('[PA AppStore] sem edição ativa'); return; }

    // Optimistic local update (UI feedback imediato)
    const localCurrent = this._cache()[key] || {};
    _appCache = { ...(this._cache()), [key]: { ...localCurrent, ...deltaObj } };
    this._notify();

    try {
      const { data: newData, error } = await _sb.rpc('edition_merge_field', {
        edition_id: ed.id, field_name: key, delta: deltaObj,
      });
      if (error) {
        // RPC indisponível → fallback
        return await this._rmwFallback(key, (cur) => ({ ...(cur || {}), ...deltaObj }), ed);
      }
      if (newData) this._applyNewData(ed, newData);
    } catch (e) {
      return await this._rmwFallback(key, (cur) => ({ ...(cur || {}), ...deltaObj }), ed);
    }
  },

  // Adiciona um item a um array atomicamente (dedup por id). Fallback se RPC faltar.
  async _appendToArray(key, item) {
    const ed = EditionStore.active();
    if (!ed) return;

    const localCurrent = this._cache()[key] || [];
    _appCache = { ...(this._cache()), [key]: [...localCurrent, item] };
    this._notify();

    try {
      const { data: newData, error } = await _sb.rpc('edition_append_array', {
        edition_id: ed.id, field_name: key, item: item,
      });
      if (error) {
        return await this._rmwFallback(key, (cur) => {
          const arr = cur || [];
          if (item && item.id && arr.some(x => x && x.id === item.id)) return arr;
          return [...arr, item];
        }, ed);
      }
      if (newData) this._applyNewData(ed, newData);
    } catch (e) {
      return await this._rmwFallback(key, (cur) => {
        const arr = cur || [];
        if (item && item.id && arr.some(x => x && x.id === item.id)) return arr;
        return [...arr, item];
      }, ed);
    }
  },

  // Remove items de um array por id atomicamente. Fallback se RPC faltar.
  async _removeFromArray(key, itemId) {
    const ed = EditionStore.active();
    if (!ed) return;

    const localCurrent = this._cache()[key] || [];
    _appCache = { ...(this._cache()), [key]: localCurrent.filter(x => x && x.id !== itemId) };
    this._notify();

    try {
      const { data: newData, error } = await _sb.rpc('edition_remove_from_array', {
        edition_id: ed.id, field_name: key, item_id: itemId,
      });
      if (error) {
        return await this._rmwFallback(key, (cur) => (cur || []).filter(x => !x || x.id !== itemId), ed);
      }
      if (newData) this._applyNewData(ed, newData);
    } catch (e) {
      return await this._rmwFallback(key, (cur) => (cur || []).filter(x => !x || x.id !== itemId), ed);
    }
  },

  // Modifica um array com função custom (fallback puro, sem RPC).
  async _modifyArray(key, fn) {
    const ed = EditionStore.active();
    if (!ed) return;
    const localCurrent = this._cache()[key] || [];
    _appCache = { ...(this._cache()), [key]: fn(localCurrent) };
    this._notify();
    await this._rmwFallback(key, (cur) => fn(cur || []), ed);
  },

  async clearKey(key) {
    const ed = EditionStore.active();
    if (!ed) return;
    _appCache = { ...(this._cache()) };
    delete _appCache[key];
    this._notify();
    const newData = { ...(ed.data || {}) };
    delete newData[key];
    ed.data = newData;
    await _sb.from('editions').update({ data: newData }).eq('id', ed.id);
  },

  async init() {
    // O EditionStore.init() já populou e sincronizou; nada a fazer aqui.
    this._syncFromActive();
  },

  load() { return this._cache(); },

  // ── Edição (metadata) ──
  getEdition() {
    const d = this._cache();
    return { title:d.editionTitle||'Nova Aventura', subtitle:d.editionSubtitle||'Algures no mundo.', number:d.editionNumber||1 };
  },
  async setEdition(t,s,n) {
    const ed = EditionStore.active();
    if (!ed) return;
    await EditionStore.update(ed.id, { title:t, subtitle:s, number:n||ed.number });
  },

  // ── Fase (guardada em editions.current_phase) ──
  getPhase()        { return this._cache().currentPhase || 1; },
  async setPhase(n) {
    const ed = EditionStore.active();
    if (!ed) return;
    _appCache = { ...(this._cache()), currentPhase: n };
    this._notify();
    ed.current_phase = n;
    await EditionStore.update(ed.id, { current_phase: n });
  },

  // ── RSVP ──
  setRsvp(uid,st)  { return this._merge('rsvp', { [uid]:st }); },
  getRsvp(uid)     { return this._cache().rsvp?.[uid]||null; },
  getAllRsvp()     { return this._cache().rsvp||{}; },

  // ── Sugestões de localização ──
  getLocSuggestions()           { return this._cache().locSuggs||[]; },
  async addLocSuggestion(s)     { await this._appendToArray('locSuggs', s); },
  async removeLocSuggestion(id) { await this._removeFromArray('locSuggs', id); },
  getLocWinner()                { return this._cache().locWinner||null; },
  async setLocWinner(id)        { await this._set('locWinner',id); },
  getLocVotes()                 { return this._cache().locVotes||{}; },
  async setLocVote(uid,id)      { await this._merge('locVotes', { [uid]:id }); },

  // ── Sugestões de alojamento ──
  getAccSuggestions()           { return this._cache().accSuggs||[]; },
  async addAccSuggestion(s)     { await this._appendToArray('accSuggs', s); },
  async removeAccSuggestion(id) { await this._removeFromArray('accSuggs', id); },
  getAccWinner()                { return this._cache().accWinner||null; },
  async setAccWinner(id)        { await this._set('accWinner',id); },
  getAccVotes()                 { return this._cache().accVotes||{}; },
  async setAccVote(uid,id)      { await this._merge('accVotes', { [uid]:id }); },

  // ── Disponibilidade ──
  getAvailability(uid)          { return (this._cache().avail||{})[uid] || []; },
  getAllAvailability()          { return this._cache().avail||{}; },
  async setAvailability(uid,days){ await this._merge('avail', { [uid]:days }); },

  // ── Datas trancadas ──
  getLockedDates()              { return this._cache().locked||null; },
  async setLockedDates(from,to,monthLabel){
    const val = (typeof from === 'object' && from !== null) ? from : { from, to, monthLabel };
    await this._set('locked', val);
  },

  // ── Planeamento ──
  getPlanning() { return this._cache().planData || { costs:{perPerson:0,breakdown:[],paid:{}}, itinerary:[],activities:[],shopping:[] }; },
  async setPlanning(p) { await this._set('planData',p); },
  // Atualização segura do planeamento via função transformadora (read-modify-write).
  // Reduz drasticamente a janela de race quando vários editam custos/itinerário em simultâneo.
  async updatePlanning(transformFn) {
    const ed = EditionStore.active();
    if (!ed) return;
    const emptyPlan = { costs:{ perPerson:0, breakdown:[], paid:{} }, itinerary:[], activities:[], shopping:[] };
    // Optimistic local
    const localPlan = this.getPlanning();
    _appCache = { ...(this._cache()), planData: transformFn(localPlan) };
    this._notify();
    // Read-modify-write a partir do servidor
    try {
      const { data: fresh } = await _sb.from('editions').select('data').eq('id', ed.id).single();
      const freshData = (fresh && fresh.data) || {};
      const freshPlan = freshData.planData || emptyPlan;
      const newPlan = transformFn(freshPlan);
      const newData = { ...freshData, planData: newPlan };
      this._applyNewData(ed, newData);
      const { error } = await _sb.from('editions').update({ data: newData }).eq('id', ed.id);
      if (error) console.error('[PA AppStore] planning erro:', error.message);
    } catch (e) {
      console.error('[PA AppStore] planning falhou:', e.message);
    }
  },

  // ── Reset da edição ativa ──
  async resetEdition() {
    const ed = EditionStore.active();
    if (!ed) return;
    await EditionStore.reset(ed.id);
  },

  subscribe(fn)   { _appListeners.add(fn); },
  unsubscribe(fn) { _appListeners.delete(fn); },
};

// Compara dados por conteúdo — evita re-renders "fantasma" do polling/realtime
// (no mobile, o realtime reconecta e o visibilitychange dispara muito; sem isto
// a página parecia "atualizar sozinha" a cada poucos segundos).
function _paSame(a, b) {
  if (a === b) return true;
  try { return JSON.stringify(a) === JSON.stringify(b); } catch { return false; }
}

function useAppStore() {
  const [data, setData] = React.useState(() => AppStore._cache());
  React.useEffect(() => {
    const update = (d) => setData(prev => _paSame(prev, d) ? prev : d);
    AppStore.subscribe(update);
    update(AppStore._cache());
    return () => AppStore.unsubscribe(update);
  }, []);
  return data;
}

// VoteStore — phase keys 'loc' e 'acc' (como os componentes usam)
const VoteStore = {
  getLocVotes()          { return AppStore.getLocVotes(); },
  setLocVote(uid,id)     { return AppStore.setLocVote(uid,id); },
  getAccVotes()          { return AppStore.getAccVotes(); },
  setAccVote(uid,id)     { return AppStore.setAccVote(uid,id); },
  getVote(uid,phase)     {
    const v = (phase === 'acc') ? this.getAccVotes() : this.getLocVotes();
    return v[uid] || null;
  },
  setVote(uid,phase,id)  {
    return (phase === 'acc') ? this.setAccVote(uid,id) : this.setLocVote(uid,id);
  },
};

// ─────────────────────────────────────────────────────────────
// ChatStore — chat_messages no Supabase + Realtime/polling
// ─────────────────────────────────────────────────────────────
let _chatCache = null;
const _chatListeners = new Set();

const ChatStore = {
  _visibilitySetup: false,
  _setupVisibility() {
    if (this._visibilitySetup) return;
    this._visibilitySetup = true;
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) this._pollOnce();
    });
  },
  async _pollOnce() {
    const lastId = (_chatCache && _chatCache.length > 0) ? _chatCache[_chatCache.length-1].id : 0;
    const { data } = await _sb.from('chat_messages')
      .select('id,profile_id,text,created_at').gt('id', lastId).order('created_at',{ascending:true});
    if (data && data.length > 0) {
      const newMsgs = data.filter(r => !(_chatCache||[]).some(m=>m.id===r.id))
        .map(r => ({ id:r.id, who:r.profile_id, text:r.text, when:_fmtTime(r.created_at) }));
      if (newMsgs.length) {
        _chatCache = [...(_chatCache||[]), ...newMsgs];
        _chatListeners.forEach(fn=>fn(_chatCache.slice()));
      }
    }
  },
  async load() {
    const { data } = await _sb.from('chat_messages').select('id,profile_id,text,created_at').order('created_at',{ascending:true});
    _chatCache = (data||[]).map(r => ({ id:r.id, who:r.profile_id, text:r.text, when:_fmtTime(r.created_at) }));
    return _chatCache;
  },
  _pollingInterval: null,
  async init() {
    await this.load();
    this._setupVisibility();
    _chatListeners.forEach(fn=>fn(_chatCache.slice()));
    try {
      const ch = _sb.channel('chat_rt')
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'chat_messages'},payload=>{
          const r=payload.new;
          if ((_chatCache||[]).some(m=>m.id===r.id)) return; // evita duplicados
          _chatCache=[...(_chatCache||[]),{id:r.id,who:r.profile_id,text:r.text,when:_fmtTime(r.created_at)}];
          _chatListeners.forEach(fn=>fn(_chatCache.slice()));
        })
        .on('postgres_changes',{event:'DELETE',schema:'public',table:'chat_messages'},payload=>{
          _chatCache=(_chatCache||[]).filter(m=>m.id!==payload.old.id);
          _chatListeners.forEach(fn=>fn(_chatCache.slice()));
        })
        .subscribe((status) => {
          if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') this._startPolling();
        });
      setTimeout(() => { if (ch.state !== 'joined') this._startPolling(); }, 5000);
    } catch(e) { this._startPolling(); }
  },
  _startPolling() {
    if (this._pollingInterval) return;
    console.log('[PA Chat] polling 4s (fallback)');
    this._pollingInterval = setInterval(async () => {
      if (document.hidden) return;
      const lastId = (_chatCache && _chatCache.length > 0) ? _chatCache[_chatCache.length-1].id : 0;
      const { data } = await _sb.from('chat_messages')
        .select('id,profile_id,text,created_at').gt('id', lastId).order('created_at',{ascending:true});
      if (data && data.length > 0) {
        const newMsgs = data.filter(r => !(_chatCache||[]).some(m=>m.id===r.id))
          .map(r => ({ id:r.id, who:r.profile_id, text:r.text, when:_fmtTime(r.created_at) }));
        if (newMsgs.length) {
          _chatCache = [...(_chatCache||[]), ...newMsgs];
          _chatListeners.forEach(fn=>fn(_chatCache.slice()));
        }
      }
    }, 4000);
  },
};

function _fmtTime(iso) {
  try { return new Date(iso).toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit' }); }
  catch { return 'agora'; }
}

function getChatMessages()   { return _chatCache || []; }
async function pushChatMessage(msg) {
  const { data, error } = await _sb.from('chat_messages').insert({ profile_id:msg.who, text:msg.text }).select().single();
  if (error) { console.error('[PA Chat] erro a enviar', error.message); return; }
  // Optimista: adiciona já localmente (realtime/polling evitam duplicado por id)
  if (data && !(_chatCache||[]).some(m=>m.id===data.id)) {
    _chatCache=[...(_chatCache||[]),{id:data.id,who:data.profile_id,text:data.text,when:_fmtTime(data.created_at)}];
    _chatListeners.forEach(fn=>fn(_chatCache.slice()));
  }
}
async function deleteChatMessage(id) {
  _chatCache=(_chatCache||[]).filter(m=>m.id!==id);  // optimista
  _chatListeners.forEach(fn=>fn(_chatCache.slice()));
  const { error } = await _sb.from('chat_messages').delete().eq('id',id);
  if (error) console.error('[PA Chat] erro a apagar', error.message);
}

function useChat() {
  const [msgs, setMsgs] = React.useState(() => getChatMessages().slice());
  React.useEffect(() => {
    const update = (list) => setMsgs(prev => _paSame(prev, list) ? prev : list);
    update(getChatMessages().slice());
    _chatListeners.add(update);
    return () => _chatListeners.delete(update);
  }, []);
  return msgs;
}

// readPhotoFile — com downscale para não encher a DB
async function readPhotoFile(file) {
  if (!file) return null;
  const dataUrl = await new Promise((res,rej) => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.onerror = () => rej(new Error('Não consegui ler a foto.'));
    fr.readAsDataURL(file);
  });
  try {
    const img = await new Promise((res,rej) => { const im = new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=dataUrl; });
    const max = 400;
    const scale = Math.min(1, max / Math.max(img.width, img.height));
    const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
    const canvas = document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    return canvas.toDataURL('image/jpeg', 0.85);
  } catch { return dataUrl; }
}

async function initSupabase() {
  // Carrega utilizadores primeiro (necessário para memberById)
  await AuthStore.refreshUsers();
  // EditionStore antes do AppStore (AppStore depende da edição ativa)
  await EditionStore.init();
  await Promise.all([AppStore.init(), ChatStore.init()]);
  // Mantém cache de utilizadores atualizado (display_name incluído)
  try {
    _sb.channel('profiles_ch').on('postgres_changes', { event:'*', schema:'public', table:'profiles' }, async () => {
      await AuthStore.refreshUsers();
      _appListeners.forEach(fn => fn(AppStore._cache()));
      // Força chat a re-renderizar com nomes atualizados
      _chatListeners.forEach(fn => fn((_chatCache||[]).slice()));
    }).subscribe();
  } catch {}
  console.log('[PA] Supabase iniciado ✓', _usersCache.length, 'utilizadores,', _editionsCache.length, 'edições');
}

Object.assign(window, {
  _sb, safeStore, AuthStore, AppStore, VoteStore, ChatStore, EditionStore,
  useAuth: function() {
    const [user, setUser] = React.useState(() => _session);
    const login    = async (name,pw)  => { const s=await AuthStore.login(name,pw);    setUser(s); return s; };
    const register = async (opts)     => { const s=await AuthStore.register(opts);    setUser(s); return s; };
    const updateProfile = async (opts) => { const s=await AuthStore.updateProfile(opts); setUser(s); return s; };
    const logout   = ()               => {
      try { if (typeof EditionStore !== 'undefined') EditionStore.setActive(null); } catch {}
      AuthStore.clearSession();
      setUser(null);
    };
    return { user, login, register, updateProfile, logout };
  },
  useAppStore, useEditions, useChat, getChatMessages, pushChatMessage, deleteChatMessage,
  readPhotoFile, initSupabase, ADMIN_NAME,
});
</script>

      {msg}

}

// AuthGate — chooses login vs register
function AuthGate({ auth, narrow }) {
  const [mode, setMode] = aUseState('login');
  if (mode === 'register') return <RegisterScreen auth={auth} onSwitch={() => setMode('login')} narrow={narrow} />;
  return <LoginScreen auth={auth} onSwitch={() => setMode('register')} narrow={narrow} />;
}

// ─────────────────────────────────────────────────────────────
// METHOD: Borda Count — rank all tied options 1st→last
// ─────────────────────────────────────────────────────────────
function TieMethodBorda({ tied, me, onResolve, onBack }) {
  const allMembers = D.members.filter((m) => D.phase1.state[m.id] === 'in');
  const n = tied.length;

  // Seed: everyone has submitted except me
  const seedRankings = {};
  allMembers.forEach((m, i) => {
    if (m.id !== me.id) {
      // Each member has a different shuffle
      const order = tied.map((_, j) => j).sort(() => (Math.sin(i * 7 + j * 13) > 0 ? 1 : -1));
      seedRankings[m.id] = order.map((idx) => tied[idx].id);
    }
  });

  const [submitted, setSubmitted] = tbUseState(seedRankings);
  const [myRanking, setMyRanking] = tbUseState(tied.map((t) => t.id)); // drag order
  const [done, setDone] = tbUseState(false);
  const [dragging, setDragging] = tbUseState(null);
  const [dragOver, setDragOver] = tbUseState(null);

  const allSubmitted = { ...submitted };
  if (done) allSubmitted[me.id] = myRanking;

  const submittedMembers = allMembers.filter((m) => allSubmitted[m.id]);
  const pendingMembers = allMembers.filter((m) => !allSubmitted[m.id]);

  // Borda tally: n pts for 1st, n-1 for 2nd, …
  const tally = tied.map((t) => {
    const pts = submittedMembers.reduce((sum, m) => {
      const rank = (allSubmitted[m.id] || []).indexOf(t.id);
      return sum + (rank >= 0 ? (n - rank) : 0);
    }, 0);
    return { opt: t, pts };
  }).sort((a, b) => b.pts - a.pts);

  const maxPts = tally[0]?.pts || 0;
  const winner = tally[0]?.opt;

  // Drag-to-reorder
  const onDragStart = (e, idx) => { setDragging(idx); e.dataTransfer.effectAllowed = 'move'; };
  const onDragOver = (e, idx) => { e.preventDefault(); setDragOver(idx); };
  const onDrop = (e, idx) => {
    e.preventDefault();
    if (dragging === null || dragging === idx) return;
    const next = myRanking.slice();
    const [item] = next.splice(dragging, 1);
    next.splice(idx, 0, item);
    setMyRanking(next);
    setDragging(null); setDragOver(null);
  };
  const onDragEnd = () => { setDragging(null); setDragOver(null); };

  return (
    <TieMethodFrame method="borda" me={me} onBack={onBack}
      meta={`${submittedMembers.length} de ${allMembers.length} ordenaram`}>

      <ParticipantRow allMembers={allMembers} submitted={submittedMembers} pending={pendingMembers} />

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }}>
        {/* My ranking drag-list */}
        {!done ? (
          <div>
            <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 8 }}>
              A tua ordem — arrasta para reordenar
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 14 }}>
              {myRanking.map((id, i) => {
                const opt = tied.find((t) => t.id === id);
                if (!opt) return null;
                return (
                  <div key={id}
                    draggable
                    onDragStart={(e) => onDragStart(e, i)}
                    onDragOver={(e) => onDragOver(e, i)}
                    onDrop={(e) => onDrop(e, i)}
                    onDragEnd={onDragEnd}
                    style={{
                      display: 'flex', alignItems: 'center', gap: 12,
                      padding: '12px 14px', borderRadius: 10, cursor: 'grab',
                      background: dragOver === i ? 'rgba(217,119,87,0.10)' : '#fff',
                      border: dragOver === i ? '2px solid var(--pa-accent)' : '1px solid var(--pa-line)',
                      transition: 'background .12s, border .12s',
                      opacity: dragging === i ? 0.4 : 1,
                    }}>
                    <div style={{
                      width: 28, height: 28, borderRadius: 28, flexShrink: 0,
                      background: i === 0 ? 'var(--pa-accent)' : i === 1 ? 'rgba(31,26,20,0.12)' : 'rgba(31,26,20,0.06)',
                      color: i === 0 ? '#fff' : 'var(--pa-ink)',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontFamily: 'var(--pa-mono)', fontSize: 13, fontWeight: 700,
                    }}>
                      {i + 1}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontFamily: 'var(--pa-body)', fontSize: 13.5, fontWeight: 600 }}>
                        {opt.type} · {opt.area}
                      </div>
                      <div style={{ fontSize: 11.5, color: 'var(--pa-muted)' }}>
                        {n - i} {n - i === 1 ? 'ponto' : 'pontos'}
                      </div>
                    </div>
                    <svg width="10" height="16" viewBox="0 0 10 16" fill="var(--pa-muted)">
                      <circle cx="3" cy="3" r="1.5"/><circle cx="7" cy="3" r="1.5"/>
                      <circle cx="3" cy="8" r="1.5"/><circle cx="7" cy="8" r="1.5"/>
                      <circle cx="3" cy="13" r="1.5"/><circle cx="7" cy="13" r="1.5"/>
                    </svg>
                  </div>
                );
              })}
            </div>
            <Btn variant="accent" size="sm" style={{ width: '100%' }} onClick={() => setDone(true)}>
              Submeter ranking
            </Btn>
          </div>
        ) : (
          <div>
            <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 8 }}>
              O teu ranking
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {myRanking.map((id, i) => {
                const opt = tied.find((t) => t.id === id);
                return (
                  <div key={id} style={{
                    display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px',
                    borderRadius: 10, background: '#fff', border: '1px solid var(--pa-line)',
                  }}>
                    <div style={{
                      width: 24, height: 24, borderRadius: 24,
                      background: i === 0 ? 'var(--pa-accent)' : 'rgba(31,26,20,0.07)',
                      color: i === 0 ? '#fff' : 'var(--pa-ink)',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontFamily: 'var(--pa-mono)', fontSize: 12, fontWeight: 700, flexShrink: 0,
                    }}>{i + 1}</div>
                    <span style={{ fontFamily: 'var(--pa-body)', fontSize: 13, fontWeight: 500 }}>
                      {opt?.type} · {opt?.area}
                    </span>
                    <Pill size="sm">{n - i}pts</Pill>
                  </div>
                );
              })}
            </div>
            <button onClick={() => setDone(false)} style={{
              marginTop: 8, background: 'transparent', border: 'none', cursor: 'pointer',
              fontFamily: 'var(--pa-body)', fontSize: 12, color: 'var(--pa-muted)', padding: '4px 0',
            }}>corrigir ranking</button>
          </div>
        )}

        {/* Live tally */}
        <div>
          <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 8 }}>
            Pontuação Borda
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {tally.map(({ opt, pts }, i) => {
              const isWinner = i === 0;
              const maxPossible = n * submittedMembers.length;
              const pct = maxPossible > 0 ? (pts / maxPossible) * 100 : 0;
              return (
                <div key={opt.id} style={{
                  padding: 12, borderRadius: 10,
                  background: isWinner && submittedMembers.length > 0 ? 'rgba(217,119,87,0.08)' : '#fff',
                  border: isWinner && submittedMembers.length > 0 ? '1.5px solid var(--pa-accent)' : '1px solid var(--pa-line)',
                }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      {isWinner && submittedMembers.length > 0 && <span style={{ fontSize: 13 }}>🏆</span>}
                      <span style={{ fontFamily: 'var(--pa-body)', fontSize: 13, fontWeight: 600 }}>
                        {opt.type} · {opt.area}
                      </span>
                    </div>
                    <span style={{ fontFamily: 'var(--pa-mono)', fontSize: 14, fontWeight: 700, color: isWinner ? 'var(--pa-accent)' : 'var(--pa-ink)' }}>
                      {pts} pts
                    </span>
                  </div>
                  <div style={{ height: 6, borderRadius: 6, background: 'rgba(31,26,20,0.06)' }}>
                    <div style={{
                      width: `${pct}%`, height: '100%', borderRadius: 6,
                      background: isWinner ? 'var(--pa-accent)' : 'var(--pa-ink)',
                      transition: 'width .4s',
                    }} />
                  </div>
                </div>
              );
            })}
          </div>

          {me.isAdmin && pendingMembers.length === 0 && (
            <Btn variant="accent" size="sm" style={{ width: '100%', marginTop: 14 }}
              onClick={() => onResolve(winner.id, 'borda')}>
              Fechar — vence {winner.type} de {winner.area}
            </Btn>
          )}
          {me.isAdmin && pendingMembers.length > 0 && (
            <Btn variant="ghost" size="sm" style={{ width: '100%', marginTop: 14 }}
              onClick={() => onResolve(winner.id, 'borda')}>
              Fechar antecipado ({submittedMembers.length}/{allMembers.length})
            </Btn>
          )}
        </div>
      </div>
    </TieMethodFrame>
  );
}

// ─────────────────────────────────────────────────────────────
// METHOD: Score voting (1–5 stars per option)
// ─────────────────────────────────────────────────────────────
function TieMethodScore({ tied, me, onResolve, onBack }) {
  const allMembers = D.members.filter((m) => D.phase1.state[m.id] === 'in');

  // Seed some existing scores
  const seedScores = {};
  allMembers.forEach((m, mi) => {
    if (m.id !== me.id) {
      seedScores[m.id] = tied.map((_, ti) => Math.max(1, Math.min(5, 3 + Math.round(Math.sin(mi * 5 + ti * 7) * 1.5))));
    }
  });

  const [allScores, setAllScores] = tbUseState(seedScores);
  const [myScores, setMyScores] = tbUseState(tied.map(() => null));
  const [submitted, setSubmitted] = tbUseState(false);

  const combinedScores = submitted ? { ...allScores, [me.id]: myScores } : allScores;
  const submittedMembers = allMembers.filter((m) => combinedScores[m.id]);
  const pendingMembers = allMembers.filter((m) => !combinedScores[m.id]);

  const averages = tied.map((t, ti) => {
    const vals = submittedMembers.map((m) => combinedScores[m.id][ti]).filter((v) => v !== null);
    return { opt: t, avg: vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0, count: vals.length };
  }).sort((a, b) => b.avg - a.avg);
  const winner = averages[0]?.opt;

  const setMyStar = (ti, star) => {
    setMyScores((prev) => { const n = [...prev]; n[ti] = star; return n; });
  };

  const canSubmit = myScores.every((s) => s !== null);

  return (
    <TieMethodFrame method="score" me={me} onBack={onBack}
      meta={`${submittedMembers.length} de ${allMembers.length} avaliaram`}>

      <ParticipantRow allMembers={allMembers} submitted={submittedMembers} pending={pendingMembers} />

      {/* Star rating ballot */}
      {!submitted && (
        <div style={{ background: 'var(--pa-bg)', borderRadius: 12, padding: 18, marginBottom: 16, border: '1.5px solid var(--pa-accent)' }}>
          <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 12 }}>
            A tua avaliação (1–5 ★ por opção)
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 14 }}>
            {tied.map((t, ti) => (
              <div key={t.id} style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: '10px 14px', background: '#fff', borderRadius: 10, gap: 16,
              }}>
                <div style={{ minWidth: 0, flex: 1 }}>
                  <div style={{ fontFamily: 'var(--pa-body)', fontSize: 13, fontWeight: 600 }}>
                    {t.type} · {t.area}
                  </div>
                  <div style={{ fontSize: 11.5, color: 'var(--pa-muted)' }}>{t.price}€/noite</div>
                </div>
                <div style={{ display: 'flex', gap: 3, flexShrink: 0 }}>
                  {[1, 2, 3, 4, 5].map((star) => (
                    <button key={star} onClick={() => setMyStar(ti, star)} style={{
                      background: 'none', border: 'none', cursor: 'pointer', padding: '2px 3px',
                      fontSize: 22, lineHeight: 1,
                      filter: (myScores[ti] !== null && star <= myScores[ti]) ? 'none' : 'grayscale(1) opacity(0.3)',
                      transform: 'scale(1)',
                      transition: 'filter .1s, transform .1s',
                    }}
                      onMouseEnter={(e) => e.currentTarget.style.transform = 'scale(1.2)'}
                      onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1)'}>
                      ⭐
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <Btn variant="accent" size="sm" style={{ width: '100%' }} disabled={!canSubmit} onClick={() => setSubmitted(true)}>
            Submeter avaliação
          </Btn>
        </div>
      )}

      {/* Live averages */}
      <div>
        <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 8 }}>
          Médias · {submittedMembers.length} avaliações
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {averages.map(({ opt, avg, count }, i) => {
            const isFirst = i === 0 && count > 0;
            const filled = Math.round(avg);
            return (
              <div key={opt.id} style={{
                display: 'flex', alignItems: 'center', gap: 14, padding: '12px 16px', borderRadius: 12,
                background: isFirst ? 'rgba(217,119,87,0.08)' : '#fff',
                border: isFirst ? '1.5px solid var(--pa-accent)' : '1px solid var(--pa-line)',
              }}>
                {isFirst && <span style={{ fontSize: 16 }}>🏆</span>}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: 'var(--pa-body)', fontSize: 13.5, fontWeight: 600 }}>
                    {opt.type} · {opt.area}
                  </div>
                  <div style={{ display: 'flex', gap: 2, marginTop: 4 }}>
                    {[1, 2, 3, 4, 5].map((s) => (
                      <span key={s} style={{ fontSize: 14, filter: s <= filled ? 'none' : 'grayscale(1) opacity(0.25)' }}>⭐</span>
                    ))}
                  </div>
                </div>
                <div style={{ textAlign: 'right', flexShrink: 0 }}>
                  <div style={{ fontFamily: 'var(--pa-display)', fontSize: 22, fontWeight: 700, letterSpacing: -0.5, color: isFirst ? 'var(--pa-accent)' : 'var(--pa-ink)' }}>
                    {avg > 0 ? avg.toFixed(1) : '—'}
                  </div>
                  <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, color: 'var(--pa-muted)' }}>
                    /{count} pessoas
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {me.isAdmin && (
          <div style={{ display: 'flex', gap: 8, marginTop: 14 }}>
            {pendingMembers.length > 0 && (
              <Btn variant="ghost" size="sm" onClick={() => onResolve(winner.id, 'score')}>
                Fechar agora ({submittedMembers.length}/{allMembers.length})
              </Btn>
            )}
            {pendingMembers.length === 0 && (
              <Btn variant="accent" size="sm" style={{ flex: 1 }} onClick={() => onResolve(winner.id, 'score')}>
                Fechar — vence {winner.type} de {winner.area}
              </Btn>
            )}
          </div>
        )}
      </div>
    </TieMethodFrame>
  );
}

// ─────────────────────────────────────────────────────────────
// METHOD: Progressive elimination — rounds until winner
// ─────────────────────────────────────────────────────────────
function TieMethodElim({ tied, me, onResolve, onBack }) {
  const allMembers = D.members.filter((m) => D.phase1.state[m.id] === 'in');

  // Each round: remaining options, mock votes from others, my vote
  const [round, setRound] = tbUseState(0);
  const [remaining, setRemaining] = tbUseState(tied.map((t) => t.id));
  const [history, setHistory] = tbUseState([]); // [{eliminated, round, votes}]
  const [roundVotes, setRoundVotes] = tbUseState({}); // memberId → optId
  const [myVote, setMyVote] = tbUseState(null);
  const [roundClosed, setRoundClosed] = tbUseState(false);

  const remainingOpts = remaining.map((id) => tied.find((t) => t.id === id)).filter(Boolean);
  const submittedMembers = allMembers.filter((m) => roundVotes[m.id] || (m.id === me.id && roundClosed));
  const pendingMembers = allMembers.filter((m) => !roundVotes[m.id] && !(m.id === me.id && roundClosed));

  // Seed mock votes for current round
  const seedRoundVotes = () => {
    const v = {};
    allMembers.forEach((m, i) => {
      if (m.id !== me.id) {
        const opts = remainingOpts;
        v[m.id] = opts[i % opts.length]?.id;
      }
    });
    return v;
  };

  const submitMyVote = () => {
    if (!myVote) return;
    const allVotes = { ...seedRoundVotes(), [me.id]: myVote };
    setRoundVotes(allVotes);
    setRoundClosed(true);
  };

  const closeRound = () => {
    const allVotes = { ...seedRoundVotes(), [me.id]: myVote };
    // Tally
    const tally = {};
    remaining.forEach((id) => { tally[id] = 0; });
    Object.values(allVotes).forEach((id) => { if (tally[id] !== undefined) tally[id]++; });
    const sorted = Object.entries(tally).sort((a, b) => a[1] - b[1]);
    const minVotes = sorted[0][1];
    const eliminated = sorted.filter(([, v]) => v === minVotes).map(([id]) => id);

    const newRemaining = remaining.filter((id) => !eliminated.includes(id));
    setHistory((h) => [...h, { round: round + 1, eliminated, tally }]);

    if (newRemaining.length === 1) {
      onResolve(newRemaining[0], 'elim');
      return;
    }
    // Next round
    setRemaining(newRemaining);
    setRound((r) => r + 1);
    setRoundVotes({});
    setMyVote(null);
    setRoundClosed(false);
  };

  return (
    <TieMethodFrame method="elim" me={me} onBack={onBack}
      meta={`Ronda ${round + 1} · ${remaining.length} opções restantes`}>

      {/* History */}
      {history.length > 0 && (
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 14 }}>
          {history.map((h) => (
            h.eliminated.map((id) => {
              const opt = tied.find((t) => t.id === id);
              return (
                <div key={id} style={{
                  padding: '6px 10px', borderRadius: 999, background: 'rgba(31,26,20,0.06)',
                  fontFamily: 'var(--pa-body)', fontSize: 11.5, color: 'var(--pa-muted)',
                  display: 'flex', alignItems: 'center', gap: 6,
                }}>
                  <span style={{ textDecoration: 'line-through' }}>{opt?.type} · {opt?.area}</span>
                  <span style={{ color: '#c44', fontWeight: 600 }}>✕ ronda {h.round}</span>
                </div>
              );
            })
          ))}
        </div>
      )}

      {/* Current round ballot */}
      {!roundClosed && (
        <div style={{ background: 'var(--pa-bg)', borderRadius: 12, padding: 16, marginBottom: 14, border: '1.5px solid var(--pa-accent)' }}>
          <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 10 }}>
            Ronda {round + 1} · votas em qual?
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: `repeat(${Math.min(remainingOpts.length, 3)}, 1fr)`, gap: 8, marginBottom: 12 }}>
            {remainingOpts.map((t) => {
              const sel = myVote === t.id;
              return (
                <button key={t.id} onClick={() => setMyVote(t.id)} style={{
                  padding: '12px 14px', borderRadius: 10, cursor: 'pointer', textAlign: 'left',
                  background: sel ? 'var(--pa-ink)' : '#fff',
                  color: sel ? '#fff' : 'var(--pa-ink)',
                  border: sel ? 'none' : '1px solid var(--pa-line)',
                }}>
                  <div style={{ fontFamily: 'var(--pa-body)', fontSize: 13, fontWeight: 600 }}>{t.type}</div>
                  <div style={{ fontSize: 11.5, opacity: .7 }}>{t.area}</div>
                </button>
              );
            })}
          </div>
          <Btn variant="accent" size="sm" style={{ width: '100%' }} disabled={!myVote} onClick={submitMyVote}>
            Votar nesta ronda
          </Btn>
        </div>
      )}

      {/* Current round tally + close */}
      {roundClosed && (
        <div style={{ background: '#fff', borderRadius: 12, padding: 16, marginBottom: 14, border: '1px solid var(--pa-line)' }}>
          <div style={{ fontFamily: 'var(--pa-mono)', fontSize: 10, letterSpacing: 1.2, color: 'var(--pa-muted)', textTransform: 'uppercase', marginBottom: 10 }}>
            Resultado ronda {round + 1}
          </div>
          {(() => {
            const allVotes = { ...seedRoundVotes(), [me.id]: myVote };
            const tally = {};
            remaining.forEach((id) => { tally[id] = 0; });
            Object.values(allVotes).forEach((id) => { if (tally[id] !== undefined) tally[id]++; });
            const sorted = Object.entries(tally).sort((a, b) => b[1] - a[1]);
            const minVotes = sorted[sorted.length - 1][1];
            return sorted.map(([id, votes]) => {
              const opt = tied.find((t) => t.id === id);
              const isElim = votes === minVotes;
              return (
                <div key={id} style={{
                  display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0',
                  opacity: isElim ? 0.5 : 1,
                }}>
                  <div style={{ flex: 1, fontFamily: 'var(--pa-body)', fontSize: 13, fontWeight: 500 }}>
                    {isElim ? <s>{opt?.type} · {opt?.area}</s> : `${opt?.type} · ${opt?.area}`}
                  </div>
                  <Pill tone={isElim ? 'warn' : 'success'} size="sm">
                    {votes} {isElim ? '— eliminado' : ''}
                  </Pill>
                </div>
              );
            });
          })()}
          {me.isAdmin && (
            <Btn variant="accent" size="sm" style={{ width: '100%', marginTop: 12 }} onClick={closeRound}>
              Eliminar e avançar →
            </Btn>
          )}
        </div>
      )}

      <ParticipantRow allMembers={allMembers} submitted={submittedMembers} pending={pendingMembers} />
    </TieMethodFrame>
  );
}

// ─────────────────────────────────────────────────────────────
// METHOD: Runoff (existing, cleaned up)
// ─────────────────────────────────────────────────────────────
function TieMethodRunoff({ tied, me, onResolve, onBack }) {
  const allMembers = D.members.filter((m) => D.phase1.state[m.id] === 'in');
  const [runoffVotes, setRunoffVotes] = tbUseState({
    rita: tied[0].id, tiago: tied[0].id, ines: tied[0].id,
    matilde: tied[1].id, joao: tied[1].id,
  });
  const [myRunoff, setMyRunoff] = tbUseState(null);

  const allVotes = { ...runoffVotes, ...(myRunoff ? { [me.id]: myRunoff } : {}) };
  const tally = tied.map((t) => ({
    opt: t,
    count: Object.values(allVotes).filter((v) => v === t.id).length,
    voters: allMembers.filter((m) => allVotes[m.id] === t.id),
  }));
  const submittedMembers = allMembers.filter((m) => allVotes[m.id]);
  const pendingMembers = allMembers.filter((m) => !allVotes[m.id]);
  const winner = [...tally].sort((a, b) => b.count - a.count)[0]?.opt;

  return (
    <TieMethodFrame method="runoff" me={me} onBack={onBack}
      meta={`${submittedMembers.length} de ${allMembers.length} votaram`}>
      <ParticipantRow allMembers={allMembers} submitted={submittedMembers} pending={pendingMembers} />
      <div style={{ display: 'grid', gridTemplateColumns: `repeat(${tied.length}, 1fr)`, gap: 12, marginBottom: 14 }}>
        {tally.map(({ opt, count, voters }) => {
          const sel = myRunoff === opt.id;
          return (
            <button key={opt.id} onClick={() => setMyRunoff(opt.id)} style={{
              background: '#fff', borderRadius: 12, padding: 16, textAlign: 'left',
              border: sel ? '2px solid var(--pa-accent)' : '1px solid var(--pa-line)', cursor: 'pointer',
              position: 'relative',
            }}>
              <div style={{ position: 'absolute', top: 12, right: 14, fontFamily: 'var(--pa-display)', fontSize: 24, fontWeight: 700, color: 'var(--pa-accent)' }}>{count}</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8 }}>
                <Pill tone="dark" size="sm">{opt.type}</Pill>
                <span style={{ fontSize: 11.5, color: 'var(--pa-muted)' }}>{opt.area}</span>
              </div>
              <div style={{ fontSize: 12.5, color: 'var(--pa-ink)', lineHeight: 1.4, marginBottom: 10 }}>{opt.note}</div>
              <Stack members={voters} max={5} size={20} ringColor="#fff" />
            </button>
          );
        })}
      </div>
      {me.isAdmin && (
        <Btn variant="accent" size="sm" onClick={() => onResolve(winner.id, 'runoff')}>
          Fechar segunda volta
        </Btn>
      )}
    </TieMethodFrame>
  );
}

// ─────────────────────────────────────────────────────────────
// METHOD: Public vote with comments (existing, cleaned up)
// ─────────────────────────────────────────────────────────────
function TieMethodPublic({ tied, me, onResolve, onBack }) {
  const allMembers = D.members.filter((m) => D.phase1.state[m.id] === 'in');
  const [publicVotes, setPublicVotes] = tbUseState({
    miguel:  { choice: tied[0].id, comment: 'Casa com cama a sério. Noites de junho ainda são frescas para tendas.' },
    rita:    { choice: tied[0].id, comment: 'Bouzas tem o melhor jantar pós-praia.' },
    matilde: { choice: tied[1].id, comment: 'Cíes só uma vez na vida. A noite na ilha é outra coisa.' },
    tiago:   { choice: tied[0].id, comment: 'Já lá fui — a casa é mesmo bonita.' },
    joao:    { choice: tied[1].id, comment: 'Glamping é uma vibe completamente diferente.' },
  });
  const [myPick, setMyPick] = tbUseState(null);
  const [myComment, setMyComment] = tbUseState('');
  const [submitted, setSubmitted] = tbUseState(false);

  const allVotes = { ...publicVotes, ...(submitted && myPick ? { [me.id]: { choice: myPick, comment: myComment } } : {}) };
  const tally = tied.map((t) => ({
    opt: t,
    voters: allMembers.filter((m) => allVotes[m.id]?.choice === t.id),
  }));
  const submittedMembers = allMembers.filter((m) => allVotes[m.id]);
  const pendingMembers = allMembers.filter((m) => !allVotes[m.id]);
  const winner = [...tally].sort((a, b) => b.voters.length - a.voters.length)[0]?.opt;

  return (
    <TieMethodFrame method="public" me={me} onBack={onBack}
      meta={`${submittedMembers.length} de ${allMembers.length} declararam`}>
      <ParticipantRow allMembers={allMembers} submitted={submittedMembers} pending={pendingMembers} />
      {!submitted && (
        <div style={{ background: 'var(--pa-bg)', borderRadius: 12, padding: 16, marginBottom: 14, border: '1.5px solid var(--pa-accent)' }}>
          <div style={{ display: 'grid', gridTemplateColumns: `repeat(${tied.length}, 1fr)`, gap: 8, marginBottom: 12 }}>
            {tied.map((t) => {
              const sel = myPick === t.id;
              return (
                <button key={t.id} onClick={() => setMyPick(t.id)} style={{
                  padding: '10px 12px', borderRadius: 8, cursor: 'pointer',
                  background: sel ? 'var(--pa-ink)' : '#fff', color: sel ? '#fff' : 'var(--pa-ink)',
                  border: sel ? 'none' : '1px solid var(--pa-line)', textAlign: 'left',
                }}>
                  <div style={{ fontSize: 12, fontWeight: 600 }}>{t.type}</div>
                  <div style={{ fontSize: 11, opacity: .7 }}>{t.area}</div>
                </button>
              );
            })}
          </div>
          <textarea value={myComment} onChange={(e) => setMyComment(e.target.value)}
            placeholder="Em duas linhas, porquê este?" rows={2}
            style={{ width: '100%', padding: '10px 12px', borderRadius: 8, background: '#fff', border: '1px solid var(--pa-line)', fontFamily: 'var(--pa-body)', fontSize: 13, outline: 'none', resize: 'none', boxSizing: 'border-box' }} />
          <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 10 }}>
            <Btn variant="accent" size="sm" disabled={!myPick} onClick={() => setSubmitted(true)}>Declarar</Btn>
          </div>
        </div>
      )}
      <div style={{ display: 'grid', gridTemplateColumns: `repeat(${tied.length}, 1fr)`, gap: 12, marginBottom: 14 }}>
        {tally.map(({ opt, voters }) => (
          <div key={opt.id} style={{ background: '#fff', borderRadius: 12, padding: 14, border: '1px solid var(--pa-line)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
              <Pill tone="dark" size="sm">{opt.type} · {opt.area}</Pill>

                      "{allVotes[v.id].comment}"
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>
      {me.isAdmin && <Btn variant="accent" size="sm" disabled={submittedMembers.length === 0} onClick={() => onResolve(winner.id, 'public')}>Fechar voto público</Btn>}
    </TieMethodFrame>
  );
}

// ─────────────────────────────────────────────────────────────
// METHOD: Random coin flip
// ─────────────────────────────────────────────────────────────
function TieMethodRandom({ tied, me, onResolve, onBack }) {
  const [state, setState] = tbUseState('idle');
  const [hover, setHover] = tbUseState(0);
  const [winner, setWinner] = tbUseState(null);
  const timerRef = tbUseRef(null);

  const roll = () => {
    if (state !== 'idle') return;
    setState('rolling');
    let speed = 80;
    let i = 0;
    const tick = () => {
      i = (i + 1) % tied.length;
      setHover(i);
      speed += 25;
      if (speed < 800) { timerRef.current = setTimeout(tick, speed); }
      else { const w = tied[Math.floor(Math.random() * tied.length)]; setWinner(w); setHover(tied.indexOf(w)); setState('done'); }
    };
    tick();
  };
  tbUseEffect(() => () => clearTimeout(timerRef.current), []);

  return (
    <TieMethodFrame method="random" me={me} onBack={state === 'idle' ? onBack : undefined}>
      <div style={{ background: '#fff', borderRadius: 14, padding: 24, textAlign: 'center' }}>
        <div style={{ fontSize: 52, marginBottom: 10 }}>🎲</div>
        <div style={{ fontFamily: 'var(--pa-body)', fontSize: 14, color: 'var(--pa-muted)', marginBottom: 18 }}>
          {state === 'idle' && (me.isAdmin ? 'Clica para lançar.' : 'Miguel vai lançar.')}
          {state === 'rolling' && '...'}
          {state === 'done' && `Saiu: ${winner?.type} de ${winner?.area}`}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: `repeat(${tied.length}, 1fr)`, gap: 10, marginBottom: 18 }}>
          {tied.map((t, i) => {
            const lit = (state === 'rolling' && hover === i) || (state === 'done' && winner?.id === t.id);
            return (
              <div key={t.id} style={{
                padding: 14, borderRadius: 12, transition: 'all .12s',
                background: lit ? 'var(--pa-accent)' : 'var(--pa-bg)',
                color: lit ? '#fff' : 'var(--pa-ink)',
                border: lit ? 'none' : '1px solid var(--pa-line)',
                transform: lit && state === 'done' ? 'scale(1.04)' : 'scale(1)',
                boxShadow: lit && state === 'done' ? '0 8px 24px rgba(217,119,87,0.4)' : 'none',
              }}>
                <div style={{ fontFamily: 'var(--pa-display)', fontSize: 16, fontWeight: 600 }}>{t.type}</div>
                <div style={{ fontSize: 12, opacity: .7 }}>{t.area}</div>
              </div>
            );
          })}
        </div>
        {me.isAdmin && state === 'idle' && <Btn variant="accent" size="lg" onClick={roll} style={{ width: '100%' }}>Lançar à sorte 🎲</Btn>}
        {me.isAdmin && state === 'done' && (
          <div style={{ display: 'flex', gap: 8 }}>
            <Btn variant="ghost" size="md" style={{ flex: 1 }} onClick={onBack}>Trocar método</Btn>
            <Btn variant="accent" size="md" style={{ flex: 1 }} onClick={() => onResolve(winner.id, 'random')}>Confirmar {winner.type}</Btn>
          </div>
        )}
      </div>
    </TieMethodFrame>
  );
}

// ─────────────────────────────────────────────────────────────
// TieBreakManager — top-level for phase 5
// ─────────────────────────────────────────────────────────────
function TieBreakManager({ tied, me, onResolve }) {
  const [method, setMethod] = tbUseState(null);
  if (!method) return <TieMethodPicker tied={tied} me={me} onPick={setMethod} />;
  const props = { tied, me, onBack: () => setMethod(null), onResolve };
  const map = { admin: TieMethodAdmin, borda: TieMethodBorda, score: TieMethodScore, elim: TieMethodElim, runoff: TieMethodRunoff, public: TieMethodPublic, random: TieMethodRandom };
  const Comp = map[method];
  return Comp ? <Comp {...props} /> : null;
}

Object.assign(window, {
  TIE_METHODS, TieBreakManager,
  TieMethodPicker, TieMethodAdmin, TieMethodBorda, TieMethodScore,
  TieMethodElim, TieMethodRunoff, TieMethodPublic, TieMethodRandom,
});

function useActivityFeed(phase) {
  const appData = useAppStore();
  const rsvp = appData.rsvp || {};
  const inMembers = getAllMembers().filter((m) => rsvp[m.id] === 'in');
  const locSuggs = appData.locSuggs || [];
  const accSuggs = appData.accSuggs || [];
  const feed = [];

  if (phase >= 1) {
    inMembers.forEach((m) => {
      feed.push({ who: m.id, text: 'está dentro 🙋', when: 'esta edição' });
    });
  }
  if (phase >= 2) {
    locSuggs.slice(0, 3).forEach((s) => {
      feed.push({ who: s.by, text: `sugeriu ${s.name}`, when: 'recentemente' });
    });
  }
  if (phase >= 4) {
    accSuggs.slice(0, 3).forEach((s) => {
      feed.push({ who: s.by, text: `lançou alojamento em ${s.area}`, when: 'recentemente' });
    });
  }
  return feed.reverse();
}
