// vai direto ao login, com explicação. Ninguém tem de saber o que é um token.
async function paEnsureSession() {
  let s = null;
  try { s = AuthStore.getSession(); } catch (e) {}
  if (!s) return;                       // já está no ecrã de entrada
  const tok = paToken();
  if (!tok) {
    // Sem token, mas há sessão guardada. Só expulsamos se o sistema de tokens
    // já existir no servidor (migração feita). Sondamos a RPC session_valid:
    // se não existe, estamos pré-migração → mantemos a sessão (modo legado).
    // Se existe, esta sessão é antiga e sem token → entra de novo para a renovar.
    try {
      const { error } = await _sb.rpc('session_valid', { p_token: '' });
      const m = String(error?.message || '');
      if (error && /does not exist|schema cache|function public\./i.test(m)) return; // pré-migração: fica
      paSessionExpired('upgrade'); // tokens existem, esta sessão não tem um: re-login
    } catch (e) { /* offline/erro de rede: não expulsamos ninguém */ }
    return;
  }
  try {
    const { data, error } = await _sb.rpc('session_valid', { p_token: tok });
    if (error) return;                  // RPC ainda não existe (migração por correr)
    if (data === false) paSessionExpired('expired');
  } catch (e) { /* offline: não expulsamos ninguém por causa da rede */ }
}
Object.assign(window, { paEnsureSession });
Object.assign(window, { paToken, paSetToken });

// Hash da password guardado APENAS em memória (só para a migração antiga).
let _sessionHash = null;
async function paRequireHash(reason) {
  if (_sessionHash) return _sessionHash;
  const pw = window.prompt((reason || 'Confirma a tua password') + ':');
  if (!pw) return null;
  _sessionHash = await sha256(pw);
  return _sessionHash;
}
Object.assign(window, { paRequireHash });

function _saveSession(u)  {
  _session = u;
  try { localStorage.setItem('pa-session', JSON.stringify(u)); } catch {}
}
function _clearSession()  {
  _session = null;
  try { localStorage.removeItem('pa-session'); } catch {}
  try { sessionStorage.removeItem('pa-session'); } catch {}
  try { localStorage.removeItem('pa-active-edition'); } catch {}
}
function _profileToSession(r) {
  return { id: r.id, name: r.name, displayName: r.display_name || r.name, initials: r.initials, color: r.color, photoDataUrl: r.photo_url || null, isAdmin: r.is_admin };
}

// Cache síncrono de utilizadores — populado no arranque
let _usersCache = [];

const AuthStore = {
  getUsers() { return _usersCache; },  // síncrono — cache populado no arranque
  // As fotos são base64 e pesam ~1,3 MB no total. Descarregá-las a cada abertura
  // custa 2-3 s em 4G. Servimos primeiro do disco (instantâneo) e refrescamos
  // em segundo plano; o utilizador nunca espera pelos avatares.
  _mapUser(r) {
    return { id:r.id, name:r.display_name||r.name, loginName:r.name, initials:r.initials,
             color:r.color, photoDataUrl:r.photo_url||null, isAdmin:r.is_admin };
  },
  _saveUsersCache() {
    try { localStorage.setItem('pa-users', JSON.stringify(_usersCache)); }
    catch (e) { try { localStorage.removeItem('pa-users'); } catch (e2) {} } // quota cheia: desiste
  },
  loadUsersFromDisk() {
    try {
      const raw = localStorage.getItem('pa-users');
      if (!raw) return false;
      const arr = JSON.parse(raw);
      if (Array.isArray(arr) && arr.length) { _usersCache = arr; return true; }
    } catch (e) {}
    return false;
  },
  async refreshUsers() {
    const { data } = await _sb.from('profiles').select('id,name,display_name,initials,color,photo_url,is_admin');
    _usersCache = (data||[]).map(this._mapUser);
    this._saveUsersCache();
    return _usersCache;
  },
  // Atualiza UM perfil a partir do evento realtime (em vez de trazer todos).
  patchUser(row) {
    if (!row || !row.id) return;
    const u = this._mapUser(row);
    const i = _usersCache.findIndex((x) => x.id === u.id);
    if (i >= 0) _usersCache[i] = u; else _usersCache.push(u);
    _usersCache = [..._usersCache];
    this._saveUsersCache();
  },
  getSession()    { return _session; },
  setSession(u)   { _saveSession(u); },
  clearHash()     { _sessionHash = null; },
  clearSession()  { _clearSession(); },
  initialsFromName(name) {
    const p = (name||'').trim().split(/\s+/);
    return ((p[0]?.[0]||'') + (p.length>1 ? p[p.length-1][0] : '')).toUpperCase() || '?';
  },
  colorFromName(name) {
    const pal = ['#d97757','#6b8e6f','#b08968','#8b6f47','#c08552','#7a8c5a','#a47148','#5a8caa','#8a4220','#5e7a5a','#9a7b4f','#6b7d8a'];
    let h = 0; for (const c of (name||'')) h = (h*31 + c.charCodeAt(0)) >>> 0;
    return pal[h % pal.length];
  },
  async login(name, password) {
    const n = (name||'').trim();
    if (!n) throw new Error('Falta o nome.');
    if (!password) throw new Error('Falta a password.');
    const { data: profiles, error } = await _sb.from('profiles')
      .select('id,name,display_name,initials,color,photo_url,is_admin').ilike('name', n).limit(1);
    if (error) throw new Error('Erro de base de dados: ' + error.message);
    if (!profiles?.length) throw new Error('Conta não encontrada. Regista-te primeiro.');
    const profile = profiles[0];
    const hash = await sha256(password);
    // 1º: auth_login (verifica no servidor E devolve o token de sessão).
    // 2º: auth_verify (migração intermédia). 3º: leitura direta (esquema antigo).
    // A app funciona antes e depois da migração — sem janela de app partida.
    let verified = null;
    let mustChange = false;
    try {
      const { data: res, error: e0 } = await _sb.rpc('auth_login2', { p_profile_id: profile.id, p_hash: hash });
      if (!e0 && res) {
        if (res.expired) throw new Error('A password temporária expirou. Pede outra ao admin.');
        verified = !!res.ok;
        if (res.ok) { paSetToken(res.token); mustChange = !!res.must_change; }
      }
    } catch (e) { if (/expirou/.test(e.message)) throw e; }
    if (verified === null) {
      try {
        const { data: tok, error: e1 } = await _sb.rpc('auth_login', { p_profile_id: profile.id, p_hash: hash });
        if (!e1) { verified = !!tok; if (tok) paSetToken(tok); }
      } catch (e) {}
    }
    if (verified === null) {
      try {
        const { data: okRpc, error: e2 } = await _sb.rpc('auth_verify', { p_profile_id: profile.id, p_hash: hash });
        if (!e2) verified = !!okRpc;
      } catch (e) {}
    }
    if (verified === null) {
      const { data: authRows, error: authErr } = await _sb.from('profiles_auth')
        .select('pass_hash').eq('profile_id', profile.id).limit(1);
      if (authErr) throw new Error('Erro de base de dados: ' + authErr.message);
      verified = !!authRows?.length && authRows[0].pass_hash === hash;
    }
    if (!verified) throw new Error('Password errada.');
    _sessionHash = hash; // memória apenas (caminho antigo)
    const session = _profileToSession(profile);
    session.mustChangePassword = mustChange;
    _saveSession(session);
    await this.refreshUsers();
    return session;
  },

  // Mudar a própria password. Com password temporária, a antiga não é pedida.
  async changePassword(oldPw, newPw) {
    if (!newPw || newPw.length < 4) throw new Error('A password nova tem de ter pelo menos 4 caracteres.');
    const oldHash = oldPw ? await sha256(oldPw) : '';
    const newHash = await sha256(newPw);
    const rp = await paRpc('password_change', { p_old_hash: oldHash, p_new_hash: newHash });
    if (rp.denied) throw new Error('Sessão inválida.');
    if (rp.legacy) throw new Error('Funcionalidade ainda não disponível — o admin tem de correr a migração.');
    if (rp.error) throw new Error(rp.error);
    if (rp.data === false) throw new Error('A password atual está errada.');
    _sessionHash = newHash;
    const s = _session ? { ..._session, mustChangePassword: false } : null;
    if (s) _saveSession(s);
    return true;
  },

  // O admin repõe a password de alguém: gera uma temporária, devolve-a para
  // ser enviada por WhatsApp. Nunca lê a antiga (não é possível).
  async adminResetPassword(targetId) {
    const temp = paTempPassword();
    const hash = await sha256(temp);
    const rp = await paRpc('password_admin_reset', { p_target_id: targetId, p_temp_hash: hash });
    if (rp.denied) throw new Error('Sessão inválida.');
    if (rp.legacy) throw new Error('Funcionalidade ainda não disponível — corre a migração das passwords.');
    if (rp.error) throw new Error(rp.error);
    if (rp.data === false) throw new Error('Só o admin pode repor passwords.');
    return temp;
  },
  async register({ name, password, passwordRepeat, photoDataUrl }) {
    const n = (name||'').trim();
    if (!n) throw new Error('Falta o nome.');
    if (n.toLowerCase() === ADMIN_NAME.toLowerCase()) throw new Error('Esse nome é reservado. Escolhe outro.');
    if (!password || password.length < 4) throw new Error('Password tem de ter 4+ caracteres.');
    if (password !== passwordRepeat) throw new Error('As passwords não coincidem.');
    const { data: existing, error: exErr } = await _sb.from('profiles').select('id').ilike('name', n).limit(1);
    if (exErr) throw new Error('Erro de base de dados: ' + exErr.message);
    if (existing?.length) throw new Error('Já existe alguém com esse nome.');
    const passHash = await sha256(password);
    const { data: inserted, error: insertErr } = await _sb.from('profiles')
      .insert({ name:n, display_name:n, initials:this.initialsFromName(n), color:this.colorFromName(n), photo_url:photoDataUrl||null, is_admin:false })
      .select().single();
    if (insertErr) throw new Error('Erro ao criar conta: ' + insertErr.message);
    // Credencial criada no servidor; devolve já o token de sessão.
    let authInsErr = null;
    try {
      const { data: tok, error: rpcErr } = await _sb.rpc('auth_register', { p_profile_id: inserted.id, p_hash: passHash });
      if (rpcErr) throw rpcErr;
      if (tok) paSetToken(tok);
    } catch (e) {
      try {
        const { error: e2 } = await _sb.rpc('auth_set_password', { p_profile_id: inserted.id, p_hash: passHash });
        if (e2) throw e2;
      } catch (e3) {
        const r = await _sb.from('profiles_auth').insert({ profile_id: inserted.id, pass_hash: passHash });
        authInsErr = r.error;
      }
    }
    _sessionHash = passHash;
    if (authInsErr) throw new Error('Erro ao guardar password: ' + authInsErr.message);
    const session = _profileToSession(inserted);
    _saveSession(session);
    await this.refreshUsers();
    return session;
  },

  // Editar perfil: display name + foto. O nome de login e password ficam iguais.
  async updateProfile({ displayName, photoDataUrl }) {
    if (!_session) throw new Error('Sessão inválida.');
    const fields = {};
    if (displayName !== undefined) {
      const dn = (displayName||'').trim();
      if (!dn) throw new Error('O nome não pode ficar vazio.');
      fields.display_name = dn;
      fields.initials = this.initialsFromName(dn);
    }
    if (photoDataUrl !== undefined) fields.photo_url = photoDataUrl;
    const rp = await paRpc('profile_update', {
      p_display_name: fields.display_name !== undefined ? fields.display_name : null,
      p_photo: (fields.photo_url !== undefined && fields.photo_url !== null) ? fields.photo_url : null,
      p_clear_photo: fields.photo_url === null,
    });
    if (rp.denied) throw new Error('Sessão inválida.');
    let data = null, error = null;
    if (rp.legacy) {
      const r = await _sb.from('profiles').update(fields).eq('id', _session.id).select().single();
      data = r.data; error = r.error;
    } else if (rp.error) { error = { message: rp.error }; }
    else {
      const r = await _sb.from('profiles').select('*').eq('id', _session.id).maybeSingle();
      data = r.data; error = r.error || (r.data ? null : { message: 'perfil não encontrado' });
    }
    if (error) throw new Error('Erro ao atualizar perfil: ' + error.message);
    const session = _profileToSession(data);
    _saveSession(session);
    await this.refreshUsers();
    return session;
  },
};

// ─────────────────────────────────────────────────────────────
// AppStore — app_data (key/value) no Supabase.
// As CHAVES de cache estão alinhadas com o que os componentes lêem:
//   rsvp, locSuggs, accSuggs, locWinner, accWinner, locVotes, accVotes,
//   avail, locked, currentPhase, editionTitle/Number/Subtitle, planData, history
// ─────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────
// EditionStore — gere múltiplas edições (tabela editions).
// Cada edição tem o seu estado completo no campo jsonb `data`.
// ─────────────────────────────────────────────────────────────
let _editionsCache = [];
const _editionsListeners = new Set();
let _activeEditionId = (() => { try { return localStorage.getItem('pa-active-edition') || null; } catch { return null; } })();

const EditionStore = {
  list() { return _editionsCache; },
  active() { return _editionsCache.find(e => e.id === _activeEditionId) || null; },
  activeId() { return _activeEditionId; },
  setActive(id) {
    _activeEditionId = id;
    try { id ? localStorage.setItem('pa-active-edition', id) : localStorage.removeItem('pa-active-edition'); } catch {}
    // Recarrega o cache do AppStore para a nova edição
    AppStore._syncFromActive();
    _editionsListeners.forEach(fn => fn(_editionsCache.slice()));
    _appListeners.forEach(fn => fn(AppStore._cache()));
  },
  _notify() { _editionsListeners.forEach(fn => fn(_editionsCache.slice())); },

  async fetchAll() {
    const { data } = await _sb.from('editions').select('*').order('number', { ascending: false });
    _editionsCache = data || [];
    AppStore._syncFromActive();
    return _editionsCache;
  },

  nextNumber() {
    const real = _editionsCache.filter(e => e.status !== 'proposed');
    if (!real.length) return 1;
    return Math.max(...real.map(e => e.number || 0)) + 1;
  },

  async create({ number, title, subtitle, excludedIds }) {
    const num = number || this.nextNumber();
    // Convites: quem NÃO foi convidado entra como "removido" da edição —
    // o mesmo mecanismo do Gerir membros, e readmissível a qualquer momento.
    // flow:2 → edições novas nascem já no fluxo de 9 fases (sem remap na leitura).
    const data0 = { flow: 2, ...((excludedIds && excludedIds.length) ? { removedMembers: excludedIds } : {}) };
    const rp = await paRpc('edition_create', {
      p_number: num, p_title: title || 'Nova Aventura',
      p_subtitle: subtitle || 'Algures no mundo.', p_status: 'active', p_data: data0,
    });
    if (rp.denied) throw new Error('Sessão inválida.');
    if (rp.error) throw new Error('Erro ao criar edição: ' + rp.error);
    let data = rp.data, error = null;
    if (rp.legacy) {
      const r = await _sb.from('editions')
        .insert({ number: num, title: title || 'Nova Aventura', subtitle: subtitle || 'Algures no mundo.', status: 'active', current_phase: 1, data: data0 })
        .select().single();
      data = r.data; error = r.error;
    }
    if (error) throw new Error('Erro ao criar edição: ' + error.message);
    _editionsCache = [data, ..._editionsCache].sort((a,b)=>b.number-a.number);
    this._notify();
    return data;
  },

  // ── Propostas de aventura ──
  // Qualquer membro pode propor; fica com status 'proposed' até o admin decidir.
  // Aprovar promove a edição normal (número atribuído na hora); recusar apaga.
  async propose({ title, subtitle, excludedIds, by, byName }) {
    const data0 = { flow: 2, proposal: { by, byName, when: new Date().toISOString() } };
    if (excludedIds && excludedIds.length) data0.removedMembers = excludedIds;
    const rp = await paRpc('edition_create', {
      p_number: 0, p_title: title || 'Nova Aventura',
      p_subtitle: subtitle || 'Algures no mundo.', p_status: 'proposed', p_data: data0,
    });
    if (rp.denied) throw new Error('Sessão inválida.');
    if (rp.error) throw new Error('Erro ao propor: ' + rp.error);
    let data = rp.data, error = null;
    if (rp.legacy) {
      const r = await _sb.from('editions')
        .insert({ number: 0, title: title || 'Nova Aventura', subtitle: subtitle || 'Algures no mundo.', status: 'proposed', current_phase: 1, data: data0 })
        .select().single();
      data = r.data; error = r.error;
    }
    if (error) throw new Error('Erro ao propor: ' + error.message);
    _editionsCache = [data, ..._editionsCache];
    this._notify();
    return data;
  },
  proposals() { return _editionsCache.filter(e => e.status === 'proposed'); },
  async approveProposal(id) {
    const ed = _editionsCache.find(e => e.id === id);
    if (!ed) return;
    const d = { ...(ed.data || {}) };
    delete d.proposal;
    return this.update(id, { status: 'active', number: this.nextNumber(), data: d });
  },
  async rejectProposal(id) { return this.remove(id); },

  async update(id, fields) {
    // Metadata (fase/estado/número/nome) é território do admin — verificado no servidor.
    const rp = await paRpc('edition_write', {
      p_edition_id: id,
      p_data: fields.data !== undefined ? fields.data : null,
      p_phase: fields.current_phase !== undefined ? fields.current_phase : null,
      p_status: fields.status !== undefined ? fields.status : null,
      p_number: fields.number !== undefined ? fields.number : null,
      p_title: fields.title !== undefined ? fields.title : null,
      p_subtitle: fields.subtitle !== undefined ? fields.subtitle : null,
    });
    if (rp.denied) throw new Error('Sessão inválida.');
    if (rp.error) throw new Error(rp.error);
    let data = null, error = null;
    if (rp.legacy) {
      const r = await _sb.from('editions').update(fields).eq('id', id).select().single();
      data = r.data; error = r.error;
    } else {
      const r = await _sb.from('editions').select('*').eq('id', id).single();
      data = r.data; error = r.error;
    }
    if (error) throw new Error('Erro ao atualizar: ' + error.message);
    _editionsCache = _editionsCache.map(e => e.id === id ? data : e).sort((a,b)=>b.number-a.number);
    this._notify();
    if (id === _activeEditionId) { AppStore._syncFromActive(); _appListeners.forEach(fn => fn(AppStore._cache())); }
    return data;
  },

  async archive(id)   { return this.update(id, { status: 'archived', archived_at: new Date().toISOString() }); },
  async unarchive(id) { return this.update(id, { status: 'active', archived_at: null }); },

  async remove(id) {
    // O servidor confirma pelo token que és admin. Sem password no caminho.
    const rp = await paRpc('edition_delete', { p_edition_id: id });
    if (rp.denied) return;
    let error = null;
    if (rp.legacy) { const r = await _sb.from('editions').delete().eq('id', id); error = r.error; }
    else if (rp.error) error = { message: rp.error };
    else if (rp.data === false) throw new Error('Só o admin pode apagar aventuras.');
    if (error) throw new Error('Erro ao eliminar: ' + error.message);
    _editionsCache = _editionsCache.filter(e => e.id !== id);
    if (_activeEditionId === id) this.setActive(null);
    this._notify();
  },

  async reset(id) {
    // Limpa o PROGRESSO (respostas, votos, sugestões...) mas mantém metadata e a
    // COMPOSIÇÃO da aventura (quem está convidado/removido) — recomeçar o plano
    // não deve re-convidar quem tinha ficado de fora.
    const src = _editionsCache.find(e => e.id === id);
    const keep = (src && src.data && src.data.removedMembers) ? { removedMembers: src.data.removedMembers } : {};
    return this.update(id, { data: keep, current_phase: 1 });
  },

  async duplicate(id, { copyData = false } = {}) {
    const src = _editionsCache.find(e => e.id === id);
    if (!src) throw new Error('Edição não encontrada.');
    const srcData = src.data || {};
    return this.create({
      number: this.nextNumber(),
      title: src.title + ' (cópia)',
      subtitle: src.subtitle,
      // A composição (convidados/removidos) é estrutural: viaja sempre com a cópia.
      excludedIds: srcData.removedMembers || [],
    }).then(async (newEd) => {
      if (copyData) {
        // Copiar o progresso, mas não o que pertence só à edição original:
        // anúncios antigos e a marca de proposta não fazem sentido na cópia.
        const d = { ...srcData };
        delete d.announcements;
        delete d.proposal;
        await this.update(newEd.id, { data: d });
      }
      return newEd;
    });
  },

  subscribe(fn)   { _editionsListeners.add(fn); },
  unsubscribe(fn) { _editionsListeners.delete(fn); },

  async init() {
    await this.fetchAll();
    this._setupVisibility();
    try {
      _sb.channel('editions_ch')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'editions' }, async () => {
          if (document.hidden) return; // não processa em background
          const before = JSON.stringify(_editionsCache);
          await this.fetchAll();
          if (JSON.stringify(_editionsCache) !== before) {
            this._notify();
            _appListeners.forEach(fn => fn(AppStore._cache()));
          }
        })
        .subscribe((status) => {
          if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') this._startPolling();
        });
      setTimeout(() => { const ch = _sb.getChannels().find(c=>c.topic.includes('editions_ch')); if (!ch || ch.state !== 'joined') this._startPolling(); }, 5000);
    } catch(e) { this._startPolling(); }
  },
  _pollingInterval: null,
  _visibilitySetup: false,
  _lastVisPoll: 0,
  _setupVisibility() {
    if (this._visibilitySetup) return;
    this._visibilitySetup = true;
    document.addEventListener('visibilitychange', () => {
      // No mobile o visibilitychange dispara muitas vezes; só refresca
      // se passaram >4s desde o último, para não atualizar em excesso.
      if (!document.hidden && Date.now() - this._lastVisPoll > 4000) {
        this._lastVisPoll = Date.now();
        this._pollOnce();
      }
    });
  },
  async _pollOnce() {
    const before = JSON.stringify(_editionsCache);
    await this.fetchAll();
    if (JSON.stringify(_editionsCache) !== before) {
      this._notify();
      _appListeners.forEach(fn => fn(AppStore._cache()));
    }
  },
  _startPolling() {
    if (this._pollingInterval) return;
    this._pollingInterval = setInterval(async () => {
      if (document.hidden) return; // não polla em background — poupa bateria e evita refresh constante
      await this._pollOnce();
    }, 5000);
  },
};

function useEditions() {
  const [eds, setEds] = React.useState(() => EditionStore.list());
  React.useEffect(() => {
    const fn = (list) => setEds(prev => _paSame(prev, list) ? prev : list);
    fn(EditionStore.list().slice());
    EditionStore.subscribe(fn);
    return () => EditionStore.unsubscribe(fn);
  }, []);
  return eds;
}

// ─────────────────────────────────────────────────────────────
// AppStore — opera sobre a EDIÇÃO ATIVA (EditionStore.active()).
// O cache (_appCache) reflete o campo `data` da edição ativa + currentPhase.
// A interface pública (getRsvp, setRsvp, etc.) mantém-se igual.
// ─────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────
// Fluxo v2 (9 fases): 1 interesse · 2 disponibilidade · 3 datas ·
// 4 confirmar presença · 5 local · 6 votar local · 7 alojamento ·
// 8 votar alojamento · 9 plano.
//
// As edições criadas no fluxo antigo (8 fases: 1 rsvp · 2 disp · 3 datas ·
// 4 local · 5 votar local · 6 aloj · 7 votar aloj · 8 plano) guardaram um
// current_phase com a numeração antiga. Traduzimos NA LEITURA — não se
// reescreve nada na base, e os dados (avail, votos, sugestões) ficam intactos.
// A marca `flow:2` no data identifica as edições já no fluxo novo.
function paPhaseFromStored(ed) {
  const n = (ed && ed.current_phase) || 1;
  const isNewFlow = !!(ed && ed.data && ed.data.flow === 2);
  if (isNewFlow) return n;
  // Antigo → novo: 1→1, 2→2, 3→3, 4→5, 5→6, 6→7, 7→8, 8→9.
  // (a fase 4 "confirmar presença" é nova; edições antigas nunca lá estiveram)
  const map = { 1:1, 2:2, 3:3, 4:5, 5:6, 6:7, 7:8, 8:9 };
  return map[n] || n;
}

let _appCache = {};
const _appListeners = new Set();

const AppStore = {
  _cache() { return _appCache || {}; },
  _notify() { _appListeners.forEach(fn => fn({ ...this._cache() })); },

  // Reconstrói o cache a partir da edição ativa
  _syncFromActive() {
    const ed = (typeof EditionStore !== 'undefined') ? EditionStore.active() : null;
    if (!ed) { _appCache = {}; return; }
    _appCache = {
      ...(ed.data || {}),
      currentPhase: paPhaseFromStored(ed),
      editionTitle: ed.title,
      editionSubtitle: ed.subtitle,
      editionNumber: ed.number,
    };
  },

  // Grava uma chave de dados na edição ativa (substitui o valor inteiro).
  // Usar APENAS para valores primitivos ou substituições completas.
  // Para edições concorrentes em objects/arrays, usar _merge/_appendToArray/_modifyArray.
  async _set(key, value) {
    const ed = EditionStore.active();
    if (!ed) { console.warn('[PA AppStore] sem edição ativa'); return; }
    // Guardamos o estado anterior: se a escrita falhar de vez, a UI tem de
    // voltar atrás. Mostrar o novo valor depois de o servidor recusar é mentir.
    const prevCache = this._cache();
    const prevData = ed.data;
    _appCache = { ...prevCache, [key]: value };
    this._notify();
    const newData = { ...(ed.data || {}) };
    newData[key] = value;
    ed.data = newData;
    const ok = await this._updateWithRetry(ed.id, newData, key);
    if (!ok) { _appCache = prevCache; ed.data = prevData; this._notify(); }
    return ok;
  },

  // Escreve no Supabase com até 3 tentativas e backoff exponencial (300ms, 600ms).
  // Resiliente a falhas de rede transitórias; só avisa o utilizador se todas falharem.
  async _updateWithRetry(edId, newData, key) {
    const attempts = 3;
    for (let i = 0; i < attempts; i++) {
      try {
        // O servidor verifica quem escreve (token) e em que campos pode mexer.
        // Se o RPC ainda não existir (migração por correr), usa o caminho antigo.
        const r = await paRpc('edition_write', { p_edition_id: edId, p_data: newData });
        if (r.denied) return false;
        let error = null;
        if (r.legacy) { const w = await _sb.from('editions').update({ data: newData }).eq('id', edId); error = w.error; }
        else error = r.error ? { message: r.error } : null;
        if (!error) return true;
        if (i === attempts - 1) {
          console.error('[PA AppStore] erro a guardar', key, error.message);
          if (window._paToast) window._paToast('Não consegui guardar. Verifica a ligação.');
          return false;
        }
      } catch (e) {
        if (i === attempts - 1) {
          console.error('[PA AppStore] exceção a guardar', key, e.message);
          if (window._paToast) window._paToast('Não consegui guardar. Verifica a ligação.');
          return false;
        }
      }
      await new Promise(r => setTimeout(r, 300 * Math.pow(2, i)));
    }
    return false;
  },

  // Sincroniza o cache local a partir de novos dados da edição
  _applyNewData(ed, newData) {
    ed.data = newData;
    _appCache = {
      ...newData,
      currentPhase: paPhaseFromStored(ed),
      editionTitle: ed.title,
      editionSubtitle: ed.subtitle,
      editionNumber: ed.number,
    };
    this._notify();
  },

  // Fallback read-modify-write directo (quando as RPC não existem na BD).
  // Não é 100% atómico mas funciona; usado se o supabase-rpcs.sql ainda não correu.
  async _rmwFallback(key, transformFn, ed, revert) {
    try {
      const { data: fresh } = await _sb.from('editions').select('data').eq('id', ed.id).maybeSingle();
      const freshData = (fresh && fresh.data) || {};
      const newData = { ...freshData, [key]: transformFn(freshData[key]) };
      this._applyNewData(ed, newData);
      const ok = await this._updateWithRetry(ed.id, newData, key);
      if (!ok && revert) { revert(); }
      return ok;
    } catch (e) {
      console.error('[PA AppStore] fallback falhou:', key, e.message);
      if (revert) revert();
      if (window._paToast) window._paToast('Erro ao guardar. Tenta de novo.');
      return false;
    }
  },

  // Detecta se o erro é "função RPC não existe" (PostgREST PGRST202 ou 404)
  _isRpcMissing(error) {
    if (!error) return false;
    const msg = (error.message || '') + (error.code || '') + (error.hint || '');
    return /PGRST202|not exist|not found|404|schema cache|Could not find/i.test(msg);
  },

  // Merge profundo de chave-valor (para objects como votos, rsvp).
  // Tenta RPC atómica; se não existir, faz fallback read-modify-write.
  async _merge(key, deltaObj) {
    const ed = EditionStore.active();
    if (!ed) { console.warn('[PA AppStore] sem edição ativa'); return; }

    // Optimistic local update (UI feedback imediato)
    const prevCache = this._cache(); const prevData = ed.data;
    const revert = () => { _appCache = prevCache; ed.data = prevData; this._notify(); };
    const localCurrent = this._cache()[key] || {};
    _appCache = { ...(this._cache()), [key]: { ...localCurrent, ...deltaObj } };
    this._notify();

    try {
      const { data: newData, error } = await _sb.rpc('edition_merge_field', {
        edition_id: ed.id, field_name: key, delta: deltaObj, p_token: paToken(),
      });
      if (error) {
        // RPC indisponível → fallback
        return await this._rmwFallback(key, (cur) => ({ ...(cur || {}), ...deltaObj }), ed, revert);
      }
      if (newData) this._applyNewData(ed, newData);
    } catch (e) {
      return await this._rmwFallback(key, (cur) => ({ ...(cur || {}), ...deltaObj }), ed, revert);
    }
  },

  // Adiciona um item a um array atomicamente (dedup por id). Fallback se RPC faltar.
  async _appendToArray(key, item) {
    const ed = EditionStore.active();
    if (!ed) return;

    const prevCache = this._cache(); const prevData = ed.data;
    const revert = () => { _appCache = prevCache; ed.data = prevData; this._notify(); };
    const localCurrent = this._cache()[key] || [];
    _appCache = { ...(this._cache()), [key]: [...localCurrent, item] };
    this._notify();

    try {
      const { data: newData, error } = await _sb.rpc('edition_append_array', {
        edition_id: ed.id, field_name: key, item: item,
        p_token: paToken(),
      });
      if (error) {
        return await this._rmwFallback(key, (cur) => {
          const arr = cur || [];
          if (item && item.id && arr.some(x => x && x.id === item.id)) return arr;
          return [...arr, item];
        }, ed, revert);
      }
      if (newData) this._applyNewData(ed, newData);
    } catch (e) {
      return await this._rmwFallback(key, (cur) => {
        const arr = cur || [];
        if (item && item.id && arr.some(x => x && x.id === item.id)) return arr;
        return [...arr, item];
      }, ed, revert);
    }
  },

  // Remove items de um array por id atomicamente. Fallback se RPC faltar.
  async _removeFromArray(key, itemId) {
    const ed = EditionStore.active();
    if (!ed) return;

    const prevCache = this._cache(); const prevData = ed.data;
    const revert = () => { _appCache = prevCache; ed.data = prevData; this._notify(); };
    const localCurrent = this._cache()[key] || [];
    _appCache = { ...(this._cache()), [key]: localCurrent.filter(x => x && x.id !== itemId) };
    this._notify();

    try {
      const { data: newData, error } = await _sb.rpc('edition_remove_from_array', {
        edition_id: ed.id, field_name: key, item_id: itemId,
        p_token: paToken(),
      });
      if (error) {
        return await this._rmwFallback(key, (cur) => (cur || []).filter(x => !x || x.id !== itemId), ed, revert);
      }
      if (newData) this._applyNewData(ed, newData);
    } catch (e) {
      return await this._rmwFallback(key, (cur) => (cur || []).filter(x => !x || x.id !== itemId), ed, revert);
    }
  },

  // Modifica um array com função custom (fallback puro, sem RPC).
  async _modifyArray(key, fn) {
    const ed = EditionStore.active();
    if (!ed) return;
    const prevCache = this._cache(); const prevData = ed.data;
    const revert = () => { _appCache = prevCache; ed.data = prevData; this._notify(); };
    const localCurrent = this._cache()[key] || [];
    _appCache = { ...(this._cache()), [key]: fn(localCurrent) };
    this._notify();
    await this._rmwFallback(key, (cur) => fn(cur || []), ed, revert);
  },

  async clearKey(key) {
    const ed = EditionStore.active();
    if (!ed) return;
    const prevCache = this._cache(); const prevData = ed.data;
    _appCache = { ...(this._cache()) };
    delete _appCache[key];
    this._notify();
    const newData = { ...(ed.data || {}) };
    delete newData[key];
    ed.data = newData;
    // Escrita direta a editions está fechada por RLS; passa pela RPC edition_write.
    const ok = await this._updateWithRetry(ed.id, newData, key);
    if (!ok) { _appCache = prevCache; ed.data = prevData; this._notify(); }
    return ok;
  },

  async init() {
    // O EditionStore.init() já populou e sincronizou; nada a fazer aqui.
    this._syncFromActive();
  },

  load() { return this._cache(); },

  // ── Edição (metadata) ──
  getEdition() {
    const d = this._cache();
    return { title:d.editionTitle||'Nova Aventura', subtitle:d.editionSubtitle||'Algures no mundo.', number:d.editionNumber||1 };
  },
  async setEdition(t,s,n) {
    const ed = EditionStore.active();
    if (!ed) return;
    await EditionStore.update(ed.id, { title:t, subtitle:s, number:n||ed.number });
  },

  // ── Fase (guardada em editions.current_phase) ──
  getPhase()        { return this._cache().currentPhase || 1; },
  async setPhase(n) {
    const ed = EditionStore.active();
    if (!ed) return;
    _appCache = { ...(this._cache()), currentPhase: n };
    this._notify();
    ed.current_phase = n;
    // Marca a edição como já no fluxo v2: a partir daqui o número gravado JÁ é
    // da numeração nova e não deve voltar a ser traduzido na leitura.
    if (!(ed.data && ed.data.flow === 2)) {
      try { await this._set('flow', 2); } catch (e) { /* segue: a fase é o essencial */ }
    }
    await EditionStore.update(ed.id, { current_phase: n });
  },

  // ── RSVP ──
  setRsvp(uid,st)  {
    // Responder (ou ser adicionado pelo admin) readmite quem tinha sido removido.
    const removed = this._cache().removedMembers || [];
    if (removed.includes(uid)) this._set('removedMembers', removed.filter((x) => x !== uid));
    return this._merge('rsvp', { [uid]:st });
  },
  getRsvp(uid)     { return this._cache().rsvp?.[uid]||null; },
  getAllRsvp()     { return this._cache().rsvp||{}; },

  // ── Sugestões de localização ──
  getLocSuggestions()           { return this._cache().locSuggs||[]; },
  async addLocSuggestion(s)     { await this._appendToArray('locSuggs', s); },
  async removeLocSuggestion(id) {
    await this._removeFromArray('locSuggs', id);
    await this._cleanupOrphanVotes('locVotes', 'locWinner', id);
  },
  getLocWinner()                { return this._cache().locWinner||null; },
  async setLocWinner(id)        { await this._set('locWinner',id); },
  getLocVotes()                 { return this._cache().locVotes||{}; },
  async setLocVote(uid,id)      { await this._merge('locVotes', { [uid]:id }); },
  // Reset pessoal: limpar a própria disponibilidade (remove a chave — sem
  // resposta —, para todos os indicadores voltarem coerentemente a "a marcar").
  // Remove UMA chave de um objeto partilhado sem apagar o trabalho dos outros.
  // (O _set escreve o objeto inteiro a partir do cache local, que pode estar
  //  até 5s desatualizado: dois utilizadores em simultâneo perdiam dados.)
  async _deleteKeyFresh(field, key) {
    const ed = EditionStore.active();
    if (!ed) return;
    // Se não conseguirmos ler o estado atual do servidor, ABORTAMOS. Escrever o
    // objeto inteiro a partir de cache velha apagaria o que outros gravaram —
    // era exatamente o bug que esta função existe para evitar.
    let fresh = null;
    try {
      const { data, error } = await _sb.from('editions').select('data').eq('id', ed.id).single();
      if (error) throw new Error(error.message);
      fresh = (data && data.data) || {};
    } catch (e) {
      if (window._paToast) window._paToast('Sem ligação — tenta outra vez daqui a pouco.', 'error');
      return false;
    }
    const obj = { ...((fresh && fresh[field]) || {}) };
    if (!(key in obj)) { // nada a fazer; só sincroniza o cache
      _appCache = { ...(this._cache()), ...fresh };
      this._notify();
      return;
    }
    delete obj[key];
    const newData = { ...fresh, [field]: obj };
    const prevCache = this._cache();
    const prevData = ed.data;
    _appCache = { ...prevCache, ...newData };
    this._notify();
    ed.data = newData;
    const ok = await this._updateWithRetry(ed.id, newData, field);
    if (!ok) { _appCache = prevCache; ed.data = prevData; this._notify(); }
  },

  async clearAvailability(uid) {
    await this._deleteKeyFresh('avail', uid);
  },

  // Modo de votação da fase (single | points). Mudar de modo RECOMEÇA a
  // votação (limpa votos e vencedor) — misturar votos de modos diferentes
  // daria contagens sem sentido.
  async setVoteMode(kind, mode) {
    const isAcc = kind === 'acc';
    await this._set(isAcc ? 'accVotes' : 'locVotes', {});
    await this.clearKey(isAcc ? 'accWinner' : 'locWinner');
    await this._set(isAcc ? 'accVoteMode' : 'locVoteMode', mode);
  },

  // Reset pessoal: remover o próprio voto (volta a "por votar").
  async clearVote(uid, kind) {
    await this._deleteKeyFresh(kind === 'acc' ? 'accVotes' : 'locVotes', uid);
  },

  // Depois de remover uma sugestão, limpa votos que apontavam para ela e o
  // vencedor se era ela (reabre a decisão). Só escreve se houver mesmo órfãos,
  // por isso no caso comum (apagar na fase de sugestões, sem votos) não custa nada.
  async _cleanupOrphanVotes(votesKey, winnerKey, removedId) {
    // Ler fresco: senão apagávamos votos que outros deram enquanto o cache envelhecia.
    let d = this._cache();
    const ed0 = EditionStore.active();
    if (ed0) {
      try {
        const { data } = await _sb.from('editions').select('data').eq('id', ed0.id).single();
        if (data && data.data) { d = data.data; _appCache = { ...(this._cache()), ...d }; }
      } catch (e) {}
    }
    const votes = d[votesKey] || {};
    // Suporta voto simples (string) e Top 3 (array): remove o id apagado do
    // voto; se a lista ficar vazia, a pessoa volta a "por votar".
    const v = { ...votes };
    let changed = false;
    for (const uid of Object.keys(v)) {
      const val = v[uid];
      if (Array.isArray(val)) {
        if (val.includes(removedId)) {
          const rest = val.filter((x) => x !== removedId);
          if (rest.length) v[uid] = rest; else delete v[uid];
          changed = true;
        }
      } else if (val === removedId) {
        delete v[uid];
        changed = true;
      }
    }
    if (changed) await this._set(votesKey, v);
    if (d[winnerKey] === removedId) await this.clearKey(winnerKey);
  },

  // ── Sugestões de alojamento ──
  getAccSuggestions()           { return this._cache().accSuggs||[]; },
  async addAccSuggestion(s)     { await this._appendToArray('accSuggs', s); },
  async removeAccSuggestion(id) {
    await this._removeFromArray('accSuggs', id);
    await this._cleanupOrphanVotes('accVotes', 'accWinner', id);
  },
  getAccWinner()                { return this._cache().accWinner||null; },
  async setAccWinner(id)        { await this._set('accWinner',id); },
  getAccVotes()                 { return this._cache().accVotes||{}; },
  async setAccVote(uid,id)      { await this._merge('accVotes', { [uid]:id }); },

  // ── Disponibilidade ──
  getAvailability(uid)          { return (this._cache().avail||{})[uid] || []; },
  getAllAvailability()          { return this._cache().avail||{}; },
  async setAvailability(uid,days){ await this._merge('avail', { [uid]:days }); },

  // ── Presença firme (fase 4 "Confirmar presença") ──
  getGoing()                    { return this._cache().going||{}; },
  async setGoing(uid, val)      { await this._merge('going', { [uid]: !!val }); },

  // ── Datas trancadas ──
  getLockedDates()              { return this._cache().locked||null; },
  async setLockedDates(from,to,monthLabel){
    const val = (typeof from === 'object' && from !== null) ? from : { from, to, monthLabel };
    await this._set('locked', val);
  },

  // ── Planeamento ──
  getPlanning() { return this._cache().planData || { costs:{perPerson:0,breakdown:[],paid:{}}, itinerary:[],activities:[],shopping:[],packing:[],pois:[] }; },
  async setPlanning(p) { await this._set('planData',p); },
  // Atualização segura do planeamento via função transformadora (read-modify-write).
  // Reduz drasticamente a janela de race quando vários editam custos/itinerário em simultâneo.
  async updatePlanning(transformFn) {
    const ed = EditionStore.active();
    if (!ed) return;
    const emptyPlan = { costs:{ perPerson:0, breakdown:[], paid:{} }, itinerary:[], activities:[], shopping:[], packing:[], pois:[] };
    // Optimistic local
    const prevCache = this._cache(); const prevData = ed.data;
    const localPlan = this.getPlanning();
    _appCache = { ...(this._cache()), planData: transformFn(localPlan) };
    this._notify();
    // Read-modify-write a partir do servidor (via RPC edition_write; direto está fechado por RLS).
    try {
      const { data: fresh } = await _sb.from('editions').select('data').eq('id', ed.id).maybeSingle();
      const freshData = (fresh && fresh.data) || {};
      const freshPlan = freshData.planData || emptyPlan;
      const newPlan = transformFn(freshPlan);
      const newData = { ...freshData, planData: newPlan };
      this._applyNewData(ed, newData);
      const ok = await this._updateWithRetry(ed.id, newData, 'planData');
      if (!ok) { _appCache = prevCache; ed.data = prevData; this._notify(); }
    } catch (e) {
      console.error('[PA AppStore] planning falhou:', e.message);
      _appCache = prevCache; ed.data = prevData; this._notify();
      if (window._paToast) window._paToast('Não consegui guardar. Verifica a ligação.');
    }
  },

  // ── Anúncios do admin ──
  getAnnouncements()            { return this._cache().announcements || []; },
  async addAnnouncement(ann)    { await this._appendToArray('announcements', ann); },
  async removeAnnouncement(id)  { await this._removeFromArray('announcements', id); },

  // ── Gestão de membros da edição (admin) ──
  // Editar estado: usa setRsvp. Remover: limpa tudo o que o membro tem nesta edição
  // (RSVP, votos, disponibilidade, sugestões) sem apagar o perfil global.
  async removeMember(uid) {
    const ed = EditionStore.active();
    if (!ed) { console.warn('[PA AppStore] sem edição ativa'); return; }

    // Lê o estado FRESCO do servidor (não a cache local) para não apagar
    // alterações recentes de outros membros (ex: um voto dado há segundos).
    let base = this._cache();
    try {
      const { data: fresh } = await _sb.from('editions').select('data').eq('id', ed.id).single();
      if (fresh && fresh.data) base = fresh.data;
    } catch (e) { /* offline: usa a cache local, melhor que nada */ }

    const omit = (obj) => { const o = { ...(obj || {}) }; delete o[uid]; return o; };
    const removedLocIds = new Set((base.locSuggs || []).filter((s) => s.by === uid).map((s) => s.id));
    const removedAccIds = new Set((base.accSuggs || []).filter((s) => s.by === uid).map((s) => s.id));
    // Limpa também votos órfãos: votos de QUALQUER pessoa que apontavam para
    // sugestões do removido deixam de fazer sentido — essas pessoas votam de novo.
    const dropOrphans = (votes, removedIds) => {
      const v = omit(votes);
      for (const k of Object.keys(v)) if (removedIds.has(v[k])) delete v[k];
      return v;
    };

    const newData = { ...base,
      rsvp: omit(base.rsvp),
      avail: omit(base.avail),
      locSuggs: (base.locSuggs || []).filter((s) => s.by !== uid),
      accSuggs: (base.accSuggs || []).filter((s) => s.by !== uid),
      locVotes: dropOrphans(base.locVotes, removedLocIds),
      accVotes: dropOrphans(base.accVotes, removedAccIds),
      // Marca como removido desta edição: sai do universo da fase 1 e de
      // "quem falta" (senão reapareceria como pendente). Responder readmite.
      removedMembers: [...(base.removedMembers || []).filter((x) => x !== uid), uid],
    };
    // Vencedor órfão (a sugestão vencedora era do removido): reabre a decisão.
    if (removedLocIds.has(newData.locWinner)) delete newData.locWinner;
    if (removedAccIds.has(newData.accWinner)) delete newData.accWinner;

    // UMA escrita atómica (em vez de 6 sequenciais): janela de conflito mínima.
    _appCache = newData;
    ed.data = newData;
    this._notify();
    await this._updateWithRetry(ed.id, newData, 'removeMember');
  },

  // ── Reset da edição ativa ──
  async resetEdition() {
    const ed = EditionStore.active();
    if (!ed) return;
    await EditionStore.reset(ed.id);
  },

  subscribe(fn)   { _appListeners.add(fn); },
  unsubscribe(fn) { _appListeners.delete(fn); },
};

// Compara dados por conteúdo — evita re-renders "fantasma" do polling/realtime
// (no mobile, o realtime reconecta e o visibilitychange dispara muito; sem isto
// a página parecia "atualizar sozinha" a cada poucos segundos).
function _paSame(a, b) {
  if (a === b) return true;
  try { return JSON.stringify(a) === JSON.stringify(b); } catch { return false; }
}

// ─────────────────────────────────────────────────────────────
// Presença online (bolinha verde): usa o Presence nativo do Supabase Realtime.
// Cada app aberta anuncia-se num channel partilhado; sem escritas na BD.
// "Online" = app aberta E visível (ao mudar de app/tab, sai — honesto).
// ─────────────────────────────────────────────────────────────
const PresenceStore = {
  _online: new Set(),
  _subs: new Set(),
  _ch: null,
  _uid: null,
  _visBound: false,
  start(uid) {
    if (!_sb || !uid || (this._ch && this._uid === uid)) return;
    this.stop();
    this._uid = uid;
    const ch = _sb.channel('pa-presence', { config: { presence: { key: uid } } });
    this._ch = ch;
    ch.on('presence', { event: 'sync' }, () => {
      const ids = new Set(Object.keys(ch.presenceState() || {}));
      const changed = ids.size !== this._online.size || [...ids].some((i) => !this._online.has(i));
      this._online = ids;
      if (changed) this._notify();
    });
    ch.subscribe((status) => {
      if (status === 'SUBSCRIBED') { try { ch.track({ at: Date.now() }); } catch (e) {} }
    });
    if (!this._visBound) {
      this._visBound = true;
      document.addEventListener('visibilitychange', () => {
        const c = this._ch;
        if (!c) return;
        try { document.hidden ? c.untrack() : c.track({ at: Date.now() }); } catch (e) {}
      });
    }
  },
  stop() {
    if (!this._ch) return;
    try { this._ch.untrack(); _sb.removeChannel(this._ch); } catch (e) {}
    this._ch = null; this._uid = null;
    if (this._online.size) { this._online = new Set(); this._notify(); }
  },
  isOnline(uid) { return this._online.has(uid); },
  subscribe(fn) { this._subs.add(fn); return () => this._subs.delete(fn); },
  _notify() { this._subs.forEach((f) => { try { f(this._online); } catch (e) {} }); },
};
Object.assign(window, { PresenceStore });

// Hook reativo: devolve o Set de ids online (re-renderiza só quando muda).
function usePresence() {
  const [online, setOnline] = React.useState(() => new Set(PresenceStore._online));
  React.useEffect(() => PresenceStore.subscribe((ids) => setOnline(new Set(ids))), []);
  return online;
}
Object.assign(window, { usePresence });

function useAppStore() {
  const [data, setData] = React.useState(() => AppStore._cache());
  React.useEffect(() => {
    const update = (d) => setData(prev => _paSame(prev, d) ? prev : d);
    AppStore.subscribe(update);
    update(AppStore._cache());
    return () => AppStore.unsubscribe(update);
  }, []);
  return data;
}

// VoteStore — phase keys 'loc' e 'acc' (como os componentes usam)
const VoteStore = {
  getLocVotes()          { return AppStore.getLocVotes(); },
  setLocVote(uid,id)     { return AppStore.setLocVote(uid,id); },
  getAccVotes()          { return AppStore.getAccVotes(); },
  setAccVote(uid,id)     { return AppStore.setAccVote(uid,id); },
  getVote(uid,phase)     {
    const v = (phase === 'acc') ? this.getAccVotes() : this.getLocVotes();
    return v[uid] || null;
  },
  setVote(uid,phase,id)  {
    return (phase === 'acc') ? this.setAccVote(uid,id) : this.setLocVote(uid,id);
  },
  clearVote(uid,phase)   { return AppStore.clearVote(uid, phase); },
};

// ─────────────────────────────────────────────────────────────
// ChatStore — chat_messages no Supabase + Realtime/polling
// ─────────────────────────────────────────────────────────────
let _chatCache = null;
const _chatListeners = new Set();

const ChatStore = {
  // Ao sair da app o chat deixa de consultar o servidor (poupa rede e bateria).
  stop() {
    if (this._pollingInterval) { clearInterval(this._pollingInterval); this._pollingInterval = null; }
    try { _sb.getChannels().filter((c) => c.topic && c.topic.includes('chat')).forEach((c) => _sb.removeChannel(c)); } catch (e) {}
  },
  _visibilitySetup: false,
  _setupVisibility() {
    if (this._visibilitySetup) return;
    this._visibilitySetup = true;
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) this._pollOnce();
    });
  },
  async _pollOnce() {
    const lastId = (_chatCache && _chatCache.length > 0) ? _chatCache[_chatCache.length-1].id : 0;
    const { data } = await _sb.from('chat_messages')
      .select('id,profile_id,text,created_at').gt('id', lastId).order('created_at',{ascending:true});
    if (data && data.length > 0) {
      const newMsgs = data.filter(r => !(_chatCache||[]).some(m=>m.id===r.id))
        .map(r => ({ id:r.id, who:r.profile_id, text:r.text, when:_fmtTime(r.created_at) }));
      if (newMsgs.length) {
        _chatCache = [...(_chatCache||[]), ...newMsgs];
        _chatListeners.forEach(fn=>fn(_chatCache.slice()));
      }
    }
  },
  async load() {
    // Só as últimas 200 (mais recentes primeiro no servidor, depois invertidas):
    // evita puxar o histórico inteiro a cada arranque à medida que cresce.
    const { data } = await _sb.from('chat_messages').select('id,profile_id,text,created_at').order('created_at',{ascending:false}).limit(200);
    const rows = (data||[]).slice().reverse();
    _chatCache = rows.map(r => ({ id:r.id, who:r.profile_id, text:r.text, when:_fmtTime(r.created_at) }));
    return _chatCache;
  },
  _pollingInterval: null,
  async init() {
    await this.load();
    this._setupVisibility();
    _chatListeners.forEach(fn=>fn(_chatCache.slice()));
    try {
      const ch = _sb.channel('chat_rt')
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'chat_messages'},payload=>{
          const r=payload.new;
          if ((_chatCache||[]).some(m=>m.id===r.id)) return; // evita duplicados
          _chatCache=[...(_chatCache||[]),{id:r.id,who:r.profile_id,text:r.text,when:_fmtTime(r.created_at)}];
          _chatListeners.forEach(fn=>fn(_chatCache.slice()));
        })
        .on('postgres_changes',{event:'DELETE',schema:'public',table:'chat_messages'},payload=>{
          _chatCache=(_chatCache||[]).filter(m=>m.id!==payload.old.id);
          _chatListeners.forEach(fn=>fn(_chatCache.slice()));
        })
        .subscribe((status) => {
          if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') this._startPolling();
        });
      setTimeout(() => { if (ch.state !== 'joined') this._startPolling(); }, 5000);
    } catch(e) { this._startPolling(); }
  },
  _startPolling() {
    if (this._pollingInterval) return;
    this._pollingInterval = setInterval(async () => {
      if (document.hidden) return;
      const lastId = (_chatCache && _chatCache.length > 0) ? _chatCache[_chatCache.length-1].id : 0;
      const { data } = await _sb.from('chat_messages')
        .select('id,profile_id,text,created_at').gt('id', lastId).order('created_at',{ascending:true});
      if (data && data.length > 0) {
        const newMsgs = data.filter(r => !(_chatCache||[]).some(m=>m.id===r.id))
          .map(r => ({ id:r.id, who:r.profile_id, text:r.text, when:_fmtTime(r.created_at) }));
        if (newMsgs.length) {
          _chatCache = [...(_chatCache||[]), ...newMsgs];
          _chatListeners.forEach(fn=>fn(_chatCache.slice()));
        }
      }
    }, 4000);
  },
};

function _fmtTime(iso) {
  try { return new Date(iso).toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit' }); }
  catch { return 'agora'; }
}

function getChatMessages()   { return _chatCache || []; }
async function pushChatMessage(msg) {
  // Devolve true/false para o caller poder reagir (ex: repor o texto no input).
  // Uma mensagem perdida SEM aviso é pior do que uma falha visível.
  try {
    // O autor vem do TOKEN, não do cliente: ninguém escreve em nome de outro.
    const rp = await paRpc('chat_send', { p_text: msg.text });
    if (rp.denied) return false;
    let data = null, error = null;
    if (rp.legacy) {
      const r = await _sb.from('chat_messages').insert({ profile_id:msg.who, text:msg.text }).select().single();
      data = r.data; error = r.error;
    } else if (rp.error) { error = { message: rp.error }; }
    else data = rp.data;
    if (error) throw new Error(error.message);
    // Optimista: adiciona já localmente (realtime/polling evitam duplicado por id)
    if (data && !(_chatCache||[]).some(m=>m.id===data.id)) {
      _chatCache=[...(_chatCache||[]),{id:data.id,who:data.profile_id,text:data.text,when:_fmtTime(data.created_at)}];
      _chatListeners.forEach(fn=>fn(_chatCache.slice()));
    }
    return true;
  } catch (e) {
    console.error('[PA Chat] erro a enviar', e.message);
    if (window._paToast) window._paToast('Mensagem não enviada — verifica a ligação.', 'error');
    return false;
  }
}
async function deleteChatMessage(id) {
  const prev = _chatCache ? _chatCache.slice() : [];
  const restore = (msg) => { _chatCache = prev; _chatListeners.forEach(fn=>fn(_chatCache.slice())); if (window._paToast) window._paToast(msg || 'Não consegui apagar a mensagem.', 'error'); };
  _chatCache=(_chatCache||[]).filter(m=>m.id!==id);  // optimista
  _chatListeners.forEach(fn=>fn(_chatCache.slice()));
  const rp = await paRpc('chat_delete', { p_message_id: id });
  if (rp.denied) { restore('Sessão inválida. Entra de novo.'); return; }
  let error = null;
  if (rp.legacy) { const r = await _sb.from('chat_messages').delete().eq('id', id); error = r.error; }
  else if (rp.error) error = { message: rp.error };
  else if (rp.data === false) error = { message: 'Sem permissão para apagar esta mensagem.' };
  if (error) { console.error('[PA Chat] erro a apagar', error.message); restore(error.message); }
}

function useChat() {
  const [msgs, setMsgs] = React.useState(() => getChatMessages().slice());
  React.useEffect(() => {
    const update = (list) => setMsgs(prev => _paSame(prev, list) ? prev : list);
    update(getChatMessages().slice());
    _chatListeners.add(update);
    return () => _chatListeners.delete(update);
  }, []);
  return msgs;
}

// readPhotoFile — com downscale para não encher a DB
async function readPhotoFile(file) {
  if (!file) return null;
  const dataUrl = await new Promise((res,rej) => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.onerror = () => rej(new Error('Não consegui ler a foto.'));
    fr.readAsDataURL(file);
  });
  try {
    const img = await new Promise((res,rej) => { const im = new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=dataUrl; });
    const max = 320; // 320px chega para um avatar de 64px em ecrã retina
    const scale = Math.min(1, max / Math.max(img.width, img.height));
    const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
    const canvas = document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    return canvas.toDataURL('image/jpeg', 0.8);
  } catch { return dataUrl; }
}

// ─────────────────────────────────────────────────────────────
// Reports de problemas: descrição + screenshot opcional (comprimido no
// cliente para não pesar na BD; o admin pode apagar tudo a qualquer momento).
// ─────────────────────────────────────────────────────────────
async function readBugImage(file) {
  if (!file) return null;
  const dataUrl = await new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.onerror = () => rej(new Error('Não consegui ler a imagem.'));
    fr.readAsDataURL(file);
  });
  const img = await new Promise((res, rej) => { const im = new Image(); im.onload = () => res(im); im.onerror = () => rej(new Error('Imagem inválida.')); im.src = dataUrl; });
  // Screenshots precisam de mais resolução que avatares (para se ler o texto),
  // mas comprimidas: max 1000px no lado maior, JPEG a 70%.
  const max = 1000;
  const scale = Math.min(1, max / Math.max(img.width, img.height));
  const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  const out = canvas.toDataURL('image/jpeg', 0.7);
  // Teto duro: ~350KB depois de comprimir. Protege a BD gratuita.
  if (out.length > 350 * 1024) throw new Error('A imagem ficou demasiado pesada mesmo comprimida — tenta um recorte mais pequeno.');
  return out;
}

const BugReportStore = {
  async submit({ byId, byName, description, image }) {
    const rp = await paRpc('bug_report_send', {
      p_description: String(description || '').slice(0, 800),
      p_image: image || null,
    });
    if (rp.denied) return;
    if (rp.error) throw new Error(rp.error);
    if (!rp.legacy) return;
    const { error } = await _sb.from('bug_reports').insert({
      by_id: byId || null, by_name: byName || null,
      description: String(description || '').slice(0, 800),
      image: image || null,
    });
    if (error) throw new Error(error.message);
  },
  async list() {
    // A tabela deixa de ser legível diretamente: só o admin, via RPC.
    const rp = await paRpc('bug_reports_list', {});
    if (rp.denied) return [];
    if (!rp.legacy) { if (rp.error) throw new Error(rp.error); return rp.data || []; }
    const { data, error } = await _sb.from('bug_reports').select('*').order('created_at', { ascending: false });
    if (error) throw new Error(error.message);
    return data || [];
  },
  async remove(id) {
    const rp = await paRpc('bug_reports_clear', { p_report_id: id });
    if (rp.denied) return;
    if (rp.error) throw new Error(rp.error);
    if (rp.legacy) { const r = await _sb.from('bug_reports').delete().eq('id', id); if (r.error) throw new Error(r.error.message); return; }
    if (rp.data === -1) throw new Error('Só o admin pode apagar reports.');
  },
  async removeAll() {
    const rp = await paRpc('bug_reports_clear', { p_report_id: null });
    if (rp.denied) return;
    if (rp.error) throw new Error(rp.error);
    if (rp.legacy) { const r = await _sb.from('bug_reports').delete().gte('created_at','1970-01-01'); if (r.error) throw new Error(r.error.message); return; }
    if (rp.data === -1) throw new Error('Só o admin pode apagar reports.');
  },
};
Object.assign(window, { BugReportStore, readBugImage });

async function initSupabase() {
  // Sessões antigas (sem token) ou mortas saem já, com explicação no login —
  // em vez de baterem com a cara na porta a meio de uma votação.
  await paEnsureSession();
  // Avatares do disco primeiro (instantâneo). Se não houver, espera pela rede.
  if (AuthStore.loadUsersFromDisk()) {
    AuthStore.refreshUsers().catch(() => {}); // refresca em segundo plano
  } else {
    await AuthStore.refreshUsers();
  }
  // EditionStore antes do AppStore (AppStore depende da edição ativa)
  await EditionStore.init();
  await Promise.all([AppStore.init(), ChatStore.init()]);
  // Mantém cache de utilizadores atualizado (display_name incluído)
  try {
    _sb.channel('profiles_ch').on('postgres_changes', { event:'*', schema:'public', table:'profiles' }, async (payload) => {
      // Só o perfil que mudou; trazer os 14 (com fotos) por causa de um nome
      // custava 1,3 MB a toda a gente.
      if (payload && payload.new && payload.new.id) AuthStore.patchUser(payload.new);
      else await AuthStore.refreshUsers();
      _appListeners.forEach(fn => fn(AppStore._cache()));
      // Força chat a re-renderizar com nomes atualizados
      _chatListeners.forEach(fn => fn((_chatCache||[]).slice()));
    }).subscribe();
  } catch {}
}

Object.assign(window, {
  _sb, safeStore, AuthStore, AppStore, VoteStore, ChatStore, EditionStore,
  useAuth: function() {
    const [user, setUser] = React.useState(() => _session);
    // A app pode decidir sozinha que a sessão morreu (arranque, ou escrita
    // recusada). Aqui reagimos: ecrã de entrada, sem recarregar a página.
    React.useEffect(() => {
      const h = () => setUser(null);
      window.addEventListener('pa-force-logout', h);
      return () => window.removeEventListener('pa-force-logout', h);
    }, []);
    const login    = async (name,pw)  => { const s=await AuthStore.login(name,pw);    setUser(s); return s; };
    const register = async (opts)     => { const s=await AuthStore.register(opts);    setUser(s); return s; };
    const updateProfile = async (opts) => { const s=await AuthStore.updateProfile(opts); setUser(s); return s; };
    const logout   = ()               => {
      _sessionHash = null; // credencial em memória some ao sair
      try { if (paToken()) _sb.rpc('auth_logout', { p_token: paToken() }); } catch (e) {}
      paSetToken(null);
      try { if (typeof ChatStore !== 'undefined') ChatStore.stop(); } catch (e) {}
      try { if (typeof EditionStore !== 'undefined') EditionStore.setActive(null); } catch {}
      AuthStore.clearSession();
      setUser(null);
    };
    return { user, login, register, updateProfile, logout };
  },
  useAppStore, useEditions, useChat, getChatMessages, pushChatMessage, deleteChatMessage,
  readPhotoFile, initSupabase, ADMIN_NAME,
});
</script>

function LoginScreen({ auth, onSwitch, narrow }) {
  const [name, setName] = aUseState('');
  const [pw, setPw]     = aUseState('');
  const [busy, setBusy] = aUseState(false);
  const [err, setErr]   = aUseState(null);
  // A app expulsou-nos por alguma razão? Dizê-la é melhor do que um ecrã mudo.
  const [notice] = aUseState(() => {
    try {
      const r = localStorage.getItem('pa-relogin');
      if (r) localStorage.removeItem('pa-relogin');
      return r;
    } catch (e) { return null; }
  });

  const submit = async (e) => {
    e.preventDefault();
    setBusy(true); setErr(null);
    try { await auth.login(name, pw); }
    catch (ex) { setErr(ex.message); setBusy(false); }
  };

  return (
    <AuthLayout narrow={narrow}>
      <div style={{ fontFamily: 'var(--pa-display)', fontSize: 36, fontWeight: 600, letterSpacing: -1.2, lineHeight: 1 }}>
        Bem-vindo<br/>de volta.

        Inicia sessão para entrar na edição em curso.

        <div role="status" style={{ marginTop: 14, padding: '12px 14px', borderRadius: 12,

          fontFamily: 'var(--pa-body)', fontSize: 13, color: 'var(--pa-ink)', lineHeight: 1.5 }}>
          {notice === 'upgrade'
            ? <>🔒 Reforçámos a segurança da app. Entra outra vez — é só desta.</>
            : <>A tua sessão expirou. Entra outra vez para continuares.</>}
        </div>
      )}

      <form onSubmit={submit} style={{ marginTop: 28, display: 'flex', flexDirection: 'column', gap: 14 }}>
        <Field label="O teu nome" placeholder="O teu nome" value={name} onChange={setName} />
        <AuthPasswordField label="Password" value={pw} onChange={setPw} />
        {err && <AuthError msg={err} />}
        <button type="submit" disabled={busy} style={{
          marginTop: 6, height: 52, borderRadius: 999, border: 'none',
          background: 'var(--pa-ink)', color: '#fff', cursor: busy ? 'default' : 'pointer',
          fontFamily: 'var(--pa-body)', fontSize: 15, fontWeight: 600,
          opacity: busy ? 0.5 : 1,
        }}>{busy ? 'A entrar...' : 'Entrar'}</button>
      </form>

      <div style={{ marginTop: 22, paddingTop: 22, borderTop: '1px solid var(--pa-line)', textAlign: 'center', fontSize: 13.5, color: 'var(--pa-muted)' }}>
        Ainda não tens conta? <button type="button" onClick={onSwitch} style={{
          background: 'none', border: 'none', color: 'var(--pa-accent)',
          fontFamily: 'inherit', fontSize: 'inherit', fontWeight: 600, cursor: 'pointer', padding: 0,
        }}>Cria a tua →</button>

  );
}
