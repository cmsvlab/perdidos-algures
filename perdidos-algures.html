          <Avatar member={preview} size={64} />
          <div style={{ flex:1 }}>
            <Btn variant="soft" size="sm" onClick={()=>fileRef.current?.click()}>Mudar foto</Btn>
            {photo && <Btn variant="ghost" size="sm" style={{ marginLeft:8 }} onClick={()=>setPhoto(null)}>Remover</Btn>}
            <input ref={fileRef} type="file" accept="image/*" onChange={onPick} style={{ display:'none' }} />
          </div>
        </div>
        <Field label="Nome de exibição" value={displayName} onChange={setDisplayName} placeholder="Como queres aparecer" />
        <div style={{ padding:'10px 14px', borderRadius:12, background:'rgba(31,26,20,0.04)', border:'1px solid var(--pa-line)' }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Nome de login (fixo)</div>
          <div style={{ fontFamily:'var(--pa-body)', fontSize:14, marginTop:2 }}>{me?.name}</div>
        </div>
        {err && <AuthError msg={err} />}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
          padding:'10px 0 2px', borderTop:'1px solid var(--pa-line)', marginTop:4 }}>
          <span style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)' }}>Idioma / Language</span>
          <LangSwitch size="md" />
        </div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'2px 0 6px' }}>
          <span style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)' }}>Password</span>
          <Btn variant="ghost" size="sm" onClick={() => { onClose(); setTimeout(() => window.dispatchEvent(new CustomEvent('pa-change-password')), 120); }}>
            Mudar password
          </Btn>
        </div>
        <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
          <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
          <Btn variant="accent" onClick={save} disabled={busy}>{busy ? 'A guardar...' : 'Guardar'}</Btn>
        </div>
      </div>
    </PAModal>
  );
}

// ─────────────────────────────────────────────────────────────
// Anúncios do admin — banner (vista de quem recebe) + modais de gestão
// ─────────────────────────────────────────────────────────────

// Banner que mostra ao utilizador os anúncios destinados a ele (todos ou individuais).
// Pode dispensar cada um; os dispensados ficam guardados localmente.
function AnnouncementBanner({ me }) {
  const appData = useAppStore();
  const [dismissed, setDismissed] = hUseState(() => {
    try { return JSON.parse(localStorage.getItem('pa-ann-dismissed') || '[]'); } catch { return []; }
  });
  const anns = (appData.announcements || []).filter((a) =>
    (a.target === 'all' || a.target === me?.id) && !dismissed.includes(a.id)
  );
  if (!anns.length) return null;
  const dismiss = (id) => {
    // Poda IDs de anúncios que já não existem (senão a lista cresce para sempre).
    const liveIds = new Set((appData.announcements || []).map((a) => a.id));
    const next = [...dismissed.filter((d) => liveIds.has(d)), id];
    setDismissed(next);
    try { localStorage.setItem('pa-ann-dismissed', JSON.stringify(next)); } catch {}
  };
  return (
    <div role="status" aria-live="polite" style={{ display:'flex', flexDirection:'column', gap:8, padding:'max(10px, env(safe-area-inset-top)) 14px 0', flexShrink:0 }}>
      {anns.map((a) => (
        <div key={a.id} style={{ display:'flex', alignItems:'flex-start', gap:10, background:'var(--pa-ink)', color:'#fff',
          borderRadius:12, padding:'11px 12px', boxShadow:'0 3px 14px rgba(0,0,0,0.12)' }}>
          <span style={{ fontSize:15, lineHeight:1.2, flexShrink:0 }}>📢</span>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:9, letterSpacing:1, opacity:0.55, textTransform:'uppercase' }}>
              {a.target === 'all' ? 'Anúncio' : 'Mensagem para ti'} · {a.byName || 'Admin'}
            </div>
            <div style={{ fontFamily:'var(--pa-body)', fontSize:13.5, marginTop:2, lineHeight:1.4, whiteSpace:'pre-wrap', wordBreak:'break-word' }}>{a.text}</div>
          </div>
          <button onClick={() => dismiss(a.id)} aria-label="Dispensar" style={{ flexShrink:0, width:24, height:24, borderRadius:999,
            border:'none', background:'rgba(255,255,255,0.15)', color:'#fff', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', padding:0 }}>
            <svg width="10" height="10" viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="#fff" strokeWidth="1.6" strokeLinecap="round"/></svg>
          </button>
        </div>
      ))}
    </div>
  );
}

// Modal de report de problemas: qualquer membro descreve e anexa screenshot;
// o admin vê a lista dos reports e pode apagar (um a um ou todos) para
// libertar espaço na base de dados gratuita.
function BugReportModal({ open, onClose, me, isAdmin }) {
  const [desc, setDesc] = hUseState('');
  const [img, setImg] = hUseState(null);
  const [busy, setBusy] = hUseState(false);
  const [sent, setSent] = hUseState(false);
  const [reports, setReports] = hUseState(null); // admin: lista carregada on-open
  const [expanded, setExpanded] = hUseState(null);

  const loadReports = async () => {
    try { setReports(await BugReportStore.list()); } catch (e) { setReports([]); }
  };
  hUseEffect(() => {
    if (open) { setDesc(''); setImg(null); setSent(false); setExpanded(null); if (isAdmin) loadReports(); }
  }, [open]);

  const attach = async (file) => {
    if (!file) return;
    try { setImg(await readBugImage(file)); }
    catch (e) { if (window._paToast) window._paToast(e.message, 'error'); }
  };

  const submit = async () => {
    if (!desc.trim()) return;
    setBusy(true);
    try {
      await BugReportStore.submit({ byId: me?.id, byName: me?.name, description: desc.trim(), image: img });
      setSent(true); setDesc(''); setImg(null);
      if (window._paToast) window._paToast('Obrigado! Problema reportado.', 'success');
      if (isAdmin) loadReports();
    } catch (e) { if (window._paToast) window._paToast('Não consegui enviar: ' + e.message, 'error'); }
    finally { setBusy(false); }
  };

  return (
    <PAModal open={open} onClose={onClose} title="🐞 Reportar um problema" maxWidth={520}>
      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
        {!sent ? (
          <>
            <div style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)', lineHeight:1.5 }}>
              Encontraste algo estranho? Descreve o que aconteceu (e onde) — um screenshot ajuda imenso.
            </div>
            <textarea value={desc} onChange={(e) => setDesc(e.target.value)} rows={4} maxLength={800}
              placeholder="O que aconteceu, e onde"
              style={{ width:'100%', boxSizing:'border-box', padding:'12px 14px', borderRadius:12, border:'1px solid var(--pa-line)',
                fontFamily:'var(--pa-body)', fontSize:16, color:'var(--pa-ink)', resize:'vertical', outline:'none', background:'#fff' }} />
            <div style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>
              <label style={{ display:'inline-flex', alignItems:'center', gap:7, padding:'9px 14px', borderRadius:12,
                border:'1px dashed var(--pa-line)', background:'#fff', cursor:'pointer',
                fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)' }}>
                📎 {img ? 'Trocar imagem' : 'Anexar imagem (opcional)'}
                <input type="file" accept="image/*" style={{ display:'none' }}
                  onChange={(e) => { attach(e.target.files && e.target.files[0]); e.target.value=''; }} />
              </label>
              {img && (
                <span style={{ display:'inline-flex', alignItems:'center', gap:8 }}>
                  <img src={img} alt="anexo" style={{ height:44, borderRadius:8, border:'1px solid var(--pa-line)' }} />
                  <button onClick={() => setImg(null)} aria-label="Remover imagem"
                    style={{ border:'none', background:'transparent', color:'var(--pa-muted)', cursor:'pointer', fontSize:15 }}>×</button>
                </span>
              )}
            </div>
            <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
              <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
              <Btn variant="accent" onClick={submit} disabled={busy || !desc.trim()}>{busy ? 'A enviar…' : 'Enviar report'}</Btn>
            </div>
          </>
        ) : (
          <div style={{ textAlign:'center', padding:'8px 0' }}>
            <div style={{ fontSize:34 }}>🙏</div>
            <div style={{ fontFamily:'var(--pa-display)', fontSize:18, fontWeight:600, marginTop:6 }}>Recebido!</div>
            <div style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)', marginTop:4 }}>O problema vai ser analisado. Obrigado por ajudares a melhorar a app.</div>
            <Btn variant="soft" style={{ marginTop:14 }} onClick={onClose}>Fechar</Btn>
          </div>
        )}

        {isAdmin && (
          <div style={{ borderTop:'1px solid var(--pa-line)', paddingTop:12 }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
              <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>
                Reports recebidos {reports ? `(${reports.length})` : ''}
              </div>
              {reports && reports.length > 0 && (
                <button onClick={async () => { if (!window.confirm('Apagar TODOS os reports? Isto liberta o espaço das imagens na base de dados.')) return;
                  try { await BugReportStore.removeAll(); loadReports(); if (window._paToast) window._paToast('Reports apagados.', 'success'); } catch (e) {} }}
                  style={{ border:'none', background:'transparent', color:'var(--pa-muted)', textDecoration:'underline', cursor:'pointer', fontFamily:'var(--pa-body)', fontSize:12 }}>
                  Apagar todos
                </button>
              )}
            </div>
            {!reports && <div style={{ fontFamily:'var(--pa-body)', fontSize:12.5, color:'var(--pa-muted)' }}>A carregar…</div>}
            {reports && reports.length === 0 && <div style={{ fontFamily:'var(--pa-body)', fontSize:12.5, color:'var(--pa-muted)' }}>Sem reports — tudo limpo. 🎉</div>}
            {reports && reports.length > 0 && (
              <div className="pa-scroll" style={{ display:'flex', flexDirection:'column', gap:8, maxHeight:260, overflow:'auto' }}>
                {reports.map((r) => (
                  <div key={r.id} style={{ padding:'10px 12px', borderRadius:12, background:'rgba(31,26,20,0.02)', border:'1px solid var(--pa-line)' }}>
                    <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
                      <span style={{ fontFamily:'var(--pa-body)', fontSize:12.5, fontWeight:700 }}>{r.by_name || 'Anónimo'}</span>
                      <span style={{ fontFamily:'var(--pa-mono)', fontSize:9.5, color:'var(--pa-muted)' }}>{new Date(r.created_at).toLocaleString(PA_LANG.locale(), { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' })}</span>
                      <button onClick={async () => { try { await BugReportStore.remove(r.id); loadReports(); } catch (e) {} }}
                        aria-label="Apagar report" title="Apagar (liberta espaço na BD)"
                        style={{ marginLeft:'auto', border:'none', background:'transparent', color:'var(--pa-muted)', cursor:'pointer', fontSize:14 }}>🗑</button>
                    </div>
                    <div style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-ink)', marginTop:4, whiteSpace:'pre-wrap' }}>{r.description}</div>
                    {r.image && (
                      <img src={r.image} alt="screenshot do report" onClick={() => setExpanded(expanded === r.id ? null : r.id)}
                        style={{ marginTop:8, borderRadius:8, border:'1px solid var(--pa-line)', cursor:'zoom-in',
                          maxWidth: expanded === r.id ? '100%' : 120, maxHeight: expanded === r.id ? 'none' : 90, objectFit:'cover' }} />
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
    </PAModal>
  );
}

// Chip com as datas trancadas, visível nas fases de local/alojamento (4-7):
// como as datas agora se decidem ANTES, toda a gente sugere e vota com elas à vista.
function DatesChip({ phase }) {
  const appData = useAppStore();
  const locked = appData.locked;
  if (!locked || phase < 4 || phase > 8) return null;
  return (
    <div style={{ padding:'8px 14px 0', flexShrink:0 }}>
      <div style={{ display:'inline-flex', alignItems:'center', gap:7, background:'#fff', border:'1px solid var(--pa-line)',
        borderRadius:999, padding:'5px 13px', fontFamily:'var(--pa-body)', fontSize:12.5, color:'var(--pa-ink)' }}>
        <span>📅</span>
        <strong style={{ fontWeight:600 }}>{paRangeLabel(locked.from, locked.to)}</strong>
        <span style={{ color:'var(--pa-muted)' }}>· {paDaySpan(locked.from, locked.to)} {paDaySpan(locked.from, locked.to) === 1 ? 'dia' : 'dias'}</span>
      </div>
    </div>
  );
}

// Modal do admin para criar anúncios (global ou para um membro) e remover os ativos.
function AdminAnnounceModal({ open, onClose, me }) {
  const appData = useAppStore();
  const [text, setText] = hUseState('');
  const [target, setTarget] = hUseState('all');
  const [busy, setBusy] = hUseState(false);
  hUseEffect(() => { if (open) { setText(''); setTarget('all'); } }, [open]);

  const members = (typeof getAllMembers === 'function' ? getAllMembers() : []);
  const anns = appData.announcements || [];

  const send = async () => {
    const t = text.trim();
    if (!t) return;
    setBusy(true);
    try {
      await AppStore.addAnnouncement({
        id: 'ann_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        text: t, target, by: me?.id, byName: me?.displayName || me?.name || 'Admin', when: new Date().toISOString(),
      });
      if (window._paToast) window._paToast('Anúncio enviado!', 'success');
      setText(''); setTarget('all');
    } catch (e) { if (window._paToast) window._paToast('Falhou: ' + e.message, 'error'); }
    finally { setBusy(false); }
  };
  const remove = async (id) => { try { await AppStore.removeAnnouncement(id); } catch {} };
  const nameFor = (t) => t === 'all' ? 'Todos' : ((memberById(t) || {}).name || '—');

  return (
    <PAModal open={open} onClose={onClose} title="Anúncios" maxWidth={500}>
      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        <textarea value={text} onChange={(e) => setText(e.target.value)} rows={3} maxLength={600}
          placeholder="Escreve o anúncio"
          style={{ width:'100%', boxSizing:'border-box', resize:'vertical', padding:'11px 13px', borderRadius:12,
            border:'1px solid var(--pa-line)', fontFamily:'var(--pa-body)', fontSize:16, background:'#fff', color:'var(--pa-ink)' }} />
        <div>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:6 }}>Para quem</div>
          <select value={target} onChange={(e) => setTarget(e.target.value)}
            style={{ width:'100%', boxSizing:'border-box', padding:'10px 12px', borderRadius:12, border:'1px solid var(--pa-line)',
              fontFamily:'var(--pa-body)', fontSize:16, background:'#fff', color:'var(--pa-ink)' }}>
            <option value="all">📢 Todos (vista geral)</option>
            {members.map((m) => <option key={m.id} value={m.id}>👤 {m.name}</option>)}
          </select>
        </div>
        <div style={{ display:'flex', justifyContent:'flex-end' }}>
          <Btn variant="accent" onClick={send} disabled={busy || !text.trim()}>{busy ? 'A enviar...' : 'Enviar anúncio'}</Btn>
        </div>
        {anns.length > 0 && (
          <div style={{ borderTop:'1px solid var(--pa-line)', paddingTop:12 }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:8 }}>Anúncios ativos ({anns.length})</div>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {anns.map((a) => (
                <div key={a.id} style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'9px 11px', borderRadius:10, background:'rgba(31,26,20,0.04)', border:'1px solid var(--pa-line)' }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontFamily:'var(--pa-mono)', fontSize:9, letterSpacing:0.8, color:'var(--pa-muted)', textTransform:'uppercase' }}>→ {nameFor(a.target)}</div>
                    <div style={{ fontFamily:'var(--pa-body)', fontSize:13, marginTop:2, wordBreak:'break-word' }}>{a.text}</div>
                  </div>
                  <Btn variant="ghost" size="sm" onClick={() => remove(a.id)}>Remover</Btn>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </PAModal>
  );
}

// Modal do admin para gerir membros: editar estado (Dentro/Fora/A pensar) e remover da edição.
function AdminMembersModal({ open, onClose }) {
  const [resetInfo, setResetInfo] = hUseState(null); // { name, password }
  const doReset = async (m) => {
    if (!window.confirm(`Repor a password de ${m.name}?\n\nAs sessões dela terminam e vai ter de escolher uma password nova ao entrar.`)) return;
    try {
      const temp = await AuthStore.adminResetPassword(m.id);
      setResetInfo({ name: m.name, password: temp });
    } catch (e) { if (window._paToast) window._paToast(e.message, 'error'); }
  };
  const appData = useAppStore();
  const members = (typeof getAllMembers === 'function' ? getAllMembers() : []);
  const rsvp = appData.rsvp || {};
  const STATES = [
    { k:'in', label:'Com interesse', color:'#3d5e44' },
    { k:'maybe', label:'Talvez', color:'#8a6d3b' },
    { k:'out', label:'Sem interesse', color:'#9a4b3b' },
  ];
  // "Na temporada" = quem já tem uma resposta. "Disponíveis" = perfis ainda fora desta edição.
  const inSeason = members.filter((m) => rsvp[m.id]);
  const available = members.filter((m) => !rsvp[m.id]);

  const setState = async (uid, st) => { try { await AppStore.setRsvp(uid, st); } catch {} };
  const addToSeason = async (m) => {
    try { await AppStore.setRsvp(m.id, 'in'); if (window._paToast) window._paToast(`${m.name} adicionado à temporada`, 'success'); }
    catch (e) { if (window._paToast) window._paToast('Falhou: ' + e.message, 'error'); }
  };
  const removeMember = async (m) => {
    if (!window.confirm(`Remover ${m.name} desta edição? Apaga as respostas, votos, sugestões e disponibilidade desta temporada (o perfil mantém-se).`)) return;
    try { await AppStore.removeMember(m.id); if (window._paToast) window._paToast(`${m.name} removido da temporada`, 'success'); }
    catch (e) { if (window._paToast) window._paToast('Falhou: ' + e.message, 'error'); }
  };

  return (
    <PAModal open={open} onClose={onClose} title="Gerir membros" maxWidth={560}>
      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        {resetInfo && (
          <div style={{ padding:'14px 16px', borderRadius:14, background:'#fff', border:'2px solid var(--pa-accent)' }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1, color:'var(--pa-accent)', textTransform:'uppercase' }}>
              Password temporária de {resetInfo.name}
            </div>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:20, fontWeight:700, color:'var(--pa-ink)', margin:'8px 0', letterSpacing:0.5, wordBreak:'break-all' }}>
              {resetInfo.password}
            </div>
            <div style={{ fontFamily:'var(--pa-body)', fontSize:12, color:'var(--pa-muted)', lineHeight:1.5 }}>
              Envia-lha agora — só a vês uma vez. Válida 24 horas; ao entrar, ela escolhe uma nova.
            </div>
            <div style={{ display:'flex', gap:8, marginTop:10, flexWrap:'wrap' }}>
              <Btn variant="accent" size="sm" onClick={async () => {
                const txt = `A tua password temporária da Perdidos Algures: ${resetInfo.password}\n(válida 24h — ao entrar escolhes uma nova)`;
                if (navigator.share) { try { await navigator.share({ text: txt }); return; } catch (e) {} }
                try { await navigator.clipboard.writeText(txt); if (window._paToast) window._paToast('Copiado — cola no WhatsApp!', 'success'); } catch (e) {}
              }}>📨 Enviar</Btn>
              <Btn variant="ghost" size="sm" onClick={() => setResetInfo(null)}>Já enviei</Btn>
            </div>
          </div>
        )}

        <div style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)' }}>
          Adiciona ou remove pessoas em qualquer fase — a temporada ajusta-se sozinha (quórum, votos e contagens recalculam). O perfil global nunca é apagado.
        </div>

        {/* ── Na temporada ── */}
        <div>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:8 }}>Na temporada ({inSeason.length})</div>
          {inSeason.length === 0 && <div style={{ color:'var(--pa-muted)', fontSize:13.5 }}>Ainda ninguém. Adiciona pessoas abaixo.</div>}
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {inSeason.map((m) => {
              const cur = rsvp[m.id] || 'pending';
              return (
                <div key={m.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 12px', borderRadius:12, background:'rgba(31,26,20,0.03)', border:'1px solid var(--pa-line)', flexWrap:'wrap' }}>
                  <Avatar member={m} size={32} />
                  <div style={{ flex:1, minWidth:80 }}>
                    <div style={{ fontFamily:'var(--pa-body)', fontSize:14, fontWeight:600 }}>{m.name}{m.isAdmin ? ' ·admin' : ''}</div>
                    <div style={{ fontFamily:'var(--pa-mono)', fontSize:9.5, color:'var(--pa-muted)', textTransform:'uppercase', letterSpacing:0.5 }}>
                      {(STATES.find((s) => s.k === cur) || {}).label || cur}
                    </div>
                  </div>
                  {!m.isAdmin && (
                    <button onClick={() => doReset(m)} title={'Repor a password de ' + m.name}
                      style={{ border:'1px solid var(--pa-line)', background:'#fff', borderRadius:999,
                        padding:'5px 10px', cursor:'pointer', fontFamily:'var(--pa-body)', fontSize:11.5, color:'var(--pa-muted)' }}>
                      🔑 Repor password
                    </button>
                  )}
                  <div style={{ display:'flex', gap:4, alignItems:'center' }}>
                    {STATES.map((s) => (
                      <button key={s.k} onClick={() => setState(m.id, s.k)} style={{
                        padding:'5px 9px', borderRadius:999, cursor:'pointer', fontFamily:'var(--pa-body)', fontSize:11.5, fontWeight:600,
                        border: cur === s.k ? 'none' : '1px solid var(--pa-line)',
                        background: cur === s.k ? s.color : '#fff', color: cur === s.k ? '#fff' : 'var(--pa-muted)' }}>
                        {s.label}
                      </button>
                    ))}
                    <button onClick={() => removeMember(m)} aria-label={`Remover ${m.name}`} title="Remover da temporada" style={{
                      width:28, height:28, borderRadius:999, border:'1px solid var(--pa-line)', background:'#fff', color:'#9a4b3b',
                      cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', padding:0, flexShrink:0 }}>
                      <svg width="12" height="12" viewBox="0 0 14 14"><path d="M2 4h10M5.5 4V2.5h3V4M3.5 4l.5 8h6l.5-8" stroke="#9a4b3b" strokeWidth="1.2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* ── Adicionar à temporada ── */}
        {available.length > 0 && (
          <div style={{ borderTop:'1px solid var(--pa-line)', paddingTop:12 }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:8 }}>Adicionar à temporada ({available.length})</div>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {available.map((m) => {
                const wasRemoved = (appData.removedMembers || []).includes(m.id);
                return (
                  <div key={m.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 12px', borderRadius:12, background:'rgba(31,26,20,0.02)', border:'1px dashed var(--pa-line)' }}>
                    <Avatar member={m} size={30} />
                    <div style={{ flex:1, minWidth:60 }}>
                      <div style={{ fontFamily:'var(--pa-body)', fontSize:14, fontWeight:600 }}>{m.name}</div>
                      {wasRemoved && <div style={{ fontFamily:'var(--pa-mono)', fontSize:9, color:'var(--pa-muted)', textTransform:'uppercase', letterSpacing:0.6 }}>removido desta edição</div>}
                    </div>
                    <Btn variant="accent" size="sm" onClick={() => addToSeason(m)}>+ Adicionar</Btn>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </PAModal>
  );
}

// Host dos modais de admin: fica montado uma vez e abre os modais via eventos,
// para que botões espalhados (barra de admin no desktop, menu no mobile) os possam abrir.
function AdminModalsHost({ me }) {
  const [announceOpen, setAnnounceOpen] = hUseState(false);
  const [membersOpen, setMembersOpen] = hUseState(false);
  const [bugOpen, setBugOpen] = hUseState(false);
  hUseEffect(() => {
    const oa = () => setAnnounceOpen(true);
    const om = () => setMembersOpen(true);
    const ob = () => setBugOpen(true);
    window.addEventListener('pa-admin-announce', oa);
    window.addEventListener('pa-admin-members', om);
    window.addEventListener('pa-bug-report', ob);
    return () => { window.removeEventListener('pa-admin-announce', oa); window.removeEventListener('pa-admin-members', om); window.removeEventListener('pa-bug-report', ob); };
  }, []);
  return (
    <>
      {me?.isAdmin && <AdminAnnounceModal open={announceOpen} onClose={() => setAnnounceOpen(false)} me={me} />}
      {me?.isAdmin && <AdminMembersModal open={membersOpen} onClose={() => setMembersOpen(false)} />}
      <BugReportModal open={bugOpen} onClose={() => setBugOpen(false)} me={me} isAdmin={!!me?.isAdmin} />
    </>
  );
}
// Helpers globais para abrir os modais a partir de qualquer sítio.
function paOpenAnnounce() { window.dispatchEvent(new CustomEvent('pa-admin-announce')); }
function paOpenMembers() { window.dispatchEvent(new CustomEvent('pa-admin-members')); }
function paOpenBugReport() { window.dispatchEvent(new CustomEvent('pa-bug-report')); }

// ─────────────────────────────────────────────────────────────
// Editor de Edição — criar ou editar (número, título, subtítulo)
// ─────────────────────────────────────────────────────────────
function EditionEditor({ open, onClose, edition, me, proposeMode = false }) {
  const isNew = !edition;
  const [number, setNumber] = hUseState('');
  const [title, setTitle] = hUseState('');
  const [subtitle, setSubtitle] = hUseState('');
  const [invited, setInvited] = hUseState(() => new Set());
  const [busy, setBusy] = hUseState(false);
  const [err, setErr] = hUseState(null);
  const allProfiles = (typeof getAllMembers === 'function') ? getAllMembers() : [];

  hUseEffect(() => {
    if (open) {
      setNumber(String(edition?.number || EditionStore.nextNumber()));
      setTitle(edition?.title || '');
      setSubtitle(edition?.subtitle || '');
      // Começa só com quem cria — os restantes escolhem-se no dropdown.
      setInvited(new Set(me ? [me.id] : []));
      setErr(null);
    }
  }, [open]);

  const toggleInvite = (id) => setInvited((prev) => {
    const n = new Set(prev);
    if (n.has(id)) n.delete(id); else n.add(id);
    if (me && !n.has(me.id)) n.add(me.id); // quem cria vai sempre
    return n;
  });

  const save = async () => {
    setBusy(true); setErr(null);
    try {
      const excludedIds = allProfiles.filter((m) => !invited.has(m.id)).map((m) => m.id);
      if (proposeMode) {
        await EditionStore.propose({ title: title.trim() || 'Nova Aventura', subtitle: subtitle.trim(),
          excludedIds, by: me?.id, byName: me?.name || 'Alguém' });
        if (window._paToast) window._paToast('Proposta enviada — o admin vai rever!', 'success');
      } else if (isNew) {
        await EditionStore.create({ title: title.trim() || 'Nova Aventura', subtitle: subtitle.trim(), excludedIds });
        if (window._paToast) window._paToast('Aventura criada!', 'success');
      } else {
        const num = parseInt(number, 10) || EditionStore.nextNumber();
        await EditionStore.update(edition.id, { number: num, title: title.trim() || 'Nova Aventura', subtitle: subtitle.trim() });
        if (window._paToast) window._paToast('Aventura atualizada!', 'success');
      }
      onClose();
    } catch (ex) { setErr(ex.message); }
    finally { setBusy(false); }
  };

  const modalTitle = proposeMode ? 'Propor aventura' : (isNew ? 'Nova aventura' : 'Editar aventura');
  return (
    <PAModal open={open} onClose={onClose} title={modalTitle} maxWidth={500}>
      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        {proposeMode && (
          <div style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)', lineHeight:1.5 }}>
            Tens uma ideia? Propõe a aventura — fica a aguardar aprovação do admin e, se for aprovada, arranca como edição a sério.
          </div>
        )}
        <Field label="Nome da aventura" value={title} onChange={setTitle} placeholder="" />
        <Field label="Descrição (opcional)" value={subtitle} onChange={setSubtitle} placeholder="" />
        {!isNew && !proposeMode && (
          <Field label="Número da edição" value={number} onChange={setNumber} placeholder="1" />
        )}
        {(isNew || proposeMode) && (
          <div>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:8 }}>
              Quem vai? ({invited.size} {invited.size === 1 ? 'pessoa' : 'pessoas'})
            </div>
            {/* Escolhidos: chips com remoção (o criador vai sempre) */}
            <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:10 }}>
              {allProfiles.filter((m) => invited.has(m.id)).map((m) => {
                const isMe = me && m.id === me.id;
                return (
                  <span key={m.id} style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'4px 10px 4px 5px',
                    borderRadius:999, border:'1px solid var(--pa-accent)', background:'rgba(217,119,87,0.07)' }}>
                    <Avatar member={m} size={20} />
                    <span style={{ fontFamily:'var(--pa-body)', fontSize:12.5, fontWeight:600 }}>{m.name}{isMe ? ' (tu)' : ''}</span>
                    {!isMe && (
                      <button onClick={() => toggleInvite(m.id)} aria-label={'Remover ' + m.name}
                        style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', fontSize:13, padding:0, lineHeight:1 }}>×</button>
                    )}
                  </span>
                );
              })}
            </div>
            {/* Dropdown para adicionar quem falta */}
            {allProfiles.some((m) => !invited.has(m.id)) && (
              <select value="" onChange={(e) => { if (e.target.value) toggleInvite(e.target.value); }}
                style={{ width:'100%', padding:'11px 12px', borderRadius:12, border:'1px solid var(--pa-line)', background:'#fff',
                  fontFamily:'var(--pa-body)', fontSize:16, color:'var(--pa-ink)', cursor:'pointer', appearance:'auto' }}>
                <option value="" disabled>+ Adicionar pessoa…</option>
                {allProfiles.filter((m) => !invited.has(m.id)).map((m) => (
                  <option key={m.id} value={m.id}>{m.name}</option>
                ))}
              </select>
            )}
            <div style={{ fontFamily:'var(--pa-body)', fontSize:11.5, color:'var(--pa-muted)', marginTop:6 }}>
              Isto é só o ponto de partida — quem ficar de fora pode sempre entrar depois (basta responder na fase 1), e quem vai pode sair a qualquer momento.
            </div>
          </div>
        )}
        {err && <AuthError msg={err} />}
        <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
          <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
          <Btn variant="accent" onClick={save} disabled={busy || !title.trim()}>
            {busy ? 'A guardar...' : (proposeMode ? 'Enviar proposta' : (isNew ? 'Criar aventura' : 'Guardar'))}
          </Btn>
        </div>
      </div>
    </PAModal>
  );
}


// ─────────────────────────────────────────────────────────────
// Card de edição — mostra info + ações (admin)
// ─────────────────────────────────────────────────────────────
function EditionCard({ edition, isAdmin, onEnter, onEdit, onAction, narrow }) {
  const [menuOpen, setMenuOpen] = hUseState(false);
  const data = edition.data || {};
  const rsvp = data.rsvp || {};
  // "A bordo": antes de trancar as datas conta quem tem interesse (sim/talvez);
  // depois de trancar, conta quem VAI mesmo. Mesmo critério do resto da app.
  const inCount = (typeof getGoingMembers === 'function' && typeof getInterestedMembers === 'function')
    ? (data.locked ? getGoingMembers(data).length : getInterestedMembers(data).length)
    : Object.values(rsvp).filter(s => s === 'in' || s === 'maybe').length;
  // A fase gravada pode estar na numeração antiga — traduzir antes de mostrar.
  const shownPhase = (typeof paPhaseFromStored === 'function') ? paPhaseFromStored(edition) : edition.current_phase;
  const totalPhases = D.phases.length;
  const phaseName = (D.phases.find(p => p.n === shownPhase) || {}).name || '—';
  const archived = edition.status === 'archived';
  const createdLabel = (() => {
    try { return new Date(edition.created_at).toLocaleDateString(PA_LANG.locale(), { day:'2-digit', month:'short', year:'numeric' }); } catch { return ''; }
  })();

  return (
    <div className="pa-card-hover" style={{
      background:'#fff', borderRadius:18, border:'1px solid var(--pa-line)',
      padding:narrow?'16px':'20px', position:'relative', opacity:archived?0.72:1,
      display:'flex', flexDirection:'column', gap:14 }}>
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:10 }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
            <span style={{ fontFamily:'var(--pa-mono)', fontSize:10.5, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>
              {edition.number}ª edição
            </span>
            {archived
              ? <Pill tone="muted" size="sm">Arquivada</Pill>
              : <Pill tone="success" size="sm">Ativa</Pill>}
          </div>
          <div style={{ fontFamily:'var(--pa-display)', fontSize:narrow?20:23, fontWeight:600, letterSpacing:-0.5, marginTop:4, lineHeight:1.05 }}>
            {edition.title}
          </div>
          {edition.subtitle && <div style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)', marginTop:2 }}>{edition.subtitle}</div>}
        </div>
        {isAdmin && (
          <div style={{ position:'relative' }}>
            <button onClick={()=>setMenuOpen(o=>!o)} style={{ width:32, height:32, borderRadius:999, border:'1px solid var(--pa-line)',
              background:'#fff', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="3" r="1.3" fill="var(--pa-ink)"/><circle cx="7" cy="7" r="1.3" fill="var(--pa-ink)"/><circle cx="7" cy="11" r="1.3" fill="var(--pa-ink)"/></svg>
            </button>
            {menuOpen && (
              <>
                <div onClick={()=>setMenuOpen(false)} style={{ position:'fixed', inset:0, zIndex:50 }} />
                <div style={{ position:'absolute', right:0, top:38, zIndex:51, background:'#fff', borderRadius:12,
                  border:'1px solid var(--pa-line)', boxShadow:'0 8px 28px rgba(0,0,0,0.16)', overflow:'hidden', minWidth:180 }}>
                  {[
                    { label:'✏️  Editar', act:'edit' },
                    { label:'📨  Copiar convite', act:'invite' },
                    { label:'🔄  Recomeçar', act:'reset' },
                    { label:'📑  Duplicar', act:'duplicate' },
                    archived ? { label:'📤  Desarquivar', act:'unarchive' } : { label:'📥  Arquivar', act:'archive' },
                    { label:'🗑️  Eliminar', act:'delete', danger:true },
                  ].map((item) => (
                    <button key={item.act} onClick={()=>{ setMenuOpen(false); item.act==='edit' ? onEdit(edition) : onAction(item.act, edition); }}
                      style={{ display:'block', width:'100%', textAlign:'left', padding:'11px 14px', border:'none',
                        background:'transparent', cursor:'pointer', fontFamily:'var(--pa-body)', fontSize:13.5,
                        color: item.danger ? '#8a4220' : 'var(--pa-ink)', borderBottom:'1px solid var(--pa-line)' }}
                      onMouseEnter={(e)=>e.currentTarget.style.background='rgba(31,26,20,0.04)'}
                      onMouseLeave={(e)=>e.currentTarget.style.background='transparent'}>
                      {item.label}
                    </button>
                  ))}
                </div>
              </>
            )}
          </div>
        )}
      </div>

      <div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:7, gap:10 }}>
          <span style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1, color:'var(--pa-muted)', textTransform:'uppercase' }}>
            Fase {shownPhase} de {totalPhases}
          </span>
        </div>
        <div style={{ height:6, background:'var(--pa-line)', borderRadius:999, overflow:'hidden' }}>
          <div style={{ width:`${Math.round((shownPhase/totalPhases)*100)}%`, height:'100%', background:'var(--pa-accent)', borderRadius:999, transition:'width 0.3s' }} />
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:18, marginTop:14 }}>
          <div style={{ display:'flex', alignItems:'baseline', gap:6 }}>
            <span style={{ fontFamily:'var(--pa-display)', fontSize:20, fontWeight:600 }}>{inCount}</span>
            <span style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)' }}>{inCount === 1 ? 'pessoa a bordo' : 'a bordo'}</span>

          )}

      </div>

      <Btn variant={archived ? 'soft' : 'primary'} onClick={()=>onEnter(edition)} style={{ width:'100%' }}>
        {archived ? 'Ver edição' : 'Entrar →'}
      </Btn>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// EditionHub — ecrã principal após login (desktop + mobile)
// ─────────────────────────────────────────────────────────────
function EditionHub({ auth, onEnterEdition, narrow }) {
  const editions = useEditions();
  const [bugOpen, setBugOpen] = hUseState(false);
  const me = sessionToMember(auth.user);
  const isAdmin = !!auth.user?.isAdmin;
  const [profileOpen, setProfileOpen] = hUseState(false);
  const [editorOpen, setEditorOpen] = hUseState(false);
  const [editingEdition, setEditingEdition] = hUseState(null);
  const [showArchived, setShowArchived] = hUseState(false);

  const active = editions.filter(e => e.status !== 'archived' && e.status !== 'proposed');
  const archived = editions.filter(e => e.status === 'archived');
  const proposals = editions.filter(e => e.status === 'proposed');

  const handleAction = async (act, ed) => {
    try {
      if (act === 'invite') {
        const phName = (D.phases.find((p) => p.n === ed.current_phase) || {}).name || '';
        const text = [
          `🌍 *${ed.number}ª edição — ${ed.title}*`,
          ed.subtitle ? `_${ed.subtitle}_` : null,
          '',
          `Estamos a planear a próxima aventura! Neste momento: *${phName}*.`,
          'Entra, diz se estás dentro e vem decidir connosco 👇',
          `${location.origin}${location.pathname}`,
        ].filter((l) => l !== null).join('\n');
        // No telemóvel abre a folha de partilha (WhatsApp incluído); no desktop copia.
        if (navigator.share) { try { await navigator.share({ text }); } catch (e) {} }
        else { try { await navigator.clipboard.writeText(text); if (window._paToast) window._paToast('Convite copiado — cola no WhatsApp!', 'success'); } catch (e) { if (window._paToast) window._paToast('Não consegui copiar.', 'error'); } }
      }
      else if (act === 'archive') await EditionStore.archive(ed.id);
      else if (act === 'unarchive') await EditionStore.unarchive(ed.id);
      else if (act === 'reset') { if (window.confirm(`Recomeçar a "${ed.title}"? Todos os dados (RSVP, votos, sugestões) serão apagados.`)) await EditionStore.reset(ed.id); }
      else if (act === 'duplicate') { const copyData = window.confirm('Copiar também os dados (RSVP, votos, etc.)?\n\nOK = copiar tudo · Cancelar = só a estrutura'); await EditionStore.duplicate(ed.id, { copyData }); }
      else if (act === 'delete') { if (window.confirm(`Eliminar a "${ed.title}" para sempre? Esta ação não pode ser desfeita.`)) await EditionStore.remove(ed.id); }
    } catch (ex) { if (window._paToast) window._paToast(ex.message || 'Algo correu mal.'); }
  };

  const enter = (ed) => { EditionStore.setActive(ed.id); onEnterEdition(ed); };

  return (
    <div style={{ width:'100%', minHeight:'100%', background:'var(--pa-bg)', display:'flex', flexDirection:'column',
      fontFamily:'var(--pa-body)', color:'var(--pa-ink)' }}>
      {/* Top bar */}
      <div style={{ height:64, padding:narrow?'0 18px':'0 32px', borderBottom:'1px solid var(--pa-line)',
        display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
        <Logo size={15} compact={narrow} />
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <button onClick={()=>setProfileOpen(true)} title="Editar perfil" style={{
            display:'flex', alignItems:'center', gap:8, padding:'4px 4px 4px 10px', borderRadius:999,
            border:'1px solid var(--pa-line)', background:'#fff', cursor:'pointer' }}>
            {!narrow && <span style={{ fontFamily:'var(--pa-body)', fontSize:13, fontWeight:600 }}>{me.name}</span>}
            <Avatar member={me} size={30} />
          </button>
          <button onClick={auth.logout} title="Sair" style={{ width:36, height:36, borderRadius:999, background:'#fff',
            border:'1px solid var(--pa-line)', cursor:'pointer', padding:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M9 4V2.5a1 1 0 00-1-1H3a1 1 0 00-1 1v9a1 1 0 001 1h5a1 1 0 001-1V10" stroke="var(--pa-ink)" strokeWidth="1.3" strokeLinecap="round"/>
              <path d="M6 7h7m0 0L10.5 4.5M13 7l-2.5 2.5" stroke="var(--pa-ink)" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      {/* Conteúdo */}
      <div className="pa-scroll" style={{ flex:1, minHeight:0, overflow:'auto', padding:narrow?'24px 18px 40px':'40px 48px 60px', maxWidth:1100, width:'100%', margin:'0 auto', boxSizing:'border-box' }}>
        <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', gap:12, marginBottom:24, flexWrap:'wrap' }}>
          <div>
            <h1 style={{ fontFamily:'var(--pa-display)', fontSize:narrow?28:38, fontWeight:600, letterSpacing:-1, margin:0, lineHeight:1 }}>
              As tuas aventuras
            </h1>
            <p style={{ fontFamily:'var(--pa-body)', fontSize:14, color:'var(--pa-muted)', margin:'8px 0 0' }}>
              {isAdmin ? 'Cria, gere e entra nas edições.' : 'Escolhe uma edição para participar.'}
            </p>
          </div>
          {isAdmin ? (
            <Btn variant="accent" onClick={()=>{ setEditingEdition(null); setEditorOpen(true); }} icon={<span style={{ fontSize:16 }}>+</span>}>
              Nova aventura
            </Btn>
          ) : (
            <Btn variant="soft" onClick={()=>{ setEditingEdition(null); setEditorOpen(true); }} icon={<span style={{ fontSize:16 }}>💡</span>}>
              Propor aventura
            </Btn>
          )}
        </div>

        {proposals.length > 0 && (
          <div style={{ marginBottom:24 }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:11, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:12 }}>
              💡 Propostas {isAdmin ? '— aprovas?' : 'a aguardar o admin'} ({proposals.length})
            </div>
            <div style={{ display:'grid', gridTemplateColumns: narrow ? '1fr' : 'repeat(auto-fill, minmax(320px, 1fr))', gap:12 }}>
              {proposals.map((p) => {
                const prop = (p.data && p.data.proposal) || {};
                const mine = me && prop.by === me.id;
                return (
                  <div key={p.id} className="pa-fade-in" style={{ background:'#fff', border:'1px dashed var(--pa-accent)', borderRadius:16, padding:'16px 18px' }}>
                    <div style={{ fontFamily:'var(--pa-mono)', fontSize:9.5, letterSpacing:1, color:'var(--pa-accent)', textTransform:'uppercase' }}>
                      Proposta de {mine ? 'ti' : (prop.byName || 'alguém')}
                    </div>
                    <div style={{ fontFamily:'var(--pa-display)', fontSize:19, fontWeight:600, marginTop:5 }}>{p.title}</div>
                    {p.subtitle && <div style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)', marginTop:2 }}>{p.subtitle}</div>}
                    <div style={{ display:'flex', gap:8, marginTop:14, flexWrap:'wrap' }}>
                      {isAdmin && (
                        <>
                          <Btn variant="accent" size="sm" onClick={() => paOnce('approve:' + p.id, async ()=>{ try { await EditionStore.approveProposal(p.id); if (window._paToast) window._paToast(`"${p.title}" aprovada — já é oficial!`, 'success'); } catch(e){ if (window._paToast) window._paToast('Falhou: '+e.message,'error'); } })}>
                            ✓ Aprovar
                          </Btn>
                          <Btn variant="ghost" size="sm" onClick={async ()=>{ if (!window.confirm(`Recusar a proposta "${p.title}"?`)) return; try { await EditionStore.rejectProposal(p.id); if (window._paToast) window._paToast('Proposta recusada.', 'success'); } catch(e){} }}>
                            Recusar
                          </Btn>
                        </>
                      )}
                      {!isAdmin && mine && (
                        <Btn variant="ghost" size="sm" onClick={async ()=>{ if (!window.confirm('Retirar a tua proposta?')) return; try { await EditionStore.rejectProposal(p.id); if (window._paToast) window._paToast('Proposta retirada.', 'success'); } catch(e){} }}>
                          Retirar proposta
                        </Btn>
                      )}
                      {!isAdmin && !mine && (
                        <span style={{ fontFamily:'var(--pa-body)', fontSize:12, color:'var(--pa-muted)', alignSelf:'center' }}>a aguardar aprovação…</span>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {active.length === 0 && (
          <div style={{ padding:'56px 0', textAlign:'center', color:'var(--pa-muted)' }}>
            <div style={{ fontSize:40, marginBottom:8 }}>🗺️</div>
            <div style={{ fontFamily:'var(--pa-body)', fontSize:15 }}>
              {isAdmin ? 'Ainda não há edições. Cria a primeira!' : 'Ainda não há edições ativas. Aguarda o admin.'}
            </div>
          </div>
        )}

        <div className="pa-stagger" style={{ display:'grid', gridTemplateColumns: narrow ? '1fr' : 'repeat(auto-fill, minmax(320px, 1fr))', gap:16 }}>
          {active.map((ed) => (
            <EditionCard key={ed.id} edition={ed} isAdmin={isAdmin} narrow={narrow}
              onEnter={enter} onEdit={(e)=>{ setEditingEdition(e); setEditorOpen(true); }} onAction={handleAction} />
          ))}
        </div>

        {archived.length > 0 && (
          <div style={{ marginTop:32 }}>
            <button onClick={()=>setShowArchived(s=>!s)} style={{ display:'flex', alignItems:'center', gap:8,
              background:'transparent', border:'none', cursor:'pointer', padding:0, marginBottom:16 }}>
              <span style={{ fontFamily:'var(--pa-mono)', fontSize:11, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>
                Arquivadas ({archived.length})
              </span>
              <svg width="12" height="12" viewBox="0 0 12 12" style={{ transform: showArchived?'rotate(180deg)':'none', transition:'transform .2s' }}>
                <path d="M2 4l4 4 4-4" fill="none" stroke="var(--pa-muted)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
            {showArchived && (
              <div style={{ display:'grid', gridTemplateColumns: narrow ? '1fr' : 'repeat(auto-fill, minmax(320px, 1fr))', gap:16 }}>
                {archived.map((ed) => (
                  <EditionCard key={ed.id} edition={ed} isAdmin={isAdmin} narrow={narrow}
                    onEnter={enter} onEdit={(e)=>{ setEditingEdition(e); setEditorOpen(true); }} onAction={handleAction} />
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{ textAlign:'center', padding:'12px 0 20px', fontFamily:'var(--pa-mono)', fontSize:10, color:'var(--pa-muted)' }}>
        <span style={{ opacity:0.6 }}>Perdidos Algures · v{window.PA_VERSION || '?'}</span>
        <span style={{ opacity:0.4, margin:'0 6px' }}>·</span>
        <LangSwitch />
        <span style={{ opacity:0.4, margin:'0 6px' }}>·</span>
        <button onClick={() => setBugOpen(true)} style={{ border:'none', background:'transparent', cursor:'pointer',
          fontFamily:'var(--pa-mono)', fontSize:10, color:'var(--pa-muted)', textDecoration:'underline', padding:0 }}>
          🐞 reportar um problema
        </button>
      </div>

      <BugReportModal open={bugOpen} onClose={() => setBugOpen(false)} me={me} isAdmin={isAdmin} />

      <ProfileEditor open={profileOpen} onClose={()=>setProfileOpen(false)} auth={auth} />
      <EditionEditor open={editorOpen} onClose={()=>setEditorOpen(false)} edition={editingEdition} me={me} proposeMode={!isAdmin} />
    </div>
  );
}

Object.assign(window, { PAModal, ProfileEditor, EditionEditor, EditionCard, EditionHub,
  AnnouncementBanner, DatesChip, BugReportModal, AdminAnnounceModal, AdminMembersModal, AdminModalsHost, paOpenAnnounce, paOpenMembers, paOpenBugReport });
</script>

<script type="text/babel">// Perdidos Algures — Live app entry. Boots the auth gate and routes the
// authenticated user into the desktop or mobile shell based on viewport.
// This is the default landing UI when there is no ?canvas=1 query param.

const { useState: lUseState, useEffect: lUseEffect } = React;

function useViewport() {
  const [w, setW] = lUseState(typeof window !== 'undefined' ? window.innerWidth : 1440);
  lUseEffect(() => {
    const r = () => setW(window.innerWidth);
    window.addEventListener('resize', r);
    return () => window.removeEventListener('resize', r);
  }, []);
  return w;
}

// Convert an auth session into a member-shaped object the rest of the app
// expects. Usa sempre o id real (UUID do Supabase) para que chat, votos,
// RSVP e disponibilidade fiquem ligados ao profile correto.
function sessionToMember(session) {
  if (!session) return null;
  return {
    id: session.id,
    name: session.displayName || session.name,
    loginName: session.name,
    initials: session.initials || ((session.displayName||session.name) ? (session.displayName||session.name)[0].toUpperCase() : '?'),
    color: session.color || '#1f1a14',
    photoDataUrl: session.photoDataUrl,
    isAdmin: !!session.isAdmin,
  };
}

function OnboardingModal({ onClose }) {
  const [step, setStep] = lUseState(0);
  const steps = [
    { emoji:'🧭', title:'Bem-vindo ao Perdidos Algures', body:'A app para o teu grupo decidir uma viagem em conjunto — sem confusão no chat de sempre.' },
    { emoji:'✅', title:'Tudo por fases', body:'Primeiro dizem quem entra e quando podem, trancam-se as datas, e só depois sugerem e votam o destino e o alojamento.' },
    { emoji:'🎲', title:'Empates? À sorte ou por pontos', body:'Se houver empate, o admin desempata com uma roleta justa ou uma votação por pontos.' },
    { emoji:'💸', title:'Contas tipo Splitwise', body:'No fim, registam as despesas (incluindo o Airbnb), e a app diz exatamente quem paga quanto a quem.' },
  ];
  const s = steps[step];
  const last = step === steps.length - 1;
  const finish = () => { try { localStorage.setItem('pa-onboarded', '1'); } catch {} onClose(); };
  return (
    <PAModal open={true} onClose={finish} title="">
      <div style={{ textAlign:'center', padding:'4px 0' }}>
        <div key={step} className="pa-scale" style={{ fontSize:48, marginBottom:14 }}>{s.emoji}</div>
        <div style={{ fontFamily:'var(--pa-display)', fontSize:22, fontWeight:600, letterSpacing:-0.4, marginBottom:10 }}>{s.title}</div>
        <div style={{ fontFamily:'var(--pa-body)', fontSize:14.5, color:'var(--pa-muted)', lineHeight:1.55, maxWidth:340, margin:'0 auto' }}>{s.body}</div>
        <div style={{ display:'flex', justifyContent:'center', gap:6, margin:'20px 0' }}>
          {steps.map((_, i) => (
            <div key={i} style={{ width: i===step?20:7, height:7, borderRadius:7, background: i===step?'var(--pa-accent)':'var(--pa-line)', transition:'all .25s' }} />
          ))}
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <Btn variant="ghost" onClick={finish} style={{ flex:1 }}>Saltar</Btn>
          <Btn variant="accent" onClick={()=> last ? finish() : setStep(step+1)} style={{ flex:2 }}>{last ? 'Começar!' : 'Seguinte'}</Btn>
        </div>
      </div>
    </PAModal>
  );
}

function LiveApp() {
  const auth = useAuth();
  const w = useViewport();
  const isDesktop = w >= 1100;
  // Re-renderiza quando a lista de edições muda (ex: eliminada externamente)
  const editions = useEditions();
  const [inEdition, setInEdition] = lUseState(() => !!EditionStore.activeId() && !!EditionStore.active());
  const [profileOpen, setProfileOpen] = lUseState(false);
  const [showOnboarding, setShowOnboarding] = lUseState(false);

  // Password temporária → obriga a escolher uma nova antes de continuar.
  const [pwOpen, setPwOpen] = lUseState(false);
  const [pwForced, setPwForced] = lUseState(false);
  lUseEffect(() => {
    if (auth.user && auth.user.mustChangePassword) { setPwForced(true); setPwOpen(true); }
  }, [auth.user?.id, auth.user?.mustChangePassword]);
  lUseEffect(() => {
    const h = () => { setPwForced(false); setPwOpen(true); };
    window.addEventListener('pa-change-password', h);
    return () => window.removeEventListener('pa-change-password', h);
  }, []);

  // Presença online: anuncia-se quando há sessão; sai no logout/fecho.
  lUseEffect(() => {
    if (auth.user) PresenceStore.start(auth.user.id);
    else PresenceStore.stop();
    return () => PresenceStore.stop();
  }, [auth.user?.id]);

  // Mostra onboarding na primeira visita (após login)
  lUseEffect(() => {
    if (auth.user) {
      try { if (!localStorage.getItem('pa-onboarded')) setShowOnboarding(true); } catch {}
    }
  }, [auth.user]);

  // Se a edição ativa desaparece (eliminada), volta automaticamente ao hub
  lUseEffect(() => {
    if (inEdition && !EditionStore.active()) {
      setInEdition(false);
    }
  }, [editions, inEdition]);

  if (!auth.user) {
    return (
      <div className="pa-vh" style={{ width: '100vw' }}>
        <AuthGate auth={auth} narrow={!isDesktop} />
      </div>
    );
  }

  const me = sessionToMember(auth.user);
  const viewAs = auth.user.isAdmin ? 'admin' : 'member';

  // Hub de edições (landing após login OU se edição ativa desapareceu)
  if (!inEdition || !EditionStore.active()) {
    return (
      <div className="pa-vh" style={{ width:'100vw', overflow:'auto' }}>
        <EditionHub auth={auth} narrow={!isDesktop} onEnterEdition={() => setInEdition(true)} />
        {showOnboarding && <OnboardingModal onClose={()=>setShowOnboarding(false)} />}
        <PasswordModal open={pwOpen} onClose={()=>setPwOpen(false)} auth={auth} forced={pwForced} />
      </div>
    );
  }

  const backToHub = () => { EditionStore.setActive(null); setInEdition(false); };

  if (isDesktop) {
    return (
      <div className="pa-vh" style={{ width: '100vw' }}>
        <DesktopShell viewAs={viewAs} liveUser={me} onLogout={auth.logout} onBackToHub={backToHub} onEditProfile={()=>setProfileOpen(true)} />
        <ProfileEditor open={profileOpen} onClose={()=>setProfileOpen(false)} auth={auth} />
        <PasswordModal open={pwOpen} onClose={()=>setPwOpen(false)} auth={auth} forced={pwForced} />
        <AdminModalsHost me={me} />
      </div>
    );
  }

  return (
    <div className="pa-vh" style={{ width: '100vw', background: 'var(--pa-ink)', display: 'flex', alignItems: 'stretch', justifyContent: 'center' }}>
      <div style={{ width: '100%', maxWidth: 520, background: 'var(--pa-bg)', display: 'flex', flexDirection: 'column', boxShadow: '0 0 60px rgba(0,0,0,0.3)' }}>
        <MobileApp viewAs={viewAs} liveUser={me} onLogout={auth.logout} onBackToHub={backToHub} onEditProfile={()=>setProfileOpen(true)} />
        <ProfileEditor open={profileOpen} onClose={()=>setProfileOpen(false)} auth={auth} />
        <PasswordModal open={pwOpen} onClose={()=>setPwOpen(false)} auth={auth} forced={pwForced} />
        <AdminModalsHost me={me} />
      </div>
    </div>
  );
}

Object.assign(window, { LiveApp, useViewport, sessionToMember });
</script>

<script type="text/babel" data-presets="env,react">
  const { useState, useEffect } = React;

  // ── Route: ?canvas=1 → design canvas; default → live app ───
  const isCanvasMode = new URLSearchParams(location.search).has('canvas');

  // ── Theme defaults ────────────────────────────────────────
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "palette": ["#f5f1ea", "#1f1a14", "#d97757"],
    "viewAs": "admin",
    "showMobile": true,
    "showAuth": true
  }/*EDITMODE-END*/;

  const PALETTES = [
    ['#f5f1ea', '#1f1a14', '#d97757'], // warm clay (default)
    ['#fdf6e3', '#2d2410', '#c8804a'], // sun-bleached
    ['#eef0e8', '#1c2418', '#5a8a5e'], // moss
    ['#f0eae4', '#1a1714', '#3a5a7a'], // tide
    ['#fafaf7', '#0f0f0e', '#ff5a36'], // editorial
  ];

  function applyPalette(p) {
    const r = document.documentElement.style;
    r.setProperty('--pa-bg', p[0]);
    r.setProperty('--pa-ink', p[1]);
    r.setProperty('--pa-accent', p[2]);
    r.setProperty('--pa-muted', mix(p[0], p[1], 0.45));
    r.setProperty('--pa-line', mix(p[0], p[1], 0.10));
  }
  function mix(a, b, t) {
    const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
    const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
    const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
    const r = Math.round(ar + (br - ar) * t);
    const g = Math.round(ag + (bg - ag) * t);
    const bl = Math.round(ab + (bb - ab) * t);
    return '#' + ((1 << 24) | (r << 16) | (g << 8) | bl).toString(16).slice(1);
  }

  function PhoneFrame({ children }) { return <IOSDevice width={402} height={874}>{children}</IOSDevice>; }

  // ── Static auth artboard previews (for the canvas only) ──
  function StaticAuthPreview({ mode, narrow }) {
    // Dummy auth object — never resolves, just shows the form chrome
    const fakeAuth = { login: async () => {}, register: async () => {}, user: null, logout: () => {} };
    if (mode === 'login') return <LoginScreen auth={fakeAuth} onSwitch={() => {}} narrow={narrow} />;
    return <RegisterScreen auth={fakeAuth} onSwitch={() => {}} narrow={narrow} />;
  }

  // ── Live-app root (default landing) ───────────────────────
  function LiveRoot() {
    const [t] = useTweaks({ palette: TWEAK_DEFAULTS.palette });
    useEffect(() => { applyPalette(TWEAK_DEFAULTS.palette); }, []);
    return <LiveApp />;
  }

  // ── Canvas root (design review) ───────────────────────────
  function CanvasRoot() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    useEffect(() => { applyPalette(t.palette); }, [t.palette]);
    const v = t.viewAs;

    const desktopArtboards = [
      { id: 'd1', label: 'Fase 01 · RSVP',                phase: 1 },
      { id: 'd2', label: 'Fase 02 · Sugerir locais',      phase: 2 },
      { id: 'd3', label: 'Fase 03 · Votar local',         phase: 3 },
      { id: 'd4', label: 'Fase 04 · Sugerir alojamento',  phase: 4 },
      { id: 'd5', label: 'Fase 05 · Votar alojamento (empate)', phase: 5 },
      { id: 'd6', label: 'Fase 06 · Disponibilidade',     phase: 6 },
      { id: 'd7', label: 'Fase 07 · Trancar datas',       phase: 7 },
      { id: 'd8', label: 'Fase 08 · Planeamento',         phase: 8 },
    ];

    const mobileArtboards = [
      { id: 'm1', label: 'Fase 01 · RSVP',          phase: 1 },
      { id: 'm2', label: 'Fase 02 · Locais',        phase: 2 },
      { id: 'm3', label: 'Fase 03 · Votar local',   phase: 3 },
      { id: 'm4', label: 'Fase 04 · Alojamentos',  phase: 4 },
      { id: 'm5', label: 'Fase 05 · Empate',       phase: 5 },
      { id: 'm6', label: 'Fase 06 · Datas',        phase: 6 },
      { id: 'm8', label: 'Fase 08 · Planear',      phase: 8 },
    ];

    return (
      <>
        <DesignCanvas>
          {t.showAuth && (
            <DCSection id="auth" title="Contas & Acesso"
              subtitle='Entrada do site: registo com nome + foto + password. Admin é "Miguel" com password fixa. (Detalhes técnicos no README.md)'>
              <DCArtboard id="login-desktop" label="Login · desktop" width={1100} height={760}>
                <StaticAuthPreview mode="login" narrow={false} />
              </DCArtboard>
              <DCArtboard id="register-desktop" label="Registo · desktop" width={1100} height={760}>
                <StaticAuthPreview mode="register" narrow={false} />
              </DCArtboard>
              <DCArtboard id="login-mobile" label="Login · mobile" width={402} height={780}>
                <StaticAuthPreview mode="login" narrow={true} />
              </DCArtboard>
              <DCArtboard id="register-mobile" label="Registo · mobile" width={402} height={780}>
                <StaticAuthPreview mode="register" narrow={true} />
              </DCArtboard>
            </DCSection>
          )}

          <DCSection id="desktop" title="Perdidos Algures · Desktop"
            subtitle="Seis fases. Miguel inicia, o grupo decide, Miguel tranca. Toggle 'Ver como' nos tweaks para alternar admin/membro.">
            {desktopArtboards.map((a) => (
              <DCArtboard key={a.id} id={a.id} label={a.label} width={1440} height={900}>
                <DesktopShell viewAs={v} phase={a.phase} />
              </DCArtboard>
            ))}
          </DCSection>

          {t.showMobile && (
            <DCSection id="mobile" title="Mobile · companion"
              subtitle="Versão de telemóvel pensada para responder em segundos a meio do dia.">
              {mobileArtboards.map((a) => (
                <DCArtboard key={a.id} id={a.id} label={a.label} width={402} height={874}>
                  <PhoneFrame><MobileApp viewAs={v} phase={a.phase} /></PhoneFrame>
                </DCArtboard>
              ))}
            </DCSection>
          )}
        </DesignCanvas>

        <TweaksPanel title="Tweaks">
          <TweakSection label="Quem está a ver">
            <TweakRadio label="Ver como" value={v}
              options={[{ value: 'admin', label: '👑 Miguel' }, { value: 'member', label: '🥾 Rita' }]}
              onChange={(value) => setTweak('viewAs', value)} />
          </TweakSection>
          <TweakSection label="Paleta">
            <TweakColor label="Tema" value={t.palette} options={PALETTES}
              onChange={(value) => setTweak('palette', value)} />
          </TweakSection>
          <TweakSection label="Secções no canvas">
            <TweakToggle label="Contas & Acesso" value={t.showAuth} onChange={(v) => setTweak('showAuth', v)} />
            <TweakToggle label="Mobile companion" value={t.showMobile} onChange={(v) => setTweak('showMobile', v)} />
          </TweakSection>
        </TweaksPanel>
      </>
    );
  }

  const RootComp = isCanvasMode ? CanvasRoot : LiveRoot;

  // Error Boundary: se um componente rebentar, mostra um ecrã de recuperação
  // em vez de deixar a app em branco (estabilidade).
  class PAErrorBoundary extends React.Component {
    constructor(props) { super(props); this.state = { hasError: false }; }
    static getDerivedStateFromError() { return { hasError: true }; }
    componentDidCatch(err, info) { console.error('[PA] erro de runtime apanhado:', err, info); }
    render() {
      if (this.state.hasError) {
        return React.createElement('div', { style:{ position:'fixed', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:16, background:'#fcf9f3', padding:24, textAlign:'center', fontFamily:'system-ui,-apple-system,sans-serif' } },
          React.createElement('div', { style:{ fontSize:40 } }, '🧭'),
          React.createElement('div', { style:{ fontFamily:"'Bricolage Grotesque',system-ui,sans-serif", fontSize:22, fontWeight:600, color:'#1f1a14' } }, 'Algo encravou'),
          React.createElement('div', { style:{ fontSize:14, color:'#8a7e6e', maxWidth:320, lineHeight:1.5 } }, 'Houve um problema a mostrar esta parte. Os teus dados estão guardados — é só recarregar.'),
          React.createElement('button', { onClick:()=>location.reload(), style:{ marginTop:8, padding:'12px 24px', borderRadius:999, border:'none', background:'#d97757', color:'#fff', cursor:'pointer', fontSize:14, fontWeight:600 } }, 'Recarregar')
        );
      }
      return this.props.children;
    }
  }

  // Raiz criada UMA vez (createRoot duas vezes no mesmo nó dá aviso do React).
  let _paRoot = null;
  const renderApp = () => {
    if (!_paRoot) _paRoot = ReactDOM.createRoot(document.getElementById('root'));
    _paRoot.render(React.createElement(PAErrorBoundary, null, React.createElement(RootComp)));
  };

  // Trocar de idioma redesenha a app inteira (os textos são traduzidos na
  // criação dos elementos, por isso basta voltar a renderizar).
  window.addEventListener('pa-lang-change', () => {
    try { document.documentElement.lang = PA_LANG.is('en') ? 'en' : 'pt-PT'; } catch (e) {}
    renderApp();
  });

  // Inicializa Supabase (AppStore + ChatStore) antes de renderizar
  initSupabase().then(renderApp).catch(err => {
    console.error('[PA] Erro ao iniciar Supabase:', err);
    renderApp(); // Renderiza mesmo assim para não bloquear a app
  });
</script>
</body>
</html>
