// PHASE 1 — RSVP
function MPhase1({ me, onLogout, onOpenChat }) {
  const appData = useAppStore();
  const rsvp = appData.rsvp || {};
  const myChoice = rsvp[me.id] || null;
  const allMembers = getAllMembers();
  const counts = mUseMemo(() => {
    const c = { in:0, out:0, maybe:0, pending:0 };
    allMembers.forEach((m) => { c[rsvp[m.id] || 'pending']++; });
    return c;
  }, [rsvp, allMembers.length]);

  const handleRsvp = (status) => AppStore.setRsvp(me.id, status);

  return (
    <MShell>
      <MHeader phase={1} onLogout={onLogout} onOpenChat={onOpenChat} />
      <MPhaseTitle
        kicker={`${memberById(D.adminId)?.name || 'Admin'} chamou-te`}
        title={<>Quem entra<br/><span style={{ color:'var(--pa-accent)' }}>{appData.editionTitle || 'Nova Aventura'}</span>?</>}
        sub={`${appData.editionNumber || 1}ª edição`} />
      <div className="pa-scroll" style={{ padding:'6px 22px', flex:1, minHeight:0, overflow:'auto' }}>
        {/* contadores */}
        <div style={{ display:'flex', gap:8, marginBottom:14 }}>
          {[
            { l:'Dentro', n:counts.in, tone:'#3d5e44', bg:'rgba(107,142,111,0.16)' },
            { l:'Fora', n:counts.out, tone:'#8a4220', bg:'rgba(217,119,87,0.18)' },
            { l:'A pensar', n:counts.maybe, tone:'var(--pa-muted)', bg:'rgba(31,26,20,0.05)' },
          ].map((c) => (
            <div key={c.l} style={{ background:c.bg, borderRadius:12, padding:'10px 12px', flex:1 }}>
              <div style={{ fontFamily:'var(--pa-display)', fontSize:24, fontWeight:600, color:c.tone, letterSpacing:-0.5 }}>{c.n}</div>
              <div style={{ fontFamily:'var(--pa-mono)', fontSize:9, color:c.tone, letterSpacing:0.8, textTransform:'uppercase', marginTop:1 }}>{c.l}</div>
            </div>
          ))}
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {[
            { id:'in',    label:'Dentro',   emoji:'🙋', sub:'Conta comigo',    tone:'#3d5e44',       bg:'rgba(107,142,111,0.16)' },
            { id:'maybe', label:'A pensar', emoji:'🤔', sub:'Digo até quinta', tone:'var(--pa-ink)', bg:'rgba(31,26,20,0.05)' },
            { id:'out',   label:'Fora',     emoji:'😩', sub:'Desta vez não',   tone:'#8a4220',       bg:'rgba(217,119,87,0.18)' },
          ].map((o) => {
            const sel = myChoice === o.id;
            return (
              <button key={o.id} onClick={() => handleRsvp(o.id)} style={{
                display:'flex', alignItems:'center', gap:14,
                background: sel?o.bg:'#fff',
                border: sel?`2px solid ${o.tone}`:'1px solid var(--pa-line)',
                borderRadius:16, padding:'14px 18px', cursor:'pointer', textAlign:'left' }}>
                <div style={{ fontSize:30 }}>{o.emoji}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontFamily:'var(--pa-display)', fontSize:18, fontWeight:600, color:o.tone, letterSpacing:-0.3 }}>{o.label}</div>
                  <div style={{ fontSize:12, color:'var(--pa-muted)', marginTop:2 }}>{o.sub}</div>
                </div>
                {sel && <svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="8" fill="#3d5e44"/><path d="M5 9l3 3 5-6" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </button>
            );
          })}
        </div>
        {myChoice && (
          <div style={{ marginTop:14, padding:'10px 14px', borderRadius:10, background:'rgba(107,142,111,0.12)', fontSize:12, color:'#3d5e44', textAlign:'center' }}>
            Resposta guardada ✓ — podes mudar até o admin fechar.
          </div>
        )}

        {/* lista de quem já respondeu */}
        <div style={{ marginTop:18, background:'#fff', borderRadius:16, border:'1px solid var(--pa-line)', overflow:'hidden' }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', padding:'12px 16px 6px' }}>A tripulação</div>
          {allMembers.length === 0 && (
            <div style={{ padding:'4px 16px 16px', color:'var(--pa-muted)', fontSize:12.5 }}>Ninguém registado ainda. Partilha o link com o grupo!</div>
          )}
          {allMembers.map((m, i) => {
            const s = rsvp[m.id] || 'pending';
            const labels = { in:'Dentro', out:'Fora', maybe:'A pensar', pending:'Sem responder' };
            const tones = { in:'success', out:'warn', maybe:'default', pending:'muted' };
            return (
              <div key={m.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 16px', borderTop:'1px solid var(--pa-line)' }}>
                <Avatar member={m} size={30} />
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontFamily:'var(--pa-body)', fontSize:14, fontWeight:600, color:'var(--pa-ink)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    {m.name} {m.isAdmin && <span style={{ color:'var(--pa-accent)', fontSize:11, fontWeight:500 }}>· admin</span>}
                  </div>
                </div>
                <Pill tone={tones[s]} size="sm">{labels[s]}</Pill>
              </div>
            );
          })}
        </div>
      </div>
    </MShell>
  );
}

// PHASE 2 — Sugerir localizações
function MPhase2({ me, onLogout, onOpenChat }) {
  const appData = useAppStore();
  const suggestions = appData.locSuggs || [];
  const mine = suggestions.filter((s) => s.by === me.id);
  const limit = D.phase2.perPersonLimit;
  const [adding, setAdding] = mUseState(false);
  const [name, setName] = mUseState('');
  const [city, setCity] = mUseState('');

  const handleAdd = () => {
    if (!name.trim()) return;
    AppStore.addLocSuggestion({ id:'loc_'+Date.now().toString(36), name:name.trim(), city:city.trim(), tags:[], accent:'var(--pa-accent)', by:me.id });
    setName(''); setCity(''); setAdding(false);
  };

  return (
    <MShell>
      <MHeader phase={2} onLogout={onLogout} onOpenChat={onOpenChat} />
      <MPhaseTitle kicker={`${mine.length} de ${limit} usados`}
        title={<>Sugere até<br/><span style={{ color:'var(--pa-accent)' }}>{limit} sítios.</span></>} />
      <div className="pa-scroll" style={{ padding:'6px 16px', flex:1, minHeight:0, overflow:'auto', display:'flex', flexDirection:'column', gap:10 }}>
        {mine.map((s) => (
          <div key={s.id} style={{ background:'#fff', borderRadius:14, padding:12, border:'1.5px solid var(--pa-accent)', display:'flex', alignItems:'center', justifyContent:'space-between', gap:10 }}>
            <div style={{ minWidth:0 }}>
              <div style={{ fontFamily:'var(--pa-display)', fontSize:16, fontWeight:600 }}>{s.name}</div>
              {s.city && <div style={{ fontSize:11.5, color:'var(--pa-muted)', marginTop:2 }}>{s.city}</div>}
            </div>
            <button onClick={() => AppStore.removeLocSuggestion(s.id)} aria-label="Remover"
              style={{ flexShrink:0, width:30, height:30, borderRadius:30, border:'1px solid var(--pa-line)', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', fontSize:15, lineHeight:1 }}>×</button>
          </div>
        ))}

        {mine.length < limit && !adding && (
          <button onClick={() => setAdding(true)} style={{
            background:'transparent', border:'1.5px dashed var(--pa-line)', borderRadius:14,
            padding:'20px 16px', cursor:'pointer', display:'flex', alignItems:'center', gap:12 }}>
            <div style={{ width:32, height:32, borderRadius:32, background:'var(--pa-ink)',
              display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <svg width="12" height="12" viewBox="0 0 12 12"><path d="M6 2v8M2 6h8" stroke="#fff" strokeWidth="1.8" strokeLinecap="round"/></svg>
            </div>
            <div style={{ textAlign:'left' }}>
              <div style={{ fontFamily:'var(--pa-body)', fontSize:13.5, fontWeight:600 }}>Slot {mine.length+1}</div>
              <div style={{ fontSize:11.5, color:'var(--pa-muted)' }}>Lança um destino</div>
            </div>
          </button>
        )}

        {adding && (
          <div style={{ background:'#fff', borderRadius:14, padding:16, border:'2px solid var(--pa-accent)' }}>
            <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Nome do sítio" maxLength={80}
              style={{ width:'100%', padding:'10px 12px', borderRadius:10, border:'1px solid var(--pa-line)',
                fontFamily:'var(--pa-body)', fontSize:14, outline:'none', boxSizing:'border-box', marginBottom:8 }} />
            <input value={city} onChange={(e) => setCity(e.target.value)} placeholder="Cidade, País" maxLength={80}
              style={{ width:'100%', padding:'10px 12px', borderRadius:10, border:'1px solid var(--pa-line)',
                fontFamily:'var(--pa-body)', fontSize:14, outline:'none', boxSizing:'border-box', marginBottom:12 }} />
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={() => setAdding(false)} style={{ flex:1, padding:'10px', borderRadius:999, border:'1px solid var(--pa-line)', background:'transparent', cursor:'pointer', fontFamily:'var(--pa-body)', fontSize:13, fontWeight:600 }}>Cancelar</button>
              <button onClick={handleAdd} disabled={!name.trim()} style={{ flex:1, padding:'10px', borderRadius:999, border:'none', background:'var(--pa-accent)', color:'#fff', cursor: name.trim()?'pointer':'default', fontFamily:'var(--pa-body)', fontSize:13, fontWeight:600, opacity: name.trim()?1:0.5 }}>Lançar</button>
            </div>
          </div>
        )}

        {suggestions.length > 0 && (
          <div style={{ marginTop:8, borderTop:'1px solid var(--pa-line)', paddingTop:12 }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:8 }}>
              Todos os destinos ({suggestions.length})
            </div>
            {suggestions.filter((s) => s.by !== me.id).map((s) => {
              const by = memberById(s.by) || { name:s.by, initials:'?' };
              return (
                <div key={s.id} style={{ padding:'8px 0', borderBottom:'1px solid var(--pa-line)', display:'flex', alignItems:'center', gap:10 }}>
                  <Avatar member={by} size={22} />
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:600 }}>{s.name}</div>
                    {s.city && <div style={{ fontSize:11, color:'var(--pa-muted)' }}>{s.city}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </MShell>
  );
}

// PHASE 3 — Vote local
function MPhase3({ me, onLogout, onOpenChat }) {
  const appData = useAppStore();
  const suggestions = appData.locSuggs || [];
  const [vote, setVote] = mUseState(() => VoteStore.getVote(me.id, 'loc'));
  mUseEffect(() => { setVote(VoteStore.getVote(me.id, 'loc')); }, [appData.locVotes, me.id]);
  const [saved, setSaved] = mUseState(false);
  const [tieOpen, setTieOpen] = mUseState(false);

  const handleVote = (id) => {
    setVote(id);
    VoteStore.setVote(me.id, 'loc', id);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  // Empate
  const inMembers = (typeof getInMembers === 'function') ? getInMembers(appData) : [];
  const votes = appData.locVotes || {};
  const allVoted = inMembers.length > 0 && inMembers.every(m => votes[m.id]);
  const tie = allVoted ? detectTie(votes, suggestions) : null;
  mUseEffect(() => { if (tie && !appData.locWinner) setTieOpen(true); }, [tie?.tiedIds?.join(','), appData.locWinner]);

  if (suggestions.length === 0) {
    return (
      <MShell>
        <MHeader phase={3} onLogout={onLogout} onOpenChat={onOpenChat} />
        <MEmpty icon="🗺️" text="Ainda não há destinos para votar. Volta à fase anterior." />
      </MShell>
    );
  }

  return (
    <MShell>
      <MHeader phase={3} onLogout={onLogout} onOpenChat={onOpenChat} />
      <MPhaseTitle kicker="Voto secreto" title={<>Onde queres<br/><span style={{ color:'var(--pa-accent)' }}>passar este?</span></>} />
      <div className="pa-scroll" style={{ padding:'6px 16px 14px', flex:1, minHeight:0, overflow:'auto', display:'flex', flexDirection:'column', gap:10 }}>
        <VotersRow doneIds={Object.keys(votes)} allMembers={inMembers} label="Já votaram" />
        {suggestions.map((s) => {
          const sel = vote === s.id;
          const by = memberById(s.by) || { name:s.by, initials:'?' };
          return (
            <button key={s.id} onClick={() => handleVote(s.id)} style={{
              background:'#fff', borderRadius:14, textAlign:'left', padding:'14px 16px',
              border: sel?'2px solid var(--pa-accent)':'1px solid var(--pa-line)',
              cursor:'pointer', position:'relative' }}>
              <div style={{ fontFamily:'var(--pa-display)', fontSize:17, fontWeight:600, letterSpacing:-0.3 }}>{s.name}</div>
              {s.city && <div style={{ fontSize:11.5, color:'var(--pa-muted)', marginTop:2 }}>{s.city}</div>}
              <div style={{ marginTop:8, display:'flex', alignItems:'center', gap:6 }}>
                <Avatar member={by} size={18} />
                <span style={{ fontSize:10.5, color:'var(--pa-muted)' }}>{by.name}</span>
              </div>
              {sel && (
                <div style={{ position:'absolute', top:12, right:12, width:24, height:24, borderRadius:24,
                  background: saved?'#3d5e44':'var(--pa-accent)',
                  display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 6.5l2 2 4.5-5" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
              )}
            </button>
          );
        })}
        {vote && (
          <div style={{ padding:'10px 14px', borderRadius:10, background:'rgba(107,142,111,0.12)', fontSize:12, color:'#3d5e44', textAlign:'center' }}>
            {saved ? 'Voto guardado ✓' : `Voto em ${suggestions.find((s) => s.id === vote)?.name}`}
          </div>
        )}

}

// PHASE 5 — Votar alojamento
function MPhase5({ me, onLogout, onOpenChat }) {
  const appData = useAppStore();
  const suggestions = appData.accSuggs || [];
  const [vote, setVote] = mUseState(() => VoteStore.getVote(me.id, 'acc'));
  mUseEffect(() => { setVote(VoteStore.getVote(me.id, 'acc')); }, [appData.accVotes, me.id]);
  const [saved, setSaved] = mUseState(false);
  const [tieOpen, setTieOpen] = mUseState(false);

  // Empate
  const inMembers = (typeof getInMembers === 'function') ? getInMembers(appData) : [];
  const votes = appData.accVotes || {};
  const allVoted = inMembers.length > 0 && inMembers.every(m => votes[m.id]);
  const tie = allVoted ? detectTie(votes, suggestions) : null;
  mUseEffect(() => { if (tie && !appData.accWinner) setTieOpen(true); }, [tie?.tiedIds?.join(','), appData.accWinner]);

  const votingClosed = false;
  const isTie = !!tie;

  const handleVote = (id) => {
    if (votingClosed) return;
    setVote(id);
    VoteStore.setVote(me.id, 'acc', id);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  if (suggestions.length === 0) {
    return (
      <MShell>
        <MHeader phase={5} onLogout={onLogout} onOpenChat={onOpenChat} />
        <MEmpty icon="🏡" text="Ainda não há alojamentos para votar. Volta à fase anterior." />
      </MShell>
    );
  }

  return (
    <MShell>
      <MHeader phase={5} onLogout={onLogout} onOpenChat={onOpenChat} />
      <div style={{ padding:'0 22px 4px' }}>
        <Pill tone="accent" size="sm">Voto secreto</Pill>
      </div>
      <MPhaseTitle title={<>Vota no <span style={{ color:'var(--pa-accent)' }}>alojamento.</span></>}
        sub="Um por pessoa, secreto até fechar." />

      <div className="pa-scroll" style={{ padding:'6px 16px 14px', flex:1, minHeight:0, overflow:'auto', display:'flex', flexDirection:'column', gap:10 }}>
        {!appData.accWinner && <VotersRow doneIds={Object.keys(votes)} allMembers={inMembers} label="Já votaram" />}
        {suggestions.map((s) => {
          const sel = vote === s.id;
          return (
            <button key={s.id} onClick={() => handleVote(s.id)} style={{
              background:'#fff', borderRadius:12, padding:'12px 14px',
              border: sel?'2px solid var(--pa-accent)':'1px solid var(--pa-line)',
              cursor:votingClosed?'default':'pointer', textAlign:'left', position:'relative', width:'100%' }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:10 }}>
                <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                  <Pill tone="dark" size="sm">{s.type}</Pill>
                  <span style={{ fontSize:11.5 }}>{s.area}</span>
                </div>
                <span style={{ fontFamily:'var(--pa-mono)', fontSize:13, fontWeight:700 }}>{s.price}€</span>
              </div>
              {sel && (
                <div style={{ position:'absolute', top:10, right:10, width:22, height:22, borderRadius:22,
                  background: saved?'#3d5e44':'var(--pa-accent)',
                  display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <svg width="11" height="11" viewBox="0 0 11 11"><path d="M2.5 5.5l2 2 4-4" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
              )}
            </button>
          );
        })}
        {vote && (
          <div style={{ padding:'10px 14px', borderRadius:10, background:'rgba(107,142,111,0.12)', fontSize:12, color:'#3d5e44', textAlign:'center' }}>
            {saved ? 'Voto guardado ✓' : `Voto em ${suggestions.find((s) => s.id === vote)?.area || vote}`}
          </div>
        )}
      </div>
      <TiebreakModal
        open={tieOpen && !!tie && !appData.accWinner}
        onClose={()=>setTieOpen(false)}
        tie={tie}
        me={me}
        voteKey="tieVotesAcc"
        onResolve={(winnerId)=>AppStore.setAccWinner(winnerId)}
      />
    </MShell>
  );
}

// PHASE 6 — Disponibilidade
function MPhase6({ me, onLogout, onOpenChat }) {
  const appData = useAppStore();
  const allMembers = getAllMembers();
  const locSuggs = appData.locSuggs || [];
  const winnerLoc = appData.locWinner ? locSuggs.find((s) => s.id === appData.locWinner) : locSuggs[0];
  const accSuggs = appData.accSuggs || [];
  const winnerAcc = appData.accWinner ? accSuggs.find((s) => s.id === appData.accWinner) : accSuggs[0];
  const [days, setDays] = mUseState(() => AppStore.getAvailability(me.id));
  mUseEffect(() => { setDays(AppStore.getAvailability(me.id)); }, [appData.avail, me.id]);
  const toggle = (d) => setDays((arr) => arr.includes(d) ? arr.filter((x) => x !== d) : [...arr, d]);
  const allAvail = appData.avail || {};
  const submittedIds = Object.keys(allAvail);
  const inMembers = (typeof getInMembers === 'function') ? getInMembers(appData) : allMembers;
  const totalIn = inMembers.length || allMembers.length;
  const inIds = mUseMemo(() => new Set(inMembers.map((m) => m.id)), [inMembers]);
  const meIsIn = inIds.has(me.id);
  const heat = mUseMemo(() => {
    const h = {};
    Object.entries(allAvail).forEach(([mid, arr]) => { if (mid === me.id || !inIds.has(mid)) return; (arr || []).forEach((d) => { h[d] = (h[d] || 0) + 1; }); });
    if (meIsIn) days.forEach((d) => { h[d] = (h[d] || 0) + 1; });
    return h;
  }, [allAvail, days, me.id, inIds, meIsIn]);
  const peopleByDay = mUseMemo(() => {
    const map = {};
    Object.entries(allAvail).forEach(([mid, arr]) => { if (mid === me.id || !inIds.has(mid)) return; (arr || []).forEach((d) => { (map[d] = map[d] || []).push(memberById(mid) || { name: '?' }); }); });
    if (meIsIn) days.forEach((d) => { (map[d] = map[d] || []).push({ name: me.name + ' (tu)' }); });
    return map;
  }, [allAvail, days, me.id, inIds, meIsIn]);
  const namesFor = (d) => (peopleByDay[d] || []).map((p) => p.name).join(', ');

  return (
    <MShell>
      <MHeader phase={6} onLogout={onLogout} onOpenChat={onOpenChat} />
      <MPhaseTitle kicker={`${days.length} dias marcados`}
        title={<>Em que dias<br/><span style={{ color:'var(--pa-accent)' }}>podes ir?</span></>} />
      <div className="pa-scroll" style={{ padding:'6px 16px 14px', flex:1, minHeight:0, overflow:'auto' }}>
        {winnerLoc && (
          <div style={{ background:'var(--pa-ink)', color:'#fff', borderRadius:14, padding:'12px 14px', display:'flex', alignItems:'center', gap:12, marginBottom:14 }}>
            <div style={{ width:38, height:38, borderRadius:9, flexShrink:0,
              background:`repeating-linear-gradient(135deg,${winnerLoc.accent||'var(--pa-accent)'}88 0 6px,${winnerLoc.accent||'var(--pa-accent)'}44 6px 12px)` }} />
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontFamily:'var(--pa-mono)', fontSize:9, letterSpacing:1.1, color:'rgba(255,255,255,0.6)', textTransform:'uppercase' }}>Destino · alojamento</div>
              <div style={{ fontFamily:'var(--pa-display)', fontSize:15, fontWeight:600, letterSpacing:-0.3, marginTop:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                {winnerLoc.name}{winnerAcc ? ` · ${winnerAcc.area}` : ''}
              </div>
            </div>
          </div>
        )}

        <div style={{ background:'#fff', borderRadius:16, padding:14, border:'1px solid var(--pa-line)' }}>
          <Calendar dense onCellClick={toggle} renderCell={(d) => {
            const sel = days.includes(d);
            const n = heat[d] || 0;
            const intensity = totalIn > 0 ? n / totalIn : 0;
            return (
              <div title={n > 0 ? namesFor(d) : undefined} style={{ width:'100%', height:'100%', borderRadius:6,
                background: intensity > 0 ? `rgba(217,119,87,${0.10 + intensity * 0.55})` : '#fff',
                color:'var(--pa-ink)',
                border: sel ? '2px solid var(--pa-accent)' : intensity === 0 ? '1px solid var(--pa-line)' : '1px solid transparent',
                boxShadow: sel ? '0 0 0 1.5px rgba(217,119,87,0.25)' : 'none',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                fontFamily:'var(--pa-body)' }}>
                <div style={{ fontSize:12, fontWeight: sel ? 700 : 600, lineHeight:1 }}>{d}</div>
                {n > 0 && <div style={{ fontFamily:'var(--pa-mono)', fontSize:7.5, marginTop:1, color:'var(--pa-muted)', fontWeight:700, lineHeight:1 }}>{n}/{totalIn}</div>}
              </div>
            );
          }} />
          <div style={{ display:'flex', alignItems:'center', gap:14, marginTop:12 }}>
            <div style={{ display:'flex', alignItems:'center', gap:5 }}>
              <span style={{ width:13, height:13, borderRadius:3, background:'rgba(217,119,87,0.5)', display:'inline-block' }} />
              <span style={{ fontSize:10.5, color:'var(--pa-muted)' }}>mais gente</span>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:5 }}>
              <span style={{ width:13, height:13, borderRadius:3, background:'#fff', border:'2px solid var(--pa-accent)', display:'inline-block', boxSizing:'border-box' }} />
              <span style={{ fontSize:10.5, color:'var(--pa-muted)' }}>os teus dias</span>
            </div>
          </div>
        </div>
        <button onClick={() => { AppStore.setAvailability(me.id, days); if (window._paToast) window._paToast('Disponibilidade guardada!', 'success'); }}
          style={{ marginTop:14, width:'100%', padding:'14px', borderRadius:999, border:'none',
            background:'var(--pa-accent)', color:'#fff', cursor:'pointer',
            fontFamily:'var(--pa-body)', fontSize:14, fontWeight:600 }}>
          Guardar disponibilidade
        </button>

        {/* estado do grupo */}
        <div style={{ marginTop:18, background:'#fff', borderRadius:16, border:'1px solid var(--pa-line)', overflow:'hidden' }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', padding:'12px 16px 6px' }}>
            Estado do grupo · {submittedIds.length}/{allMembers.length}
          </div>
          {allMembers.map((m) => {
            const submitted = submittedIds.includes(m.id);
            return (
              <div key={m.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'9px 16px', borderTop:'1px solid var(--pa-line)' }}>
                <Avatar member={m} size={28} />
                <span style={{ flex:1, minWidth:0, fontSize:13.5, color:'var(--pa-ink)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{m.name}</span>
                {submitted ? <Pill tone="success" size="sm">✓ pronto</Pill> : <Pill tone="muted" size="sm">a marcar…</Pill>}
              </div>
            );
          })}
        </div>
      </div>
    </MShell>
  );
}

// PHASE 7 — Trancar datas
function MPhase7({ me, onLogout, onOpenChat }) {
  const appData = useAppStore();
  const locked = appData.locked;
  const allAvail = appData.avail || {};
  const inMembers = (typeof getInMembers === 'function') ? getInMembers(appData) : getAllMembers();
  const totalIn = inMembers.length || getAllMembers().length;
  const inIds = new Set(inMembers.map((m) => m.id));
  const [range, setRange] = mUseState({ from: null, to: null });

  // Heat map dos dias — conta apenas quem está "in" (ignora quem marcou e depois saiu)
  const heat = {};
  Object.entries(allAvail).forEach(([mid, arr]) => { if (!inIds.has(mid)) return; (arr||[]).forEach(d => { heat[d] = (heat[d]||0) + 1; }); });
  // Quem marcou cada dia (nomes, só "in")
  const peopleByDay = {};
  Object.entries(allAvail).forEach(([mid, days]) => {
    if (!inIds.has(mid)) return;
    (days||[]).forEach(d => { (peopleByDay[d] = peopleByDay[d] || []).push(memberById(mid) || { id:mid, name:'?', initials:'?', color:'var(--pa-muted)' }); });
  });
  const namesFor = (d) => (peopleByDay[d] || []).map(p => p.name).join(', ');
  const rankedDays = Object.keys(peopleByDay).map(Number).sort((a,b) => (heat[b]||0) - (heat[a]||0)).slice(0,6);

  return (
    <MShell>
      <MHeader phase={7} onLogout={onLogout} onOpenChat={onOpenChat} />
      {locked ? (
        <>
          <MPhaseTitle kicker="Datas trancadas 🔒"
            title={<>Temos datas!<br/><span style={{ color:'var(--pa-accent)' }}>{locked.from}–{locked.to}.</span></>}
            sub={locked.monthLabel || D.phase6.monthLabel} />
          <div className="pa-scroll" style={{ padding:'6px 16px 14px', flex:1, minHeight:0, overflow:'auto' }}>
            <div style={{ background:'var(--pa-ink)', color:'#fff', borderRadius:16, padding:20, textAlign:'center' }}>
              <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'rgba(255,255,255,0.6)', textTransform:'uppercase', marginBottom:8 }}>Confirmado</div>
              <div style={{ fontFamily:'var(--pa-display)', fontSize:40, fontWeight:600, letterSpacing:-1 }}>{locked.from}–{locked.to}</div>
              <div style={{ marginTop:4, opacity:0.7 }}>{locked.monthLabel || D.phase6.monthLabel}</div>
            </div>
            {me.isAdmin && (
              <Btn variant="ghost" size="sm" style={{ width:'100%', marginTop:12 }}
                onClick={() => AppStore.clearKey('locked')}>
                Destrancar
              </Btn>
            )}
          </div>
        </>
      ) : me.isAdmin ? (
        <>
          <MPhaseTitle kicker="Tu decides"
            title={<>Tranca os <br/><span style={{ color:'var(--pa-accent)' }}>melhores dias.</span></>}
            sub="Toca num dia para começar a seleção." />
          <div className="pa-scroll" style={{ padding:'6px 16px 14px', flex:1, minHeight:0, overflow:'auto' }}>
            <div style={{ background:'#fff', borderRadius:16, padding:16, border:'1px solid var(--pa-line)' }}>
              <Calendar dense onCellClick={(d) => { setRange({ from:d, to:Math.min(d+2,31) }); }} renderCell={(d) => {
                const n = heat[d] || 0;
                const inRange = range.from && range.to && d >= range.from && d <= range.to;
                const intensity = totalIn > 0 ? n/totalIn : 0;
                return (
                  <div style={{ width:'100%', height:'100%', borderRadius:7,
                    background: inRange ? 'var(--pa-ink)' : intensity > 0 ? `rgba(217,119,87,${0.10+intensity*0.6})` : '#fff',
                    color: inRange ? '#fff' : 'var(--pa-ink)',
                    border: intensity===0&&!inRange ? '1px solid var(--pa-line)' : 'none',
                    display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
                    <div style={{ fontFamily:'var(--pa-body)', fontSize:12, fontWeight:600 }}>{d}</div>
                    {n > 0 && <div style={{ fontFamily:'var(--pa-mono)', fontSize:8, color: inRange?'rgba(255,255,255,0.7)':'var(--pa-muted)' }}>{n}/{totalIn}</div>}
                  </div>
                );
              }} />
            </div>
            {rankedDays.length > 0 && (
              <div style={{ background:'#fff', borderRadius:14, padding:14, marginTop:12, border:'1px solid var(--pa-line)' }}>
                <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:8 }}>Quem está livre em cada dia</div>
                {rankedDays.map((day, idx) => (
                  <div key={day} style={{ display:'flex', alignItems:'flex-start', gap:8, padding:'7px 0', borderTop: idx===0?'none':'1px solid var(--pa-line)' }}>
                    <div style={{ width:30, height:26, borderRadius:7, flexShrink:0,
                      background:`rgba(217,119,87,${0.15+((heat[day]||0)/Math.max(1,totalIn))*0.6})`,
                      fontFamily:'var(--pa-body)', fontSize:12, fontWeight:700, color:'var(--pa-ink)',
                      display:'flex', alignItems:'center', justifyContent:'center' }}>{day}</div>
                    <div style={{ flex:1, display:'flex', flexWrap:'wrap', gap:4, minWidth:0 }}>
                      {(peopleByDay[day]||[]).map(p => (
                        <div key={p.id} style={{ display:'flex', alignItems:'center', gap:4, background:'rgba(31,26,20,0.04)', borderRadius:999, padding:'2px 8px 2px 2px' }}>
                          <Avatar member={p} size={16} />
                          <span style={{ fontFamily:'var(--pa-body)', fontSize:11, fontWeight:500, color:'var(--pa-ink)' }}>{p.name}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}
            {range.from && (
              <div style={{ background:'#fff', borderRadius:14, padding:14, marginTop:12, border:'1px solid var(--pa-line)' }}>
                <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Seleção</div>
                <div style={{ fontFamily:'var(--pa-display)', fontSize:22, fontWeight:600, marginTop:4 }}>{range.from}–{range.to}</div>
                <div style={{ display:'flex', gap:6, marginTop:10 }}>
                  <Btn variant="ghost" size="sm" style={{ flex:1 }} onClick={() => setRange({from:Math.max(1,range.from-1), to:range.to})}>−1 dia</Btn>
                  <Btn variant="ghost" size="sm" style={{ flex:1 }} onClick={() => setRange({from:range.from, to:Math.min(31,range.to+1)})}>+1 dia</Btn>
                </div>
                <Btn variant="accent" style={{ width:'100%', marginTop:10 }}
                  onClick={() => { AppStore.setLockedDates(range.from, range.to, D.phase6.monthLabel); }}>
                  Trancar estes dias 🔒
                </Btn>
              </div>
            )}
          </div>
        </>
      ) : (
        <>
          <MPhaseTitle kicker="A aguardar"
            title={<>Admin está<br/><span style={{ color:'var(--pa-accent)' }}>a escolher os dias.</span></>}
            sub="Já submeteste disponibilidade. Brevemente sabes." />
          <div style={{ padding:'6px 16px', flex:1 }}>
            <div style={{ padding:16, background:'rgba(31,26,20,0.04)', borderRadius:14, fontSize:13, color:'var(--pa-muted)', textAlign:'center' }}>
              Aguarda que o {memberById(D.adminId)?.name || 'admin'} tranche as datas.
            </div>
          </div>
        </>
      )}
    </MShell>
  );
}

// PHASE 8 — Planeamento
function MPhase8({ me, onLogout, onOpenChat }) {
  const appData = useAppStore();
  const locked = appData.locked;
  const [tab, setTab] = mUseState('estadia');

  const tabs = [

            <span style={{ width:5, height:5, borderRadius:5, background:'#3d5e44' }} />
            {locked.from}–{locked.to} · trancado
          </Pill>
        </div>
      )}
      <MPhaseTitle title={<>Planeamento.</>} sub="A viagem nos detalhes." />

      {/* Tab bar deslizável */}
      <div style={{ padding:'0 16px 12px', overflowX:'auto', WebkitOverflowScrolling:'touch' }}>
        <div style={{ display:'flex', gap:6, minWidth:'min-content' }}>
          {tabs.map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              padding:'8px 14px', borderRadius:999, border:'1px solid var(--pa-line)',

              color: tab === t.id ? '#fff' : 'var(--pa-ink)',
              fontFamily:'var(--pa-body)', fontSize:12, fontWeight:600, cursor:'pointer',
              display:'flex', alignItems:'center', gap:5, whiteSpace:'nowrap', flexShrink:0 }}>

            </button>
          ))}

      <div className="pa-scroll" style={{ padding:'4px 16px 12px', flex:1, minHeight:0, overflow:'auto' }}>
        {tab === 'estadia'    && <PlanEstadia appData={appData} />}
        {tab === 'custos'     && <PlanCustos me={me} />}
        {tab === 'itinerario' && <PlanItinerario me={me} />}
        {tab === 'atividades' && <PlanAtividades me={me} />}
        {tab === 'compras'    && <PlanCompras me={me} />}
      </div>
    </MShell>
  );
}

// Top-level mobile router
function MobileApp({ viewAs = 'member', liveUser, onLogout, phase: initialPhase, onBackToHub, onEditProfile }) {
  const appData = useAppStore();
  const me = liveUser || (viewAs === 'admin' ? memberById(D.adminId) : getAllMembers()[0] || memberById(D.adminId));
  const [chatOpen, setChatOpen] = mUseState(false);
  const allMsgs = useChat();
  const [lastSeen, setLastSeen] = mUseState(() => {
    try { return parseInt(localStorage.getItem('pa-chat-seen') || '0', 10) || 0; } catch { return 0; }
  });
  const unread = allMsgs.filter(m => (m.id || 0) > lastSeen && m.who !== me?.id).length;
  const markChatSeen = () => {
    const maxId = allMsgs.reduce((mx, m) => Math.max(mx, m.id || 0), 0);
    setLastSeen(maxId);
    try { localStorage.setItem('pa-chat-seen', String(maxId)); } catch {}
  };
  const openChat = () => { markChatSeen(); setChatOpen(true); };
  // Se o chat está aberto e chegam mensagens novas, marca como vistas
  mUseEffect(() => { if (chatOpen) markChatSeen(); /* eslint-disable-next-line */ }, [allMsgs.length, chatOpen]);
  const phase = initialPhase !== undefined ? initialPhase : (appData.currentPhase || D.edition.currentPhase || 1);
  const phases = { 1:MPhase1, 2:MPhase2, 3:MPhase3, 4:MPhase4, 5:MPhase5, 6:MPhase6, 7:MPhase7, 8:MPhase8 };
  const View = phases[phase] || MPhase1;
  return (
    <MNavCtx.Provider value={{ onBackToHub, onEditProfile, me, chatUnread: unread }}>
      <div style={{ position:'relative', width:'100%', height:'100%', display:'flex', flexDirection:'column' }}>
        <div style={{ flex:1, overflow:'hidden', position:'relative' }}>
          <div key={phase} className="pa-phase-enter" style={{ width:'100%', height:'100%' }}>
            <View me={me} onLogout={onLogout} onOpenChat={openChat} />
          </div>
        </div>
        {initialPhase === undefined && (
          <div style={{ padding:'8px 14px calc(12px + env(safe-area-inset-bottom))', background:'var(--pa-bg)', borderTop:'1px solid var(--pa-line)', flexShrink:0 }}>
            <PhaseProgressBanner phase={phase} me={me} narrow />
          </div>
        )}
        <MobileChatSheet me={me} open={chatOpen} onClose={() => setChatOpen(false)} />
      </div>
    </MNavCtx.Provider>
  );
}

Object.assign(window, {
  MPhase1, MPhase2, MPhase3, MPhase4, MPhase5, MPhase6, MPhase7, MPhase8,
  MobileApp,
});
</script>
<script type="text/babel">// Perdidos Algures — Sistema de progressão de fases.
// - Auto-advance: quando todos os participantes "in" tiverem completado a fase,
//   inicia countdown de 10s. Quando chega a 0, qualquer cliente avança a fase
//   (idempotente, primeiro a chegar ganha; os outros notam e param).
// - Só o admin avança a fase (botão "Avançar"). Prazo opcional com countdown.
// Tudo guardado na edição ativa via AppStore.

const { useState: pUseState, useEffect: pUseEffect, useRef: pUseRef } = React;

// ─────────────────────────────────────────────────────────────
// Quem está "a bordo" (RSVP === 'in'). Inclui o admin se respondeu in.
// ─────────────────────────────────────────────────────────────
function getInMembers(appData) {
  const rsvp = appData.rsvp || {};
  const all = (typeof getAllMembers === 'function') ? getAllMembers() : [];
  return all.filter(m => rsvp[m.id] === 'in');
}

// Quantos membros TOTAIS existem (para fase 1, onde ainda ninguém disse 'in')
function getTotalMembers() {
  return (typeof getAllMembers === 'function') ? getAllMembers().length : 0;
}

// ─────────────────────────────────────────────────────────────
// phaseComplete: a fase está pronta para avançar?
//   - Fase 1: todos responderam (in/out/maybe)
//   - Fase 2: todos os "in" submeteram pelo menos uma sugestão de local
//   - Fase 3: todos os "in" votaram num local
//   - Fase 4: todos os "in" submeteram pelo menos uma sugestão de alojamento
//   - Fase 5: todos os "in" votaram num alojamento E sem empate
//   - Fase 6: todos os "in" submeteram disponibilidade
//   - Fase 7: datas trancadas
//   - Fase 8: nunca (é a última)
// ─────────────────────────────────────────────────────────────
function phaseComplete(phase, appData) {
  const rsvp = appData.rsvp || {};
  const allMembers = (typeof getAllMembers === 'function') ? getAllMembers() : [];
  const inIds = allMembers.filter(m => rsvp[m.id] === 'in').map(m => m.id);

  if (phase === 1) {
    if (allMembers.length === 0) return false;
    return allMembers.every(m => rsvp[m.id]); // todos têm uma resposta
  }
  if (phase === 2) {
    if (inIds.length === 0) return false;
    const suggs = appData.locSuggs || [];
    return inIds.every(id => suggs.some(s => s.by === id));
  }
  if (phase === 3) {
    if (inIds.length === 0) return false;
    const votes = appData.locVotes || {};
    const allVoted = inIds.every(id => votes[id]);
    if (!allVoted) return false;
    // Se admin já desempatou, completo
    if (appData.locWinner) return true;
    // Se há empate (sem vencedor escolhido), NÃO completa
    const suggs = appData.locSuggs || [];
    const tally = {};
    suggs.forEach(s => { tally[s.id] = 0; });
    Object.values(votes).forEach(v => { if (tally[v] !== undefined) tally[v]++; });
    const sorted = Object.values(tally).sort((a,b) => b-a);
    if (sorted.length < 2) return true;
    return !(sorted[0] === sorted[1]);
  }
  if (phase === 4) {
    if (inIds.length === 0) return false;
    const suggs = appData.accSuggs || [];
    return inIds.every(id => suggs.some(s => s.by === id));
  }
  if (phase === 5) {
    if (inIds.length === 0) return false;
    const votes = appData.accVotes || {};
    const allVoted = inIds.every(id => votes[id]);
    if (!allVoted) return false;
    if (appData.accWinner) return true;
    const suggs = appData.accSuggs || [];
    const tally = {};
    suggs.forEach(s => { tally[s.id] = 0; });
    Object.values(votes).forEach(v => { if (tally[v] !== undefined) tally[v]++; });
    const sorted = Object.values(tally).sort((a,b) => b-a);
    if (sorted.length < 2) return true;
    return !(sorted[0] === sorted[1]);
  }
  if (phase === 6) {
    if (inIds.length === 0) return false;
    const avail = appData.avail || {};
    return inIds.every(id => Array.isArray(avail[id]) && avail[id].length > 0);
  }
  if (phase === 7) {
    return !!appData.locked;
  }
  return false; // fase 8 é a última
}

// ─────────────────────────────────────────────────────────────
// Hook: gere progresso da fase (SEM countdown automático).
// - Quando todos os "in" estão prontos, admin pode avançar com botão
// - Só o admin avança a fase; prazo opcional avança automaticamente quando expira
// - Sem timer, sem auto-advance silencioso — sempre uma ação humana clara
// ─────────────────────────────────────────────────────────────
function usePhaseProgress(phase, me) {
  const appData = useAppStore();

  const isLast = phase >= 8;
  const isComplete = phaseComplete(phase, appData);
  const allMembers = (typeof getAllMembers === 'function') ? getAllMembers() : [];
  const inMembers = (phase === 1) ? allMembers : getInMembers(appData);

  // Prazo opcional (countdown). Guardado em appData.deadline (ISO). Só o admin define.
  const deadline = appData.deadline || null;
  const expired = deadline ? (Date.now() >= new Date(deadline).getTime()) : false;

  // Quem ainda não completou (para mostrar quem falta)
  let pending = [];
  if (!isComplete && inMembers.length > 0) {
    if (phase === 1) {
      pending = allMembers.filter(m => !(appData.rsvp||{})[m.id]);
    } else if (phase === 2) {
      const suggs = appData.locSuggs || [];
      pending = inMembers.filter(m => !suggs.some(s => s.by === m.id));
    } else if (phase === 3) {
      const votes = appData.locVotes || {};
      pending = inMembers.filter(m => !votes[m.id]);
    } else if (phase === 4) {
      const suggs = appData.accSuggs || [];
      pending = inMembers.filter(m => !suggs.some(s => s.by === m.id));
    } else if (phase === 5) {
      const votes = appData.accVotes || {};
      pending = inMembers.filter(m => !votes[m.id]);
    } else if (phase === 6) {
      const avail = appData.avail || {};
      pending = inMembers.filter(m => !(Array.isArray(avail[m.id]) && avail[m.id].length > 0));
    }
  }

  // Só o admin avança a fase. Avançar limpa qualquer prazo definido.
  const advanceNow = async () => {
    if (isLast) return;
    await AppStore.setPhase(phase + 1);
    await AppStore.clearKey('deadline');
  };
  const setDeadline = async (iso) => { await AppStore._set('deadline', iso); };
  const clearDeadline = async () => { await AppStore.clearKey('deadline'); };

  // Avanço automático quando o prazo expira: a votação fecha e passa à fase seguinte.
  // Só o admin dispara (e o advanceNow limpa o prazo, parando a verificação).
  pUseEffect(() => {
    if (!deadline || isLast || !me?.isAdmin) return;
    const check = () => { if (Date.now() >= new Date(deadline).getTime()) advanceNow(); };
    check();
    const iv = setInterval(check, 5000);
    return () => clearInterval(iv);
    // eslint-disable-next-line
  }, [deadline, me?.isAdmin, phase]);

  return {
    isLast, isComplete,
    inCount: inMembers.length,
    pending,
    deadline, expired,
    advanceNow, setDeadline, clearDeadline,
  };
}

// ─────────────────────────────────────────────────────────────
// Componente: Banner de progresso (sem countdown).
// 3 estados:
//   A) Fase incompleta: mostra "Faltam: X" + voto para avançar
//   B) Fase completa: "Todos prontos!" + botão admin "Avançar fase →"
//   C) Empate fase 3/5 não resolvido: avisa que admin tem de desempatar
// ─────────────────────────────────────────────────────────────
function CountdownBanner({ deadline, narrow }) {
  const [now, setNow] = pUseState(Date.now());
  pUseEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(t);
  }, []);
  const ms = new Date(deadline).getTime() - now;
  const expired = ms <= 0;
  const d = Math.max(0, Math.floor(ms / 86400000));
  const h = Math.max(0, Math.floor((ms % 86400000) / 3600000));
  const m = Math.max(0, Math.floor((ms % 3600000) / 60000));
  const s = Math.max(0, Math.floor((ms % 60000) / 1000));
  const Unit = ({ v, l }) => (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', minWidth:40 }}>
      <div style={{ fontFamily:'var(--pa-display)', fontSize: narrow?22:26, fontWeight:700, lineHeight:1, fontVariantNumeric:'tabular-nums' }}>{String(v).padStart(2,'0')}</div>
      <div style={{ fontFamily:'var(--pa-mono)', fontSize:9, letterSpacing:1, opacity:0.6, textTransform:'uppercase', marginTop:3 }}>{l}</div>
    </div>
  );
  if (expired) {
    return (
      <div style={{ background:'var(--pa-ink)', color:'#fff', borderRadius:14, padding: narrow?'12px 14px':'14px 18px', textAlign:'center' }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, opacity:0.6, textTransform:'uppercase' }}>Prazo terminado</div>
        <div style={{ fontFamily:'var(--pa-display)', fontSize:16, fontWeight:600, marginTop:3 }}>O tempo de votação acabou ⏱</div>
      </div>
    );
  }
  return (
    <div style={{ background:'var(--pa-ink)', color:'#fff', borderRadius:14, padding: narrow?'12px 14px':'14px 18px' }}>
      <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, opacity:0.6, textTransform:'uppercase', marginBottom:8, textAlign:'center' }}>Tempo para votar</div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap: narrow?6:10 }}>
        <Unit v={d} l="dias" />
        <span style={{ opacity:0.4, fontSize:20, fontWeight:700 }}>:</span>
        <Unit v={h} l="horas" />
        <span style={{ opacity:0.4, fontSize:20, fontWeight:700 }}>:</span>
        <Unit v={m} l="min" />
        <span style={{ opacity:0.4, fontSize:20, fontWeight:700 }}>:</span>
        <Unit v={s} l="seg" />
      </div>
    </div>
  );
}

// Controlo de admin para definir/limpar o prazo de votação
function DeadlineControl({ deadline, onSet, onClear, narrow }) {
  const [open, setOpen] = pUseState(false);
  const [val, setVal] = pUseState('');
  if (deadline) {
    return (
      <Btn variant="soft" size="sm" onClick={onClear}>Remover prazo</Btn>
    );
  }
  if (!open) {
    return <Btn variant="soft" size="sm" onClick={() => setOpen(true)}>⏱ Definir prazo</Btn>;
  }
  return (
    <div style={{ display:'flex', alignItems:'center', gap:6, flexWrap:'wrap' }}>
      <input type="datetime-local" value={val} onChange={(e)=>setVal(e.target.value)}
        style={{ padding:'7px 10px', borderRadius:10, border:'1px solid var(--pa-line)', fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-ink)' }} />
      <Btn variant="accent" size="sm" disabled={!val} onClick={() => {
        const iso = new Date(val).toISOString();
        if (new Date(iso).getTime() > Date.now()) { onSet(iso); setOpen(false); }
        else if (window._paToast) window._paToast('Escolhe uma data no futuro.');
      }}>Definir</Btn>
      <Btn variant="ghost" size="sm" onClick={() => setOpen(false)}>✕</Btn>
    </div>
  );
}

function PhaseProgressBanner({ phase, me, narrow }) {
  const p = usePhaseProgress(phase, me);
  if (p.isLast || !me) return null;

  const appData = AppStore._cache();

  // Estado C: empate na fase 3 ou 5 (todos votaram mas há empate sem vencedor)
  const _detectTie = (typeof detectTie === 'function') ? detectTie : () => null;
  const tieIn3 = (phase === 3 && !appData.locWinner) ? (() => {
    const inMembers = getInMembers(appData);
    const votes = appData.locVotes || {};
    const allVoted = inMembers.length > 0 && inMembers.every(m => votes[m.id]);
    return allVoted && _detectTie(votes, appData.locSuggs || []);
  })() : null;
  const tieIn5 = (phase === 5 && !appData.accWinner) ? (() => {
    const inMembers = getInMembers(appData);
    const votes = appData.accVotes || {};
    const allVoted = inMembers.length > 0 && inMembers.every(m => votes[m.id]);
    return allVoted && _detectTie(votes, appData.accSuggs || []);
  })() : null;
  const hasUnresolvedTie = tieIn3 || tieIn5;

  const pendingNames = p.pending.slice(0, 3).map(m => m.name).join(', ');
  const extraPending = p.pending.length > 3 ? ` +${p.pending.length - 3}` : '';

  let statusContent = null;
  if (hasUnresolvedTie) {
    statusContent = (
      <div style={{ background:'#fff', border:'1px solid var(--pa-accent)', borderRadius:14, padding: narrow ? '10px 14px' : '12px 18px', display:'flex', alignItems:'center', gap:12 }}>
        <div style={{ fontSize:22 }}>🎯</div>
        <div style={{ flex:1 }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-accent)', textTransform:'uppercase' }}>Empate</div>
          <div style={{ fontFamily:'var(--pa-body)', fontSize:13.5, color:'var(--pa-ink)', marginTop:2 }}>
            {me.isAdmin ? 'Tens de desempatar para avançar.' : 'O admin está a desempatar...'}
          </div>
        </div>
      </div>
    );
  } else if (p.isComplete) {
    statusContent = (
      <div style={{ background:'#3d5e44', color:'#fff', borderRadius:14, padding: narrow ? '12px 14px' : '14px 18px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, flexWrap:'wrap' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ fontSize:18 }}>✓</div>
          <div>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, opacity:0.75, textTransform:'uppercase' }}>Todos prontos</div>
            <div style={{ fontFamily:'var(--pa-display)', fontSize: narrow?14:16, fontWeight:600, marginTop:2 }}>
              {me.isAdmin ? 'Podes avançar a fase.' : 'À espera de o admin avançar.'}
            </div>
          </div>
        </div>
        {me.isAdmin && (
          <button onClick={p.advanceNow} style={{ background:'#fff', color:'#3d5e44', border:'none', padding:'8px 16px', borderRadius:999, fontFamily:'var(--pa-body)', fontSize:13, fontWeight:700, cursor:'pointer' }}>
            Avançar fase →
          </button>
        )}
      </div>
    );
  } else if (p.inCount > 0) {
    statusContent = (
      <div style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:14, padding: narrow ? '10px 14px' : '12px 18px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, flexWrap:'wrap' }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>A aguardar</div>
          <div style={{ fontFamily:'var(--pa-body)', fontSize:13.5, color:'var(--pa-ink)', marginTop:2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
            {p.pending.length > 0
              ? <>Faltam: <strong>{pendingNames}{extraPending}</strong></>
              : <>Quando quiseres, avança a fase.</>}
          </div>
        </div>
        <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
          {me.isAdmin && p.pending.length > 0 && (
            <Btn variant="soft" size="sm" onClick={() => {
              const names = p.pending.map(m => m.name).join(', ');
              if (typeof pushChatMessage === 'function') {
                pushChatMessage({ id: Date.now(), who: me.id, text: `📣 ${names} — faltam vocês nesta fase! 🙌`, when: 'agora' });
                if (window._paToast) window._paToast('Lembrete enviado no chat!', 'success');
              }
            }}>Lembrar quem falta</Btn>
          )}
          {me.isAdmin && (
            <Btn variant="accent" size="sm" onClick={p.advanceNow}>Avançar →</Btn>
          )}
        </div>
      </div>
    );
  }

  const showCountdown = !!p.deadline;
  // Timer sempre acessível ao admin (mesmo com a fase completa, para poder
  // dar uma margem antes de avançar ou remover um prazo já definido).
  const showDeadlineCtrl = me.isAdmin && !hasUnresolvedTie;
  if (!statusContent && !showCountdown && !showDeadlineCtrl) return null;

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
      {showCountdown && <CountdownBanner deadline={p.deadline} narrow={narrow} />}
      {statusContent}
      {showDeadlineCtrl && (
        <div style={{ display:'flex', justifyContent:'flex-end' }}>
          <DeadlineControl deadline={p.deadline} onSet={p.setDeadline} onClear={p.clearDeadline} narrow={narrow} />
        </div>
      )}
    </div>
  );
}


Object.assign(window, { getInMembers, getTotalMembers, phaseComplete, usePhaseProgress, PhaseProgressBanner });
</script>

<script type="text/babel">// Perdidos Algures — Painel de desempate (admin).
// Quando há empate, admin pode resolver com:
//  - Cara ou coroa (random, animação)
//  - Votação por pontos (3-2-1 — cada um classifica top 3)
// O resultado é guardado em locWinner / accWinner conforme a fase.

const { useState: tbUseState2, useEffect: tbUseEffect2, useRef: tbUseRef2 } = React;

// Deteta empate nos votos da fase atual.
// Se inIds for passado, conta apenas votos de quem está "in".
function detectTie(votes, suggestions, inIds) {
  if (!votes) return null;
  const filteredVotes = inIds && Array.isArray(inIds)
    ? Object.entries(votes).filter(([uid]) => inIds.includes(uid)).map(([_,v]) => v)
    : Object.values(votes);
  if (filteredVotes.length === 0) return null;
  const tally = {};
  suggestions.forEach(s => { tally[s.id] = 0; });
  filteredVotes.forEach(id => { if (tally[id] !== undefined) tally[id]++; });
  const sorted = Object.entries(tally).sort((a,b) => b[1] - a[1]);
  if (sorted.length < 2 || sorted[0][1] === 0) return null;
  const top = sorted[0][1];
  const tied = sorted.filter(([,v]) => v === top).map(([id]) => id);
  if (tied.length < 2) return null;
  return {
    tiedIds: tied,
    tiedItems: tied.map(id => suggestions.find(s => s.id === id)).filter(Boolean),
    tally,
  };
}

// ─────────────────────────────────────────────────────────────
// Cara ou Coroa — animação simples, resultado aleatório
// ─────────────────────────────────────────────────────────────
function CoinFlip({ tiedItems, me, onResolve, onCancel }) {
  const appData = useAppStore();
  const isAdmin = !!me?.isAdmin;

  // Resultado partilhado por todos os clientes (admin grava, outros leem)
  const sharedResultId = appData.coinFlipResult;
  const result = sharedResultId ? (tiedItems.find(t => t.id === sharedResultId) || null) : null;

  const [flipping, setFlipping] = tbUseState2(false);
  const [highlight, setHighlight] = tbUseState2(-1);
  const timerRef = tbUseRef2 ? tbUseRef2(null) : { current: null };

  // Para não-admin: quando o resultado partilhado chega, faz uma animação curta
  // e depois fixa no vencedor (sincroniza visualmente sem decidir nada localmente)
  tbUseEffect2(() => {
    if (isAdmin) return;
    if (!sharedResultId) { setHighlight(-1); setFlipping(false); return; }
    const winnerIdx = tiedItems.findIndex(t => t.id === sharedResultId);
    if (winnerIdx < 0) return;
    runAnimation(winnerIdx, false);
    return () => { if (timerRef.current) clearTimeout(timerRef.current); };
    // eslint-disable-next-line
  }, [sharedResultId, isAdmin]);

  // Animação partilhada: percorre as opções, dá voltas completas, desacelera e
  // termina exatamente no vencedor. Só revela o resultado (laranja) quando para.
  function runAnimation(winnerIdx, persistFirst) {
    const n = tiedItems.length;
    setFlipping(true);
    setHighlight(0);
    const loops = 3; // voltas completas antes de abrandar
    const seq = [];
    for (let i = 0; i < loops * n + winnerIdx; i++) seq.push(i % n);
    seq.push(winnerIdx); // garante terminar no vencedor
    let k = 0;
    const tick = () => {
      setHighlight(seq[k]);
      k++;
      if (k < seq.length) {
        const progress = k / seq.length;
        const delay = 55 + Math.pow(progress, 2.4) * 340; // abranda no fim
        timerRef.current = setTimeout(tick, delay);
      } else {
        setHighlight(winnerIdx);
        setFlipping(false); // só agora o resultado é revelado
      }
    };
    tick();
  }

  // Admin lança: escolhe vencedor justo, persiste, e anima
  const flip = async () => {
    if (!isAdmin || flipping) return;
    const winnerIdx = Math.floor(Math.random() * tiedItems.length);
    const winnerId = tiedItems[winnerIdx].id;
    // Persiste primeiro para os outros clientes começarem a animação em sincronia
    await AppStore._set('coinFlipResult', winnerId);
    runAnimation(winnerIdx, true);
  };

  const repeat = async () => {
    if (!isAdmin || flipping) return;
    if (timerRef.current) clearTimeout(timerRef.current);
    await AppStore.clearKey('coinFlipResult');
    setHighlight(-1);
    setFlipping(false);
  };

  const accept = async () => {
    if (!isAdmin || !result || flipping) return;
    await AppStore.clearKey('coinFlipResult');
    onResolve(result.id);
  };

  // O resultado (laranja) só aparece quando a animação parou
  const revealed = result && !flipping;

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:18, padding:'8px 0' }}>
      <div style={{ fontFamily:'var(--pa-mono)', fontSize:11, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', textAlign:'center' }}>
        {tiedItems.length === 2 ? 'Cara ou coroa' : 'À sorte'}
      </div>

      {/* Estado para não-admin quando o admin ainda não lançou */}
      {!isAdmin && !sharedResultId && (
        <div style={{ padding:'12px 14px', background:'rgba(31,26,20,0.04)', borderRadius:12, textAlign:'center', fontFamily:'var(--pa-body)', fontSize:13.5, color:'var(--pa-muted)' }}>
          O admin vai sortear num instante...
        </div>
      )}

      {/* Lista vertical com destaque animado/sincronizado */}
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        {tiedItems.map((item, i) => {
          const isHighlight = flipping && highlight === i;
          const isResult = revealed && result.id === item.id;
          return (
            <div key={item.id} style={{
              padding:'14px 16px', borderRadius:14,
              background: isResult ? 'var(--pa-accent)' : isHighlight ? 'var(--pa-ink)' : '#fff',
              color: (isResult || isHighlight) ? '#fff' : 'var(--pa-ink)',
              border: '1px solid ' + ((isResult || isHighlight) ? 'transparent' : 'var(--pa-line)'),
              fontFamily:'var(--pa-display)', fontSize:18, fontWeight:600,
              transition: 'all 0.12s ease',
              transform: isHighlight ? 'scale(1.03)' : 'scale(1)',
              boxShadow: isResult ? '0 6px 20px rgba(217,119,87,0.35)' : 'none',
              display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <span>{item.name || item.area || '?'}</span>
              {isResult && <span style={{ fontSize:14, opacity:0.9 }}>★ Vencedor</span>}
            </div>
          );
        })}
      </div>

      {/* Controlos: só admin */}
      {isAdmin ? (
        <div style={{ display:'flex', gap:8 }}>
          {!revealed
            ? <>
                <Btn variant="ghost" onClick={onCancel} style={{ flex:1 }} disabled={flipping}>Cancelar</Btn>
                <Btn variant="accent" onClick={flip} disabled={flipping} style={{ flex:1 }}>{flipping ? 'A girar...' : '🎲 Lançar'}</Btn>
              </>
            : <>
                <Btn variant="ghost" onClick={repeat} style={{ flex:1 }}>Repetir</Btn>
                <Btn variant="accent" onClick={accept} style={{ flex:1 }}>Aceitar vencedor</Btn>
              </>}
        </div>
      ) : (
        sharedResultId && (
          <div style={{ padding:'10px 12px', background:'rgba(31,26,20,0.04)', borderRadius:10, textAlign:'center', fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)' }}>
            {flipping ? 'A girar a roleta...' : 'Aguarda o admin confirmar o vencedor...'}
          </div>
        )
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Votação por pontos — cada pessoa classifica top 3 dos empatados
//   1ª escolha = 3 pts, 2ª = 2 pts, 3ª = 1 pt
//   Resultados guardados em appData.tieVotes (objeto por user → array ordenado)
// ─────────────────────────────────────────────────────────────
function PointsVote({ tiedItems, me, onResolve, onCancel, voteKey }) {
  const appData = useAppStore();
  const tieVotes = appData[voteKey] || {};
  const inMembers = getInMembers(appData);
  // Toda a gente que está na edição pode participar (não apenas in members)
  const [myRank, setMyRank] = tbUseState2(() => {
    const existing = tieVotes[me?.id];
    if (existing && Array.isArray(existing) && existing.length === tiedItems.length) return existing.slice();
    return tiedItems.map(i => i.id);
  });

  tbUseEffect2(() => {
    const existing = tieVotes[me?.id];
    if (existing && JSON.stringify(existing) !== JSON.stringify(myRank)) {
      setMyRank(existing.slice());
    }
  }, [tieVotes[me?.id]]);

  // Conta todos os votos válidos (não só inMembers)
  const allMembers = (typeof getAllMembers === 'function') ? getAllMembers() : [];
  const eligible = allMembers; // toda a gente pode votar
  const voted = eligible.filter(m => Array.isArray(tieVotes[m.id]) && tieVotes[m.id].length === tiedItems.length);
  const allVoted = voted.length >= Math.max(inMembers.length, 1); // pelo menos os in

  const moveItem = (idx, dir) => {
    const swap = idx + dir;
    if (swap < 0 || swap >= myRank.length) return;
    const next = myRank.slice();
    [next[idx], next[swap]] = [next[swap], next[idx]];
    setMyRank(next);
  };

  const submit = async () => {
    await AppStore._set(voteKey, { ...tieVotes, [me.id]: myRank });
  };

  const resolveWinner = () => {
    // Pontuação: posição 0 = N pontos, posição N-1 = 1 ponto
    const N = tiedItems.length;
    const score = {};
    tiedItems.forEach(t => { score[t.id] = 0; });
    voted.forEach(m => {
      const rank = tieVotes[m.id];
      rank.forEach((id, i) => { score[id] = (score[id] || 0) + (N - i); });
    });
    const sorted = Object.entries(score).sort((a,b) => b[1] - a[1]);
    if (sorted.length === 0) return null;
    const topScore = sorted[0][1];
    const tiedAtTop = sorted.filter(([,v]) => v === topScore).length > 1;
    return { winnerId: sorted[0][0], scores: score, tied: tiedAtTop };
  };

  const accept = async () => {
    const r = resolveWinner();
    if (!r) return;
    await AppStore.clearKey(voteKey);
    onResolve(r.winnerId);
  };

  const result = allVoted ? resolveWinner() : null;
  const myVoteSubmitted = !!tieVotes[me?.id];

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <div style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)' }}>
        Ordena por preferência. A 1ª escolha vale {tiedItems.length} pontos, a última vale 1.
      </div>

      <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
        {myRank.map((id, idx) => {
          const item = tiedItems.find(t => t.id === id);
          if (!item) return null;
          const points = tiedItems.length - idx;
          return (
            <div key={id} style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 12px',
              background:'#fff', borderRadius:12, border:'1px solid var(--pa-line)' }}>
              <div style={{ width:28, height:28, borderRadius:8, background:'var(--pa-accent)', color:'#fff',
                display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--pa-display)', fontWeight:700, fontSize:13, flexShrink:0 }}>
                {idx + 1}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontFamily:'var(--pa-body)', fontSize:13.5, fontWeight:600 }}>{item.name || item.area || '?'}</div>
                <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, color:'var(--pa-muted)' }}>{points} {points===1?'ponto':'pontos'}</div>
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
                <button onClick={() => moveItem(idx, -1)} disabled={idx===0 || myVoteSubmitted} style={{ width:24, height:18, border:'1px solid var(--pa-line)', borderRadius:4, background:'#fff', cursor:idx===0?'default':'pointer', padding:0, opacity:idx===0||myVoteSubmitted?0.4:1 }}>
                  <svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 5l4-4 4 4" fill="none" stroke="var(--pa-ink)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </button>
                <button onClick={() => moveItem(idx, 1)} disabled={idx===myRank.length-1 || myVoteSubmitted} style={{ width:24, height:18, border:'1px solid var(--pa-line)', borderRadius:4, background:'#fff', cursor:idx===myRank.length-1?'default':'pointer', padding:0, opacity:(idx===myRank.length-1||myVoteSubmitted)?0.4:1 }}>
                  <svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" fill="none" stroke="var(--pa-ink)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </button>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ padding:'10px 12px', background:'rgba(31,26,20,0.04)', borderRadius:10 }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>
          Votos
        </div>
        <div style={{ fontFamily:'var(--pa-display)', fontSize:15, fontWeight:600, marginTop:2 }}>
          {voted.length} {voted.length === 1 ? 'voto' : 'votos'}
        </div>
      </div>

      {result && me?.isAdmin && (
        <div style={{ padding:'12px 14px', borderRadius:12, background: result.tied ? 'var(--pa-accent)' : 'var(--pa-ink)', color:'#fff' }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, opacity:0.6, textTransform:'uppercase' }}>{result.tied ? 'Ainda empatado' : 'Resultado'}</div>
          <div style={{ fontFamily:'var(--pa-display)', fontSize:18, fontWeight:600, marginTop:4 }}>
            {result.tied
              ? 'Empate nos pontos!'
              : <>{(tiedItems.find(t=>t.id===result.winnerId) || {}).name || (tiedItems.find(t=>t.id===result.winnerId) || {}).area} ganha</>}
          </div>
          <div style={{ fontFamily:'var(--pa-body)', fontSize:11, opacity:0.8, marginTop:4 }}>
            {Object.entries(result.scores).map(([id,s]) => `${(tiedItems.find(t=>t.id===id)||{}).name||(tiedItems.find(t=>t.id===id)||{}).area}: ${s}`).join(' · ')}
          </div>
          {result.tied && (
            <div style={{ fontFamily:'var(--pa-body)', fontSize:12, marginTop:8, opacity:0.95 }}>
              Os pontos empataram. Volta atrás e usa a roleta para desempatar à sorte.
            </div>
          )}
        </div>
      )}

      <div style={{ display:'flex', gap:8 }}>
        <Btn variant="ghost" onClick={onCancel} style={{ flex:1 }}>Voltar</Btn>
        {!myVoteSubmitted
          ? <Btn variant="accent" onClick={submit} style={{ flex:1 }}>Submeter voto</Btn>
          : (me?.isAdmin && result
              ? (result.tied
                  ? <Btn variant="soft" disabled style={{ flex:1 }}>Empate — usa a roleta</Btn>
                  : <Btn variant="accent" onClick={accept} style={{ flex:1 }}>Aceitar vencedor</Btn>)
              : <Btn variant="soft" disabled style={{ flex:1 }}>Voto submetido · aguarda outros</Btn>)}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Modal global de desempate (admin escolhe método; membros vêm o método ativo)
// O método ativo guarda-se em appData.tieMethod = 'coin' | 'points' | null
// ─────────────────────────────────────────────────────────────
function TiebreakModal({ open, onClose, tie, me, voteKey, onResolve }) {
  const appData = useAppStore();
  const method = appData.tieMethod;

  if (!open || !tie) return null;

  const choose = (m) => AppStore._set('tieMethod', m);
  const cancel = () => { AppStore.clearKey('tieMethod'); AppStore.clearKey(voteKey); onClose(); };
  const resolveAndClose = async (winnerId) => {
    await AppStore.clearKey('tieMethod');
    await AppStore.clearKey(voteKey);
    await onResolve(winnerId);
    onClose();
  };

  return (
    <PAModal open={open} onClose={me?.isAdmin ? cancel : onClose} title="🎯 Desempate" maxWidth={500}>
      <div style={{ fontFamily:'var(--pa-body)', fontSize:13.5, color:'var(--pa-muted)', marginBottom:14 }}>
        Empate entre <strong style={{ color:'var(--pa-ink)' }}>{tie.tiedItems.length} opções</strong>:&nbsp;
        {tie.tiedItems.map(t => t.name || t.area).join(' · ')}
      </div>

      {!method && (
        me?.isAdmin ? (
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            <button onClick={() => choose('coin')} style={{
              padding:'14px 16px', borderRadius:14, border:'1px solid var(--pa-line)', background:'#fff',
              cursor:'pointer', textAlign:'left', display:'flex', alignItems:'center', gap:14, fontFamily:'var(--pa-body)' }}>
              <div style={{ fontSize:30 }}>🎰</div>
              <div>
                <div style={{ fontSize:15, fontWeight:600 }}>Roleta da sorte</div>
                <div style={{ fontSize:12, color:'var(--pa-muted)', marginTop:2 }}>Cara ou coroa (à sorte)</div>
              </div>
            </button>
            <button onClick={() => choose('points')} style={{
              padding:'14px 16px', borderRadius:14, border:'1px solid var(--pa-line)', background:'#fff',
              cursor:'pointer', textAlign:'left', display:'flex', alignItems:'center', gap:14, fontFamily:'var(--pa-body)' }}>
              <div style={{ fontSize:30 }}>🏆</div>
              <div>
                <div style={{ fontSize:15, fontWeight:600 }}>Votação por pontos</div>
                <div style={{ fontSize:12, color:'var(--pa-muted)', marginTop:2 }}>Cada um classifica · 1º = mais pontos · ganha o que somar mais</div>
              </div>
            </button>
          </div>
        ) : (
          <div style={{ padding:'20px 0', textAlign:'center', color:'var(--pa-muted)' }}>
            O admin está a escolher como desempatar...
          </div>
        )
      )}

      {method === 'coin' && (
        <CoinFlip tiedItems={tie.tiedItems} me={me} onResolve={resolveAndClose} onCancel={() => AppStore.clearKey('tieMethod')} />
      )}

      {method === 'points' && (
        <PointsVote tiedItems={tie.tiedItems} me={me} voteKey={voteKey}
          onResolve={resolveAndClose}
          onCancel={() => me?.isAdmin && AppStore.clearKey('tieMethod')} />
      )}
    </PAModal>
  );
}

Object.assign(window, { detectTie, CoinFlip, PointsVote, TiebreakModal });
</script>

<script type="text/babel">// Perdidos Algures — Edition Hub + modais (perfil, criar/editar edição).
// Funciona em desktop e mobile (layout responsivo).

const { useState: hUseState, useEffect: hUseEffect, useRef: hUseRef } = React;

// ─────────────────────────────────────────────────────────────
// Modal genérico (overlay centrado, responsivo)
// ─────────────────────────────────────────────────────────────
function PAModal({ open, onClose, title, children, maxWidth = 460 }) {
  if (!open) return null;
  return (
    <div onClick={onClose} className="pa-fade" style={{
      position:'fixed', inset:0, zIndex:1000, background:'rgba(31,26,20,0.45)',
      display:'flex', alignItems:'center', justifyContent:'center', padding:16,
      backdropFilter:'blur(2px)' }}>
      <div onClick={(e)=>e.stopPropagation()} className="pa-scale" style={{
        width:'100%', maxWidth, maxHeight:'90dvh', overflow:'auto',
        background:'var(--pa-bg)', borderRadius:20, padding:'24px 22px',
        boxShadow:'0 20px 60px rgba(0,0,0,0.3)' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:18 }}>
          <div style={{ fontFamily:'var(--pa-display)', fontSize:20, fontWeight:600, letterSpacing:-0.4 }}>{title}</div>
          <button onClick={onClose} style={{ width:32, height:32, borderRadius:999, border:'none',
            background:'rgba(31,26,20,0.06)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="var(--pa-ink)" strokeWidth="1.5" strokeLinecap="round"/></svg>
          </button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Editor de Perfil — foto + nome de exibição (login fica fixo)
// ─────────────────────────────────────────────────────────────
function ProfileEditor({ open, onClose, auth }) {
  const me = auth.user;
  const [displayName, setDisplayName] = hUseState(me?.displayName || me?.name || '');
  const [photo, setPhoto] = hUseState(me?.photoDataUrl || null);
  const [busy, setBusy] = hUseState(false);
  const [err, setErr] = hUseState(null);
  const fileRef = hUseRef(null);

  hUseEffect(() => {
    if (open) { setDisplayName(me?.displayName || me?.name || ''); setPhoto(me?.photoDataUrl || null); setErr(null); }
  }, [open]);

  const onPick = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    try { setPhoto(await readPhotoFile(f)); } catch { setErr('Não consegui ler a foto.'); }
  };

  const save = async () => {
    setBusy(true); setErr(null);
    try { await auth.updateProfile({ displayName, photoDataUrl: photo }); if (window._paToast) window._paToast('Perfil atualizado!', 'success'); onClose(); }
    catch (ex) { setErr(ex.message); }
    finally { setBusy(false); }
  };

  const preview = { initials: AuthStore.initialsFromName(displayName||'?'), color: me?.color||'var(--pa-accent)', photoDataUrl: photo, name: displayName };

  return (
    <PAModal open={open} onClose={onClose} title="Editar perfil">
      <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
        <div style={{ display:'flex', alignItems:'center', gap:16 }}>
          <Avatar member={preview} size={64} />
          <div style={{ flex:1 }}>
            <Btn variant="soft" size="sm" onClick={()=>fileRef.current?.click()}>Mudar foto</Btn>
            {photo && <Btn variant="ghost" size="sm" style={{ marginLeft:8 }} onClick={()=>setPhoto(null)}>Remover</Btn>}
            <input ref={fileRef} type="file" accept="image/*" onChange={onPick} style={{ display:'none' }} />
          </div>
        </div>
        <Field label="Nome de exibição" value={displayName} onChange={setDisplayName} placeholder="Como queres aparecer" />
        <div style={{ padding:'10px 14px', borderRadius:12, background:'rgba(31,26,20,0.04)', border:'1px solid var(--pa-line)' }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Nome de login (fixo)</div>
          <div style={{ fontFamily:'var(--pa-body)', fontSize:14, marginTop:2 }}>{me?.name}</div>
        </div>
        {err && <AuthError msg={err} />}
        <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
          <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
          <Btn variant="accent" onClick={save} disabled={busy}>{busy ? 'A guardar...' : 'Guardar'}</Btn>
        </div>
      </div>
    </PAModal>
  );
}

// ─────────────────────────────────────────────────────────────
// Editor de Edição — criar ou editar (número, título, subtítulo)
// ─────────────────────────────────────────────────────────────
function EditionEditor({ open, onClose, edition }) {
  const isNew = !edition;
  const [number, setNumber] = hUseState('');
  const [title, setTitle] = hUseState('');
  const [subtitle, setSubtitle] = hUseState('');
  const [busy, setBusy] = hUseState(false);
  const [err, setErr] = hUseState(null);

  hUseEffect(() => {
    if (open) {
      setNumber(String(edition?.number || EditionStore.nextNumber()));
      setTitle(edition?.title || '');
      setSubtitle(edition?.subtitle || '');
      setErr(null);
    }
  }, [open]);

  const save = async () => {
    setBusy(true); setErr(null);
    try {
      const num = parseInt(number) || EditionStore.nextNumber();
      if (isNew) await EditionStore.create({ number:num, title:title.trim()||'Nova Aventura', subtitle:subtitle.trim() });
      else await EditionStore.update(edition.id, { number:num, title:title.trim()||'Nova Aventura', subtitle:subtitle.trim() });
      if (window._paToast) window._paToast(isNew ? 'Edição criada!' : 'Edição atualizada!', 'success');
      onClose();
    } catch (ex) { setErr(ex.message); }
    finally { setBusy(false); }
  };

  return (
    <PAModal open={open} onClose={onClose} title={isNew ? 'Nova edição' : 'Editar edição'}>
      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>

  );
}

// ─────────────────────────────────────────────────────────────
// EditionHub — ecrã principal após login (desktop + mobile)
// ─────────────────────────────────────────────────────────────
function EditionHub({ auth, onEnterEdition, narrow }) {
  const editions = useEditions();
  const me = sessionToMember(auth.user);
  const isAdmin = !!auth.user?.isAdmin;
  const [profileOpen, setProfileOpen] = hUseState(false);
  const [editorOpen, setEditorOpen] = hUseState(false);
  const [editingEdition, setEditingEdition] = hUseState(null);
  const [showArchived, setShowArchived] = hUseState(false);

  const active = editions.filter(e => e.status !== 'archived');
  const archived = editions.filter(e => e.status === 'archived');

  const handleAction = async (act, ed) => {
    try {
      if (act === 'archive') await EditionStore.archive(ed.id);
      else if (act === 'unarchive') await EditionStore.unarchive(ed.id);
      else if (act === 'reset') { if (window.confirm(`Recomeçar a "${ed.title}"? Todos os dados (RSVP, votos, sugestões) serão apagados.`)) await EditionStore.reset(ed.id); }
      else if (act === 'duplicate') { const copyData = window.confirm('Copiar também os dados (RSVP, votos, etc.)?\n\nOK = copiar tudo · Cancelar = só a estrutura'); await EditionStore.duplicate(ed.id, { copyData }); }
      else if (act === 'delete') { if (window.confirm(`Eliminar a "${ed.title}" para sempre? Esta ação não pode ser desfeita.`)) await EditionStore.remove(ed.id); }
    } catch (ex) { if (window._paToast) window._paToast(ex.message || 'Algo correu mal.'); }
  };

  const enter = (ed) => { EditionStore.setActive(ed.id); onEnterEdition(ed); };

  return (
    <div style={{ width:'100%', minHeight:'100%', background:'var(--pa-bg)', display:'flex', flexDirection:'column',
      fontFamily:'var(--pa-body)', color:'var(--pa-ink)' }}>
      {/* Top bar */}
