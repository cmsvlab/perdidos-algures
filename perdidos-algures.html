function DPhase1({ me }) {
  const appData = useAppStore();
  const rsvp = appData.rsvp || {};
  const allMembers = getAllMembers();
  const counts = dUseMemo(() => {
    const c = { in:0, out:0, maybe:0, pending:0 };
    allMembers.forEach((m) => { const s = rsvp[m.id] || 'pending'; c[s]++; });
    return c;
  }, [rsvp, allMembers.length]);

  const myChoice = rsvp[me.id] || null;
  const [picking, setPicking] = dUseState(false);

  const handleRsvp = (status) => {
    AppStore.setRsvp(me.id, status);
    setPicking(false);
  };

  return (
    <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
      <DPhaseHeader phase={1} status="Em curso" statusTone="accent"
        title={<>Quem entra na <span style={{ color:'var(--pa-accent)' }}>{(appData.editionNumber||1)}ª edição</span> — <span style={{ color:'var(--pa-accent)' }}>{appData.editionTitle || 'Nova Aventura'}</span>?</>}
        sub={<>O {memberById(D.adminId)?.name || 'admin'} iniciou esta edição. Diz se estás dentro.</>} />

      {/* balcões */}
      <div style={{ display:'flex', gap:12, marginBottom:24 }}>
        {[
          { l:'Dentro', n:counts.in, tone:'#3d5e44', bg:'rgba(107,142,111,0.16)' },
          { l:'Fora', n:counts.out, tone:'#8a4220', bg:'rgba(217,119,87,0.18)' },
          { l:'A pensar', n:counts.maybe, tone:'var(--pa-muted)', bg:'rgba(31,26,20,0.05)' },
        ].map((c) => (
          <div key={c.l} style={{ background:c.bg, borderRadius:14, padding:'14px 18px', flex:1 }}>
            <div style={{ fontFamily:'var(--pa-display)', fontSize:32, fontWeight:600, color:c.tone, letterSpacing:-0.6 }}>{c.n}</div>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, color:c.tone, letterSpacing:1, textTransform:'uppercase', marginTop:2 }}>{c.l}</div>
          </div>
        ))}
      </div>

      {/* botões RSVP — toda a gente responde, incluindo o admin */}
      {(
        <div style={{ marginBottom:20, padding:16, background:'#fff', borderRadius:14, border:'1px solid var(--pa-line)' }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:12 }}>
            A tua resposta
          </div>
          <div style={{ display:'flex', gap:8 }}>
            {[{ id:'in', label:'Dentro 🙋', tone:'success' }, { id:'maybe', label:'A pensar 🤔', tone:'default' }, { id:'out', label:'Fora 😩', tone:'warn' }].map((o) => (
              <button key={o.id} onClick={() => handleRsvp(o.id)} style={{
                flex:1, padding:'10px 8px', borderRadius:10, cursor:'pointer', fontFamily:'var(--pa-body)', fontSize:13, fontWeight:600,
                background: myChoice===o.id ? 'var(--pa-ink)' : '#fff',
                color: myChoice===o.id ? '#fff' : 'var(--pa-ink)',
                border: myChoice===o.id ? 'none' : '1px solid var(--pa-line)',
              }}>{o.label}</button>
            ))}
          </div>
          {myChoice && <div style={{ marginTop:10, fontSize:12, color:'var(--pa-muted)', textAlign:'center' }}>
            Resposta guardada. Podes mudar até a fase fechar.
          </div>}
        </div>
      )}

      {/* lista de membros */}
      <div style={{ background:'#fff', borderRadius:18, border:'1px solid var(--pa-line)', overflow:'hidden' }}>
        {allMembers.length === 0 && (
          <div style={{ padding:24, textAlign:'center', color:'var(--pa-muted)', fontSize:13 }}>
            Ninguém registado ainda. Partilha o link com o grupo!
          </div>
        )}
        {allMembers.map((m, i) => {
          const s = rsvp[m.id] || 'pending';
          const labels = { in:'Dentro', out:'Fora', maybe:'A pensar', pending:'Sem responder' };
          const tones = { in:'success', out:'warn', maybe:'default', pending:'muted' };
          return (
            <div key={m.id} style={{ display:'flex', alignItems:'center', gap:14, padding:'14px 20px',
              borderTop: i===0?'none':'1px solid var(--pa-line)' }}>
              <Avatar member={m} size={36} />
              <div style={{ flex:1 }}>
                <div style={{ fontFamily:'var(--pa-body)', fontSize:15, fontWeight:600, color:'var(--pa-ink)' }}>
                  {m.name} {m.isAdmin && <span style={{ color:'var(--pa-accent)', fontSize:12, fontWeight:500 }}>· admin</span>}
                </div>
              </div>
              <Pill tone={tones[s]}>{labels[s]}</Pill>
            </div>
          );
        })}
      </div>

      {me.isAdmin && (
        <DAdminBar hint={`${counts.in} confirmados. Quando estiver completo, avança.`}>
          <Btn variant="ghost" size="sm" onClick={() => {
            if (window.confirm('Limpar todos os RSVPs?')) {
              AppStore.clearKey('rsvp');
            }
          }}>Reiniciar</Btn>
        </DAdminBar>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PHASE 2 — Sugerir localizações (dinâmico via AppStore)
// ─────────────────────────────────────────────────────────────
function DPhase2({ me }) {
  const appData = useAppStore();
  const suggestions = appData.locSuggs || [];
  const mineCount = suggestions.filter((s) => s.by === me.id).length;
  const limit = D.phase2.perPersonLimit;
  const [adding, setAdding] = dUseState(false);

  const handleAdd = ({ name, city, tags, accent }) => {
    AppStore.addLocSuggestion({
      id: 'loc_' + Date.now().toString(36),
      name, city, tags: tags || [], accent: accent || 'var(--pa-accent)',
      by: me.id,
    });
    setAdding(false);
  };

  return (
    <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
      <DPhaseHeader phase={2} status="Em curso" statusTone="accent"
        title={<>Cada um lança<br/><span style={{ color:'var(--pa-accent)' }}>até {limit} sítios.</span></>}
        sub="Sem censura. Convencer o grupo é com o nome e os argumentos." />

      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:11, letterSpacing:1, color:'var(--pa-muted)', textTransform:'uppercase' }}>
          {suggestions.length} destino{suggestions.length !== 1 ? 's' : ''} no chapéu
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <Pill>Os teus: {mineCount} / {limit}</Pill>
          {mineCount < limit && !adding && (
            <Btn variant="accent" size="sm" onClick={() => setAdding(true)} icon={<span style={{ fontSize:14 }}>+</span>}>
              Lançar destino
            </Btn>
          )}
        </div>
      </div>

      {adding && <LocSuggestionForm onCancel={() => setAdding(false)} onSubmit={handleAdd} />}

      {suggestions.length === 0 && !adding && (
        <div style={{ padding:'48px 0', textAlign:'center', color:'var(--pa-muted)', fontSize:14 }}>
          Ainda ninguém sugeriu nada. Vai lá! 🗺️
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:14 }}>
        {suggestions.map((s) => {
          const by = memberById(s.by) || { name: s.by, color:'var(--pa-muted)', initials:'?' };
          const mine = s.by === me.id;
          return (
            <div key={s.id} style={{ background:'#fff', borderRadius:14, overflow:'hidden',
              border: mine?'1.5px solid var(--pa-accent)':'1px solid var(--pa-line)', position:'relative' }}>
              <PhotoSlot accent={s.accent || 'var(--pa-accent)'} label={s.city} height={108} radius={0} />
              {(me.isAdmin || mine) && (
                <button onClick={() => AppStore.removeLocSuggestion(s.id)}
                  title="Remover" style={{ position:'absolute', top:8, right:8, width:24, height:24,
                    borderRadius:999, border:'none', background:'rgba(0,0,0,0.4)', color:'#fff',
                    cursor:'pointer', fontSize:14, display:'flex', alignItems:'center', justifyContent:'center' }}>×</button>
              )}
              <div style={{ padding:'12px 14px 14px' }}>
                <div style={{ fontFamily:'var(--pa-display)', fontSize:17, fontWeight:600, letterSpacing:-0.3, lineHeight:1.15 }}>
                  {s.name}
                </div>
                {s.tags && s.tags.length > 0 && (
                  <div style={{ marginTop:6, display:'flex', flexWrap:'wrap', gap:4 }}>
                    {s.tags.map((t) => <Pill key={t} size="sm">{t}</Pill>)}
                  </div>
                )}
                <div style={{ marginTop:10, paddingTop:10, borderTop:'1px solid var(--pa-line)',
                  display:'flex', alignItems:'center', gap:6 }}>
                  <Avatar member={by} size={20} />
                  <span style={{ fontSize:11.5, color:'var(--pa-muted)' }}>{mine ? 'tu' : by.name}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {me.isAdmin && (
        <DAdminBar hint={`${suggestions.length} destinos. Quando fechar, avança para votação.`}>
          <Btn variant="ghost" size="sm" onClick={() => { if (window.confirm('Limpar todas as sugestões?')) { AppStore.clearKey('locSuggs'); } }}>
            Limpar tudo
          </Btn>
        </DAdminBar>
      )}
    </div>
  );
}

function LocSuggestionForm({ onCancel, onSubmit }) {
  const [name, setName] = dUseState('');
  const [city, setCity] = dUseState('');
  const [tag, setTag] = dUseState('');
  const [tags, setTags] = dUseState([]);
  const ok = name.trim() && city.trim();

  const addTag = () => {
    const t = tag.trim();
    if (t && !tags.includes(t)) setTags([...tags, t]);
    setTag('');
  };

  return (
    <div style={{ background:'#fff', borderRadius:16, padding:22, marginBottom:14, border:'2px solid var(--pa-accent)' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
        <div style={{ fontFamily:'var(--pa-display)', fontSize:18, fontWeight:600, letterSpacing:-0.3 }}>Lançar destino</div>
        <button onClick={onCancel} style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', fontSize:18, padding:4 }}>×</button>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:10 }}>
        <Field label="Nome do sítio" placeholder="Ilhas Cíes, Comporta..." value={name} onChange={setName} />
        <Field label="Cidade / país" placeholder="Vigo, ES" value={city} onChange={setCity} />
      </div>
      <div style={{ marginBottom:14 }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:6 }}>Tags</div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:8 }}>
          {tags.map((t) => (
            <span key={t} style={{ display:'inline-flex', alignItems:'center', gap:4, padding:'4px 10px', borderRadius:999, background:'rgba(31,26,20,0.08)', fontSize:12 }}>
              {t}
              <button onClick={() => setTags(tags.filter((x) => x !== t))} style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', padding:0, fontSize:13 }}>×</button>
            </span>
          ))}
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <input value={tag} onChange={(e) => setTag(e.target.value)} onKeyDown={(e) => { if (e.key==='Enter') { e.preventDefault(); addTag(); } }}
            placeholder="Praia, Cidade, Glamping..."
            style={{ flex:1, padding:'8px 12px', borderRadius:10, border:'1px solid var(--pa-line)', fontFamily:'var(--pa-body)', fontSize:13, outline:'none' }} />
          <button onClick={addTag} style={{ padding:'8px 14px', borderRadius:10, border:'none', background:'var(--pa-ink)', color:'#fff', cursor:'pointer', fontSize:12, fontWeight:600 }}>+</button>
        </div>
      </div>
      <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
        <Btn variant="ghost" size="sm" onClick={onCancel}>Cancelar</Btn>
        <Btn variant="accent" size="sm" onClick={() => onSubmit({ name:name.trim(), city:city.trim(), tags })} disabled={!ok}>Lançar</Btn>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PHASE 3 — Votar local (VoteStore, sugestões do AppStore)
// ─────────────────────────────────────────────────────────────
function DPhase3({ me }) {
  const appData = useAppStore();
  const suggestions = appData.locSuggs || [];
  const [vote, setVote] = dUseState(() => VoteStore.getVote(me.id, 'loc'));
  dUseEffect(() => { setVote(VoteStore.getVote(me.id, 'loc')); }, [appData.locVotes, me.id]);
  const [saved, setSaved] = dUseState(false);
  const [tieOpen, setTieOpen] = dUseState(false);

  const inMembers = (typeof getInMembers === 'function') ? getInMembers(appData) : [];

  const handleVote = (id) => {
    setVote(id);
    VoteStore.setVote(me.id, 'loc', id);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  // Detetar empate
  const votes = appData.locVotes || {};
  const allVoted = inMembers.length > 0 && inMembers.every(m => votes[m.id]);
  const tie = allVoted ? detectTie(votes, suggestions) : null;
  dUseEffect(() => { if (tie && !appData.locWinner) setTieOpen(true); }, [tie?.tiedIds?.join(','), appData.locWinner]);

  if (suggestions.length === 0) {
    return (
      <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
        <DPhaseHeader phase={3} status="Sem destinos" statusTone="muted"
          title={<>Ainda não há<br/><span style={{ color:'var(--pa-accent)' }}>destinos para votar.</span></>}
          sub="Volta à fase 2 e pede ao grupo para sugerir sítios primeiro." />
        {me.isAdmin && <DAdminBar hint="Sem sugestões ainda." />}
      </div>
    );
  }

  return (
    <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
      <DPhaseHeader phase={3} status="A decorrer" statusTone="accent"
        title={<>Vota no teu<br/><span style={{ color:'var(--pa-accent)' }}>sítio favorito.</span></>}
        sub="Voto secreto. Um por pessoa." />

      <div style={{ marginBottom:18 }}>
        <VotersRow doneIds={Object.keys(votes)} allMembers={inMembers} label="Já votaram" />
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:14, marginBottom:8 }}>
        {suggestions.map((s) => {
          const by = memberById(s.by) || { name:s.by, color:'var(--pa-muted)', initials:'?' };
          const sel = vote === s.id;
          return (
            <button key={s.id} onClick={() => handleVote(s.id)} style={{
              background:'#fff', borderRadius:14, overflow:'hidden', textAlign:'left',
              border: sel?'2px solid var(--pa-accent)':'1px solid var(--pa-line)',
              cursor:'pointer', padding:0, position:'relative' }}>
              <PhotoSlot accent={s.accent || 'var(--pa-accent)'} label="" height={96} radius={0} />
              {sel && (
                <div style={{ position:'absolute', top:10, right:10, width:28, height:28, borderRadius:28,
                  background: saved?'#3d5e44':'var(--pa-accent)',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  boxShadow:'0 4px 12px rgba(217,119,87,0.5)' }}>
                  <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 7l3 3 5-6" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
              )}
              <div style={{ padding:'12px 14px 14px' }}>
                <div style={{ fontFamily:'var(--pa-display)', fontSize:16, fontWeight:600, letterSpacing:-0.2, lineHeight:1.15 }}>{s.name}</div>
                <div style={{ fontSize:11, color:'var(--pa-muted)', marginTop:2 }}>{s.city}</div>
                <div style={{ marginTop:10, display:'flex', alignItems:'center', gap:6 }}>
                  <Avatar member={by} size={18} />
                  <span style={{ fontSize:10.5, color:'var(--pa-muted)' }}>por {by.name}</span>
                </div>
              </div>
            </button>
          );
        })}
      </div>

      <div style={{ marginTop:18, padding:14, borderRadius:12, background:'rgba(31,26,20,0.04)', display:'flex', alignItems:'center', gap:12 }}>
        <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" stroke="var(--pa-muted)" strokeWidth="1.2" fill="none"/><path d="M8 5v3.5M8 11v.5" stroke="var(--pa-muted)" strokeWidth="1.5" strokeLinecap="round"/></svg>
        <div style={{ fontSize:12.5, color:'var(--pa-muted)' }}>
          Cada um vota numa só opção.{' '}
          {saved
            ? <span style={{ color:'#3d5e44', fontWeight:600 }}>✓ Voto guardado!</span>
            : vote
              ? <span style={{ color:'var(--pa-ink)', fontWeight:600 }}>Voto em {suggestions.find((s) => s.id === vote)?.name}.</span>
              : 'Ainda não votaste.'}
        </div>
      </div>

      {me.isAdmin && (
        <DAdminBar hint={`${suggestions.length} destinos a votar. Quando fechar, avança.`}>
          <Btn variant="ghost" size="sm">Reabrir votação</Btn>
        </DAdminBar>
      )}
      <TiebreakModal
        open={tieOpen && !!tie && !appData.locWinner}
        onClose={()=>setTieOpen(false)}
        tie={tie}
        me={me}
        voteKey="tieVotesLoc"
        onResolve={(winnerId)=>AppStore.setLocWinner(winnerId)}
      />
    </div>
  );
}

Object.assign(window, {
  getAllMembers,
  DTopBar, DLeftRail, DRightRail, DPhaseHeader, DAdminBar,
  DPhase1, DPhase2, DPhase3, LocSuggestionForm,
  useActivityFeed,
});
</script>
<script type="text/babel">// Perdidos Algures — Desktop fases 4–8 + DesktopShell.

const { useState: dUseState2, useMemo: dUseMemo2, useEffect: dUseEffect2 } = React;

// ─────────────────────────────────────────────────────────────
// PHASE 4 — Sugerir alojamentos (AppStore)
// ─────────────────────────────────────────────────────────────
function DLocationWinnerStrip() {
  const appData = useAppStore();
  const locSuggs = appData.locSuggs || [];
  const winnerId = appData.locWinner;
  const w = winnerId ? locSuggs.find((s) => s.id === winnerId) : locSuggs[0];
  if (!w) return null;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:14, padding:'12px 16px', borderRadius:14, marginBottom:18,
      background:'#fff', border:'1px solid var(--pa-line)' }}>
      <div style={{ width:44, height:44, borderRadius:10, flexShrink:0,
        background:`repeating-linear-gradient(135deg,${w.accent||'var(--pa-accent)'}66 0 6px,${w.accent||'var(--pa-accent)'}33 6px 12px)` }} />
      <div style={{ flex:1 }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Local decidido</div>
        <div style={{ fontFamily:'var(--pa-display)', fontSize:18, fontWeight:600, letterSpacing:-0.3, marginTop:2 }}>
          {w.name} <span style={{ color:'var(--pa-muted)', fontWeight:400, fontSize:13 }}>· {w.city}</span>
        </div>
      </div>
    </div>
  );
}

function DPhase4({ me }) {
  const appData = useAppStore();
  const suggestions = appData.accSuggs || [];
  const mineCount = suggestions.filter((s) => s.by === me.id).length;
  const [adding, setAdding] = dUseState2(false);

  const handleAdd = (data) => {
    AppStore.addAccSuggestion({ id:'acc_' + Date.now().toString(36), ...data, by: me.id });
    setAdding(false);
  };

  return (
    <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
      <DPhaseHeader phase={4} status="Em curso" statusTone="accent"
        title={<>Onde é que <span style={{ color:'var(--pa-accent)' }}>dormimos?</span></>}
        sub="Cada um pode lançar quantos alojamentos quiser. Aprende a vender — o teu favorito merece argumentos." />

      <DLocationWinnerStrip />

      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:11, letterSpacing:1, color:'var(--pa-muted)', textTransform:'uppercase' }}>
          {suggestions.length} alojamento{suggestions.length !== 1 ? 's' : ''} no chapéu
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <Pill>Os teus: {mineCount}</Pill>
          {!adding && (
            <Btn variant="accent" size="sm" onClick={() => setAdding(true)} icon={<span style={{ fontSize:14 }}>+</span>}>
              Lançar alojamento
            </Btn>
          )}
        </div>
      </div>

      {adding && <AccommodationForm onCancel={() => setAdding(false)} onSubmit={handleAdd} />}

      {suggestions.length === 0 && !adding && (
        <div style={{ padding:'48px 0', textAlign:'center', color:'var(--pa-muted)', fontSize:14 }}>
          Ainda sem alojamentos. Sê o primeiro! 🏡
        </div>
      )}

      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {suggestions.map((s) => <AccommodationCard key={s.id} acc={s} me={me} />)}
      </div>

      {me.isAdmin && (
        <DAdminBar hint={`${suggestions.length} alojamentos. Quando estiverem prontos, abre votação.`}>
          <Btn variant="ghost" size="sm" onClick={() => { if (window.confirm('Limpar todos os alojamentos?')) { AppStore.clearKey('accSuggs'); } }}>
            Limpar tudo
          </Btn>
        </DAdminBar>
      )}
    </div>
  );
}

function AccommodationCard({ acc, me }) {
  const by = memberById(acc.by) || { name: acc.by, color:'var(--pa-muted)', initials:'?' };
  const mine = acc.by === me.id;
  const host = (() => { try { return new URL(acc.link).host.replace('www.',''); } catch { return acc.link || ''; } })();

  return (
    <div style={{ background:'#fff', borderRadius:14, overflow:'hidden',
      border: mine?'1.5px solid var(--pa-accent)':'1px solid var(--pa-line)', display:'flex' }}>
      <div style={{ width:8, flexShrink:0,
        background:`repeating-linear-gradient(180deg,var(--pa-accent) 0 8px,transparent 8px 16px)`,
        opacity: mine?1:0 }} />
      <div style={{ padding:'16px 20px', flex:1 }}>
        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:16 }}>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
              <Pill tone="dark" size="sm">{acc.type}</Pill>
              <span style={{ fontFamily:'var(--pa-body)', fontSize:12.5, color:'var(--pa-muted)' }}>{acc.area}</span>
            </div>
            {acc.note && (
              <div style={{ fontFamily:'var(--pa-body)', fontSize:14, color:'var(--pa-ink)', lineHeight:1.45, marginBottom:8 }}>
                {acc.note}
              </div>
            )}
            {host && (
              <a href={acc.link} target="_blank" rel="noreferrer" style={{
                display:'inline-flex', alignItems:'center', gap:6,
                fontFamily:'var(--pa-mono)', fontSize:11.5, color:'var(--pa-accent)', fontWeight:600, textDecoration:'none' }}>
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
                  <path d="M3 8l5-5M5 2.5h2.5V5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                {host}
              </a>
            )}
          </div>
          <div style={{ textAlign:'right', flexShrink:0, display:'flex', flexDirection:'column', alignItems:'flex-end', gap:8 }}>
            <div>

                style={{ border:'1px solid var(--pa-line)', background:'transparent', borderRadius:8,
                  padding:'4px 10px', cursor:'pointer', fontSize:11.5, color:'var(--pa-muted)', fontFamily:'var(--pa-body)' }}>
                Remover

// ─────────────────────────────────────────────────────────────
// PHASE 5 — Votar alojamento (VoteStore + AppStore suggestions)
// ─────────────────────────────────────────────────────────────
function DPhase5({ me }) {
  const appData = useAppStore();
  const suggestions = appData.accSuggs || [];
  const [vote, setVote] = dUseState2(() => VoteStore.getVote(me.id, 'acc'));
  dUseEffect2(() => { setVote(VoteStore.getVote(me.id, 'acc')); }, [appData.accVotes, me.id]);
  const [saved, setSaved] = dUseState2(false);
  const [resolved, setResolved] = dUseState2(null);
  const [tieOpen, setTieOpen] = dUseState2(false);

  const handleVote = (id) => {
    if (closed) return;
    setVote(id);
    VoteStore.setVote(me.id, 'acc', id);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  // Detetar empate
  const inMembers = (typeof getInMembers === 'function') ? getInMembers(appData) : [];
  const votes = appData.accVotes || {};
  const allVoted = inMembers.length > 0 && inMembers.every(m => votes[m.id]);
  const tie = allVoted ? detectTie(votes, suggestions) : null;
  dUseEffect2(() => { if (tie && !appData.accWinner) setTieOpen(true); }, [tie?.tiedIds?.join(','), appData.accWinner]);

  if (suggestions.length === 0) {
    return (
      <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
        <DPhaseHeader phase={5} status="Sem alojamentos" statusTone="muted"
          title={<>Ainda não há<br/><span style={{ color:'var(--pa-accent)' }}>alojamentos para votar.</span></>}
          sub="Volta à fase 4 e adiciona alojamentos primeiro." />
        {me.isAdmin && <DAdminBar hint="Sem alojamentos ainda." />}
      </div>
    );
  }

  const closed = false; // Admin fecha manualmente — por enquanto sempre aberto
  const winner = resolved ? suggestions.find((s) => s.id === resolved.id) : null;

  return (
    <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
      <DPhaseHeader phase={5}
        status={winner ? 'Decidido' : 'A decorrer'}
        statusTone={winner ? 'success' : 'accent'}
        title={winner
          ? <>{winner.type} em <span style={{ color:'var(--pa-accent)' }}>{winner.area}.</span></>
          : <>Onde é que <span style={{ color:'var(--pa-accent)' }}>dormimos mesmo?</span></>}
        sub={winner ? `${winner.price}€/noite · sugerido por ${memberById(winner.by)?.name || winner.by}`
          : 'Voto secreto. Cada um vota num alojamento.'} />

      {!winner && (
        <div style={{ marginBottom:18 }}>
          <VotersRow doneIds={Object.keys(votes)} allMembers={inMembers} label="Já votaram" />
        </div>
      )}

      {winner && (
        <div style={{ background:'var(--pa-ink)', color:'#fff', borderRadius:16, padding:20, marginBottom:20, display:'flex', alignItems:'center', gap:18 }}>
          <div style={{ width:56, height:56, borderRadius:12, flexShrink:0,
            background:'repeating-linear-gradient(135deg,var(--pa-accent) 0 8px,rgba(217,119,87,0.4) 8px 16px)' }} />
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'rgba(255,255,255,0.6)', textTransform:'uppercase' }}>Vencedor</div>
            <div style={{ fontFamily:'var(--pa-display)', fontSize:22, fontWeight:600, letterSpacing:-0.4, marginTop:2 }}>
              {winner.type} · {winner.area}
            </div>
            <div style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'rgba(255,255,255,0.7)', marginTop:4 }}>
              {winner.price}€/noite
            </div>
          </div>
          {winner.link && (
            <a href={winner.link} target="_blank" rel="noreferrer" style={{
              padding:'10px 16px', borderRadius:999, background:'rgba(255,255,255,0.12)',
              color:'#fff', textDecoration:'none', fontFamily:'var(--pa-body)', fontSize:13, fontWeight:600 }}>Ver anúncio →</a>
          )}
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:12 }}>
        {suggestions.map((s) => {
          const sel = vote === s.id;
          const isWinner = winner && winner.id === s.id;
          return (
            <button key={s.id} onClick={() => handleVote(s.id)} style={{
              background:'#fff', borderRadius:14, padding:16, textAlign:'left',
              border: isWinner||sel ? '2px solid var(--pa-accent)' : '1px solid var(--pa-line)',
              cursor: closed?'default':'pointer', position:'relative' }}>
              <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>
                <Pill tone="dark" size="sm">{s.type}</Pill>
                <span style={{ fontSize:11, color:'var(--pa-muted)' }}>{s.area}</span>
              </div>
              {s.note && (
                <div style={{ fontFamily:'var(--pa-body)', fontSize:12.5, color:'var(--pa-ink)', lineHeight:1.4, minHeight:36 }}>
                  {s.note.length > 90 ? s.note.slice(0,90)+'…' : s.note}
                </div>
              )}
              <div style={{ marginTop:10, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                <span style={{ fontFamily:'var(--pa-mono)', fontSize:12, fontWeight:600 }}>{s.price}€/n</span>
                {sel && <Pill tone={saved?'success':'accent'} size="sm">{saved?'✓ Guardado':'✓ Voto teu'}</Pill>}
              </div>
            </button>
          );
        })}
      </div>

      {me.isAdmin && !winner && (
        <DAdminBar hint="Votação em curso. Declara o vencedor quando estiver pronto.">
          {suggestions.map((s) => (
            <Btn key={s.id} variant="soft" size="sm"
              onClick={() => { if (window.confirm(`Declarar "${s.type} em ${s.area}" como vencedor?`)) setResolved({ id:s.id }); }}>
              {s.type} · {s.area}
            </Btn>
          ))}
        </DAdminBar>
      )}
      {me.isAdmin && winner && (
        <DAdminBar hint="Alojamento decidido.">
          <Btn variant="ghost" size="sm" onClick={() => setResolved(null)}>Anular</Btn>
        </DAdminBar>
      )}
      <TiebreakModal
        open={tieOpen && !!tie && !appData.accWinner}
        onClose={()=>setTieOpen(false)}
        tie={tie}
        me={me}
        voteKey="tieVotesAcc"
        onResolve={(winnerId)=>AppStore.setAccWinner(winnerId)}
      />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PHASE 6 — Disponibilidade (AppStore)
// ─────────────────────────────────────────────────────────────
function DPhase6({ me }) {
  const appData = useAppStore();
  const allMembers = getAllMembers();
  const locSuggs = appData.locSuggs || [];
  const locWinnerId = appData.locWinner;
  const winnerLoc = locWinnerId ? locSuggs.find((s) => s.id === locWinnerId) : locSuggs[0];
  const accSuggs = appData.accSuggs || [];
  const accWinnerId = appData.accWinner;
  const winnerAcc = accWinnerId ? accSuggs.find((s) => s.id === accWinnerId) : accSuggs[0];

  const [days, setDays] = dUseState2(() => AppStore.getAvailability(me.id));
  dUseEffect2(() => { setDays(AppStore.getAvailability(me.id)); }, [appData.avail, me.id]);
  const toggle = (d) => setDays((arr) => arr.includes(d) ? arr.filter((x) => x !== d) : [...arr, d]);

  const allAvail = appData.avail || {};
  const submittedIds = Object.keys(allAvail);

  // Mapa de calor do grupo em tempo real: outros (já guardado) + a minha seleção atual (local).
  // Conta APENAS quem está "in" — se alguém marcou e depois saiu, a disponibilidade não conta.
  const inMembers = (typeof getInMembers === 'function') ? getInMembers(appData) : allMembers;
  const totalIn = inMembers.length || allMembers.length;
  const inIds = dUseMemo2(() => new Set(inMembers.map((m) => m.id)), [inMembers]);
  const meIsIn = inIds.has(me.id);
  const heat = dUseMemo2(() => {
    const h = {};
    Object.entries(allAvail).forEach(([mid, arr]) => { if (mid === me.id || !inIds.has(mid)) return; (arr || []).forEach((d) => { h[d] = (h[d] || 0) + 1; }); });
    if (meIsIn) days.forEach((d) => { h[d] = (h[d] || 0) + 1; });
    return h;
  }, [allAvail, days, me.id, inIds, meIsIn]);
  const peopleByDay = dUseMemo2(() => {
    const map = {};
    Object.entries(allAvail).forEach(([mid, arr]) => { if (mid === me.id || !inIds.has(mid)) return; (arr || []).forEach((d) => { (map[d] = map[d] || []).push(memberById(mid) || { name: '?' }); }); });
    if (meIsIn) days.forEach((d) => { (map[d] = map[d] || []).push({ name: me.name + ' (tu)' }); });
    return map;
  }, [allAvail, days, me.id, inIds, meIsIn]);
  const namesFor = (d) => (peopleByDay[d] || []).map((p) => p.name).join(', ');

  return (
    <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
      <DPhaseHeader phase={6} status="A recolher disponibilidades" statusTone="accent"
        title={<>Toca nos dias<br/>em que <span style={{ color:'var(--pa-accent)' }}>podes ir.</span></>}
        sub="Marca generoso. As células mais escuras já têm mais gente — o teu contorno laranja marca os teus dias." />

      {winnerLoc && (
        <div style={{ background:'var(--pa-ink)', color:'#fff', borderRadius:16, padding:'14px 18px',
          display:'flex', alignItems:'center', gap:14, marginBottom:20 }}>
          <div style={{ width:44, height:44, borderRadius:10, flexShrink:0,
            background:`repeating-linear-gradient(135deg,${winnerLoc.accent||'var(--pa-accent)'}88 0 6px,${winnerLoc.accent||'var(--pa-accent)'}44 6px 12px)` }} />
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'rgba(255,255,255,0.6)', textTransform:'uppercase' }}>Destino · alojamento</div>
            <div style={{ fontFamily:'var(--pa-display)', fontSize:16, fontWeight:600, letterSpacing:-0.3, marginTop:1 }}>
              {winnerLoc.name}{winnerAcc ? ` · ${winnerAcc.area}` : ''}
            </div>
          </div>
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'1.6fr 1fr', gap:22, alignItems:'flex-start' }}>
        <div style={{ background:'#fff', borderRadius:18, padding:20, border:'1px solid var(--pa-line)' }}>
          <Calendar onCellClick={toggle} renderCell={(d) => {
            const sel = days.includes(d);
            const n = heat[d] || 0;
            const intensity = totalIn > 0 ? n / totalIn : 0;
            return (
              <div title={n > 0 ? namesFor(d) : undefined} style={{ width:'100%', height:'100%', borderRadius:8,
                background: intensity > 0 ? `rgba(217,119,87,${0.10 + intensity * 0.55})` : '#fff',
                color:'var(--pa-ink)',
                border: sel ? '2.5px solid var(--pa-accent)' : intensity === 0 ? '1px solid var(--pa-line)' : '1px solid transparent',
                boxShadow: sel ? '0 0 0 2px rgba(217,119,87,0.22), 0 2px 8px rgba(217,119,87,0.28)' : 'none',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                fontFamily:'var(--pa-body)', cursor:'pointer', transition:'background 0.12s, box-shadow 0.12s' }}>
                <div style={{ fontSize:14, fontWeight: sel ? 700 : 600 }}>{d}</div>
                {n > 0 && <div style={{ fontFamily:'var(--pa-mono)', fontSize:9, marginTop:1, color:'var(--pa-muted)', fontWeight:600 }}>{n}/{totalIn}</div>}
              </div>
            );
          }} />
          <div style={{ display:'flex', alignItems:'center', gap:16, marginTop:14, flexWrap:'wrap' }}>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ width:16, height:16, borderRadius:4, background:'rgba(217,119,87,0.5)', display:'inline-block' }} />
              <span style={{ fontSize:11, color:'var(--pa-muted)' }}>mais escuro = mais gente</span>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ width:16, height:16, borderRadius:4, background:'#fff', border:'2.5px solid var(--pa-accent)', display:'inline-block', boxSizing:'border-box' }} />
              <span style={{ fontSize:11, color:'var(--pa-muted)' }}>os teus dias</span>
            </div>
          </div>
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          <div style={{ background:'#fff', borderRadius:16, padding:16, border:'1px solid var(--pa-line)' }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>A tua disponibilidade</div>
            <div style={{ marginTop:4, fontFamily:'var(--pa-display)', fontSize:28, fontWeight:600, letterSpacing:-0.5 }}>
              {days.length} <span style={{ fontSize:14, color:'var(--pa-muted)', fontWeight:400 }}>dias marcados</span>
            </div>
          </div>

          <div style={{ background:'#fff', borderRadius:16, padding:16, border:'1px solid var(--pa-line)' }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:10 }}>Estado do grupo</div>
            {allMembers.map((m) => {
              const submitted = submittedIds.includes(m.id);
              return (
                <div key={m.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'6px 0' }}>
                  <Avatar member={m} size={22} />
                  <span style={{ flex:1, fontSize:13, color:'var(--pa-ink)' }}>{m.name}</span>
                  {submitted ? <Pill tone="success" size="sm">✓ pronto</Pill> : <Pill tone="muted" size="sm">a marcar…</Pill>}
                </div>
              );
            })}
          </div>

          <Btn variant="accent" size="lg" style={{ width:'100%' }} onClick={() => {
            AppStore.setAvailability(me.id, days);
            if (window._paToast) window._paToast('Disponibilidade guardada!', 'success');
          }}>Guardar disponibilidade</Btn>
        </div>
      </div>

      {me.isAdmin && (
        <DAdminBar hint={`${submittedIds.length} de ${allMembers.length} submeteram.`} />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PHASE 7 — Trancar datas (AppStore)
// ─────────────────────────────────────────────────────────────
function DPhase7({ me }) {
  const appData = useAppStore();
  const allAvail = appData.avail || {};
  const allMembers = getAllMembers();
  const inMembers = (typeof getInMembers === 'function') ? getInMembers(appData) : allMembers;
  const totalIn = inMembers.length || allMembers.length;
  const monthLabel = (D.phase6 && D.phase6.monthLabel) || 'Este mês';
  const monthShort = monthLabel.split(' ')[0].slice(0,3);

  // Conta apenas a disponibilidade de quem está "in" (ignora quem marcou e depois saiu)
  const inIds = dUseMemo2(() => new Set(inMembers.map((m) => m.id)), [inMembers]);
  const heat = dUseMemo2(() => {
    const h = {};
    Object.entries(allAvail).forEach(([mid, arr]) => { if (!inIds.has(mid)) return; (arr||[]).forEach((d) => { h[d] = (h[d]||0) + 1; }); });
    return h;
  }, [allAvail, inIds]);

  // Mapa dia → pessoas que marcaram esse dia (só "in", para mostrar os nomes)
  const peopleByDay = dUseMemo2(() => {
    const map = {};
    Object.entries(allAvail).forEach(([mid, days]) => {
      if (!inIds.has(mid)) return;
      (days||[]).forEach((d) => { (map[d] = map[d] || []).push(memberById(mid) || { id:mid, name:'?', initials:'?', color:'var(--pa-muted)' }); });
    });
    return map;
  }, [allAvail, inIds]);
  const namesFor = (d) => (peopleByDay[d] || []).map(p => p.name).join(', ');

  const locked = appData.locked || null;
  const [range, setRange] = dUseState2({ from: null, to: null });

  const ranked = dUseMemo2(() => {
    return Object.entries(heat).sort((a,b) => b[1]-a[1]).slice(0,5).map(([d,n]) => ({ day:+d, count:n }));
  }, [heat]);

  const hasData = Object.keys(heat).length > 0;

  // Seleção por cliques: 1º clique = início; 2º clique = fim (se depois do início).
  const pickDay = (d) => {
    if (!me.isAdmin) return;
    setRange((r) => {
      if (!r.from || (r.from && r.to)) return { from: d, to: null };       // novo início
      if (d >= r.from) return { from: r.from, to: d };                      // fecha intervalo
      return { from: d, to: null };                                         // antes do início → recomeça
    });
  };

  const selFrom = range.from, selTo = range.to || range.from;

  return (
    <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
      <DPhaseHeader phase={7} status={me.isAdmin ? 'Tu decides' : 'A aguardar'} statusTone={me.isAdmin?'accent':'muted'}
        title={<>O calendário falou.<br/><span style={{ color:'var(--pa-accent)' }}>{me.isAdmin ? 'Escolhe os dias.' : 'Admin está a escolher.'}</span></>}
        sub={hasData ? 'Quanto mais escura a célula, mais gente está disponível. Clica num dia (ou clica em dois para um intervalo).' : 'Ninguém marcou disponibilidade na fase 6, mas podes escolher os dias à mesma.'} />

      <div style={{ display:'grid', gridTemplateColumns:'1.6fr 1fr', gap:22, alignItems:'flex-start', flex:1 }}>
        <div style={{ background:'#fff', borderRadius:18, padding:22, border:'1px solid var(--pa-line)' }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:11, letterSpacing:1, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:14 }}>{monthLabel}</div>
          <Calendar onCellClick={me.isAdmin ? pickDay : undefined} renderCell={(d) => {
            const n = heat[d] || 0;
            const inRange = selFrom && d >= selFrom && d <= selTo;
            const isLocked = locked && d >= locked.from && d <= locked.to;
            const intensity = totalIn > 0 ? n/totalIn : 0;
            return (
              <div title={n > 0 ? namesFor(d) : undefined} style={{ width:'100%', height:'100%', borderRadius:8,
                background: isLocked ? 'var(--pa-accent)' : inRange ? 'var(--pa-ink)' : intensity > 0 ? `rgba(217,119,87,${0.10+intensity*0.6})` : '#fff',
                color: isLocked||inRange ? '#fff' : 'var(--pa-ink)',
                border: intensity===0&&!inRange&&!isLocked ? '1px solid var(--pa-line)' : 'none',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                transition:'background 0.12s' }}>
                <div style={{ fontFamily:'var(--pa-body)', fontSize:14, fontWeight:600 }}>{d}</div>
                {n > 0 && <div style={{ fontFamily:'var(--pa-mono)', fontSize:9, marginTop:1, color: isLocked||inRange?'rgba(255,255,255,0.7)':'var(--pa-muted)', fontWeight:600 }}>{n}/{totalIn}</div>}
              </div>
            );
          }} />
          {me.isAdmin && selFrom && !range.to && (
            <div style={{ marginTop:12, fontSize:12, color:'var(--pa-muted)', textAlign:'center', fontFamily:'var(--pa-body)' }}>
              Início em <strong>{selFrom}</strong>. Clica noutro dia para um intervalo, ou tranca já só esse dia.
            </div>
          )}
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          {locked && (
            <div style={{ background:'var(--pa-ink)', color:'#fff', borderRadius:16, padding:18 }}>

// PlanCustos — registo de despesas + divisão equitativa
// ─────────────────────────────────────────────────────────────
// ── Splitwise: funções de cálculo de divisão de despesas ──
// Converte texto em número aceitando vírgula decimal (formato PT: "33,50" → 33.5)
function paNum(v) {
  if (typeof v === 'number') return isNaN(v) ? 0 : v;
  const n = parseFloat(String(v == null ? '' : v).replace(',', '.'));
  return isNaN(n) ? 0 : n;
}
function expenseShares(exp, members) {
  const amount = paNum(exp.amount);
  const mode = exp.splitMode || 'equal';
  const ids = members.map(m => m.id);
  let among = (exp.splitAmong && exp.splitAmong.length) ? exp.splitAmong.filter(id => ids.includes(id)) : ids.slice();
  if (among.length === 0) among = ids.slice();
  const shares = {};
  if (among.length === 0) return shares; // sem membros → nada a dividir (evita divisão por zero)
  if (mode === 'custom' && exp.splitCustom) {
    among.forEach(id => { shares[id] = paNum(exp.splitCustom[id]); });
  } else {
    // 'equal' e 'some' dividem igualmente entre os participantes escolhidos
    const per = amount / among.length;
    among.forEach(id => { shares[id] = per; });
  }
  return shares;
}

// Saldo líquido de cada membro (positivo = tem a receber; negativo = deve)
function computeBalances(breakdown, members) {
  const bal = {};
  members.forEach(m => { bal[m.id] = 0; });
  (breakdown || []).forEach(exp => {
    const amount = paNum(exp.amount);
    if (bal[exp.paidBy] !== undefined) bal[exp.paidBy] += amount;
    const shares = expenseShares(exp, members);
    Object.entries(shares).forEach(([id, owed]) => { if (bal[id] !== undefined) bal[id] -= owed; });
  });
  // arredonda a cêntimos
  Object.keys(bal).forEach(id => { bal[id] = Math.round(bal[id] * 100) / 100; });
  // Corrige o resíduo de arredondamento para os saldos somarem EXATAMENTE 0
  // (caso contrário alguém perderia/ganharia 1-2 cêntimos no acerto de contas).
  const ids = Object.keys(bal);
  if (ids.length) {
    const residual = Math.round(ids.reduce((s, id) => s + bal[id], 0) * 100) / 100;
    if (Math.abs(residual) >= 0.01) {
      // Absorve o resíduo no maior saldo em valor absoluto
      let target = ids[0];
      ids.forEach(id => { if (Math.abs(bal[id]) > Math.abs(bal[target])) target = id; });
      bal[target] = Math.round((bal[target] - residual) * 100) / 100;
    }
  }
  return bal;
}

// Minimiza o número de transferências para acertar as contas (greedy)
function simplifyDebts(balances) {
  const creditors = [], debtors = [];
  Object.entries(balances).forEach(([id, b]) => {
    if (b > 0.01) creditors.push({ id, amount: b });
    else if (b < -0.01) debtors.push({ id, amount: -b });
  });
  creditors.sort((a,b) => b.amount - a.amount);
  debtors.sort((a,b) => b.amount - a.amount);
  const tx = [];
  let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const d = debtors[i], c = creditors[j];
    const pay = Math.round(Math.min(d.amount, c.amount) * 100) / 100;
    if (pay > 0) tx.push({ from: d.id, to: c.id, amount: pay });
    d.amount = Math.round((d.amount - pay) * 100) / 100;
    c.amount = Math.round((c.amount - pay) * 100) / 100;
    if (d.amount <= 0.01) i++;
    if (c.amount <= 0.01) j++;
  }
  return tx;
}

  const [open, setOpen] = React.useState(false);
  const [desc, setDesc] = React.useState('');
  const [amount, setAmount] = React.useState('');
  const [payer, setPayer] = React.useState(me?.id || '');
  const [splitMode, setSplitMode] = React.useState('equal');
  const [among, setAmong] = React.useState(inMembers.map(m => m.id));
  const [custom, setCustom] = React.useState({});

  // Garante que o pagador é sempre um membro válido (evita créditos perdidos
  // se o pagador não estiver entre os participantes, p.ex. admin sem RSVP 'in').
  React.useEffect(() => {
    if (inMembers.length && !inMembers.some(m => m.id === payer)) {
      setPayer(inMembers.some(m => m.id === me?.id) ? me.id : inMembers[0].id);
    }
    // eslint-disable-next-line
  }, [inMembers.length, payer]);
  React.useEffect(() => { if (among.length === 0) setAmong(inMembers.map(m => m.id)); /* eslint-disable-next-line */ }, [inMembers.length]);

  const total = breakdown.reduce((s, e) => s + paNum(e.amount), 0);

  // não estejam 'in' — para ninguém perder reembolsos por ter mudado o RSVP.
  const involvedIds = new Set(inMembers.map(m => m.id));
  breakdown.forEach(e => {
    if (e.paidBy) involvedIds.add(e.paidBy);
    (e.splitAmong || []).forEach(id => involvedIds.add(id));

  const calcMembers = Array.from(involvedIds).map(id => memberById(id)).filter(Boolean);
  const balances = computeBalances(breakdown, calcMembers);
  const settlements = simplifyDebts(balances);

  const resetForm = () => { setDesc(''); setAmount(''); setSplitMode('equal'); setAmong(inMembers.map(m=>m.id)); setCustom({}); };

          <div style={{ fontFamily:'var(--pa-display)', fontSize:24, fontWeight:600, marginTop:4 }}>{total.toFixed(2)}€</div>
        </div>
        <div style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:14, padding:'14px 16px' }}>

                  <span style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:13, fontWeight:600 }}>{m.name}</span>
                  <span style={{ fontSize:14 }}>{among.includes(m.id) ? '✓' : ''}</span>
                </button>
              ))}
              {paNum(amount)>0 && among.length>0 && (
                <div style={{ fontSize:11.5, color:'var(--pa-muted)', textAlign:'center' }}>{(paNum(amount)/among.length).toFixed(2)}€ por pessoa ({among.length})</div>
              )}
            </div>
          )}

          {/* Valores personalizados (custom) */}
          {splitMode === 'custom' && (
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {inMembers.map(m => (
                <div key={m.id} style={{ display:'flex', alignItems:'center', gap:10 }}>
                  <Avatar member={m} size={26} />
                  <span style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:13, fontWeight:600 }}>{m.name}</span>
                  <div style={{ width:110, padding:'8px 10px', borderRadius:10, background:'#fff', border:'1px solid var(--pa-line)', display:'flex', alignItems:'center', gap:4 }}>
                    <span style={{ color:'var(--pa-muted)', fontSize:14 }}>€</span>
                    <input value={custom[m.id]||''} onChange={(e)=>setCustom(c=>({...c,[m.id]:e.target.value}))} placeholder="0" inputMode="decimal" maxLength={8}
                      style={{ width:'100%', minWidth:0, border:'none', outline:'none', background:'transparent', fontFamily:'var(--pa-body)', fontSize:16 }} />
                  </div>
                </div>
              ))}
              <div style={{ fontSize:11.5, textAlign:'center', color: customOk ? 'var(--pa-muted)' : '#8a4220', fontWeight:600 }}>
                Soma: {customTotal.toFixed(2)}€ / {paNum(amount).toFixed(2)}€ {customOk ? '✓' : '(tem de bater certo)'}
              </div>
            </div>
          )}

          <Btn variant="accent" onClick={addExpense} disabled={!desc.trim() || !(paNum(amount)>0) || !customOk}>Adicionar despesa</Btn>
        </div>
      )}

      {/* Estado vazio */}
      {breakdown.length === 0 && !open && (
        <div style={{ textAlign:'center', padding:'24px 16px', color:'var(--pa-muted)' }}>
          <div style={{ fontSize:28, marginBottom:8, opacity:0.5 }}>🧾</div>
          <div style={{ fontFamily:'var(--pa-body)', fontSize:13.5, fontWeight:600, color:'var(--pa-ink)' }}>Ainda sem despesas</div>
          <div style={{ fontFamily:'var(--pa-body)', fontSize:12, marginTop:2, lineHeight:1.5, maxWidth:300, margin:'2px auto 0' }}>
            Adiciona o alojamento, combustível, jantares... e a app divide tudo e diz quem paga a quem.
          </div>
        </div>
      )}

      {/* Lista de despesas */}
      {breakdown.length > 0 && (
        <div className="pa-stagger" style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {breakdown.slice().reverse().map(e => {
            const by = memberById(e.paidBy);
            const shares = expenseShares(e, inMembers);
            const nShare = Object.keys(shares).length;
            const modeLabel = e.splitMode === 'custom' ? 'valores' : (e.splitMode === 'some' ? nShare+' pessoas' : 'todos');
            return (
              <div key={e.id} style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:12, padding:'10px 14px', display:'flex', alignItems:'center', gap:12 }}>

                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontFamily:'var(--pa-body)', fontSize:13.5, fontWeight:600, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{e.desc}</div>
                  <div style={{ fontFamily:'var(--pa-mono)', fontSize:10.5, color:'var(--pa-muted)' }}>{by?.name || '?'} pagou · dividido por {modeLabel}</div>
                </div>
                <div style={{ fontFamily:'var(--pa-display)', fontSize:16, fontWeight:600 }}>{paNum(e.amount).toFixed(2)}€</div>

      {/* Acerto de contas (settlement) */}

                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <Avatar member={from||{initials:'?'}} size={24} ringColor="var(--pa-ink)" />
                    <span style={{ fontFamily:'var(--pa-body)', fontSize:13, fontWeight:600 }}>{from?.name||'?'}</span>
                    <svg width="16" height="10" viewBox="0 0 16 10" style={{ opacity:0.6 }}><path d="M1 5h13M10 1l4 4-4 4" stroke="#fff" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>

      {total > 0 && settlements.length === 0 && (
        <div style={{ background:'rgba(107,142,111,0.15)', borderRadius:14, padding:16, textAlign:'center', fontFamily:'var(--pa-body)', fontSize:13.5, fontWeight:600, color:'#3d5e44' }}>

// ─────────────────────────────────────────────────────────────
// PlanItinerario — paragens/atividades organizadas por dia
// ─────────────────────────────────────────────────────────────
function PlanItinerario({ me }) {
  const appData = useAppStore();
  const plan = appData.planData || { itinerary:[] };
  const items = plan.itinerary || [];
  const locked = appData.locked;

  const [day, setDay] = React.useState(1);
  const [time, setTime] = React.useState('');
  const [what, setWhat] = React.useState('');

  // Calcular nº de dias da viagem
  const dayCount = locked ? (Math.abs(locked.to - locked.from) + 1) : 1;
  const days = Array.from({length: dayCount}, (_,i) => i+1);

  const add = async () => {
    if (!what.trim()) return;
    const newI = { id:'it_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6), day, time:time.trim(), what:what.trim() };
    await AppStore.updatePlanning(p => ({ ...p, itinerary:[...((p.itinerary)||[]), newI] }));
    setTime(''); setWhat('');
  };

  const remove = async (id) => {
    await AppStore.updatePlanning(p => ({ ...p, itinerary:((p.itinerary)||[]).filter(i => i.id !== id) }));
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      {/* Form */}
      <div style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:14, padding:16, display:'flex', flexDirection:'column', gap:10 }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Nova paragem</div>
        <div style={{ display:'grid', gridTemplateColumns:'auto 1fr', gap:10 }}>
          <label style={{ padding:'12px 14px', borderRadius:12, background:'#fff', border:'1px solid var(--pa-line)', minWidth:90, boxSizing:'border-box', display:'flex', alignItems:'center' }}>
            <select value={day} onChange={(e)=>setDay(parseInt(e.target.value))} style={{ width:'100%', minWidth:0, border:'none', outline:'none', background:'transparent', fontFamily:'var(--pa-body)', fontSize:16, color:'var(--pa-ink)' }}>
              {days.map(d => <option key={d} value={d}>Dia {d}</option>)}
            </select>
          </label>
          <Field placeholder="Hora (opcional)" value={time} onChange={setTime} prefix="🕐" />
        </div>
        <Field placeholder="O que fazer? (Ex: Miradouro da Senhora do Monte)" value={what} onChange={setWhat} />
        <Btn variant="accent" onClick={add} disabled={!what.trim()}>+ Adicionar</Btn>
      </div>

      {/* Itinerário por dia */}
      {days.map(d => {
        const dayItems = items.filter(i => i.day === d).sort((a,b) => (a.time||'').localeCompare(b.time||''));
        if (dayItems.length === 0) return null;
        return (
          <div key={d} style={{ display:'flex', flexDirection:'column', gap:8 }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Dia {d}</div>
            {dayItems.map(i => (
              <div key={i.id} style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:12, padding:'10px 14px', display:'flex', alignItems:'center', gap:12 }}>
                {i.time && <div style={{ fontFamily:'var(--pa-mono)', fontSize:11, fontWeight:600, color:'var(--pa-accent)', minWidth:42 }}>{i.time}</div>}
                <div style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:13.5 }}>{i.what}</div>
                {me?.isAdmin && <button onClick={()=>remove(i.id)} style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', fontSize:16, padding:0 }}>×</button>}
              </div>
            ))}
          </div>
        );
      })}
      {items.length === 0 && (
        <div style={{ padding:'24px 0', textAlign:'center', color:'var(--pa-muted)', fontSize:13 }}>
          Sem paragens ainda. Adiciona a primeira acima.
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PlanAtividades — wishlist de coisas a fazer
// ─────────────────────────────────────────────────────────────
function PlanAtividades({ me }) {
  const appData = useAppStore();
  const plan = appData.planData || { activities:[] };
  const items = plan.activities || [];
  const [text, setText] = React.useState('');

  const add = async () => {
    if (!text.trim()) return;
    const newA = { id:'act_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6), text:text.trim(), by:me?.id, done:false, at:Date.now() };
    await AppStore.updatePlanning(p => ({ ...p, activities:[...((p.activities)||[]), newA] }));
    setText('');
  };

  const toggle = async (id) => {
    await AppStore.updatePlanning(p => ({ ...p, activities:((p.activities)||[]).map(a => a.id===id ? {...a, done:!a.done} : a) }));
  };

  const remove = async (id) => {
    await AppStore.updatePlanning(p => ({ ...p, activities:((p.activities)||[]).filter(a => a.id !== id) }));

  const pending = items.filter(a => !a.done);
  const done = items.filter(a => a.done);

      <div style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:14, padding:16, display:'flex', gap:8 }}>
        <input value={text} onChange={(e)=>setText(e.target.value)} onKeyDown={(e)=>{ if(e.key==='Enter'){ e.preventDefault(); add(); } }}
          placeholder="Surf ao pôr do sol, restaurante X..." maxLength={100} style={{ flex:1, minWidth:0, boxSizing:'border-box', padding:'10px 14px', borderRadius:10, border:'1px solid var(--pa-line)', fontFamily:'var(--pa-body)', fontSize:16, outline:'none' }} />
        <Btn variant="accent" onClick={add} disabled={!text.trim()} style={{ flexShrink:0 }}>+</Btn>
      </div>

      {pending.length > 0 && (
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Por fazer ({pending.length})</div>
          {pending.map(a => {
            const by = memberById(a.by);
            return (
              <div key={a.id} style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:12, padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
                <button onClick={()=>toggle(a.id)} style={{ width:22, height:22, borderRadius:6, border:'2px solid var(--pa-line)', background:'#fff', cursor:'pointer', flexShrink:0, padding:0 }} />
                <div style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:13.5 }}>{a.text}</div>
                {by && <Avatar member={by} size={20} />}
                {(me?.isAdmin || a.by === me?.id) && <button onClick={()=>remove(a.id)} style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', fontSize:16, padding:0 }}>×</button>}
              </div>
            );
          })}
        </div>
      )}

      {done.length > 0 && (
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Feito ({done.length})</div>
          {done.map(a => (
            <div key={a.id} style={{ background:'rgba(31,26,20,0.03)', borderRadius:12, padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
              <button onClick={()=>toggle(a.id)} style={{ width:22, height:22, borderRadius:6, border:'none', background:'var(--pa-accent)', color:'#fff', cursor:'pointer', flexShrink:0, padding:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13 }}>✓</button>
              <div style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:13.5, color:'var(--pa-muted)', textDecoration:'line-through' }}>{a.text}</div>
              {(me?.isAdmin || a.by === me?.id) && <button onClick={()=>remove(a.id)} style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', fontSize:16, padding:0 }}>×</button>}
            </div>
          ))}
        </div>
      )}

      {items.length === 0 && (
        <div style={{ padding:'24px 0', textAlign:'center', color:'var(--pa-muted)', fontSize:13 }}>
          Lista vazia. Adiciona ideias aqui.
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PlanCompras — lista de compras partilhada
// ─────────────────────────────────────────────────────────────
function PlanCompras({ me }) {
  const appData = useAppStore();
  const plan = appData.planData || { shopping:[] };
  const items = plan.shopping || [];
  const [text, setText] = React.useState('');
  const [qty, setQty] = React.useState('');

  const add = async () => {
    if (!text.trim()) return;
    const newS = { id:'shop_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6), text:text.trim(), qty:qty.trim(), done:false, at:Date.now() };
    await AppStore.updatePlanning(p => ({ ...p, shopping:[...((p.shopping)||[]), newS] }));
    setText(''); setQty('');
  };

  const toggle = async (id) => {
    await AppStore.updatePlanning(p => ({ ...p, shopping:((p.shopping)||[]).map(s => s.id===id ? {...s, done:!s.done} : s) }));
  };

  const remove = async (id) => {
    await AppStore.updatePlanning(p => ({ ...p, shopping:((p.shopping)||[]).filter(s => s.id !== id) }));
  };

  const clearDone = async () => {
    if (!window.confirm('Limpar itens já comprados?')) return;
    await AppStore.updatePlanning(p => ({ ...p, shopping:((p.shopping)||[]).filter(s => !s.done) }));
  };

  const pending = items.filter(s => !s.done);
  const done = items.filter(s => s.done);

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      <div style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:14, padding:16, display:'flex', gap:8 }}>
        <input value={text} onChange={(e)=>setText(e.target.value)} onKeyDown={(e)=>{ if(e.key==='Enter'){ e.preventDefault(); add(); } }}
          placeholder="Protetor solar..." maxLength={100} style={{ flex:1, minWidth:0, boxSizing:'border-box', padding:'10px 14px', borderRadius:10, border:'1px solid var(--pa-line)', fontFamily:'var(--pa-body)', fontSize:16, outline:'none' }} />
        <input value={qty} onChange={(e)=>setQty(e.target.value)} placeholder="Qtd" maxLength={8} style={{ width:56, flexShrink:0, boxSizing:'border-box', padding:'10px 8px', borderRadius:10, border:'1px solid var(--pa-line)', fontFamily:'var(--pa-body)', fontSize:16, outline:'none', textAlign:'center' }} />
        <Btn variant="accent" onClick={add} disabled={!text.trim()} style={{ flexShrink:0 }}>+</Btn>
      </div>

      {pending.length > 0 && (
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Por comprar ({pending.length})</div>
          {pending.map(s => (
            <div key={s.id} style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:12, padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
              <button onClick={()=>toggle(s.id)} style={{ width:22, height:22, borderRadius:6, border:'2px solid var(--pa-line)', background:'#fff', cursor:'pointer', flexShrink:0, padding:0 }} />
              <div style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:13.5 }}>{s.text}</div>
              {s.qty && <Pill size="sm" tone="muted">×{s.qty}</Pill>}
              <button onClick={()=>remove(s.id)} style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', fontSize:16, padding:0 }}>×</button>
            </div>
          ))}
        </div>
      )}

      {done.length > 0 && (
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Comprado ({done.length})</div>
            <Btn variant="ghost" size="sm" onClick={clearDone}>Limpar</Btn>
          </div>
          {done.map(s => (
            <div key={s.id} style={{ background:'rgba(31,26,20,0.03)', borderRadius:12, padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
              <button onClick={()=>toggle(s.id)} style={{ width:22, height:22, borderRadius:6, border:'none', background:'var(--pa-accent)', color:'#fff', cursor:'pointer', flexShrink:0, padding:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13 }}>✓</button>
              <div style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:13.5, color:'var(--pa-muted)', textDecoration:'line-through' }}>{s.text}</div>
              {s.qty && <Pill size="sm" tone="muted">×{s.qty}</Pill>}
            </div>
          ))}
        </div>
      )}

      {items.length === 0 && (
        <div style={{ padding:'24px 0', textAlign:'center', color:'var(--pa-muted)', fontSize:13 }}>
          Lista vazia. Adiciona itens acima.
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// DesktopShell
// ─────────────────────────────────────────────────────────────
const PHASE_STORAGE_KEY = 'pa-current-phase';

function DesktopShell({ viewAs = 'admin', phase: initialPhase, liveUser, onLogout, onBackToHub, onEditProfile }) {
  const appData = useAppStore();
  const me = liveUser || (viewAs === 'admin' ? memberById(D.adminId) : (getAllMembers().find(m=>!m.isAdmin) || getAllMembers()[0] || memberById(D.adminId)));

  const edition = {
    number: appData.editionNumber || D.edition.number,
    title: appData.editionTitle || D.edition.title,
    subtitle: appData.editionSubtitle || D.edition.subtitle,
  };

  // Fase partilhada via AppStore (Supabase). No canvas usa initialPhase fixo.
  const phase = initialPhase !== undefined ? initialPhase : (appData.currentPhase || D.edition.currentPhase || 1);

  const setPhase = (n) => {
    if (initialPhase !== undefined) return;
    const clamped = Math.max(1, Math.min(D.phases.length, n));
    AppStore.setPhase(clamped);
  };
  const reset = () => { if (initialPhase === undefined) AppStore.resetEdition(); };

  const ctx = { phase, setPhase, reset, canEdit: me.isAdmin };

  const phases = { 1:DPhase1, 2:DPhase2, 3:DPhase3, 4:DPhase4, 5:DPhase5, 6:DPhase6, 7:DPhase7, 8:DPhase8 };
  const PhaseView = phases[phase] || DPhase1;

  return (
    <PhaseCtx.Provider value={ctx}>
      <div style={{ width:'100%', height:'100%', display:'flex', flexDirection:'column',
        background:'var(--pa-bg)', overflow:'hidden',
        fontFamily:'var(--pa-body)', color:'var(--pa-ink)', WebkitFontSmoothing:'antialiased' }}>
        <DTopBar me={me} edition={edition} onLogout={onLogout} onBackToHub={onBackToHub} onEditProfile={onEditProfile} />
        <div style={{ flex:1, display:'flex', overflow:'hidden', minHeight:0 }}>
          <DLeftRail phase={phase} me={me} />
          <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0, background:'#fcf9f3' }}>
            <div key={phase} className="pa-phase-enter" style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0 }}>
              <PhaseView me={me} />
            </div>
            {initialPhase === undefined && (
              <div style={{ padding:'12px 36px 16px', background:'#fcf9f3', borderTop:'1px solid var(--pa-line)' }}>
                <PhaseProgressBanner phase={phase} me={me} />
              </div>
            )}
          </div>
          <DRightRail phase={phase} me={me} />
        </div>
      </div>
    </PhaseCtx.Provider>
  );
}

Object.assign(window, {
  DPhase4, DPhase5, DPhase6, DPhase7, DPhase8,

});

      background:'var(--pa-bg)', fontFamily:'var(--pa-body)', color:'var(--pa-ink)',
      WebkitFontSmoothing:'antialiased',
      paddingTop:'max(10px, env(safe-area-inset-top))',
      paddingBottom:'max(6px, env(safe-area-inset-bottom))',
      boxSizing:'border-box', overflow:'hidden' }}>
      {children}
    </div>
  );
}

const MNavCtx = React.createContext({ onBackToHub: null, onEditProfile: null, me: null });

function MPhaseNav({ phase }) {
  const [open, setOpen] = mUseState(false);
  const total = D.phases.length;
  const go = (n) => { AppStore.setPhase(Math.max(1, Math.min(total, n))); AppStore.clearKey('deadline'); setOpen(false); };
  // Reiniciar a fase atual (paridade com o desktop): cada fase limpa a sua chave
  const resetKey = { 1:'rsvp', 2:'locSuggs', 3:'locVotes', 4:'accSuggs', 5:'accVotes', 6:'avail', 7:'locked' }[phase];
  const resetLabel = { 1:'as respostas', 2:'as sugestões de local', 3:'os votos de local', 4:'as sugestões de alojamento', 5:'os votos de alojamento', 6:'as disponibilidades', 7:'as datas trancadas' }[phase];
  const doReset = () => { if (window.confirm(`Reiniciar ${resetLabel} desta fase?`)) { AppStore.clearKey(resetKey); setOpen(false); } };
  return (
    <div style={{ position:'relative', display:'flex', alignItems:'center', gap:3 }}>
      <button onClick={() => go(phase - 1)} disabled={phase === 1} aria-label="Fase anterior"
        style={{ width:36, height:36, borderRadius:999, border:'1px solid var(--pa-line)', background:'#fff',
          cursor: phase===1?'default':'pointer', opacity: phase===1?0.4:1, padding:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <svg width="9" height="9" viewBox="0 0 11 11"><path d="M7 2L3 5.5l4 3.5" stroke="var(--pa-ink)" strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
      <button onClick={() => setOpen(o=>!o)} style={{ height:36, padding:'0 12px', borderRadius:999, background:'var(--pa-ink)', color:'#fff', border:'none', fontFamily:'var(--pa-mono)', fontSize:11, fontWeight:600, cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5 }}>
        FASE {String(phase).padStart(2,'0')}/{String(total).padStart(2,'0')}
        <svg width="8" height="5" viewBox="0 0 9 6"><path d="M1 1l3.5 3.5L8 1" stroke="#fff" strokeWidth="1.4" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
      <button onClick={() => go(phase + 1)} disabled={phase === total} aria-label="Fase seguinte"
        style={{ width:36, height:36, borderRadius:999, border:'1px solid var(--pa-line)', background:'#fff',
          cursor: phase===total?'default':'pointer', opacity: phase===total?0.4:1, padding:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <svg width="9" height="9" viewBox="0 0 11 11"><path d="M4 2l4 3.5L4 9" stroke="var(--pa-ink)" strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
      {open && (
        <>
          <div onClick={() => setOpen(false)} style={{ position:'fixed', inset:0, zIndex:40 }} />
          <div style={{ position:'absolute', top:'100%', right:0, marginTop:6, background:'#fff', borderRadius:12, padding:6, boxShadow:'0 8px 28px rgba(0,0,0,0.18)', border:'1px solid var(--pa-line)', zIndex:41, minWidth:160 }}>
            {D.phases.map((p) => (
              <button key={p.n} onClick={() => go(p.n)} style={{
                width:'100%', textAlign:'left', padding:'8px 10px', borderRadius:8, border:'none', cursor:'pointer',
                background: p.n===phase ? 'var(--pa-ink)' : 'transparent', color: p.n===phase ? '#fff' : 'var(--pa-ink)',
                fontFamily:'var(--pa-body)', fontSize:12.5, display:'flex', gap:8, alignItems:'center' }}>
                <span style={{ fontFamily:'var(--pa-mono)', fontSize:10, opacity:0.7 }}>{String(p.n).padStart(2,'0')}</span>
                {p.name}
              </button>
            ))}
            {resetKey && (
              <>
                <div style={{ borderTop:'1px solid var(--pa-line)', margin:'4px 0' }} />
                <button onClick={doReset} style={{
                  width:'100%', textAlign:'left', padding:'8px 10px', borderRadius:8, border:'none', cursor:'pointer',
                  background:'transparent', color:'#8a4220', fontFamily:'var(--pa-body)', fontSize:12.5, display:'flex', gap:8, alignItems:'center' }}>
                  <span style={{ fontSize:13 }}>🔄</span> Reiniciar esta fase
                </button>
              </>
            )}
          </div>
        </>
      )}
    </div>
  );
}

    <div style={{ padding:'4px 18px 12px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>

              <path d="M2 4a2 2 0 012-2h6a2 2 0 012 2v4a2 2 0 01-2 2H6l-3 2.5V10H4a2 2 0 01-2-2V4z" stroke={nav.chatUnread ? '#fff' : 'var(--pa-ink)'} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>

            display:'flex', alignItems:'center', justifyContent:'center' }}>
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
              <path d="M9 4V2.5a1 1 0 00-1-1H3a1 1 0 00-1 1v9a1 1 0 001 1h5a1 1 0 001-1V10" stroke="var(--pa-ink)" strokeWidth="1.3" strokeLinecap="round"/>
              <path d="M6 7h7m0 0L10.5 4.5M13 7l-2.5 2.5" stroke="var(--pa-ink)" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>

function MPhaseTitle({ kicker, title, sub }) {
  return (
    <div style={{ padding:'12px 22px 14px' }}>
      {kicker && <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.5, color:'var(--pa-muted)', textTransform:'uppercase' }}>{kicker}</div>}

function MEmpty({ icon, text }) {

    <div style={{ padding:'48px 22px', textAlign:'center', color:'var(--pa-muted)', fontSize:13 }}>
      <div style={{ fontSize:32, marginBottom:12 }}>{icon}</div>
