// ─────────────────────────────────────────────────────────────
// PHASE 4 — Confirmar presença (quem vai mesmo, já com datas concretas)
// Auto "Vou" para quem marcou os dias trancados; pergunta aos restantes.
// Admin pode sobrepor qualquer estado; o avanço é sempre input do admin.
// ─────────────────────────────────────────────────────────────
function DPhaseConfirm({ me }) {
  const appData = useAppStore();
  const locked = appData.locked || null;
  const rangeLabel = locked ? paRangeLabel(locked.from, locked.to) : '—';
  const interested = getInterestedMembers(appData);

  const stateOf = (id) => memberGoing(appData, id); // true | false | undefined
  const going = interested.filter((m) => stateOf(m.id) === true);
  const notGoing = interested.filter((m) => stateOf(m.id) === false);
  const pending = interested.filter((m) => stateOf(m.id) === undefined);

  const myState = stateOf(me.id);
  const meInterested = interested.some((m) => m.id === me.id);
  const answer = (uid, val) => AppStore.setGoing(uid, val);

  return (
    <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
      <DPhaseHeader status="Confirmar presença" statusTone="accent"
        title={<>Quem <span style={{ color:'var(--pa-accent)' }}>vai?</span></>}
        sub={`A aventura é de ${rangeLabel}. Quem marcou estes dias já entra como "Vou" — falta só confirmar os restantes.`} />

      {!locked && (
        <div style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:14, padding:16, color:'var(--pa-muted)', fontFamily:'var(--pa-body)', fontSize:14 }}>
          As datas ainda não estão trancadas — volta à fase das datas primeiro.
        </div>
      )}

      {locked && meInterested && myState === undefined && (
        <div style={{ background:'#fff', border:'1.5px solid var(--pa-accent)', borderRadius:16, padding:'18px 20px', marginBottom:18 }}>
          <div style={{ fontFamily:'var(--pa-display)', fontSize:20, fontWeight:600, marginBottom:4 }}>Vais? A aventura é de {rangeLabel}.</div>
          <div style={{ fontFamily:'var(--pa-body)', fontSize:13.5, color:'var(--pa-muted)', marginBottom:14 }}>Sê sincero — assim sabemos já quem conta para o destino e as contas.</div>
          <div style={{ display:'flex', gap:10 }}>
            <Btn variant="accent" size="lg" onClick={() => answer(me.id, true)}>Vou</Btn>
            <Btn variant="ghost" size="lg" onClick={() => answer(me.id, false)}>Não vou</Btn>
          </div>
        </div>
      )}

      {locked && meInterested && myState !== undefined && (
        <div style={{ background:'#fff', border:'1px solid var(--pa-line)', borderRadius:14, padding:'14px 18px', marginBottom:18, display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, flexWrap:'wrap' }}>
          <div style={{ fontFamily:'var(--pa-body)', fontSize:14 }}>Estás como <strong>{myState ? 'Vou' : 'Não vou'}</strong>.</div>
          <Btn variant="ghost" size="sm" onClick={() => answer(me.id, !myState)}>Mudar para {myState ? 'Não vou' : 'Vou'}</Btn>
        </div>
      )}

      {/* resumo ao vivo — toda a gente vê quem vai e quem não vai */}
      <div style={{ display:'flex', gap:12, marginBottom:16 }}>
        {[
          { l:'Vão', n:going.length, tone:'#3d5e44', bg:'rgba(107,142,111,0.16)' },
          { l:'Não vão', n:notGoing.length, tone:'#8a4220', bg:'rgba(217,119,87,0.18)' },
          { l:'Por confirmar', n:pending.length, tone:'var(--pa-muted)', bg:'rgba(31,26,20,0.05)' },
        ].map((c) => (
          <div key={c.l} style={{ background:c.bg, borderRadius:14, padding:'14px 18px', flex:1 }}>
            <div style={{ fontFamily:'var(--pa-display)', fontSize:32, fontWeight:600, color:c.tone, letterSpacing:-0.6 }}>{c.n}</div>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, color:c.tone, letterSpacing:1, textTransform:'uppercase', marginTop:2 }}>{c.l}</div>
          </div>
        ))}
      </div>

      <div style={{ background:'#fff', borderRadius:16, padding:16, border:'1px solid var(--pa-line)' }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:10 }}>
          Estado do grupo
        </div>
        {interested.map((m) => {
          const s = stateOf(m.id);
          const pill = s === true ? <Pill tone="success" size="sm">✓ vai</Pill>
            : s === false ? <Pill tone="muted" size="sm">não vai</Pill>
            : <Pill tone="muted" size="sm">por confirmar</Pill>;
          return (
            <div key={m.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'6px 0', opacity: s === false ? 0.55 : 1 }}>
              <Avatar member={m} size={22} />
              <span style={{ flex:1, fontSize:13, color:'var(--pa-ink)' }}>{m.name}</span>
              {me.isAdmin ? (
                <div style={{ display:'flex', gap:6 }}>
                  <Btn variant={s === true ? 'accent' : 'ghost'} size="sm" onClick={() => answer(m.id, true)}>Vai</Btn>
                  <Btn variant={s === false ? 'accent' : 'ghost'} size="sm" onClick={() => answer(m.id, false)}>Não vai</Btn>
                </div>
              ) : pill}
            </div>
          );
        })}
      </div>

      {me.isAdmin && (
        <DAdminBar hint={`${going.length} ${going.length === 1 ? 'vai' : 'vão'} · ${pending.length} por confirmar. Avança quando estiver decidido.`} />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PHASE 1 — RSVP (dinâmico via AppStore)
// ─────────────────────────────────────────────────────────────
function DPhase1({ me }) {
  const appData = useAppStore();
  const rsvp = appData.rsvp || {};
  const allMembers = getEditionMembers(appData);
  const counts = dUseMemo(() => {
    const c = { in:0, out:0, maybe:0, pending:0 };
    allMembers.forEach((m) => { const s = rsvp[m.id] || 'pending'; c[s]++; });
    return c;
  }, [rsvp, allMembers.length]);
  const interestedCount = counts.in + counts.maybe;

  const myChoice = rsvp[me.id] || null;
  const [picking, setPicking] = dUseState(false);

  const handleRsvp = (status) => {
    AppStore.setRsvp(me.id, status);
    setPicking(false);
  };

  return (
    <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
      <DPhaseHeader status="Em curso" statusTone="accent"
        title={<>Há aventura a caminho: <span style={{ color:'var(--pa-accent)' }}>{appData.editionTitle || 'Nova Aventura'}</span>. Tens interesse?</>}
        sub={<>Ainda não é compromisso — só queremos ver quem está atento. As datas decidem-se a seguir, e só depois é que se confirma quem vai mesmo.</>} />

      {/* balcões — o que interessa aqui é o interesse, não o compromisso */}
      <div style={{ display:'flex', gap:12, marginBottom:24 }}>
        {[
          { l:'Com interesse', n:interestedCount, tone:'#3d5e44', bg:'rgba(107,142,111,0.16)' },
          { l:'Sem interesse', n:counts.out, tone:'#8a4220', bg:'rgba(217,119,87,0.18)' },
          { l:'Sem responder', n:counts.pending, tone:'var(--pa-muted)', bg:'rgba(31,26,20,0.05)' },
        ].map((c) => (
          <div key={c.l} style={{ background:c.bg, borderRadius:14, padding:'14px 18px', flex:1 }}>
            <div style={{ fontFamily:'var(--pa-display)', fontSize:32, fontWeight:600, color:c.tone, letterSpacing:-0.6 }}>{c.n}</div>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, color:c.tone, letterSpacing:1, textTransform:'uppercase', marginTop:2 }}>{c.l}</div>
          </div>
        ))}
      </div>

      {/* botões RSVP — toda a gente responde, incluindo o admin */}
      {(
        <div style={{ marginBottom:20, padding:16, background:'#fff', borderRadius:14, border:'1px solid var(--pa-line)' }}>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:12 }}>
            A tua resposta
          </div>
          <div style={{ display:'flex', gap:8 }}>
            {[{ id:'in', label:'Tenho interesse 🙋', tone:'success' }, { id:'maybe', label:'Talvez 🤔', tone:'default' }, { id:'out', label:'Desta vez não 😩', tone:'warn' }].map((o) => (
              <button key={o.id} onClick={() => handleRsvp(o.id)} style={{
                flex:1, padding:'10px 8px', borderRadius:10, cursor:'pointer', fontFamily:'var(--pa-body)', fontSize:13, fontWeight:600,
                background: myChoice===o.id ? 'var(--pa-ink)' : '#fff',
                color: myChoice===o.id ? '#fff' : 'var(--pa-ink)',
                border: myChoice===o.id ? 'none' : '1px solid var(--pa-line)',
              }}>{o.label}</button>
            ))}
          </div>
          {myChoice && <div style={{ marginTop:10, fontSize:12, color:'var(--pa-muted)', textAlign:'center' }}>
            Resposta guardada. Podes mudar até a fase fechar.
          </div>}
        </div>
      )}

      {/* lista de membros */}
      <div style={{ background:'#fff', borderRadius:18, border:'1px solid var(--pa-line)', overflow:'hidden' }}>
        {allMembers.length === 0 && (
          <div style={{ padding:24, textAlign:'center', color:'var(--pa-muted)', fontSize:13 }}>
            Ninguém registado ainda. Partilha o link com o grupo!
          </div>
        )}
        {allMembers.map((m, i) => {
          const s = rsvp[m.id] || 'pending';
          const labels = { in:'Com interesse', out:'Sem interesse', maybe:'Talvez', pending:'Sem responder' };
          const tones = { in:'success', out:'warn', maybe:'default', pending:'muted' };
          return (
            <div key={m.id} style={{ display:'flex', alignItems:'center', gap:14, padding:'14px 20px',
              borderTop: i===0?'none':'1px solid var(--pa-line)' }}>
              <Avatar member={m} size={36} />
              <div style={{ flex:1 }}>
                <div style={{ fontFamily:'var(--pa-body)', fontSize:15, fontWeight:600, color:'var(--pa-ink)' }}>
                  {m.name} {m.isAdmin && <span style={{ color:'var(--pa-accent)', fontSize:12, fontWeight:500 }}>· admin</span>}
                </div>
              </div>
              <Pill tone={tones[s]}>{labels[s]}</Pill>
            </div>
          );
        })}
      </div>

      {me.isAdmin && (
        <DAdminBar hint={`${counts.in} confirmados. Quando estiver completo, avança.`}>
          <Btn variant="ghost" size="sm" onClick={() => {
            if (window.confirm('Limpar todos os RSVPs?')) {
              AppStore.clearKey('rsvp');
            }
          }}>Reiniciar</Btn>
        </DAdminBar>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PHASE 2 — Sugerir localizações (dinâmico via AppStore)
// ─────────────────────────────────────────────────────────────
function DPhase2({ me }) {
  const appData = useAppStore();
  const suggestions = appData.locSuggs || [];
  const mineCount = suggestions.filter((s) => s.by === me.id).length;
  const limit = D.phase2.perPersonLimit;
  const [adding, setAdding] = dUseState(false);

  const handleAdd = ({ name, city, tags, accent, geo, zone }) => {
    // O geo/zone vêm do LocationPicker (pino ou região confirmados à mão).
    AppStore.addLocSuggestion({
      id: 'loc_' + Date.now().toString(36),
      name, city, tags: tags || [], accent: accent || 'var(--pa-accent)',
      by: me.id,
      ...(geo ? { geo } : {}),
      ...(zone ? { zone } : {}),
    });
    setAdding(false);
  };

  return (
    <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
      <DPhaseHeader phase={4} status="Em curso" statusTone="accent"
        title={<>Cada um lança<br/><span style={{ color:'var(--pa-accent)' }}>até {limit} sítios.</span></>}
        sub="Sem censura. Convencer o grupo é com o nome e os argumentos." />

      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:11, letterSpacing:1, color:'var(--pa-muted)', textTransform:'uppercase' }}>
          {suggestions.length} destino{suggestions.length !== 1 ? 's' : ''} no chapéu
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <Pill>Os teus: {mineCount} / {limit}</Pill>
          {mineCount < limit && !adding && (
            <Btn variant="accent" size="sm" onClick={() => setAdding(true)} icon={<span style={{ fontSize:14 }}>+</span>}>
              Lançar destino
            </Btn>
          )}
        </div>
      </div>

      {adding && <LocSuggestionForm onCancel={() => setAdding(false)} onSubmit={handleAdd} />}

      {suggestions.length === 0 && !adding && (
        <div style={{ padding:'48px 0', textAlign:'center', color:'var(--pa-muted)', fontSize:14 }}>
          Ainda ninguém sugeriu nada. Vai lá! 🗺️
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:14 }}>
        {suggestions.map((s) => {
          const by = memberById(s.by) || { name: s.by, color:'var(--pa-muted)', initials:'?' };
          const mine = s.by === me.id;
          return (
            <div key={s.id} style={{ background:'#fff', borderRadius:14, overflow:'hidden',
              border: mine?'1.5px solid var(--pa-accent)':'1px solid var(--pa-line)', position:'relative' }}>
              <PhotoSlot accent={s.accent || 'var(--pa-accent)'} label={s.city} height={108} radius={0} />
              {(me.isAdmin || mine) && (
                <button onClick={() => AppStore.removeLocSuggestion(s.id)}
                  title="Remover" style={{ position:'absolute', top:8, right:8, width:24, height:24,
                    borderRadius:999, border:'none', background:'rgba(0,0,0,0.4)', color:'#fff',
                    cursor:'pointer', fontSize:14, display:'flex', alignItems:'center', justifyContent:'center' }}>×</button>
              )}
              <div style={{ padding:'12px 14px 14px' }}>
                <div style={{ fontFamily:'var(--pa-display)', fontSize:17, fontWeight:600, letterSpacing:-0.3, lineHeight:1.15 }}>
                  {s.name}
                </div>
                {s.tags && s.tags.length > 0 && (
                  <div style={{ marginTop:6, display:'flex', flexWrap:'wrap', gap:4 }}>
                    {s.tags.map((t) => <Pill key={t} size="sm">{t}</Pill>)}
                  </div>
                )}
                <div style={{ marginTop:10, paddingTop:10, borderTop:'1px solid var(--pa-line)',
                  display:'flex', alignItems:'center', gap:6 }}>
                  <Avatar member={by} size={20} />
                  <span style={{ fontSize:11.5, color:'var(--pa-muted)' }}>{mine ? 'tu' : by.name}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {me.isAdmin && (
        <DAdminBar hint={`${suggestions.length} destinos. Quando fechar, avança para votação.`}>
          <Btn variant="ghost" size="sm" onClick={() => { if (window.confirm('Limpar todas as sugestões?')) { AppStore.clearKey('locSuggs'); } }}>
            Limpar tudo
          </Btn>
        </DAdminBar>
      )}
    </div>
  );
}

function LocSuggestionForm({ onCancel, onSubmit }) {
  const [name, setName] = dUseState('');
  const [city, setCity] = dUseState('');
  const [tag, setTag] = dUseState('');
  const [tags, setTags] = dUseState([]);
  const [geo, setGeo] = dUseState(null); // escolhido no mapa (picker), nunca adivinhado
  const ok = !!name.trim(); // só o nome é obrigatório; o resto é opcional

  const addTag = () => {
    const t = tag.trim();
    if (t && !tags.includes(t)) setTags([...tags, t]);
    setTag('');
  };

  return (
    <div style={{ background:'#fff', borderRadius:16, padding:22, marginBottom:14, border:'2px solid var(--pa-accent)' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
        <div style={{ fontFamily:'var(--pa-display)', fontSize:18, fontWeight:600, letterSpacing:-0.3 }}>Lançar destino</div>
        <button onClick={onCancel} style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', fontSize:18, padding:4 }}>×</button>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:10 }}>
        <Field label="Nome do sítio" placeholder="" value={name} onChange={setName} />
        <Field label="Cidade / país (opcional)" placeholder="" value={city} onChange={setCity} />
      </div>
      <div style={{ marginBottom:14 }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:6 }}>Tags</div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:8 }}>
          {tags.map((t) => (
            <span key={t} style={{ display:'inline-flex', alignItems:'center', gap:4, padding:'4px 10px', borderRadius:999, background:'rgba(31,26,20,0.08)', fontSize:12 }}>
              {t}
              <button onClick={() => setTags(tags.filter((x) => x !== t))} style={{ border:'none', background:'transparent', cursor:'pointer', color:'var(--pa-muted)', padding:0, fontSize:13 }}>×</button>
            </span>
          ))}
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <input value={tag} onChange={(e) => setTag(e.target.value)} onKeyDown={(e) => { if (e.key==='Enter') { e.preventDefault(); addTag(); } }}
            placeholder="Adicionar etiqueta"
            style={{ flex:1, padding:'8px 12px', borderRadius:10, border:'1px solid var(--pa-line)', fontFamily:'var(--pa-body)', fontSize:16, outline:'none' }} />
          <button onClick={addTag} style={{ padding:'8px 14px', borderRadius:10, border:'none', background:'var(--pa-ink)', color:'#fff', cursor:'pointer', fontSize:12, fontWeight:600 }}>+</button>
        </div>
      </div>
            <div style={{ margin:'10px 0 12px' }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:6 }}>Localização no mapa (opcional)</div>
        <LocationPicker onChange={setGeo} placeholder="Procurar no mapa" />
      </div>
<div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
        <Btn variant="ghost" size="sm" onClick={onCancel}>Cancelar</Btn>
        <Btn variant="accent" size="sm" onClick={() => onSubmit({ name:name.trim(), city:city.trim(), tags, ...(geo ? { geo: { lat: geo.lat, lng: geo.lng }, ...(geo.zone ? { zone: geo.zone } : {}) } : {}) })} disabled={!ok}>Lançar</Btn>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PHASE 3 — Votar local (VoteStore, sugestões do AppStore)
// ─────────────────────────────────────────────────────────────
function DPhase3({ me }) {
  const appData = useAppStore();
  const suggestions = appData.locSuggs || [];
  const [vote, setVote] = dUseState(() => VoteStore.getVote(me.id, 'loc'));
  dUseEffect(() => { setVote(VoteStore.getVote(me.id, 'loc')); }, [appData.locVotes, me.id]);
  const [saved, setSaved] = dUseState(false);
  const [tieOpen, setTieOpen] = dUseState(false);

  const inMembers = (typeof getInMembers === 'function') ? getInMembers(appData) : [];

  const voteMode = appData.locVoteMode || 'points' /* Top 3 por defeito */;
  const myList = paVoteList(vote);
  const handleVote = (id) => {
    if (voteMode === 'points') {
      const cur = paVoteList(vote);
      let next;
      if (cur.includes(id)) next = cur.filter((x) => x !== id);
      else if (cur.length < 3) next = [...cur, id];
      else { if (window._paToast) window._paToast('Já tens 3 escolhas — toca numa para a trocar.', 'info'); return; }
      if (next.length === 0) { setVote(null); VoteStore.clearVote(me.id, 'loc'); return; }
      setVote(next);
      VoteStore.setVote(me.id, 'loc', next);
    } else {
      setVote(id);
      VoteStore.setVote(me.id, 'loc', id);
    }
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  // Detetar empate
  const votes = appData.locVotes || {};
  const allVoted = inMembers.length > 0 && inMembers.every(m => votes[m.id]);
  const tie = allVoted ? detectTie(votes, suggestions) : null;
  dUseEffect(() => { if (tie && !appData.locWinner) setTieOpen(true); }, [tie?.tiedIds?.join(','), appData.locWinner]);

  if (suggestions.length === 0) {
    return (
      <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
        <DPhaseHeader phase={5} status="Sem destinos" statusTone="muted"
          title={<>Ainda não há<br/><span style={{ color:'var(--pa-accent)' }}>destinos para votar.</span></>}
          sub="Volta à fase 4 e pede ao grupo para sugerir sítios primeiro." />
        {me.isAdmin && <DAdminBar hint="Sem sugestões ainda." />}
      </div>
    );
  }

  return (
    <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
      <DPhaseHeader phase={5} status="A decorrer" statusTone="accent"
        title={<>Vota no teu<br/><span style={{ color:'var(--pa-accent)' }}>sítio favorito.</span></>}
        sub={voteMode === 'points' ? 'Voto secreto. Escolhe até 3 por ordem: 1º vale 3 pontos, 2º vale 2, 3º vale 1.' : 'Voto secreto. Um por pessoa.'} />

      <LocMap suggestions={suggestions} height={240} membersById={(id) => (typeof memberById === 'function' ? memberById(id) : null)} />

      <div style={{ marginBottom:18 }}>
        <VotersRow doneIds={Object.keys(votes).filter((id) => paVoteList(votes[id]).length > 0)} allMembers={inMembers} label="Já votaram" />
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:14, marginBottom:8 }}>
        {suggestions.map((s) => {
          const by = memberById(s.by) || { name:s.by, color:'var(--pa-muted)', initials:'?' };
          const sel = voteMode === 'points' ? myList.includes(s.id) : vote === s.id;
          const rank = voteMode === 'points' ? myList.indexOf(s.id) : -1;
          return (
            <button key={s.id} onClick={() => handleVote(s.id)} style={{ position:'relative',
              background:'#fff', borderRadius:14, overflow:'hidden', textAlign:'left',
              border: sel?'2px solid var(--pa-accent)':'1px solid var(--pa-line)',
              
              cursor:'pointer', padding:0, position:'relative' }}>
              {voteMode === 'points' && rank >= 0 && (
                <span aria-label={`A tua ${rank+1}ª escolha`} style={{ position:'absolute', top:8, left:8, zIndex:3,
                  width:26, height:26, borderRadius:26, background:'var(--pa-accent-strong)', color:'#fff',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontFamily:'var(--pa-mono)', fontSize:11, fontWeight:700,
                  boxShadow:'0 2px 6px rgba(0,0,0,0.25)' }}>{rank+1}º</span>
              )}
              
              <PhotoSlot accent={s.accent || 'var(--pa-accent)'} label="" height={96} radius={0} />
              {sel && (
                <div style={{ position:'absolute', top:10, right:10, width:28, height:28, borderRadius:28,
                  background: saved?'#3d5e44':'var(--pa-accent)',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  boxShadow:'0 4px 12px rgba(217,119,87,0.5)' }}>
                  <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 7l3 3 5-6" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
              )}
              <div style={{ padding:'12px 14px 14px' }}>
                <div style={{ fontFamily:'var(--pa-display)', fontSize:16, fontWeight:600, letterSpacing:-0.2, lineHeight:1.15 }}>{s.name}</div>
                <div style={{ fontSize:11, color:'var(--pa-muted)', marginTop:2 }}>{s.city}</div>
                <MapLink targetId={s.id} hasGeo={!!s.geo} style={{ marginTop:4, display:'inline-block' }} />
                <div style={{ marginTop:10, display:'flex', alignItems:'center', gap:6 }}>
                  <Avatar member={by} size={18} />
                  <span style={{ fontSize:10.5, color:'var(--pa-muted)' }}>por {by.name}</span>
                </div>
              </div>
            </button>
          );
        })}
      </div>

      <div style={{ marginTop:18, padding:14, borderRadius:12, background:'rgba(31,26,20,0.04)', display:'flex', alignItems:'center', gap:12 }}>
        <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" stroke="var(--pa-muted)" strokeWidth="1.2" fill="none"/><path d="M8 5v3.5M8 11v.5" stroke="var(--pa-muted)" strokeWidth="1.5" strokeLinecap="round"/></svg>
        <div style={{ fontSize:12.5, color:'var(--pa-muted)' }}>
          Cada um vota numa só opção.{' '}
          {saved
            ? <span style={{ color:'#3d5e44', fontWeight:600 }}>✓ Voto guardado!</span>
            : myList.length
              ? <span style={{ color:'var(--pa-ink)', fontWeight:600 }}>{voteMode === 'points'
                  ? 'O teu top: ' + myList.map((id, i) => `${i+1}º ${((id) => { const s = suggestions.find((x) => x.id === id); return s ? (s.name || s.area || s.type) : '?'; })(id)}`).join(' · ') + '.'
                  : `Voto em ${((id) => { const s = suggestions.find((x) => x.id === id); return s ? (s.name || s.area || s.type) : '?'; })(myList[0])}.`}</span>
              : 'Ainda não votaste.'}
          {myList.length > 0 && !closed && (
            <button onClick={() => { setVote(null); VoteStore.clearVote(me.id, 'loc'); if (window._paToast) window._paToast('Voto removido — podes votar de novo.', 'success'); }}
              style={{ marginLeft: 10, border:'none', background:'transparent', color:'var(--pa-muted)', textDecoration:'underline', cursor:'pointer', fontFamily:'var(--pa-body)', fontSize:12.5, padding:0 }}>
              Remover o meu voto
            </button>
          )}
        </div>
      </div>

      {me.isAdmin && (
        <DAdminBar hint={`${suggestions.length} destinos a votar. Quando fechar, avança.`}>
          <VoteModeToggle kind="loc" mode={voteMode} isAdmin={me.isAdmin} hasVotes={Object.keys(appData.locVotes || {}).length > 0} />
          <Btn variant="ghost" size="sm">Reabrir votação</Btn>
        </DAdminBar>
      )}
      <TiebreakModal
        open={tieOpen && !!tie && !appData.locWinner}
        onClose={()=>setTieOpen(false)}
        tie={tie}
        me={me}
        voteKey="tieVotesLoc"
        onResolve={(winnerId)=>AppStore.setLocWinner(winnerId)}
      />
    </div>
  );
}

Object.assign(window, {
  getAllMembers,
  DTopBar, DLeftRail, DRightRail, DPhaseHeader, DAdminBar, DayPeoplePanel,
  DPhase1, DPhase2, DPhase3, DPhaseConfirm, LocSuggestionForm,
  useActivityFeed,
});
</script>
<script type="text/babel">// Perdidos Algures — Desktop fases 4–8 + DesktopShell.

const { useState: dUseState2, useMemo: dUseMemo2, useEffect: dUseEffect2 } = React;

// ─────────────────────────────────────────────────────────────
// PHASE 4 — Sugerir alojamentos (AppStore)
// ─────────────────────────────────────────────────────────────
function DLocationWinnerStrip() {

  const locSuggs = appData.locSuggs || [];
  const winnerId = appData.locWinner;
  const w = winnerId ? locSuggs.find((s) => s.id === winnerId) : null; // sem vencedor eleito → não fingir
  if (!w) return null;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:14, padding:'12px 16px', borderRadius:14, marginBottom:18,
      background:'#fff', border:'1px solid var(--pa-line)' }}>
      <div style={{ width:44, height:44, borderRadius:10, flexShrink:0,
        background:`repeating-linear-gradient(135deg,${w.accent||'var(--pa-accent)'}66 0 6px,${w.accent||'var(--pa-accent)'}33 6px 12px)` }} />
      <div style={{ flex:1 }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>Local decidido</div>
        <div style={{ fontFamily:'var(--pa-display)', fontSize:18, fontWeight:600, letterSpacing:-0.3, marginTop:2 }}>
          {w.name} <span style={{ color:'var(--pa-muted)', fontWeight:400, fontSize:13 }}>· {w.city}</span>
        </div>

}

function DPhase4({ me }) {
  const appData = useAppStore();
  const suggestions = appData.accSuggs || [];
  const mineCount = suggestions.filter((s) => s.by === me.id).length;
  const [adding, setAdding] = dUseState2(false);

  const handleAdd = (data) => {
    // data.geo (se existir) vem do LocationPicker do formulário.

  };

  return (
    <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
      <DPhaseHeader phase={6} status="Em curso" statusTone="accent"
        title={<>Onde é que <span style={{ color:'var(--pa-accent)' }}>dormimos?</span></>}
        sub="Cada um pode lançar quantos alojamentos quiser. Aprende a vender — o teu favorito merece argumentos." />

      <DLocationWinnerStrip />

      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:11, letterSpacing:1, color:'var(--pa-muted)', textTransform:'uppercase' }}>
          {suggestions.length} alojamento{suggestions.length !== 1 ? 's' : ''} no chapéu
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <Pill>Os teus: {mineCount}</Pill>
          {!adding && (
            <Btn variant="accent" size="sm" onClick={() => setAdding(true)} icon={<span style={{ fontSize:14 }}>+</span>}>

      {adding && <AccommodationForm onCancel={() => setAdding(false)} onSubmit={handleAdd} />}

      {suggestions.length === 0 && !adding && (
        <div style={{ padding:'48px 0', textAlign:'center', color:'var(--pa-muted)', fontSize:14 }}>
          Ainda sem alojamentos. Sê o primeiro! 🏡
        </div>
      )}

      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {suggestions.map((s) => <AccommodationCard key={s.id} acc={s} me={me} />)}
      </div>

      {me.isAdmin && (
        <DAdminBar hint={`${suggestions.length} alojamentos. Quando estiverem prontos, abre votação.`}>
          <Btn variant="ghost" size="sm" onClick={() => { if (window.confirm('Limpar todos os alojamentos?')) { AppStore.clearKey('accSuggs'); } }}>
            Limpar tudo
          </Btn>
        </DAdminBar>
      )}
    </div>
  );
}

  const mine = acc.by === me.id;
  const host = (() => { try { return new URL(acc.link).host.replace('www.',''); } catch { return acc.link || ''; } })();

    <div style={{ background:'#fff', borderRadius:14, overflow:'hidden',
      border: mine?'1.5px solid var(--pa-accent)':'1px solid var(--pa-line)', display:'flex' }}>
      <div style={{ width:8, flexShrink:0,
        background:`repeating-linear-gradient(180deg,var(--pa-accent) 0 8px,transparent 8px 16px)`,
        opacity: mine?1:0 }} />
      <div style={{ padding:'16px 20px', flex:1 }}>
        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:16 }}>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
              <Pill tone="dark" size="sm">{acc.type}</Pill>

                display:'inline-flex', alignItems:'center', gap:6,

                <svg width="11" height="11" viewBox="0 0 11 11" fill="none">

            {mine ? 'tu' : by.name} sugeriu
          </span>
        </div>
      </div>
    </div>
  );
}

function AccommodationForm({ onCancel, onSubmit }) {
  const [accGeo, setAccGeo] = dUseState(null);
  const [type, setType]   = dUseState2('Casa');

      </div>
      <div style={{ marginBottom:10 }}><Field label="Morada" placeholder="" value={area} onChange={setArea} /></div>
      <div style={{ marginBottom:10 }}><Field label="Link" placeholder="" value={link} onChange={setLink} prefix="🔗" /></div>
      <div style={{ marginBottom:14 }}><Field label="Comentário" textarea placeholder="" value={note} onChange={setNote} /></div>
            <div style={{ margin:'10px 0 12px' }}>
        <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:6 }}>Localização no mapa (opcional)</div>
        <LocationPicker onChange={setAccGeo} placeholder="Procurar no mapa" />
      </div>
<div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
        <Btn variant="ghost" size="sm" onClick={onCancel}>Cancelar</Btn>
        <Btn variant="accent" size="sm" onClick={() => onSubmit({ type, price: paNum(price), area, link, note, ...(accGeo ? { geo: { lat: accGeo.lat, lng: accGeo.lng }, ...(accGeo.zone ? { zone: accGeo.zone } : {}) } : {}) })} disabled={!ok}>Lançar</Btn>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PHASE 5 — Votar alojamento (VoteStore + AppStore suggestions)
// ─────────────────────────────────────────────────────────────
function DPhase5({ me }) {
  const appData = useAppStore();
  const suggestions = appData.accSuggs || [];
  const [vote, setVote] = dUseState2(() => VoteStore.getVote(me.id, 'acc'));
  dUseEffect2(() => { setVote(VoteStore.getVote(me.id, 'acc')); }, [appData.accVotes, me.id]);
  const [saved, setSaved] = dUseState2(false);
  const [tieOpen, setTieOpen] = dUseState2(false);

  const voteMode = appData.accVoteMode || 'points' /* Top 3 por defeito */;
  const myList = paVoteList(vote);
  const handleVote = (id) => {
    if (closed) return;
    if (voteMode === 'points') {
      const cur = paVoteList(vote);
      let next;
      if (cur.includes(id)) next = cur.filter((x) => x !== id);
      else if (cur.length < 3) next = [...cur, id];
      else { if (window._paToast) window._paToast('Já tens 3 escolhas — toca numa para a trocar.', 'info'); return; }
      if (next.length === 0) { setVote(null); VoteStore.clearVote(me.id, 'acc'); return; }
      setVote(next);
      VoteStore.setVote(me.id, 'acc', next);
    } else {
      setVote(id);
      VoteStore.setVote(me.id, 'acc', id);
    }
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  // Detetar empate
  const inMembers = (typeof getInMembers === 'function') ? getInMembers(appData) : [];
  const votes = appData.accVotes || {};
  const allVoted = inMembers.length > 0 && inMembers.every(m => votes[m.id]);
  const tie = allVoted ? detectTie(votes, suggestions) : null;
  dUseEffect2(() => { if (tie && !appData.accWinner) setTieOpen(true); }, [tie?.tiedIds?.join(','), appData.accWinner]);

  if (suggestions.length === 0) {
    return (
      <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
        <DPhaseHeader phase={7} status="Sem alojamentos" statusTone="muted"
          title={<>Ainda não há<br/><span style={{ color:'var(--pa-accent)' }}>alojamentos para votar.</span></>}
          sub="Volta à fase 6 e adiciona alojamentos primeiro." />
        {me.isAdmin && <DAdminBar hint="Sem alojamentos ainda." />}
      </div>
    );
  }

  const closed = false; // Admin fecha manualmente — por enquanto sempre aberto
  const winner = appData.accWinner ? suggestions.find((s) => s.id === appData.accWinner) : null;

  return (
    <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
      <DPhaseHeader phase={7}
        status={winner ? 'Decidido' : 'A decorrer'}
        statusTone={winner ? 'success' : 'accent'}
        title={winner
          ? <>{winner.type} em <span style={{ color:'var(--pa-accent)' }}>{winner.area}.</span></>
          : <>Onde é que <span style={{ color:'var(--pa-accent)' }}>dormimos mesmo?</span></>}
        sub={winner ? `${winner.price}€/noite${(appData.locked && paDaySpan(appData.locked.from, appData.locked.to) > 1 && paNum(winner.price) > 0) ? ` · ≈ ${Math.round(paNum(winner.price) * (paDaySpan(appData.locked.from, appData.locked.to) - 1))}€ p/ ${paDaySpan(appData.locked.from, appData.locked.to) - 1} noites` : ''} · sugerido por ${memberById(winner.by)?.name || winner.by}`
          : (voteMode === 'points' ? 'Voto secreto. Escolhe até 3 por ordem — 3/2/1 pontos.' : 'Voto secreto. Cada um vota num alojamento.')} />

      <LocMap suggestions={suggestions} height={220} membersById={(id) => (typeof memberById === 'function' ? memberById(id) : null)} />

      {!winner && (
        <div style={{ marginBottom:18 }}>
          <VotersRow doneIds={Object.keys(votes).filter((id) => paVoteList(votes[id]).length > 0)} allMembers={inMembers} label="Já votaram" />
        </div>
      )}

      {winner && (
        <div style={{ background:'var(--pa-ink)', color:'#fff', borderRadius:16, padding:20, marginBottom:20, display:'flex', alignItems:'center', gap:18 }}>
          <div style={{ width:56, height:56, borderRadius:12, flexShrink:0,
            background:'repeating-linear-gradient(135deg,var(--pa-accent) 0 8px,rgba(217,119,87,0.4) 8px 16px)' }} />
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'rgba(255,255,255,0.6)', textTransform:'uppercase' }}>Vencedor</div>
            <div style={{ fontFamily:'var(--pa-display)', fontSize:22, fontWeight:600, letterSpacing:-0.4, marginTop:2 }}>
              {winner.type} · {winner.area}
            </div>
            <div style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'rgba(255,255,255,0.7)', marginTop:4 }}>
              {winner.price}€/noite
            </div>
          </div>
          {winner.link && (
            <a href={paSafeUrl(winner.link) || undefined} target="_blank" rel="noopener noreferrer" style={{
              padding:'10px 16px', borderRadius:999, background:'rgba(255,255,255,0.12)',
              color:'#fff', textDecoration:'none', fontFamily:'var(--pa-body)', fontSize:13, fontWeight:600 }}>Ver anúncio →</a>
          )}
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:12 }}>
        {suggestions.map((s) => {
          const sel = voteMode === 'points' ? myList.includes(s.id) : vote === s.id;
          const rank = voteMode === 'points' ? myList.indexOf(s.id) : -1;
          const isWinner = winner && winner.id === s.id;
          return (
            <button key={s.id} onClick={() => handleVote(s.id)} style={{ position:'relative',
              background:'#fff', borderRadius:14, padding:16, textAlign:'left',
              border: isWinner||sel ? '2px solid var(--pa-accent)' : '1px solid var(--pa-line)',
              
              cursor: closed?'default':'pointer', position:'relative' }}>
              {voteMode === 'points' && rank >= 0 && (
                <span aria-label={`A tua ${rank+1}ª escolha`} style={{ position:'absolute', top:-8, left:-8, zIndex:3,
                  width:26, height:26, borderRadius:26, background:'var(--pa-accent-strong)', color:'#fff',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontFamily:'var(--pa-mono)', fontSize:11, fontWeight:700,
                  boxShadow:'0 2px 6px rgba(0,0,0,0.25)' }}>{rank+1}º</span>
              )}
              
              <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>
                <Pill tone="dark" size="sm">{s.type}</Pill>
                <span style={{ fontSize:11, color:'var(--pa-muted)' }}>{s.area}</span>
                <MapLink targetId={s.id} hasGeo={!!s.geo} style={{ marginLeft:8 }} />
              </div>
              {s.note && (
                <div style={{ fontFamily:'var(--pa-body)', fontSize:12.5, color:'var(--pa-ink)', lineHeight:1.4, minHeight:36 }}>
                  {s.note.length > 90 ? s.note.slice(0,90)+'…' : s.note}
                </div>
              )}
              <div style={{ marginTop:10, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                <span style={{ fontFamily:'var(--pa-mono)', fontSize:12, fontWeight:600 }}>{s.price}€/n</span>
                {sel && <Pill tone={saved?'success':'accent'} size="sm">{saved?'✓ Guardado':'✓ Voto teu'}</Pill>}
              </div>
            </button>
          );
        })}
      </div>

      {myList.length > 0 && (
        <div style={{ marginTop:10, fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)' }}>
          O teu voto está guardado.{' '}
          <button onClick={() => { setVote(null); VoteStore.clearVote(me.id, 'acc'); if (window._paToast) window._paToast('Voto removido — podes votar de novo.', 'success'); }}
            style={{ border:'none', background:'transparent', color:'var(--pa-muted)', textDecoration:'underline', cursor:'pointer', fontFamily:'var(--pa-body)', fontSize:12.5, padding:0 }}>
            Remover o meu voto
          </button>
        </div>
      )}

      {me.isAdmin && !winner && (
        <DAdminBar hint="Votação em curso. Declara o vencedor quando estiver pronto.">
          <VoteModeToggle kind="acc" mode={voteMode} isAdmin={me.isAdmin} hasVotes={Object.keys(appData.accVotes || {}).length > 0} />
          {suggestions.map((s) => (
            <Btn key={s.id} variant="soft" size="sm"
              onClick={() => { if (window.confirm(`Declarar "${s.type} em ${s.area}" como vencedor?`)) AppStore.setAccWinner(s.id); }}>
              {s.type} · {s.area}
            </Btn>
          ))}
        </DAdminBar>
      )}
      {me.isAdmin && winner && (
        <DAdminBar hint="Alojamento decidido.">
          <Btn variant="ghost" size="sm" onClick={() => AppStore.clearKey('accWinner')}>Anular</Btn>
        </DAdminBar>
      )}
      <TiebreakModal
        open={tieOpen && !!tie && !appData.accWinner}
        onClose={()=>setTieOpen(false)}
        tie={tie}
        me={me}
        voteKey="tieVotesAcc"
        onResolve={(winnerId)=>AppStore.setAccWinner(winnerId)}
      />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PHASE 6 — Disponibilidade (AppStore)
// ─────────────────────────────────────────────────────────────
function DPhase6({ me }) {
  const appData = useAppStore();
  const allMembers = getEditionMembers(appData);
  const locSuggs = appData.locSuggs || [];
  const locWinnerId = appData.locWinner;
  const winnerLoc = locWinnerId ? locSuggs.find((s) => s.id === locWinnerId) : null;
  const accSuggs = appData.accSuggs || [];
  const accWinnerId = appData.accWinner;
  const winnerAcc = accWinnerId ? accSuggs.find((s) => s.id === accWinnerId) : null;

  const [mi, setMi] = dUseState2(0) /* mês corrente primeiro */;
  const [days, setDays] = dUseState2(() => (AppStore.getAvailability(me.id) || []).map(paNormDay));
  dUseEffect2(() => { setDays((AppStore.getAvailability(me.id) || []).map(paNormDay)); }, [appData.avail, me.id]);
  const toggle = (k) => setDays((arr) => arr.includes(k) ? arr.filter((x) => x !== k) : [...arr, k]);

  const allAvail = appData.avail || {};
  // "Pronto" = a MESMA métrica do quórum da fase: pelo menos 1 dia marcado.
  // (A existência da chave não chega — uma lista vazia não é uma resposta.)
  const submittedIds = Object.keys(allAvail).filter((id) => paFutureDays(allAvail[id]).length > 0);

  // Mapa de calor do grupo em tempo real: outros (já guardado) + a minha seleção atual (local).
  // Conta APENAS quem está "in" — se alguém marcou e depois saiu, a disponibilidade não conta.
  // Chaves absolutas (YYYY-MM-DD): dias antigos em número são normalizados.
  const inMembers = (typeof getInMembers === 'function') ? getInMembers(appData) : allMembers;
  const totalIn = inMembers.length || allMembers.length;
  // Conjunto que conta na disponibilidade = INTERESSADOS (sim ou a pensar).
  // Antes de trancar as datas ninguém se comprometeu ainda, por isso a
  // disponibilidade de um "a pensar" vale tanto como a de um "sim".
  const expectedMembers = (typeof getInterestedMembers === 'function') ? getInterestedMembers(appData) : inMembers;
  const expectedSubmitted = expectedMembers.filter((m) => submittedIds.includes(m.id));
  const inIds = dUseMemo2(() => new Set(expectedMembers.map((m) => m.id)), [expectedMembers]);
  const meIsIn = inIds.has(me.id);
  const heat = dUseMemo2(() => {
    const h = {};
    Object.entries(allAvail).forEach(([mid, arr]) => { if (mid === me.id || !inIds.has(mid)) return; (arr || []).forEach((d) => { const k = paNormDay(d); h[k] = (h[k] || 0) + 1; }); });
    if (meIsIn) days.forEach((k) => { h[k] = (h[k] || 0) + 1; });
    return h;
  }, [allAvail, days, me.id, inIds, meIsIn]);
  const peopleByDay = dUseMemo2(() => {
    const map = {};
    Object.entries(allAvail).forEach(([mid, arr]) => { if (mid === me.id || !inIds.has(mid)) return; (arr || []).forEach((d) => { const k = paNormDay(d); (map[k] = map[k] || []).push(memberById(mid) || { name: '?' }); }); });
    if (meIsIn) days.forEach((k) => { (map[k] = map[k] || []).push({ ...(memberById(me.id) || me), name: me.name + ' (tu)' }); });
    return map;
  }, [allAvail, days, me.id, inIds, meIsIn]);
  const namesFor = (k) => (peopleByDay[k] || []).map((p) => p.name).join(', ');

  return (
    <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>
      <DPhaseHeader phase={2} status="A recolher disponibilidades" statusTone="accent"
        title={<>Toca nos dias<br/>em que <span style={{ color:'var(--pa-accent)' }}>podes ir.</span></>}
        sub="Marca generoso. As células mais escuras já têm mais gente — o teu contorno laranja marca os teus dias." />

      {winnerLoc && (
        <div style={{ background:'var(--pa-ink)', color:'#fff', borderRadius:16, padding:'14px 18px',
          display:'flex', alignItems:'center', gap:14, marginBottom:20 }}>
          <div style={{ width:44, height:44, borderRadius:10, flexShrink:0,
            background:`repeating-linear-gradient(135deg,${winnerLoc.accent||'var(--pa-accent)'}88 0 6px,${winnerLoc.accent||'var(--pa-accent)'}44 6px 12px)` }} />
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'rgba(255,255,255,0.6)', textTransform:'uppercase' }}>Destino · alojamento</div>
            <div style={{ fontFamily:'var(--pa-display)', fontSize:16, fontWeight:600, letterSpacing:-0.3, marginTop:1 }}>
              {winnerLoc.name}{winnerAcc ? ` · ${winnerAcc.area}` : ''}
            </div>
          </div>
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'1.6fr 1fr', gap:22, alignItems:'flex-start' }}>
        <div style={{ background:'#fff', borderRadius:18, padding:20, border:'1px solid var(--pa-line)' }}>
          <Calendar pastDisabled mi={mi} onMonth={setMi} onCellClick={(d) => toggle(paDayKey(PA_MONTHS[mi].y, PA_MONTHS[mi].m, d))} renderCell={(d, _i, past) => {
            const k = paDayKey(PA_MONTHS[mi].y, PA_MONTHS[mi].m, d);
            const sel = days.includes(k);
            const n = heat[k] || 0;
            const intensity = totalIn > 0 ? n / totalIn : 0;
            return (
              <div title={past ? (sel ? 'Dia já passado — a tua marca deixou de contar' : 'Dia já passado') : (n > 0 ? namesFor(k) : undefined)}
                style={{ width:'100%', height:'100%', borderRadius:8,
                background: past ? (sel ? 'rgba(31,26,20,0.10)' : 'rgba(31,26,20,0.03)')
                  : (intensity > 0 ? `rgba(217,119,87,${0.10 + intensity * 0.55})` : '#fff'),
                color: past ? 'var(--pa-muted)' : 'var(--pa-ink)',
                border: past ? (sel ? '2px dashed rgba(31,26,20,0.28)' : '1px solid var(--pa-line)')
                  : (sel ? '2.5px solid var(--pa-accent)' : intensity === 0 ? '1px solid var(--pa-line)' : '1px solid transparent'),
                boxShadow: (!past && sel) ? '0 0 0 2px rgba(217,119,87,0.22), 0 2px 8px rgba(217,119,87,0.28)' : 'none',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                fontFamily:'var(--pa-body)', cursor: past ? 'default' : 'pointer', transition:'background 0.12s, box-shadow 0.12s' }}>
                <div style={{ fontSize:14, fontWeight: (sel && !past) ? 700 : 600, textDecoration: past && sel ? 'line-through' : 'none' }}>{d}</div>
                {n > 0 && <div style={{ fontFamily:'var(--pa-mono)', fontSize:9, marginTop:1, color:'var(--pa-muted)', fontWeight:600 }}>{n}/{totalIn}</div>}
              </div>
            );
          }} />
          <div style={{ display:'flex', alignItems:'center', gap:16, marginTop:14, flexWrap:'wrap' }}>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ width:16, height:16, borderRadius:4, background:'rgba(217,119,87,0.5)', display:'inline-block' }} />
              <span style={{ fontSize:11, color:'var(--pa-muted)' }}>mais escuro = mais gente</span>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ width:16, height:16, borderRadius:4, background:'#fff', border:'2.5px solid var(--pa-accent)', display:'inline-block', boxSizing:'border-box' }} />
              <span style={{ fontSize:11, color:'var(--pa-muted)' }}>os teus dias</span>
            </div>
          </div>
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          <div style={{ background:'#fff', borderRadius:16, padding:16, border:'1px solid var(--pa-line)' }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase' }}>A tua disponibilidade</div>
            <div style={{ marginTop:4, fontFamily:'var(--pa-display)', fontSize:28, fontWeight:600, letterSpacing:-0.5 }}>
              {paFutureDays(days).length} <span style={{ fontSize:14, color:'var(--pa-muted)', fontWeight:400 }}>dias marcados</span>
            </div>
          </div>

          <div style={{ background:'#fff', borderRadius:16, padding:16, border:'1px solid var(--pa-line)' }}>
            <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:10 }}>Estado do grupo</div>
            {allMembers.map((m) => {
              const rsvpState = (appData.rsvp || {})[m.id];
              const submitted = submittedIds.includes(m.id);
              const isInterested = rsvpState === 'in' || rsvpState === 'maybe';
              const isOut = rsvpState === 'out';
              let pill;
              if (isOut) pill = <Pill tone="muted" size="sm">sem interesse</Pill>;
              else if (isInterested) pill = submitted ? <Pill tone="success" size="sm">✓ pronto</Pill> : <Pill tone="muted" size="sm">a marcar…</Pill>;
              else pill = <Pill tone="muted" size="sm">sem responder</Pill>;
              return (
                <div key={m.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'6px 0', opacity: isInterested ? 1 : 0.55 }}>
                  <Avatar member={m} size={22} />
                  <span style={{ flex:1, fontSize:13, color:'var(--pa-ink)' }}>{m.name}</span>
                  {pill}
                </div>
              );
            })}
          </div>

          <DayPeoplePanel peopleByDay={peopleByDay} total={expectedMembers.length} />

          <Btn variant="accent" size="lg" style={{ width:'100%' }} onClick={() => {
            AppStore.setAvailability(me.id, days);
            if (window._paToast) window._paToast('Disponibilidade guardada!', 'success');
          }}>Guardar disponibilidade</Btn>
          {(days.length > 0 || (allAvail[me.id] || []).length > 0) && (
            <Btn variant="ghost" size="sm" style={{ width:'100%', marginTop:8 }} onClick={() => {
              if (!window.confirm('Limpar todos os teus dias marcados?')) return;
              setDays([]);
              AppStore.clearAvailability(me.id);
              if (window._paToast) window._paToast('Disponibilidade limpa — marca de novo quando quiseres.', 'success');
            }}>Limpar os meus dias</Btn>
          )}
        </div>
      </div>

      {me.isAdmin && (
        <DAdminBar hint={`${expectedSubmitted.length} de ${expectedMembers.length} submeteram.`} />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PHASE 7 — Trancar datas (AppStore)
// ─────────────────────────────────────────────────────────────
function DPhase7({ me }) {
  const appData = useAppStore();
  const allAvail = appData.avail || {};
  const allMembers = getEditionMembers(appData);
  // Datas decidem-se com a disponibilidade dos INTERESSADOS (não muda ao trancar).
  const inMembers = (typeof getInterestedMembers === 'function') ? getInterestedMembers(appData) : allMembers;
  const totalIn = inMembers.length || allMembers.length;
  const [mi, setMi] = dUseState2(0) /* mês corrente primeiro */;

  // Conta apenas a disponibilidade de quem está "in" (ignora quem marcou e depois saiu).
  // Chaves absolutas YYYY-MM-DD (dias antigos em número são normalizados).
  const inIds = dUseMemo2(() => new Set(inMembers.map((m) => m.id)), [inMembers]);
  const heat = dUseMemo2(() => {
    const h = {};
    Object.entries(allAvail).forEach(([mid, arr]) => { if (!inIds.has(mid)) return; (arr||[]).forEach((d) => { const k = paNormDay(d); h[k] = (h[k]||0) + 1; }); });
    return h;
  }, [allAvail, inIds]);

  // Mapa dia → pessoas que marcaram esse dia (só "in", para mostrar os nomes)
  const peopleByDay = dUseMemo2(() => {
    const map = {};
    Object.entries(allAvail).forEach(([mid, days]) => {
      if (!inIds.has(mid)) return;
      (days||[]).forEach((d) => { const k = paNormDay(d); (map[k] = map[k] || []).push(memberById(mid) || { id:mid, name:'?', initials:'?', color:'var(--pa-muted)' }); });
    });
    return map;
  }, [allAvail, inIds]);
  const namesFor = (k) => (peopleByDay[k] || []).map(p => p.name).join(', ');

  const locked = appData.locked || null;
  const [range, setRange] = dUseState2({ from: null, to: null });

  const ranked = dUseMemo2(() => {
    return Object.entries(heat).sort((a,b) => b[1]-a[1]).slice(0,5).map(([k,n]) => ({ day:k, count:n }));
  }, [heat]);

  const hasData = Object.keys(heat).length > 0;

  // Seleção por cliques: 1º clique = início; 2º clique = fim (se depois do início).
  // Chaves YYYY-MM-DD comparam-se como texto — funciona ENTRE meses diferentes.
  const pickDay = (k) => {
    if (!me.isAdmin) return;
    setRange((r) => {
      if (!r.from || (r.from && r.to)) return { from: k, to: null };       // novo início
      if (k >= r.from) return { from: r.from, to: k };                      // fecha intervalo
      return { from: k, to: null };                                         // antes do início → recomeça
    });
  };

  const selFrom = range.from, selTo = range.to || range.from;

  return (
    <div className="pa-scroll" style={{ flex:1, minHeight:0, padding:'32px 36px', display:'flex', flexDirection:'column', overflow:'auto' }}>

            const k = paDayKey(PA_MONTHS[mi].y, PA_MONTHS[mi].m, d);
            const n = heat[k] || 0;
            const inRange = selFrom && k >= selFrom && k <= selTo;

            const intensity = totalIn > 0 ? n/totalIn : 0;
            return (
              <div title={past ? 'Dia já passado' : (n > 0 ? namesFor(k) : undefined)} style={{ width:'100%', height:'100%', borderRadius:8,
                opacity: past && !isLocked ? 0.5 : 1,

                color: isLocked||inRange ? '#fff' : past ? 'var(--pa-muted)' : 'var(--pa-ink)',
                border: intensity===0&&!inRange&&!isLocked ? '1px solid var(--pa-line)' : 'none',

        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          {locked && (
            <div style={{ background:'var(--pa-ink)', color:'#fff', borderRadius:16, padding:18 }}>
              <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'rgba(255,255,255,0.6)', textTransform:'uppercase' }}>Trancado 🔒</div>

                onClick={() => window.paDownloadIcs()}>

              </Btn>

// 🎒 Bagagem partilhada: "quem leva o quê". Itens de grupo (coluna, jogos,
// kit primeiros socorros) com claim "levo eu" — evita 3 colunas e zero abre-latas.
function PlanBagagem({ me }) {
  const appData = useAppStore();
  const plan = AppStore.getPlanning();
  const packing = plan.packing || [];
  const [name, setName] = dUseState2('');
  const [isGroup, setIsGroup] = dUseState2(true);
  const members = (typeof getEditionMembers === 'function') ? getEditionMembers(appData) : [];
  const byId = (id) => members.find((m) => m.id === id) || null;

  const add = () => {
    const n = name.trim();
    if (!n) return;
    AppStore.updatePlanning((p) => ({ ...p, packing: [ ...(p.packing || []),
      { id: 'pk_' + Date.now().toString(36), name: n.slice(0, 60), group: isGroup, claimedBy: null, by: me.id } ] }));
    setName('');
  };
  const claim = (item) => {
    AppStore.updatePlanning((p) => ({ ...p, packing: (p.packing || []).map((it) =>
      it.id === item.id ? { ...it, claimedBy: it.claimedBy === me.id ? null : me.id } : it) }));
  };
  const remove = (item) => {
    if (!window.confirm(`Tirar "${item.name}" da lista?`)) return;
    AppStore.updatePlanning((p) => ({ ...p, packing: (p.packing || []).filter((it) => it.id !== item.id) }));
  };

  const groupItems = packing.filter((it) => it.group);
  const unclaimed = groupItems.filter((it) => !it.claimedBy).length;
  const personal = packing.filter((it) => !it.group);

  const renderItem = (it) => {
    const owner = it.claimedBy ? byId(it.claimedBy) : null;
    const mine = it.claimedBy === me.id;
    const canRemove = me.isAdmin || it.by === me.id;
    return (
      <div key={it.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 12px',
        borderRadius:12, background:'#fff', border: owner ? '1px solid var(--pa-line)' : '1px dashed var(--pa-accent)' }}>
        <span style={{ flex:1, fontFamily:'var(--pa-body)', fontSize:13.5, fontWeight:600, color:'var(--pa-ink)', minWidth:0, overflow:'hidden', textOverflow:'ellipsis' }}>{it.name}</span>
        {it.group && (owner
          ? <span style={{ display:'inline-flex', alignItems:'center', gap:6 }}>
              <Avatar member={owner} size={20} />
              <span style={{ fontFamily:'var(--pa-body)', fontSize:11.5, color:'var(--pa-muted)' }}>{mine ? 'levas tu' : owner.name}</span>
            </span>
          : <span style={{ fontFamily:'var(--pa-body)', fontSize:11.5, color:'var(--pa-accent)' }}>por atribuir</span>)}
        {it.group && (
          <button onClick={() => claim(it)} style={{ padding:'5px 10px', borderRadius:999, cursor:'pointer',
            border: mine ? '1.5px solid var(--pa-accent)' : '1px solid var(--pa-line)',
            background: mine ? 'rgba(217,119,87,0.1)' : '#fff', color: mine ? 'var(--pa-accent)' : 'var(--pa-ink)',
            fontFamily:'var(--pa-mono)', fontSize:10, fontWeight:700 }}>
            {mine ? '✓ levo eu' : 'levo eu'}
          </button>
        )}
        {canRemove && (
          <button onClick={() => remove(it)} aria-label={'Tirar ' + it.name} style={{ border:'none', background:'transparent', color:'var(--pa-muted)', cursor:'pointer', fontSize:14, padding:0 }}>×</button>
        )}
      </div>
    );
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <div style={{ display:'flex', gap:8, flexWrap:'wrap', alignItems:'center' }}>
        <input value={name} onChange={(e) => setName(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') add(); }}
          placeholder="Adicionar item" maxLength={60}
          style={{ flex:1, minWidth:180, padding:'11px 14px', borderRadius:12, border:'1px solid var(--pa-line)', background:'#fff',
            fontFamily:'var(--pa-body)', fontSize:16, color:'var(--pa-ink)', outline:'none' }} />
        <button onClick={() => setIsGroup((g) => !g)} title="Itens de grupo têm um responsável; pessoais são só lembrete para todos"
          style={{ padding:'9px 13px', borderRadius:12, cursor:'pointer', border:'1px solid var(--pa-line)',
            background: isGroup ? 'var(--pa-ink)' : '#fff', color: isGroup ? '#fff' : 'var(--pa-muted)',
            fontFamily:'var(--pa-mono)', fontSize:10.5, fontWeight:700 }}>
          {isGroup ? '👥 de grupo' : '🧍 pessoal'}
        </button>
        <Btn variant="accent" size="sm" onClick={add} disabled={!name.trim()}>Adicionar</Btn>
      </div>

      {packing.length === 0 && (
        <div style={{ fontFamily:'var(--pa-body)', fontSize:13, color:'var(--pa-muted)', textAlign:'center', padding:'18px 0' }}>
          A lista está vazia. Começa pelas coisas do grupo — coluna de som, jogos, kit de primeiros socorros…
        </div>
      )}

      {groupItems.length > 0 && (
        <div>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:8 }}>
            👥 Coisas do grupo {unclaimed > 0 ? `— ${unclaimed} por atribuir` : '— tudo atribuído ✓'}
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>{groupItems.map(renderItem)}</div>
        </div>
      )}

      {personal.length > 0 && (
        <div>
          <div style={{ fontFamily:'var(--pa-mono)', fontSize:10, letterSpacing:1.2, color:'var(--pa-muted)', textTransform:'uppercase', marginBottom:8 }}>
            🧍 Não esquecer (cada um leva o seu)
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>{personal.map(renderItem)}</div>
        </div>
      )}
    </div>
  );
}
